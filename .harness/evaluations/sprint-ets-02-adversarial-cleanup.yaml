verdict_summary: |
  Sprint 2 cleanup batch substantively complete. The headline adversarial axes I
  attacked all hold up to scrutiny:

  (1) **Dana's "/req/core/* fictional" claim** — VERIFIED. The OGC ogcapi-common
  `/19-072/requirements/` directory contains EXACTLY 4 subdirs (`html`, `json`,
  `landing-page`, `oas30`); no `core/` subdirectory exists. Verified independently via
  `curl -sL "https://api.github.com/repos/opengeospatial/ogcapi-common/contents/19-072/requirements?ref=master"`.
  All 4 canonical URIs Dana swept to (`/req/landing-page/{root,conformance,api-definition}-success`
  and `/req/oas30/oas-impl`) return HTTP 200 against the `.adoc` source. Dana's URI
  mapping table at `ets-ogcapi-connectedsystems10/ops/test-results/sprint-ets-02-uri-canonical-mapping-2026-04-28.md`
  is HONEST; spot-checks confirm row-by-row. Sprint 1 inherited PARTIAL
  `uri_mapping_fidelity_preserved` is now closed PASS.

  (2) **ETSAssert refactor correctness** — ALL 5 helpers exist EXACTLY per ADR-008
  signatures (assertStatus, assertJsonObjectHas, assertJsonArrayContains,
  assertJsonArrayContainsAnyOf, failWithUri); each uses `java.lang.AssertionError` (not
  TestNG SkipException); each prefixes the URI; each has both PASS and FAIL unit tests.
  Independent grep `grep -rnE 'throw new AssertionError|Assert\.fail' src/main/java/.../conformance/`
  returns ZERO hits. The 21 bare-throw sites are migrated to helper calls (verified by
  inspection of refactored LandingPageTests/ConformanceTests/ResourceShapeTests). The
  3 pre-existing AssertionErrors in ETSAssert.java (lines 84/108/138) are in the
  XML/Schematron helpers (assertXPath/assertSchemaValid/assertSchematronValid) — not
  new, not in conformance/*. listener/* and util/* are clean of bare throws.

  (3) **VerifyETSAssert + VerifyCredentialMaskingFilter unit tests are SUBSTANTIVE,
  not vacuous**. Independent fresh-clone surefire run: 49 tests / 0 failures / 0 errors
  / 3 skipped (matches Dana's claim exactly). VerifyETSAssert: every helper has
  PASS-path with concrete value AND FAIL-path with structured AssertionError message
  asserting URI prefix + descriptive substring. VerifyCredentialMaskingFilter: 15
  tests cover Bearer 24-char, API key 16-char, 9-char threshold, 8-char boundary
  (full redaction), <8-char (full redaction), null/empty (full redaction), case-
  insensitive header set membership for Authorization + X-API-Key + Cookie + Set-Cookie
  + Proxy-Authorization, custom set construction, IllegalArgumentException for null
  set. Critical leak guard explicitly asserts `EFGH12345678WXYZ` does NOT appear in
  masked form (`maskValue_bearerTwentyFourCharsMaskedToFirst4ThreeStarsLast4` line 40).

  (4) **CredentialMaskingFilter v1.0 semantic parity** — VERIFIED at the maskValue level.
  The Java port's `maskValue(value)` (lines 108-116) is byte-equivalent to v1.0
  TypeScript `CredentialMasker.maskValue()` (csapi_compliance/src/engine/credential-masker.ts
  lines 36-41): both use first-4 + middle-as-stars + last-4; both use `****` for ≤8
  chars; both treat null as `****`. **However** — see CONCERN-1 below for the wiring-
  level divergence: the v1.0 TS implementation actively MUTATES headers in
  `maskExchange()` to produce a masked exchange object. The Java port's
  `CredentialMaskingFilter.filter()` (lines 152-170) does NOT mutate the outgoing
  request (would break auth handshake) and does NOT intercept REST-Assured's built-in
  RequestLoggingFilter — it only emits a parallel FINE-level log of the masked form.
  This semantic difference is honestly disclosed in the Java code comment (lines 145-150)
  but is materially weaker than v1.0's mask-the-stored-exchange semantics, AND weaker
  than design.md §529's claim "the actual masking BEFORE the request/response reaches
  the logger." Combined with the deferred integration test, this is the single
  load-bearing concern in the Sprint 2 batch.

  (5) **Multi-stage Dockerfile is genuinely multi-stage** — TWO `FROM` directives
  (line 19 builder eclipse-temurin:17-jdk-jammy AS builder; line 71 runtime
  tomcat:8.5-jre17), USER tomcat directive (line 134), BuildKit cache mount syntax
  EXACTLY per ADR-009 (`--mount=type=cache,target=/root/.m2`). scripts/smoke-test.sh
  no longer calls host mvn — the build stage bakes it.

  (6) **No-host-mvn smoke verification — INDEPENDENTLY CONFIRMED**. From a fresh
  clone with NO mvn on PATH (`unset PATH; export PATH=/usr/bin:...` minus mvn) and
  empty target/ (deleted lib-runtime + jars + ctl.zip), `bash scripts/smoke-test.sh`
  produced exit 0, 12/12 PASS in ~35s end-to-end (build + run + smoke). Container
  log clean of startup ERROR/SEVERE. Image runs as `uid=999(tomcat) gid=999(tomcat)`
  per `docker run --rm ... id`. Eliminates Raze s03 CONCERN-2 + CONCERN-3 as Sprint 2
  promised.

  (7) **Adversarial sabotage test — DETECTION CONFIRMED**. I injected
  `ETSAssert.assertStatus(this.landingResponse, 999, REQ_ROOT_SUCCESS);` (always-fail)
  in LandingPageTests.landingPageReturnsHttp200, rebuilt via multi-stage Docker (35s),
  ran smoke. Output: `TestNG: total=12 passed=11 failed=1 skipped=0` followed by
  `[smoke-test FATAL] TestNG report has failed=1 (>0)`. Restored test, verified
  recovery. The smoke-test.sh detection logic still works through the multi-stage
  rewrite — Dana's no-regression claim holds.

  (8) **Reproducibility — INDEPENDENTLY CONFIRMED** at HEAD 7f05eb6 via fresh-clone
  Maven build. `target/ets-ogcapi-connectedsystems10-0.1-SNAPSHOT.jar` sha256
  `07c4d438080a49df900f2cb96a7b4a8bbefb5320508a4cdc70576416b2df0004` matches user
  worktree byte-identical. Dana's claim verified.

  (9) **Sequential -02 → -03 actually held — VERIFIED**. `git log --reverse 8aeffbf..7f05eb6`
  shows: 50d0985 + 5069326 + 287b371 + e64afef (the four S-02-02 commits in order:
  ETSAssert extension, then LandingPage refactor, then ConformanceTests, then
  ResourceShapeTests) → 1abdaa2 (S-02-03 URI sweep) → dc5cb57 (S-02-04 logback) →
  7f05eb6 (S-02-05 multi-stage Dockerfile). Strict sequential ordering preserved per
  architect-handoff `surfaced_risks.SCOPE-CONFLICT-INSIDE-CONFORMANCE-CORE-RACE`
  mitigation.

  (10) **gh workflow scope claim — VERIFIED**. `gh auth status` reports scopes
  `'gist', 'read:org', 'repo'` only — `workflow` IS missing. Dana correctly
  diagnosed; the deferral is genuine, not a misdiagnosis.

  (11) **No regression of Sprint 1 invariants** — schema bundle byte-identical to
  csapi_compliance@HEAD (`diff -r` empty); pom.xml `<connected-systems-yaml.sha>3fd86c73...</>`
  preserved at HEAD 7f05eb6; META-INF/services file 58 bytes single-line FQCN unchanged;
  smoke 12/12 PASS preserved at every commit boundary; stale-string scan returns only
  legitimate canonical OGC URI form (`ogcapi-connectedsystems-1/1.0/conf/core` in
  ConformanceTests:33+49); no Pat-coordinate strings in production paths.

  Sprint 2 contract walk: 14/16 success_criteria PASS; 1/16 PARTIAL (`ci_workflow_live`
  blocked by gh token scope — DEFERRED-WITH-RATIONALE per S-ETS-02-05 acceptance);
  1/16 NEW concern surfaces (`no_credential_leak_in_test_logs` — see CONCERN-1).
  Image size criterion not formally listed but Dana flags 815MB vs 450MB target as
  Sprint 3 carryover with ADR-009 "Image size target" §157 deferral language.

  TWO concerns hold the verdict at APPROVE_WITH_CONCERNS:

  **CONCERN-1 (medium)**: CredentialMaskingFilter is wired but functionally weaker
  than design.md/architect-handoff text implies. The filter cannot mutate the outgoing
  request (correct — would break auth), AND does not wrap REST-Assured's built-in
  RequestLoggingFilter (NOT correct per design.md §529 "the actual masking BEFORE
  the request/response reaches the logger"). The Java code is honest about this gap
  (lines 145-150 disclose); the integration test that would have caught it is
  deferred. Quinn (or future Raze) should not interpret SCENARIO-ETS-CLEANUP-LOGBACK-MASKING-001
  as functionally proven by VerifyCredentialMaskingFilter alone — only the maskValue
  semantics are proven; the END-TO-END "Authorization header in REST-Assured request
  log is masked" claim is unproven and depends on Sprint 2's suite NOT chaining
