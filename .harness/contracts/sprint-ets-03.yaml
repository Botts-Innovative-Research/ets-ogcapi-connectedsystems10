  - id: "S-ETS-03-07"
    title: "Implement CS API Common (`/conf/common`) conformance class end-to-end against GeoRobotix"
    file: "epics/stories/s-ets-03-07-common-conformance-class.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"  # Foundational — every remaining 11 Part 1 class inherits from Common's base assertions; highest dependency-leverage
    complexity: "M"
    depends_on: []  # Independent — Common is a sibling of Core (not a dependent); both inherit from OGC API Common Part 1
    parallelizable: true
    rationale: |
      Second additional Part 1 conformance class beyond Core + SystemFeatures.
      Mirrors the S-ETS-01-02 / S-ETS-02-06 architectural pattern: new
      `conformance.common.*` subpackage with at least one TestNG @Test per ATS
      assertion in OGC 23-001 Annex A `/conf/common/`, REQ-ETS-PART1-001 expanded
      from PLACEHOLDER → SPECIFIED with full per-assertion enumeration,
      SCENARIO-ETS-PART1-001-* added, testng.xml wired (Common is INDEPENDENT
      of Core — same group-dependency-DAG-root level as Core; no
      dependsOnGroups entry needed; Common runs in parallel with Core), smoke
      verified against GeoRobotix.

      **Why Common over Subsystems/Procedures/Sampling/Properties/Deployments**
      (Pat's pick — single class for Sprint 3, NOT pair):
      (i) **Highest dependency-leverage**: every remaining 11 Part 1 class
          (Subsystems, Procedures, Sampling, Properties, Deployments,
          AdvancedFiltering, CRUD, Update, GeoJSON, SensorML, plus Subdeployments)
          inherits from Common's base assertions (collections discovery,
          link-relations discipline beyond Core's landing-page subset, content
          negotiation). Landing Common in Sprint 3 unlocks all 11 cleanly.
      (ii) **GeoRobotix readily exercises Common**: Common asserts are at
          IUT-root level (landing-page link relations, collections endpoint,
          content negotiation) — GeoRobotix's open IUT serves all of these.
          Empirical curl-verification trivial.
      (iii) **Subsystems pair would force the multi-class testng.xml
          consolidation pattern earlier**: design.md §"testng.xml single-block
          consolidation" notes Sprint 3+ migration path needs BeforeSuite
          SkipException pattern OR SuitePreconditions-style listener for >2
          dependent classes. Subsystems depends on SystemFeatures → would force
          this Sprint-3-early. With Common+Subsystems, the testng.xml strategy
          revisit is also Sprint-3-early. Subsystems alone (without Common
          first) reduces dependency leverage. Pair (Common+Subsystems) doubles
          new-feature scope on top of 8 carryover items → gate fatigue risk.
      (iv) **Common has the smallest assertion surface** of the foundational
          choices (~5-7 ATS items per OGC 23-001 Annex A `/conf/common`),
          making the per-class new-feature effort ~30-40% the cost of S-ETS-01-02
          (S-ETS-02-06 was ~50% as design.md predicted; Common will be smaller
          because Core's landing-page+conformance assertions overlap with
          Common's discovery assertions).

      **Generator MUST**: (a) curl `https://api.georobotix.io/ogc/t18/api/`,
      `https://api.georobotix.io/ogc/t18/api/conformance`, and
      `https://api.georobotix.io/ogc/t18/api/collections` (if it exists)
      BEFORE writing assertions; archive curl evidence into Implementation
      Notes; (b) verify OGC `.adoc` canonical URI form for each Common
      sub-requirement (5 sub-requirements expected: `/req/common/landing-page`,
      `/req/common/conformance`, `/req/common/collections`,
      `/req/common/content-negotiation`, `/req/common/json-html`); (c) use
      ETSAssert helpers + canonical URI form from day 1; (d) do NOT introduce
      new bare-throw sites (Sprint 2 invariant `zero_bare_assertionerror_in_conformance`
      preserved); (e) preserve any v1.0 known-issue handling for Common
      (sweep `csapi_compliance/src/engine/registry/common.ts` for tolerance
      comments before writing assertions).

      **Architectural deferral**: Architect ratifies (i) full per-assertion
      coverage now vs Sprint-1-style minimal-then-expand (Pat recommends
      Sprint-1-style minimal — 4-5 @Tests covering the 3-4 highest-priority
      assertions, narrowed PARTIAL with explicit deferral notes — to preserve
      gate verification time and the Quinn 0.96 trend); (ii) testng.xml
      consolidation strategy for Common (independent of Core like
      SystemFeatures isn't, so a SECOND `<test>` block OR a sibling group
      annotation in the existing single-block — the latter aligns with Sprint 2
      single-block consolidation; Architect picks). See deferred_to_architect.

