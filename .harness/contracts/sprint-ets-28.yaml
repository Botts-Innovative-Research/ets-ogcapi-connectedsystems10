verdict_policy:
  declaration_gate:
    - "If /conf/json is not declared exactly, JSON assertions SKIP with a precise reason."
  prerequisites:
    - "Keep SWE Common 3.0 /conf/json-record-components visible before reporting full class closure."
  condition_gates:
    - "DataStream/Observation JSON assertions require /conf/datastream."
    - "ControlStream/Command/CommandStatus/CommandResult JSON assertions require /conf/controlstream."
    - "SystemEvent JSON assertions require /conf/system-event."
  schema_honesty:
    - "Schema PASS requires a retrieved candidate resource or collection and the corresponding bundled schema."
    - "Observation, Command, and CommandResult constraints require parent schema evidence and candidate child resource evidence."
  endpoint_honesty:
    - "HTTP 400, HTTP 500, streaming-only, empty candidate collections, and text/html error bodies cannot produce JSON conformance PASS."
  mutation_safety:
    - "Default public GeoRobotix smoke must issue zero IUT-bound POST, PUT, PATCH, or DELETE."
    - "Requirement 94 mediatype-write is API-definition/readiness only in the first increment."
    - "OPTIONS alone cannot PASS mediatype-write."

generator_must_do:
  - "Record exact HEAD before editing."
  - "Use official OGC 23-002 identifiers: /req/json and /conf/json."
  - "Use OGC 23-002 Annex A.9 schema names and bundled schemas under connected-systems-2/json."
  - "Gate resource-specific assertions on /conf/datastream, /conf/controlstream, and /conf/system-event."
  - "Add tests/comments referencing REQ-ETS-PART2-009 and SCENARIO-ETS-PART2-009-* IDs."
  - "Run formatter, scripts/mvn-test-via-docker.sh, and TeamEngine smoke after implementation."
  - "Verify public smoke logs contain zero IUT-bound POST/PUT/PATCH/DELETE by default."
  - "Update spec/story/traceability/status/changelog/test-results after implementation."

generator_must_not_do:
  - "Do not mutate public GeoRobotix."
  - "Do not PASS /conf/json from Common JSON, GeoJSON, SWE Common, or resource-class declarations."
  - "Do not PASS schema validation without an actual resource or collection validated against the named schema."
  - "Do not PASS Observation/Command/CommandResult dynamic constraints from hardcoded examples."
  - "Do not implement SWE Common JSON, SWE Common Text, SWE Common Binary, or observation-binding closure in this sprint."

evaluation_focus:
  raze:
    - "Attack false PASS from /conf/json declaration alone."
    - "Attack missing SWE Common JSON record-components prerequisite handling."
    - "Attack missing resource condition gates for /conf/datastream, /conf/controlstream, and /conf/system-event."
    - "Attack schema-validation claims without bundled schema and candidate resource evidence."
    - "Attack dynamic constraint PASS from hardcoded examples rather than parent schemas."
    - "Attack any path that mutates public GeoRobotix."
