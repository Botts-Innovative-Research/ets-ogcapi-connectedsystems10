findings:
  - id: "RAZE-ETS19-FOLLOWUP-GAP-001"
    severity: "medium"
    area: "spec/story/status consistency"
    status: "open"
    title: "Follow-up r3 evidence is not reconciled across mandatory Sprint 19 docs"
    detail: >
      `ops/test-results.md` and `ops/changelog.md` record the r3 Maven total
      (144/0/0/3), GeoRobotix smoke r3 (89/55/0/34), and local OSH mutable-auth
      smoke r3 (89/52/4/33) with both mediatype-write tests PASS. However,
      `ops/status.md`, the Sprint 19 story, OpenSpec implementation evidence,
      and traceability still describe the earlier pre-follow-up state, including
      143 Maven tests and/or positive dedicated mutable-IUT mediatype-write
      evidence still being required. This does not undermine the Java change, but
      it violates the repo's spec-anchored reconciliation rule before a clean
      amend/commit.
    required_fix: >
      Reconcile Sprint 19 story, ops/status.md, OpenSpec REQ-ETS-PART1-012 and
      REQ-ETS-PART1-013 evidence notes, and _bmad/traceability.md with the r3
      Maven, GeoRobotix smoke, and local OSH positive mediatype-write evidence.
      Keep the overall GeoJSON/SensorML requirement classes PARTIAL and call out
      the four unrelated local OSH SensorML non-system 500 failures.

  - id: "RAZE-ETS19-FOLLOWUP-CONCERN-001"
    severity: "low"
    area: "cleanup diagnostics"
    status: "accepted_followup"
    title: "Cleanup DELETE remains best-effort"
    detail: >
      The r3 local OSH request log shows cleanup DELETE requests after both
      GeoJSON and SensorML mediatype-write positive checks. The tests still do
      not assert cleanup status. This is acceptable for the current assertion
      because PASS depends on POST status, created-resource discovery, follow-up
      GET, and UID preservation, but dedicated mutable-IUT diagnostics remain
      weaker if cleanup ever fails.
    required_fix: null

