  gaps:
    - id: "PROG-ASSERTION-WEAK"
      severity: "HIGH"
      issue: >
        SCENARIO-SESS-PROG-001 marked PASS on the strength of a single
        assertion (getByText(/Assessment in Progress/i)). The spec text
        explicitly requires: current class name, next test name, 'N/M' counter,
        progress bar percentage, and 1-second update latency. TC-E2E-001
        validates NONE of these observable behaviors. Backend duration on the
        last run was 1331ms (81 tests total; 16 pass / 12 fail / 53 skip), so
        the progress page likely renders and redirects in under 2 seconds —
        the Playwright assertion only confirms the heading mounted briefly
        before redirect. This is a render check, not a behavior check.
      locations:
        - "tests/e2e/assessment-flow.spec.ts:176-178"
        - "openspec/capabilities/progress-session/spec.md:61-64 (SCENARIO text)"
    - id: "RPT-TEST-FILTER-NOT-EXERCISED"
      severity: "HIGH"
      issue: >
        SCENARIO-RPT-TEST-001 ('test-level filtering') marked PASS. TC-E2E-001
        never clicks any filter button. Filter buttons exist at
        src/app/assess/[id]/results/page.tsx:277-295 (all/pass/fail/skip),
        but no E2E test exercises them, and no unit test exercises them
        either. The traceability.md claim 'per-filter behavior covered by
        unit tests in tests/unit/components' is FALSE — that directory does
        not exist, and no unit test touches StatusFilter/setFilter.
      locations:
        - "_bmad/traceability.md:154"
        - "tests/e2e/assessment-flow.spec.ts:183-191"
    - id: "EXP-JSON-NOT-DOWNLOADED"
      severity: "MEDIUM"
      issue: >
        SCENARIO-EXP-JSON-001 marked PASS based on the Export JSON button
        being visible. TC-E2E-001 does NOT click the button, does NOT
        assert the download event, and does NOT assert the downloaded
        payload shape. There is server-route + api-client unit coverage
        (tests/unit/server/assessments.test.ts, tests/unit/engine/export-engine.test.ts),
        so this gap is smaller than RPT-TEST-001, but the E2E claim is
        still weaker than the scenario text.
      locations:
        - "tests/e2e/assessment-flow.spec.ts:190-191"
    - id: "DESTRUCTIVE-BACKEND-UNENFORCED"
      severity: "HIGH"
      issue: >
        Spec openspec/capabilities/conformance-testing/design.md:123 and
        dynamic-data-testing/design.md:278 state that the backend MUST return
        HTTP 400 if a destructive-class selection arrives without the opt-in
        confirmation. Grep of src/server/ shows ZERO references to
        'destructive' or 'destructiveConfirm'. The POST /api/assessments/:id/start
        handler (src/server/routes/assessments.ts:185-232) accepts
        conformanceClasses with no gating whatsoever. TC-E2E-006 validates
        only the frontend UX gate; the backend is a latent bypass. Not
        introduced this turn, but this turn marked the destructive-confirm
        story as RESOLVED in known-issues.md, which is premature.
      locations:
        - "src/server/routes/assessments.ts:185-232"
        - "openspec/capabilities/conformance-testing/design.md:123"
        - "ops/known-issues.md (FINDING marked RESOLVED)"
    - id: "SCENARIO-GAP-DESTRUCTIVE"
      severity: "MEDIUM"
      issue: >
        The destructive-confirm gate is now a first-class tested behavior
        but has NO SCENARIO-* in openspec/capabilities/progress-session/spec.md
        or conformance-testing/spec.md enumerating the Given/When/Then.
        TC-E2E-006 has no SCENARIO-* trace in its header comment
        (assessment-flow.spec.ts:263-267 only says 'destructive-confirm UX
        gate'). This violates CLAUDE.md Step 1 (Spec First) and Step 2
        (tests reference REQ-*/SCENARIO-*).
      locations:
        - "tests/e2e/assessment-flow.spec.ts:263-267"
        - "openspec/capabilities/progress-session/spec.md (missing scenario)"

  scope_creep:
