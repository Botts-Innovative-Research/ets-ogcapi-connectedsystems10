scope:
  include:
    - Verify and build the exact upstream SWE Common validator source commit until a repository artifact is published.
    - Wrap SweCommonJsonSchemaValidator behind an ETS-owned result boundary.
    - Retain local Connected Systems wrapper, format, encoding, mapping, binding, media-type, and skip/fail behavior.
    - Dual-validate extracted recordSchema components in all JSON, Text, and Binary Observation/Command schema assertions.
    - Exercise all six complete wrapper variants through local and reusable validation, including active requirement-URI diagnostics.
    - Exclude upstream NetworkNT/Jackson versions and package validator classes/resources in the slim shaded ETS jar.
    - Extend structural and runtime verification for source provenance, shaded resources, relocation, and duplicate jar families.
  exclude:
    - Importing the upstream ets-swecommon30 suite jar.
    - Removing local SWE schemas or local JSON/Text/Binary encoding validation.
    - Adding SensorML until FCU/OGC exposes a reusable module.
success_criteria:
  - Tests cite REQ-ETS-VALIDATOR-001 and applicable scenario identifiers.
  - Valid and invalid SWE components prove deterministic immutable diagnostics and operational-error classification.
  - Supported Docker Maven and Dockerfile paths bootstrap the same exact upstream commit.
  - The final TeamEngine image contains embedded validator classes/resources and no standalone duplicate runtime-family jar.
  - The final-image verifier executes valid and invalid adapter calls using shaded schema resources and relocated NetworkNT.
  - Existing advisory PASS/SKIP totals do not drift and no mutation is issued.
  - Mandatory primary local OSH TeamEngine E2E completes before story completion.
  - Raze returns no unresolved worktree required fixes.
guardrails:
  - Upstream ValidationMessage types must not escape the adapter API.
  - Missing validator schemas or configuration are suite errors, not IUT failures.
  - The source bootstrap must fail closed on source mismatch or unavailability.
  - GeoRobotix remains advisory and cannot substitute for primary local OSH E2E.
