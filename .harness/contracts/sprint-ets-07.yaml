# --- Process improvements (per meta-Raze recommendations, baked into success_criteria) ---
process_improvements:
  bash_x_trace_verification:
    description: |
      Sprint 7 contract mandates bash -x trace verification for any modified bash script.
      Generator MUST run bash -x <modified-script> for each modified script and archive the
      trace. Quinn and Raze each verify the trace for their respective script at gate time.
      This catches the GAP-Q1 (wrong grep target) + GAP-3 (pipefail unreachable) class of defects.
    enforced_in: "success_criteria.bash_x_trace_evidence_for_bash_changes"
    gate_check: "evaluation_questions_for_quinn (cred-leak trace) + evaluation_questions_for_raze (sabotage trace)"

  generator_design_md_adr_self_audit:
    description: |
      When Generator modifies a Java filter, listener, or other architectural component,
      Generator MUST grep design.md and all ADR docs for references to the OLD pattern.
      Any stale references MUST be updated or marked historical in the SAME sprint.
      This directly enforces the fix for META-GAP-M1 (design.md §Sprint 3 hardening
      still described old subclass-based super.filter() wrap pattern after Sprint 6's
      approach (i) redesign).
    enforced_in: "success_criteria.generator_design_md_adr_self_audit"
    note: "S-ETS-07-01 Wedge 5 is the remediation story for the Sprint 6 missed self-audit."

  spec_status_honesty_principle:
    description: |
      REQ status in spec.md REQUIRES live-exec verification before being set to IMPLEMENTED.
      If live-exec is deferred to gate, status MUST remain PARTIAL-IMPLEMENTED, SPECIFIED,
      or STRUCTURAL-IMPLEMENTED-LIVE-EXEC-FAILED. The overconfident IMPLEMENTED status in
      REQ-ETS-CLEANUP-017 (Sprint 6) and the Sprint 5 META-RAZE M-3 framing-flattening
      pattern are both evidence of this recurring issue. This principle is now a first-class
      success criterion.
    enforced_in: "success_criteria.spec_status_honesty_principle"
    applies_to_sprint_7: |
      REQ-ETS-PART1-007 + 008 status should be promoted to IMPLEMENTED only after
      Generator runs mvn test and confirms ≥4 @Tests PASS. REQ-ETS-CLEANUP-017 must
      stay STRUCTURAL-IMPLEMENTED-LIVE-EXEC-FAILED until Wedge 1 cascade XML is produced.

risks:
  medium:
    - id: "SAMPLING-FEATURES-ENDPOINT-PATH"
      description: |
        GeoRobotix returns HTTP 200 for /samplingFeatures (confirmed at planning). The OGC
        spec may use /samplingFeatures or /sampling-features or another variant. Generator
        must verify the actual URL path against GeoRobotix's /conformance endpoint (look
        for the SF conformance URI) before hardcoding the path in the test. If GeoRobotix
        doesn't declare /conf/sf in conformance, all SF @Tests must SKIP-with-reason.
      severity: medium
      mitigation: "Generator reads GeoRobotix /conformance before writing SF assertions. If /conf/sf absent, use @BeforeClass SkipException with explicit conformance-based reason."
    - id: "PROPERTY-DEFINITIONS-ITEM-SHAPE"
      description: |
        Property definitions may have a different response shape than system/subsystem/procedure
        resources. The /conf/property requirements may not mandate `type`, `id`, `links` in
        exactly the same form. Generator must read actual GeoRobotix /properties/{id} response
        shape before asserting specific fields.
      severity: medium
      mitigation: "Generator curl-verifies /properties/{first-id} and checks actual field names. If different from system-resource shape, adapt assertions accordingly (defense-in-depth SKIP-with-reason for fields absent in GeoRobotix response)."
    - id: "SABOTAGE-MARKER-INJECTION-GENERALITY"
      description: |
        The `if (true) throw` fix is specific to defeating javac's reachability analysis for a
        two-statement method body. If Generator changes the injection point or the method body,
        a different approach may be needed. The fix is well-understood (JLS §14.21 constant-
        expression idiom) but is still a change to the python injector.
      severity: medium
      mitigation: "Generator reads JLS §14.21 rationale in the story Technical Notes. Tests by running Docker build in /tmp clone. If javac still rejects with unreachable statement, escalate immediately to next option (replace method body entirely, per Raze's option 2 suggestion)."
  low:
    - id: "TESTNG-GROUP-NAMING-CONVENTION"
      description: |
        Pat uses 'samplingfeatures' and 'propertydefinitions' as group names (all lowercase,
        no hyphens, matching existing 'systemfeatures', 'subsystems', 'procedures', 'deployments'
        convention). Generator should not diverge from this naming convention.
      severity: low
      mitigation: "Generator follows the existing naming convention exactly. No architecture decision required."

