findings:
  - id: RAZE-ETS27-PLAN-GAP-001
    severity: MEDIUM
    status: CLOSED
    title: "Clause 15 per-requirement Conditions are now explicit planning gates."
    evidence:
      - "Official OGC 23-002 Clause 15 gives Conditions for the individual Update requirements: Datastream/Observation requirements depend on Datastreams & Observations, ControlStream/Command requirements depend on Control Streams & Commands, Feasibility requirements depend on Command Feasibility, and SystemEvent update depends on System Events."
      - "OpenSpec REQ-ETS-PART2-008 now has a Condition gates paragraph and SCENARIO-ETS-PART2-008-RESOURCE-CONDITION-GATES-001 requiring /conf/datastream for R79-R82, /conf/controlstream for R83-R88, /conf/feasibility for R89-R91, and /conf/system-event for R92."
      - "The Sprint 27 story now lists the Clause 15 condition gates and requires missing condition classes to produce prerequisite-incomplete SKIP behavior rather than PASS from /conf/update, endpoint availability, sibling declarations, or OPTIONS."
      - "The Sprint 27 contract now includes condition_gates under upstream_ogc_verification, verdict_policy entries for R79-R92, and generator must/must-not constraints preventing PASS when the condition class is absent."
      - "Traceability, epic notes, ops status/test-results/known-issues/changelog, and planner handoff now all carry the condition-gate policy."
    required_fix: null

  - id: RAZE-ETS27-PLAN-CONCERN-001
    severity: LOW
    status: ACCEPTED
    title: "No accepted Sprint 27 E2E gate exists yet, but the docs do not overclaim it."
    evidence:
      - "Archived GeoRobotix XML reports 146 total / 27 passed / 5 failed / 114 skipped."
      - "ops/test-results.md and the story call the GeoRobotix run a failed advisory public check, not an accepted Sprint 27 E2E gate."
      - "Local OSH is explicitly blocked for Sprint 27 planning because the current shell lacks SMOKE_AUTH_CREDENTIAL and unauthenticated /conformance returns HTTP 401."
    required_fix: null

  - id: RAZE-ETS27-PLAN-CONCERN-002
    severity: LOW
    status: ACCEPTED
    title: "GeoRobotix Features Part 4 Update prerequisite state is not separately summarized."
    evidence:
      - "The spec/story/contract correctly list OGC API Features Part 4 /req/update and /conf/update as the prerequisite authority."
      - "The current GeoRobotix probe summaries explicitly mention Features Part 4 /conf/create-replace-delete and Part 2 /conf/update absence, but do not separately summarize whether Features Part 4 /conf/update is present or absent."
      - "The planned prerequisite scenario still requires the Generator to record Features Part 4 /conf/update before full closure, so this is not a blocking planning defect."
    required_fix: null

