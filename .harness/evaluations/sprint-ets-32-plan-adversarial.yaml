findings:
  - id: "RAZE-ETS32-PLAN-GAP-001"
    severity: "MEDIUM"
    title: "Primary local OSH E2E command snippets omit the credential variable required by the authenticated evidence path."
    status: "CLOSED"
    affected_files:
      - "AGENTS.md"
      - "ops/e2e-test-plan.md"
    evidence:
      - "The Sprint 32 contract, story, planner handoff, status, and test-results entries correctly show the planning smoke command with SMOKE_AUTH_CREDENTIAL=<derived, not logged>."
      - "AGENTS.md and the first Primary E2E Command block in ops/e2e-test-plan.md show local OSH smoke commands without SMOKE_AUTH_CREDENTIAL."
      - "The archived planning probe labels the local OSH evidence as authenticated and records credential handling as Basic auth derived from local OSH config, with the credential value intentionally omitted."
      - "Earlier project docs recorded unauthenticated local OSH /sensorhub/api/conformance as HTTP 401, so future agents following the short command may fail the new default gate or silently use a different IUT auth state."
    impact: "This weakens reproducibility of the new local OSH primary policy and can lead to false blockers or inconsistent evidence capture."
    required_fix: "Add an explicit non-secret SMOKE_AUTH_CREDENTIAL placeholder or prerequisite note to every primary local OSH E2E command snippet, especially AGENTS.md and the first command block in ops/e2e-test-plan.md. Keep actual credential values out of repo artifacts."
    closure_evidence:
      - "Focused recheck confirmed AGENTS.md primary local OSH smoke command now includes SMOKE_AUTH_CREDENTIAL=\"$SMOKE_AUTH_CREDENTIAL\"."
      - "Focused recheck confirmed the first Primary E2E Command in ops/e2e-test-plan.md now includes SMOKE_AUTH_CREDENTIAL=\"$SMOKE_AUTH_CREDENTIAL\"."
      - "Focused recheck confirmed the Local OSH command shape in ops/e2e-test-plan.md also includes SMOKE_AUTH_CREDENTIAL=\"$SMOKE_AUTH_CREDENTIAL\"."
      - "The snippets still avoid recording credential values."

