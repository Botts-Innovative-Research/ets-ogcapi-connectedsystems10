summary: |
  APPROVE 0.93. Sprint `deployments-collections-heuristic` closes P0 #1
  (Quinn's 2026-04-02 finding) with a spec-grounded fix that addresses
  BOTH defects in the old heuristic: the over-broad id-convention branch
  AND the wrong itemType-includes branch. Heuristic rewritten in both
  deployments.ts and system-features.ts to
  `collections.some((c) => c.featureType === 'sosa:<X>')`, with inline
  OGC citation comments and operator-friendly failure messages that name
  the required featureType verbatim and cite the normative requirement
