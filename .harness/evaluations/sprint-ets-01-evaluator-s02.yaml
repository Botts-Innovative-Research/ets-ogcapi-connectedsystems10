  reported hash. (Big improvement over S-ETS-01-01 where Dana's hash was wrong.) Layout
  refactor closed CONCERN-3 from prior gates: `level1/` is gone, `conformance/core/` and
  `listener/` subpackages exist per ADR-003. Schema bundle still byte-identical (126/126 .json).
  pom.xml `<connected-systems-yaml.sha>` SHA pin at line 80 survives. spring-javaformat:validate
  exits 0. No Part 2 contamination in any new test code (grep returned 0 hits). Zero usage
