description: |
  Sprint 15 extends REQ-ETS-PART1-012 rather than adding a new Part 1 class.
  Sprint 9 implemented only the systems read-only GeoJSON subset. Sprint 15
  plans deployment, procedure, and sampling feature GeoJSON schema/mapping
  coverage while preserving fallback honesty when an IUT returns CS API default
  `items` JSON instead of a GeoJSON FeatureCollection.

