      - "Docs record /commands?limit=1 as HTTP 400 and instruct Generator not to assume /commands availability."
      - "Live probes performed during this review matched the documented outcomes."
  no_part2_mutation:
    verdict: "pass"
    evidence:
      - "Sprint type is planning; no Java code changes are present."
      - "Contract, story, status, and handoff require read-only Generator behavior and forbid mutation."
      - "Out-of-scope lists exclude Part 2 Create/Replace/Delete and Update mutation."
  no_part2_json_implementation:
    verdict: "pass"
    evidence:
      - "Contract and story explicitly exclude /req/json and Part 2 JSON encoding implementation."
      - "GeoRobotix /conf/json is treated only as sibling declaration evidence, not API Common PASS evidence."
  docs_reconciliation:
    verdict: "pass_with_note"
    evidence:
      - "OpenSpec, story, contract, traceability, Epic ETS-03, status, changelog, test-results, and planner handoff consistently describe S-ETS-20-01 as planning-only API Common activation."
      - "No changed Java/TestNG/shell files were observed in the Sprint 20 planning diff."
      - "Non-blocking note: broader Part 2 placeholder taxonomy remains stale for future decomposition, captured as RAZE-ETS20-PLAN-CONCERN-001."

required_fixes: []
approval_rationale: >
  Sprint 20 planning is sufficiently constrained for Generator start. It corrects
  the identifier drift to official OGC 23-002 API Common identifiers, keeps
  GeoRobotix declaration evidence honest, rejects false PASS from sibling Part 2
  classes, prevents /commands availability assumptions, and excludes mutation,
  Part 2 JSON, and resource-specific Part 2 implementations. The single concern
  is future-facing placeholder taxonomy, not a blocker for S-ETS-20-01.
