verdict_summary: |
  Substantive engineering is sound. The layout refactor that closed CONCERN-3 from the prior
  review is genuine: `level1/Capability1Tests` is gone, listener subpackage exists with
  correct package decls, conformance/core subpackage exists with correct package decls. The
  v1.0 GH#3 sentinel `landingPageDoesNotRequireSelfRel` (LandingPageTests:209) implements
  the right semantic: it asserts both states (rel=self present OR absent) PASS — neither
  the regression bug (asserting present) nor the over-correction (asserting absent) is
  present. The api-def fallback `landingPageHasApiDefinitionLink` (LandingPageTests:179)
  correctly asserts service-desc OR service-doc, FAIL only when both absent, matching
  v1.0 SCENARIO-API-DEF-FALLBACK-001 exactly. Live IUT smoke artifact at
  ops/test-results/s-ets-01-02-georobotix-smoke-2026-04-28.xml records `total=12 passed=12
  failed=0 skipped=0`; @Test method names cross-check against source. The 3 conformance
  classes' .class files are in the AIO jar. Schema bundle still byte-identical
  (diff -r empty). pom.xml YAML SHA pin from S-ETS-01-01 GAP-2 closure preserved at
  3fd86c73. testng.xml correctly references the 3 new classes by FQCN; listener references
  use the new listener subpackage. Independent reproducibility re-verified at ea2c91f:
  two consecutive fresh-clone builds produce sha256
  b1ffdc8eeed0dd777af243e0c77812391c60468c17979405dca320de9d20f680 byte-identical;
  user worktree rebuild reproduces same hash. spring-javaformat:validate passes.
  No Part 2 leakage. No PRD-stale strings. mvn test 22/0/0/3.

  THREE GAPS hold the verdict at GAPS_FOUND, not APPROVE:

  (1) **Architect-must-constraint #9 violation — bare AssertionError used throughout, NOT
  EtsAssert**. architect-handoff.yaml:124 says verbatim "Use EtsAssert with structured FAIL
  messages including the /req/* URI; do not throw bare TestNG AssertionError." The 3 new
  conformance core test classes (ConformanceTests, LandingPageTests, ResourceShapeTests)
  contain 21 instances of `throw new AssertionError(...)` and zero EtsAssert calls. ETSAssert
  utility class exists at src/main/java/.../ETSAssert.java and is used by the archetype
  XML/Schematron paths, but the new REST Assured / JSON paths bypass it entirely. The
  /req/* URI IS embedded in each AssertionError message, so the *intent* of the constraint
  (URI traceability in failures) is partially honored. But the structural form requested by
  the architect is not. This is a defensible-but-unilateral deviation — the architect did
  not list a Sprint-1 escape hatch. GAPS_FOUND, not REJECT, because failure messages do
  carry the /req/* URI.

  (2) **URI-fidelity drift — Java cites `/req/core/root-success`, OGC's canonical form is
  `/req/landing-page/root-success`**. Raze's prior 2026-04-17 sprint api-definition-service-doc-fallback
  (Gate 4 verdict APPROVE 0.92) verified by upstream .adoc fetch that OGC 19-072's
  canonical path is `/req/landing-page/root-success`. csapi_compliance/ops/known-issues.md
  line 86 + ops/changelog.md line 197+289+317 all cite the canonical form. The Java port
  uses a third form `/req/core/root-success` (different from BOTH the v1.0 TS slug
  `/req/ogcapi-common/landing-page` AND OGC's canonical `/req/landing-page/root-success`).
  csapi_compliance/openspec/capabilities/ets-ogcapi-connectedsystems/spec.md line 83 and
  conformance-testing/spec.md line 18 also use `/req/core/root-success` — so the spec.md
  text is the upstream cause. Sprint contract evaluation_focus #1 says "Did the Java port
  preserve the URI-mapping fidelity from the TS registry?" The answer is partially; the
  Java side has wandered to a third path slug rather than aligning with either the v1.0 TS
  slug or OGC's known-canonical form. **A CITE SC reviewer who dereferences these URIs
  against the OGC spec will get a 404.** GAPS_FOUND.

  (3) **`ResourceShapeTests.REQ_OAS30_OAS_IMPL` cites `ogcapi-common-2/0.0/req/oas30/oas-impl`
  — a different OGC standard (Common Part 2: Geospatial Data, OGC 20-024) that the IUT
  may or may not declare conformance to**. Sprint 1 is supposed to be CS API Core only;
  citing a Common Part 2 URI as the requirement source for a Sprint-1 ResourceShapeTests
  assertion is a category error. The assertion logic itself (api-def link returns 200 +
  non-empty body) is fine; the cited URI is not. GAPS_FOUND not REJECT because the test
  PASSES against GeoRobotix and the assertion is structurally lax-enough to be defensible;
  but the citation is wrong.

  Plus three lower-severity concerns: (a) Dana's self-reported sha256
  `c4a8029440a31a588308008fee7dc165b11207b02faae51d4f1c78b2bfc0b57a` is NOT the canonical
  reproducible-build hash at HEAD ea2c91f — a fresh-clone independent build produces
  `b1ffdc8eeed0dd777af243e0c77812391c60468c17979405dca320de9d20f680`. The `c4a8029...` jar
  was a stale build artifact in the user worktree from BEFORE HEAD reached ea2c91f (likely
  from b249aa1 or earlier). After re-running `mvn clean install -DskipTests` on the user
  worktree, the hash matches the fresh clone. Reproducibility is GENUINE; only the
  reported number was sourced from a stale artifact (precisely the same class of
  honesty-issue as S-ETS-01-01 GAP-1). (b) `ResourceShapeTests` is a deliberate Sprint-1
  narrowing per design.md "single representative resource" — that's defensible but the
  spec.md REQ-ETS-CORE-004 strict-shape (id/type/links per resource) is not yet covered;
  Status reconciliation will need a PARTIAL note. (c) logback.xml + CredentialMaskingFilter
  not present — architect-handoff lists this as `should`, not `must`, and Sprint 1 Core
  doesn't authenticate (GeoRobotix is open), so absence is defensible-by-deferral; no
  Authorization header logging risk in the smoke artifact (verified zero hits for
  authorization/bearer/api-key in the XML).

gaps:
  - id: GAP-1
    severity: medium
    title: "Architect must-constraint violation: 21 bare `throw new AssertionError(...)` in conformance.core.* — should be EtsAssert.assert*"
    description: |
      architect-handoff.yaml line 124: "Use EtsAssert with structured FAIL messages
      including the /req/* URI; do not throw bare TestNG AssertionError."

      Verification:
        grep -n 'throw new AssertionError\|EtsAssert\|ETSAssert' \
          src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/core/*.java

      Result:
        - ConformanceTests.java: 6 `throw new AssertionError`, 0 EtsAssert calls
        - LandingPageTests.java: 8 `throw new AssertionError`, 0 EtsAssert calls
        - ResourceShapeTests.java: 7 `throw new AssertionError`, 0 EtsAssert calls
        Total: 21 bare AssertionError throws across the 3 new conformance classes.

      The ETSAssert utility class DOES exist
      (src/main/java/org/opengis/cite/ogcapiconnectedsystems10/ETSAssert.java, 191 LOC)
      and IS still used by the archetype-retained XML/Schematron paths
      (assertQualifiedName, assertXPath, assertSchemaValid, assertSchematronValid,
      assertExceptionReport, assertDescendantElementCount, assertExceptionReport). But
      the new REST Assured / JSON-based test classes bypass it entirely.

      Mitigating factor: every AssertionError message DOES embed the /req/* URI (e.g.
      `throw new AssertionError(REQ_ROOT_SUCCESS + " — expected HTTP 200 ...")`). So
      the *intent* of the architect's constraint (URI traceability in failure messages)
      is achieved structurally; only the form (EtsAssert.assert* vs `throw new
      AssertionError`) deviates. TestNG treats a bare AssertionError the same way it
      treats Assert.fail — both are caught and reported as FAIL — so there's no
      runtime semantic regression.

      Aggravating factor: ETSAssert has no `assertHttpStatus`, `assertJsonHas`,
      `assertJsonArrayNonEmpty` methods that would be the natural REST Assured-era
      replacements. So Dana would have had to ADD those methods to ETSAssert before
      she could use it from conformance.core.* — that's why she chose bare
      AssertionError. This is a *design-level deferred refactor*, not a flat oversight.

      But: the architect did not list a Sprint-1 escape hatch. design.md §"REST Assured
      request lifecycle" line 184 explicitly shows `EtsAssert.assertStatus(resp, 200,
      "/req/core/landing-page");` as the intended pattern. Dana wrote 21 bare-throws
      where the design specified one EtsAssert call style; that's a deviation.
    evidence: |
      grep -c 'throw new AssertionError' src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/core/{ConformanceTests,LandingPageTests,ResourceShapeTests}.java
        ConformanceTests.java: 6
        LandingPageTests.java: 8
        ResourceShapeTests.java: 7
      grep -c 'EtsAssert\|ETSAssert' src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/core/*.java
        zero hits.
      ETSAssert.java exists at src/main/java/org/opengis/cite/ogcapiconnectedsystems10/ETSAssert.java (191 LOC, archetype-retained).
      design.md line 184: "EtsAssert.assertStatus(resp, 200, ..."
      architect-handoff.yaml line 124: "Use EtsAssert with structured FAIL messages... do not throw bare TestNG AssertionError"
    recommended_fix: |
      Two paths, choose one:
      (a) Sprint-2 deferred refactor: add @Deprecated/Sprint-2-cleanup-tag to the 3 test
          files at the top, document deferral in spec.md Implementation Status Deviations
          section, file an issue/story for Sprint 2 to: (i) extend ETSAssert with
          assertHttpStatus, assertJsonHas, assertJsonArrayNonEmpty, assertJsonObjectShape,
          (ii) refactor the 21 bare-throws to ETSAssert calls. Cleanest long-term.
      (b) Same-turn fix: add the 4 helper methods to ETSAssert and replace the 21 bare
          throws across 3 files. ~150 LOC delta, low risk because failure messages already
          carry the /req/* URI; the refactor only changes the throw mechanism.
      Either is acceptable; (a) is more honest given the Sprint 1 contract is otherwise
      green.
    address_in_turn: optional (defer to Sprint 2 cleanup is defensible if documented)

  - id: GAP-2
    severity: medium
    title: "URI-fidelity drift — Java cites `/req/core/root-success`; OGC 19-072 canonical form is `/req/landing-page/root-success`"
    description: |
      Sprint contract evaluation_focus #1: "Did the Java port preserve the URI-mapping
      fidelity from the TS registry?"

      The v1.0 TS registry uses path slug:
        /req/ogcapi-common/landing-page (csapi_compliance/src/engine/registry/common.ts:21)

      Raze's prior 2026-04-17 sprint api-definition-service-doc-fallback (Gate 4 verdict
      APPROVE 0.92, .harness/evaluations/sprint-api-def-fallback-adversarial.yaml)
      independently fetched
      https://raw.githubusercontent.com/opengeospatial/ogcapi-common/master/19-072/requirements/landing-page/REQ_root-success.adoc
      and verified the upstream canonical OGC form is:
        /req/landing-page/root-success

      The csapi_compliance/ops/known-issues.md "Requirement URIs Use Local Paths, Not
      Canonical OGC URIs — RESOLVED" entry (line 80) explicitly notes:
        "for OGC Common Part 1 (`/req/ogcapi-common/...`) and Features Part 1
        (`/req/ogcapi-features/...`), the local paths are project-specific slugs that
        don't exactly match OGC's canonical paths (e.g. 19-072 uses
        `/req/landing-page/root-success`...). A full path-segment remap would require
        per-URI OGC-spec lookup and is logged as a follow-up below."

      The Java port chose YET A THIRD form:
        /req/core/root-success (LandingPageTests:62, REQ_ROOT_SUCCESS)
        /req/core/conformance-success (LandingPageTests:65, REQ_CONFORMANCE_SUCCESS)
        /req/core/api-definition-success (LandingPageTests:68, REQ_API_DEFINITION_SUCCESS)

      None of these three forms match the OGC-canonical `/req/landing-page/root-success`,
      `/req/core/conformance-success` (this one happens to match), or
      `/req/landing-page/api-definition-success` (Raze did not re-verify each separately;
      `/req/landing-page/root-success` was the specifically-verified one).

      Tracing the source: csapi_compliance/openspec/capabilities/ets-ogcapi-connectedsystems/
      spec.md line 83 (REQ-ETS-CORE-002) and conformance-testing/spec.md line 18 BOTH cite
      `/req/core/root-success`. So the Java port faithfully implements *what the spec
      says*; it's the spec that uses the wrong path slug.

      A CITE SC reviewer who dereferences `http://www.opengis.net/spec/ogcapi-common-1/
      1.0/req/core/root-success` against the OGC normative document will get a 404
      (the canonical path is `.../req/landing-page/root-success`).

      Sprint contract success_criterion `uri_mapping_fidelity_preserved: true` is met
      vacuously (the Java port faithfully reflects the spec strings) but the underlying
      goal (URIs that dereference correctly to OGC normative requirements) is not.

      This gap is upstream of Sprint 1 — it lives in the spec.md text + the
      pre-existing csapi_compliance v1.0 known-issues entry that flagged this exact
      mismatch as deferred. Dana correctly mirrored the spec; Sam (Scrum Master)
      should reconcile the spec text + flag this for an upstream OGC-canonical
      remap sprint.
    evidence: |
      grep -hoE 'http://www[^ "]*' src/main/java/.../conformance/core/*.java | sort -u
      Returns 5 distinct canonical URIs, including:
        http://www.opengis.net/spec/ogcapi-common-1/1.0/req/core/root-success
        http://www.opengis.net/spec/ogcapi-common-1/1.0/req/core/conformance-success
        http://www.opengis.net/spec/ogcapi-common-1/1.0/req/core/api-definition-success

      grep -h "requirementUri" csapi_compliance/src/engine/registry/common.ts
        Uses `/req/ogcapi-common/landing-page` form (project slug).

      csapi_compliance/ops/known-issues.md:86 confirms OGC's canonical is
      `/req/landing-page/root-success`.

      csapi_compliance/.harness/evaluations/sprint-api-def-fallback-adversarial.yaml
      records the upstream-adoc fetch verification (Raze 2026-04-17).
    recommended_fix: |
      Upstream-rooted fix (most correct):
      (1) Sam reconciles csapi_compliance/openspec/capabilities/ets-ogcapi-connectedsystems/
          spec.md REQ-ETS-CORE-002 to use `/req/landing-page/root-success` per the
          known-issues catalog finding;
      (2) Dana re-runs S-ETS-01-02 URI strings in LandingPageTests.java + ConformanceTests.java
          + ResourceShapeTests.java to match the corrected spec;
      (3) Note in spec.md Implementation Status Deviations that the URI form in test
          descriptions changed from `/req/core/...` → `/req/landing-page/...` for
          Common Part 1 URIs.

      Same-turn alternative: leave Java as-is (matches current spec.md), document this
      gap in Sprint 1 close-out as a tracked URI-canonicalization debt, schedule
      "URI canonicalization sweep" as a Sprint 2 housekeeping story analogous to the
      v1.0 sprint of the same name.

      If neither happens: when the OGC SC reviews the ETS, the URIs in TestNG @Test
      descriptions will not dereference. CITE submission risk.
    address_in_turn: optional (Sam reconciliation is the right path; can be deferred to next planning cycle)

  - id: GAP-3
    severity: low-medium
    title: "ResourceShapeTests cites an `ogcapi-common-2/0.0/req/oas30/oas-impl` URI — that's a different OGC standard (Common Part 2: Geospatial Data, OGC 20-024)"
    description: |
      ResourceShapeTests.java:55:
        static final String REQ_OAS30_OAS_IMPL =
          "http://www.opengis.net/spec/ogcapi-common-2/0.0/req/oas30/oas-impl";

      `ogcapi-common-2` is OGC API – Common Part 2: Geospatial Data (OGC 20-024), a
      separate specification from OGC API – Common Part 1 (19-072) which Sprint 1 Core
      validates against. The `/req/oas30/oas-impl` requirement (if it exists in 20-024)
      governs OpenAPI 3.0 implementation conformance, NOT a generic resource-shape check.

      Sprint 1 Core scope per spec.md REQ-ETS-CORE-004 covers "Resource Base Shape" —
      the assertion is "any resource discoverable from landing-page links includes id
      (string), type (string), links (array)". The Java implementation deliberately
      narrows to "api-definition link returns HTTP 200 with non-empty body" + "the
      /conformance resource is a JSON object" — both perfectly defensible Sprint-1
      narrowings per design.md (and spec.md Implementation Status will need a PARTIAL
      note for that).

      But the `REQ_OAS30_OAS_IMPL` URI is the WRONG citation for both narrowed checks.
      The api-def-link-returns-content check should cite the same `/req/core/api-definition-
      success` (or the canonical `/req/landing-page/api-definition-success`) URI that
      LandingPageTests already uses; the /conformance-shape-is-object check should cite
      `/req/core/conformance-success`. Citing `oas-impl` from a different OGC spec
      conflates "API definition exists at the link" with "the API definition implements
      OpenAPI 3.0 normatively" — different conformance levels, different tests, different
      requirements.

      This is not a false-positive (test passes against GeoRobotix) and not a
      false-negative (the assertion logic is honest about being lax — non-empty body
      check). It's a citation hygiene issue.

      Adversarial-test consequence: a CITE SC reviewer mapping ATS assertions to ETS
      tests would see ResourceShapeTests claiming to validate `/req/oas30/oas-impl` from
      OGC 20-024 when in fact it validates a Common Part 1 link relation. Spec
      traceability breaks.
    evidence: |
      ResourceShapeTests.java:55: REQ_OAS30_OAS_IMPL = "...ogcapi-common-2/0.0/req/oas30/oas-impl"
      ResourceShapeTests.java:94 + 137: this URI used as @Test description prefix and in
        AssertionError messages.
      Smoke XML records "OGC-19-072 http://...ogcapi-common-2/0.0/req/oas30/oas-impl"
        — the prefix says "OGC-19-072" (Common Part 1) but the URI says "ogcapi-common-2"
        (Common Part 2). Internal contradiction in the same description string.
    recommended_fix: |
      Replace REQ_OAS30_OAS_IMPL with REQ_API_DEFINITION_SUCCESS (or whichever path slug
      lands in GAP-2 reconciliation). Update both @Test methods. ~5 LOC change in
      ResourceShapeTests.java.
    address_in_turn: yes (low effort, high audit-clarity benefit)

concerns:
  - id: CONCERN-1
    severity: low
    title: Dana's self-reported sha256 c4a8029... is from a stale build artifact, not the HEAD ea2c91f canonical reproducible build
    description: |
      Dana's S-ETS-01-02 self-report claims:
        "Reproducibility: sha256 c4a8029440a31a588308008fee7dc165b11207b02faae51d4f1c78b2bfc0b57a
         for the main jar"

      Raze verification:
