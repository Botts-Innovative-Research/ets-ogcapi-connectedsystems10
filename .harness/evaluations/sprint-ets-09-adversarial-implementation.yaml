summary: >
  Sprint 9 is mostly honest about being a PARTIAL GeoJSON systems read-only subset:
  docs, traceability, story DoD, and testng wiring do not claim the full
  REQ-ETS-PART1-012 is closed, and the live smoke XML shows the CS API `items`
  wrapper is not counted as a GeoJSON FeatureCollection PASS. One adversarial gap
  remains: the `/req/geojson/mediatype-read` test passes when `/systems` returns
  default `application/json` with `items`, even though the Sprint 9 spec/contract
  only allowed fallback PASS when the representation is still valid GeoJSON.
findings:
  - id: "RAZE-ETS09-GAP-001"
    severity: "MEDIUM"
    category: "scope_honesty"
    status: "open"
    title: "`geoJsonMediaTypeRead` passes on default CS API `items` JSON"
    evidence:
      - "GeoJsonTests.java:123-135 asserts HTTP 200 and then passes when the body contains either `features` or `items`; it does not require `Content-Type: application/geo+json`, `type=FeatureCollection`, or `features` for the mediatype-read PASS."
      - "OpenSpec SCENARIO-ETS-PART1-012-GEOJSON-MEDIATYPE-READ-001 says fallback is acceptable when the payload is a valid GeoJSON FeatureCollection but the server does not advertise `application/geo+json`."
      - "Sprint contract risk GEOJSON-MEDIATYPE-NEGOTIATION-OVERCLAIM says not to claim mediatype-read PASS solely from default JSON without a note; the implementation includes a note, but still records a PASS for `items`-only JSON."
      - "Smoke XML line 99 records `geoJsonMediaTypeRead` status PASS; lines 103-111 record `systemsCollectionIsGeoJsonFeatureCollection` SKIP because `/systems` returned `items`, not `features`."
    impact: >
      This is not a full-scope overclaim, but it is a per-assertion overclaim: a
      conformant-looking PASS is emitted for `/req/geojson/mediatype-read` against
      evidence that is explicitly not GeoJSON FeatureCollection evidence.
    required_fix: >
      Change `geoJsonMediaTypeRead` so default `items` JSON does not produce PASS
      for `/req/geojson/mediatype-read`. Acceptable fixes: SKIP with the same
      fallback-honesty reason used by the FeatureCollection test, or split this into
      a non-normative diagnostic/fallback test that does not cite mediatype-read as
      satisfied.
