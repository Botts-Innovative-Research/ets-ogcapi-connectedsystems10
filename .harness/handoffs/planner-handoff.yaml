strategic_decisions:
  q1_next_work:
    question: "After Sprint 18, what is the next Part 1 gap?"
    decision: "S-ETS-19-01 Encoding mediatype-write safety-gated checks"
    rationale: |
      GeoJSON and SensorML both remain partial partly because mediatype-write is
      open. Sprint 12/14 already built mutation opt-in and no-public-IUT
      safety gates, so the next useful increment is to plan write-side encoding
      checks that reuse those controls.

  q2_scope_boundary:
    question: "Should Sprint 19 mutate GeoRobotix?"
    decision: "No. Default GeoRobotix smoke remains strictly non-mutating."
    rationale: |
      GeoRobotix declares Create/Replace/Delete and advertises POST/PUT/DELETE,
      but it is a shared public IUT. Sprint 19 requires positive parse evidence
      only against a dedicated mutable IUT with explicit mutation opt-in.

  q3_verdict_policy:
    question: "What can PASS mediatype-write?"
    decision: "Only exact Content-Type parse evidence followed by dereference evidence."
    rationale: |
      OPTIONS readiness and mutation status codes can show capability hints but
      do not prove that the IUT parsed a GeoJSON or SensorML body according to
      the resource type.

