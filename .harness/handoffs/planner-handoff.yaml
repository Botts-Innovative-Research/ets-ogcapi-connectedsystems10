strategic_decisions:
  q1_next_class:
    question: "Which remaining Part 1 class should Sprint 9 implement?"
    decision: "geojson"
    rationale: |
      GeoJSON systems read-only coverage is lower risk than create-replace-delete mutation coverage.
      It has narrower schema inheritance than SensorML and less cross-cutting behavior than AdvancedFiltering.
      GeoRobotix has historically declared /conf/geojson, but Generator must re-verify at sprint time.
    alternatives_rejected:
      - advanced_filtering: "Cross-cutting query behavior; better after more encoding/resource classes are stable."
      - create_replace_delete: "Mutation-side risk; no ETS write-operation precedent yet."
      - update: "Mutation-side risk; should not be first post-Sprint-8 class."
      - sensorml: "Broader SensorML 3.0 schema inheritance; defer until GeoJSON encoding pattern lands."

  q2_scope:
    question: "Full GeoJSON class or systems read-only subset?"
    decision: "systems read-only subset"
    rationale: |
      The upstream class lists 12 subrequirements, including mediatype-write and non-system schema/mapping
      requirements. Sprint 9 deliberately targets only the systems read-only subset. mediatype-write remains
      OPEN until create-replace-delete is implemented or explicitly selected.

