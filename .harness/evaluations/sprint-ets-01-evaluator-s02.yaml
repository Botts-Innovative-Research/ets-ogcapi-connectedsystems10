evaluation_questions_answered:
  - question: |
      Compare Java @Test descriptions in the Core suite against the URI list extracted from
      csapi_compliance/src/engine/registry/common.ts and csapi-core.ts. Are all relevant URIs
      present? Are there extras? Are any missing without justification?
    answer: |
      ANSWERED CONCRETELY (this question was deferred from Sprint 1 start; now actionable).

      Methodology: extracted every `requirementUri:` value from common.ts (6) and
      csapi-core.ts (3), and every `static final String REQ_*` URI constant in
      conformance/core/*.java (4 + 1 conformance-class URI = 5). Then read
      ops/test-results/s-ets-01-02-georobotix-smoke-2026-04-28.xml to confirm test
      descriptions.

      TS common.ts URIs (6, all `/req/ogcapi-common/<X>`):
        - landing-page, landing-page-links, conformance, conformance-conformsTo,
          api-definition, json-content-type
      TS csapi-core.ts URIs (3, all `/req/api-common/<X>` under the
      `ogcapi-connectedsystems-1` spec — these are CS-API-specific not Common):
        - datetime, resource-ids, resource-uids

      Java conformance.core.* URIs (5):
        - REQ_ROOT_SUCCESS = .../ogcapi-common-1/1.0/req/core/root-success
          (LandingPageTests: 6 @Tests reference this — landingPageReturnsHttp200,
          landingPageReturnsJson, landingPageHasLinks, landingPageDoesNotRequireSelfRel,
          and indirectly two more via dependsOnMethods chain)
        - REQ_CONFORMANCE_SUCCESS = .../ogcapi-common-1/1.0/req/core/conformance-success
          (ConformanceTests + LandingPageTests + ResourceShapeTests reference it)
        - REQ_API_DEFINITION_SUCCESS = .../ogcapi-common-1/1.0/req/core/api-definition-success
          (LandingPageTests:179)
        - REQ_OAS30_OAS_IMPL = .../ogcapi-common-2/0.0/req/oas30/oas-impl
          (ResourceShapeTests:94 — this is OGC API Common Part 2 (OpenAPI), not OGC 19-072)
        - CS_CORE_CONFORMANCE_URI = .../ogcapi-connectedsystems-1/1.0/conf/core
          (ConformanceTests:46 — IUT-declares-Core gate test)

      Findings:

      (a) Path-segment divergence: TS uses `/req/ogcapi-common/<X>`; Java uses
          `/req/core/<X>-success`. The csapi_compliance repo's own ops/known-issues.md and
          a prior Raze adversarial review (sprint-rubric-6-1-sweep) flagged that the
          OGC 19-072 adoc's actual canonical form is `/req/landing-page/root-success` —
          a THIRD form, used by neither side. Both implementations cite the correct
          normative TEXT (service-desc OR service-doc, conformance, conformsTo array)
          but each chose a different imprecise URI path-segment. NOT a correctness bug.
          Logged as GAP-2.

      (b) Concept coverage in S-ETS-01-02 is ESSENTIALLY COMPLETE for what Core needs in
          Sprint 1: landing-page (root-success), conformance endpoint (conformance-success),
          api-definition link with fallback (api-definition-success), CS API Core
          conformance class declaration (conf/core). The TS `landing-page-links` is split
          across 3 Java @Tests (landingPageHasLinks, landingPageHasConformanceLink,
          landingPageHasApiDefinitionLink) — finer granularity, not a regression.

      (c) Missing without justification: ZERO. The TS `json-content-type` URI is NOT
          asserted in Java — but this is INTENTIONAL and DOCUMENTED. The class javadoc at
          LandingPageTests:115-122 and ConformanceTests:96-102 explicitly cites the v1.0
          known-issue 2026-03-31 fix that says "real CS API servers may emit non-standard
          Content-Type values (e.g. GeoRobotix returns Content-Type: auto) while serving
          valid JSON. PASS-if-body-is-JSON-parseable; the Content-Type header is logged
          but not strictly checked." This is the v1.0 GH-tolerance fix preserved correctly.
          The TS `json-content-type` URI represents a stricter check that was deliberately
          relaxed in v1.0; Java appropriately omits it.

      (d) The csapi-core.ts URIs (datetime, resource-ids, resource-uids) are NOT in
          S-ETS-01-02 scope — those are CommonTests / SystemFeaturesTests territory in
          design.md's Sprint 2+ skeleton. Correctly deferred.

      (e) Java extra: REQ_OAS30_OAS_IMPL from OGC API Common PART 2 (`ogcapi-common-2`)
          is asserted at ResourceShapeTests:94. This is NOT in the v1.0 TS registry
          (csapi_compliance v1.0 doesn't model OAS 3.0 / OGC API Common Part 2 / OGC
          21-053). It's a forward-leaning addition by Dana that exercises the api-definition
          link as an HTTP-200-with-non-empty-body assertion. ACCEPTABLE — extends, doesn't
          regress.

      Verdict on Q1: URI-mapping fidelity is PARTIAL. Concept-level fidelity is COMPLETE
      (every load-bearing TS assertion has a Java equivalent or a documented justified
      omission like json-content-type tolerance). URI-path-segment fidelity is DIVERGENT
      both from the TS source and from the OGC 19-072 adoc canonical form — same-imprecise
      vs different-imprecise. Recommend a Sprint 2 cleanup pass to canonicalize across
      both repos.

  - question: |
      Verify the v1.0 known-issue catalog at csapi_compliance/ops/known-issues.md does not
      regress: rel=self, service-doc fallback, half-conformant featureType — all should be
