concerns:
  - id: CONCERN-1
    description: |
      Dana's handoff claims "19 atomic commits" but git log shows 28 commits on the branch.
      The 28 includes the archetype:generate baseline commit + 27 deltas. The discrepancy
      doesn't materially affect the audit but suggests Dana miscounted; future Generators
      should commit-count from `git log --oneline | wc -l` rather than memory.
  - id: CONCERN-2
    description: |
      12 of the 28 commits do NOT cite an ADR row in the message. Most are legitimate
      (archetype:generate raw output, SCM-rewrite for Botts-Innovative-Research, Mockito-3
      ArgumentMatchers compatibility, Jersey/Jakarta port commits citing features10 java17
      branch instead). REQ-ETS-SCAFFOLD-006 says "Each archetype-default modification has an
      ADR" — strict reading would expect commits like the Jersey port and Jakarta migration
      to map to a new ADR (call it "ADR-006: Jersey 1.x → Jakarta EE 9 / Jersey 3.x port for
      JDK 17 archetype util layer"). Currently those decisions are documented only in commit
      messages and via reference to the features10 java17Tomcat10TeamEngine6 branch.
      Recommendation: write a small ADR-006 documenting the Jersey/Jakarta port reasoning so
      a future maintainer doesn't have to reverse-engineer 5 commits to understand why
      `javax.ws.rs` became `jakarta.ws.rs`. Not blocking for Sprint 1.
  - id: CONCERN-3
    description: |
      Repo layout is the archetype-flat structure (level1/, util/, top-level controller +
      listener classes) rather than the features10 java17Tomcat10TeamEngine6 subpackage
      layout (conformance/core/*, listener/*, openapi3/*). Dana self-flagged this PARTIAL.
      Architect-handoff design.md does specify the features10-style subpackage layout
      (org.opengis.cite.ogcapiconnectedsystems10.conformance.core.*, .listener.*, .openapi3.*
      per ADR-003). S-ETS-01-02 is when CoreTests lands and the conformance.core.* package
      gets created — at that point Dana should also factor TestRunListener, SuiteFixtureListener,
      TestFailureListener into a `listener` subpackage to match the design. Not blocking for
      Sprint 1 since the scaffold builds green with the flat layout, but the divergence should
      close in Sprint 2.
  - id: CONCERN-4
    description: |
      The CI workflow (.github/workflows/build.yml) is staged at ci/github-workflows-build.yml
      because gh token lacks "workflow" scope at push time. This is a known deferred item per
      Dana's handoff and ops/status.md ("`gh auth refresh -s workflow` then git mv"). Acceptable
      for Sprint 1 close; track to closure before S-ETS-01-02 ships so CI catches any
      conformance-test regressions.

