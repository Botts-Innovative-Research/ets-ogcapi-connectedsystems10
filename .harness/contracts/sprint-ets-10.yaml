evaluation_focus:
  - "Generator must re-verify GeoRobotix /conformance for /conf/sensorml before implementing assertion behavior."
  - "Generator must not claim collection-level `Accept: application/sml+json` PASS when the IUT returns CS API default `items` JSON."
  - "Generator may use item-level alternate links with `type=application/sml+json` as explicit fallback evidence, but must record that behavior in test descriptions or messages and must not report it as full mediatype-read closure unless the fetched body proves SensorML JSON support."
  - "Generator must not implement mediatype-write, create-replace-delete, update, or any write-operation check in Sprint 10."
  - "Quinn should run scripts/mvn-test-via-docker.sh from a /tmp clone and verify surefire includes the SensorML lint tests."
  - "Raze should run scripts/smoke-test.sh from a separate /tmp clone and verify failed=0 and total PASS+SKIP >= 57."
  - "Raze should inspect SensorMlTests.java for over-claiming SensorML support from CS API `items` wrappers or generic application/json single-item Feature documents."
  - "Both gates must avoid reading each other's Sprint 10 YAML before writing their own result."

risk_register:
  - id: "SENSORML-ALTERNATE-LINK-OVERCLAIM"
    severity: "MEDIUM"
    mitigation: "Accept alternate-link fallback only when the link advertises application/sml+json and the fetched body has SensorML-like structure; do not PASS from generic CS API JSON alone."
  - id: "SENSORML-SCHEMA-INHERITANCE-SCOPE-CREEP"
    severity: "MEDIUM"
    mitigation: "Keep full SensorML 3.0 JSON Schema validation out of Sprint 10 unless separately planned."
  - id: "MUTATION-SCOPE-CREEP"
    severity: "LOW"
    mitigation: "Contract excludes mediatype-write and all POST/PUT/PATCH/DELETE behavior."
