# Sprint 10 contract — sensorml-systems-read-only
# Created 2026-05-05 after Sprint 9 Quinn + Raze gates approved with concerns.

sprint: "ets-10"
sprint_name: "sensorml-systems-read-only-subset"
type: "feature-expansion"
created: "2026-05-05T17:41:19Z"
description: |
  Sprint 10 implements one Part 1 class subset:

  S-ETS-10-01 — SensorML systems read-only subset (`/conf/sensorml`) (P0/M).
  Scope is PARTIAL for REQ-ETS-PART1-013:
    - `/conformance` declares `/conf/sensorml`, otherwise SKIP-with-reason.
    - Select a System resource and discover SensorML JSON through direct media-type negotiation or an explicit item-level `alternate` link with `type=application/sml+json`.
    - Fetch the SensorML representation and assert HTTP 200 + parseable JSON.
    - Minimal SensorML system shape and identity-mapping sanity checks.
    - Runtime or structural dependency proof: `sensorml` depends on `systemfeatures`.

  Explicitly excluded:
    - `/req/sensorml/mediatype-write`
    - `/req/sensorml/relation-types`
    - Deployment/Procedure/Property SensorML schema and mapping assertions
    - Full SensorML 3.0 JSON Schema validation
    - AdvancedFiltering query/filtering work, create-replace-delete, and Update
    - Part 2 work

