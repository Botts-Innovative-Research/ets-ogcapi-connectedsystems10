summary: >
  Sprint 9 planning is directionally sound but overstates what a five-test,
  systems-only read-only subset can close. The OGC commit/path claim is accurate,
  and ops handoff is fresh. The blockers are scope honesty and one conformance
  correctness trap: the plan permits an `items` wrapper as "FeatureCollection-like"
  even though the pinned OGC GeoJSON system collection schema requires the GeoJSON
  `features` member.

findings:
  - id: RAZE-S9-PLAN-001
    severity: HIGH
    category: ogc_requirement_overclaim
    status: open
    title: "Plan targets IMPLEMENTED for REQ-ETS-PART1-012 while covering only a subset of the GeoJSON requirement class"
    evidence:
      - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md:394 says target IMPLEMENTED after live smoke."
      - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md:395 lists all 12 OGC GeoJSON subrequirements."
      - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md:396 scopes Sprint 9 to five tests over conformance, mediatype-read/default fallback, systems collection, first system feature, and dependency/smoke."
      - "epics/stories/s-ets-09-01-geojson-encoding-conformance-class.md:28 repeats SPECIFIED -> target IMPLEMENTED."
      - ".harness/contracts/sprint-ets-09.yaml:61 repeats SPECIFIED -> target IMPLEMENTED."
    adversarial_analysis: >
      The upstream requirements class includes mediatype-read, mediatype-write,
      relation-types, common feature attribute mapping, and schema/mapping
      requirements for System, Deployment, Procedure, and Sampling Feature
      representations. A systems-only read-only slice is a useful Sprint 9
      increment, but calling the whole GeoJSON class IMPLEMENTED after five tests
      would be an overclaim unless the plan explicitly defines "partial
      implementation" and keeps untested subrequirements open.
    required_fix: >
      Change REQ-ETS-PART1-012 and story/contract wording from "target
      IMPLEMENTED" to "target PARTIAL/SUBSET IMPLEMENTED" or split the requirement
      into subrequirements such as REQ-ETS-PART1-012A for the systems read-only
      subset. Keep remaining GeoJSON requirements open in traceability until
      deployment/procedure/sampling-feature schema+mappings and relation-types are
      tested.

  - id: RAZE-S9-PLAN-002
    severity: HIGH
    category: conformance_correctness
    status: open
    title: "FeatureCollection scenario accepts `items`, but OGC GeoJSON systemCollection schema requires `features`"
    evidence:
      - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md:421 accepts `features` or `items`."
      - "epics/stories/s-ets-09-01-geojson-encoding-conformance-class.md:63 says CS API `items` wrappers are acceptable with explicit normalization."
      - ".harness/contracts/sprint-ets-09.yaml:107-109 mitigates items-vs-features by documentation rather than by failing or skipping non-GeoJSON shape."
      - "Pinned upstream systemCollection.json allOf includes geojson.org FeatureCollection and properties.features -> systemArray.json; no `items` collection member is defined there."
    adversarial_analysis: >
      Documentation is not enough. A response with `items` can be valid CS API JSON
      collection shape but is not a GeoJSON FeatureCollection as defined by the
      pinned GeoJSON schema. Accepting `items` under a GeoJSON requirement can
      create false positives against servers that declare /conf/geojson but return
      the non-GeoJSON collection encoding.
    required_fix: >
      Require `type == "FeatureCollection"` and a `features` array for the
      GeoJSON test path. If the IUT returns `items`, record that as default CS API
      JSON fallback and SKIP/CONCERN for GeoJSON mediatype-read rather than PASSing
      the GeoJSON FeatureCollection assertion.

  - id: RAZE-S9-PLAN-003
    severity: MEDIUM
    category: mediatype_write_deferral
    status: open
    title: "mediatype-write deferral is mostly valid, but it is tied too loosely to CRUD/Update"
    evidence:
      - "OGC clause_20 requirement /req/geojson/mediatype-write has condition: server implements clause-resource-crd."
      - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md:396 defers mediatype-write to REQ-ETS-PART1-010/011."
      - "epics/stories/s-ets-09-01-geojson-encoding-conformance-class.md:57 says mediatype-write and mutation-side checks are out of scope."
      - "_bmad/traceability.md:37 says mediatype-write and mutation-side checks are deferred to CRUD/Update scope."
    adversarial_analysis: >
      Deferring write-side media type checks from a read-only sprint is acceptable
      only if the plan avoids full-class closure. The upstream condition is CRD,
      not Update generally. Tying this to both CRUD and Update muddies the
      dependency and invites later drift.
    required_fix: >
      State that /req/geojson/mediatype-write remains OPEN and is conditional on
      the create-replace-delete requirement class being implemented or selected,
      with Update only mentioned if a later design explicitly needs it.

