    severity: medium
    title: "spec.md REQ-ETS-TEAMENGINE-003 text NOT updated to reflect the implementation reality"
    description: |
      spec.md REQ-ETS-TEAMENGINE-003 (line 137-139) still reads:
        "A `Dockerfile` SHALL extend `ogccite/teamengine-production:5.6.1` and
         copy the built ETS jar into ..."

