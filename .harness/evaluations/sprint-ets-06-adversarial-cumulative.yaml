    rsync_fix_landed: true
    rsync_fix_evidence: "scripts/sabotage-test.sh lines 212-219: `--exclude='.git/'` removed from rsync; `cp -a` fallback now keeps .git too (only target/ removed). Sister .git size: 5.2MB (negligible per Plan-Raze)."
