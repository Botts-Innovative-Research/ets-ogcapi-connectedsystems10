      `b1ffdc8eeed0dd777af243e0c77812391c60468c17979405dca320de9d20f680` in:
        - ops/status.md (csapi_compliance) sprint close-out summary
        - generator-handoff.yaml in .harness/handoffs/ (if recorded)
        - any sprint-close commit message body
      Procedural fix: Dana should run `mvn clean install -DskipTests` *before* recording
      the reproducibility hash, not just `sha256sum target/*.jar` against whatever's
      already there.
    address_in_turn: yes (one-line text edit, no rebuild needed)

