    - Mutating GeoRobotix or any public/shared IUT.
    - Claiming clean primary nested Command E2E coverage without live ControlStream/Command evidence.
success_criteria:
  - OpenSpec/story/traceability/epic artifacts name the Sprint 38 fixture and candidate-selection scenarios.
  - Fixture probe/preseed artifact contains no credential values and includes direct SimUAV Observation/Command/Status/Result evidence.
  - ETS regressions cover populated parent selection and reference `REQ-ETS-PART2-013` plus Sprint 38 scenarios in comments.
  - Maven verification for touched ETS modules is archived.
  - SimUAV-preseeded TeamEngine E2E artifacts and request method counts are archived; clean read-only smoke records no IUT-bound writes.
  - Any remaining failures are classified as OSH limitations, fixture-data gaps, or ETS regressions with exact evidence.
  - Raze review returns no required fixes or all required fixes are closed.
guardrails:
  - Preserve Sprint 36 `f=json` schema request shaping and strict JSON media-type gate.
  - Preserve Sprint 37 Annex A.9 format assertions and OSH stream metadata expectations.
  - Keep SimUAV disabled for clean primary state unless a sprint explicitly documents the populated fixture state.
  - Do not record Basic/Auth credential values in repo artifacts or logs.
