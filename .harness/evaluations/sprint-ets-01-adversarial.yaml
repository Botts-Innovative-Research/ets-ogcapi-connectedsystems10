concerns:
  - id: CONCERN-1
    severity: low
    title: Several modernization commits do not cite an ADR row in the message, contrary to architect-handoff `must` constraint
    description: |
      Architect-handoff §`constraints_for_generator.must` says: "Apply ADR-004 modernization
      checklist Groups A-D items as separate atomic commits, each commit message citing the ADR
      row (e.g. 'S-ETS-01-01: pom.xml parent → ets-common:17 (ADR-004 A-1)')." Audit of `git log`
      in the new repo finds these commits without an explicit ADR row reference:
        - `c11d4ef` (mvn spring-javaformat:apply) — no ADR cite (debatably an ADR-004 D bonus)
        - `6fa3c8c` (re-add schema-utils dependency) — no ADR cite (recovers from a regression
          introduced by `5313352` "dependency overhaul"; arguably ADR-004 Group B coverage)
        - `8e031ef`, `3979709`, `9ca229f`, `87c6fe2`, `9b42cb7`, `d01c187` (Jakarta EE 9 / Jersey 3
          ports) — cite features10 java17 branch but no ADR row; these are clearly within ADR-004
          spirit but no explicit row exists for "Jersey 1.x → 3.x" because ADR-004 expected the
          dependency replacement to be a single Group B item and didn't anticipate the multi-file
          source-port effort
        - `3fbdfea` (SCM/URL/organization metadata) — no ADR cite
        - `ce23f95` (distribution-management site SCM URL) — no ADR cite
        - `6516cd1` (ignore archetype VerifyTestNGController.doTestRun) — no ADR cite
      None of these are wrong technical choices; the gap is purely auditability per the
      architect's must-constraint. A reviewer git-blaming any of these files cannot find the
      ADR justification in the commit message.
    recommended_fix: |
      Either: (a) accept as a low-severity audit gap and note in changelog that Sprint 1's ADR
      coverage is "ADR-004 by reference, not by line-by-line cite"; or (b) extend ADR-004 with
      a "Group F — Jersey 1.x → 3.x source port" row that retroactively covers the 6 Jersey
      port commits, making the citation gap a documentation update only. Option (b) is cleaner
      for downstream auditability and matches what actually happened.
    address_in_turn: optional (defer to a same-turn ADR amendment or to Sprint 2 cleanup)

  - id: CONCERN-2
    severity: low
    title: GitHub Actions workflow staged at ci/github-workflows-build.yml not live at .github/workflows/build.yml
    description: |
      Commit `35d5154` ("stage CI workflow under ci/ (push-with-workflow-scope deferred)")
      places the workflow file at `ci/github-workflows-build.yml` instead of
      `.github/workflows/build.yml`. Reason given (per ops/status.md, ops/changelog.md): the
      gh token at commit time lacked `workflow` scope. This is documented and the file is
      correctly authored — but until it is moved into `.github/workflows/`, GitHub Actions does
      not run it on push, so the "build green on every push" guard is not actually live.

      The sprint contract `evaluation_artifacts_required` lists "Diff output from
      reproducible-build CI job (must be empty modulo META-INF timestamps)" — this artifact
      cannot be produced by a non-running CI. Strictly read, that sprint requirement is unmet.
      Pragmatically, reproducibility was verified manually by both Dana and Raze independently;
      the live CI is a redundant guard that just hasn't been wired up yet.
    recommended_fix: |
      As soon as the orchestrator session has a gh token with `workflow` scope:
        gh auth refresh -s workflow
        cd /home/nh/docker/gir/ets-ogcapi-connectedsystems10
        git mv ci/github-workflows-build.yml .github/workflows/build.yml
        git commit -m "S-ETS-01-01: move CI workflow to .github/workflows/ (workflow scope acquired)"
        git push
      Then trigger one workflow_dispatch run and archive the green output as the sprint's
      evaluation artifact.
    address_in_turn: no  # depends on token scope; carry to next session with workflow scope

  - id: CONCERN-3
    severity: low
    title: `<connected-systems-yaml.sha>` recorded in ops/server.md as "for forward-tracking" but never consumed as the upstream pin
    description: |
      `ops/server.md` of the new repo records two SHAs:
        - "Upstream master SHA at fetch (csapi_compliance fetch-schemas.ts run): not pinned in
           manifest; fetched 2026-04-17"
        - "Upstream master SHA at this copy (2026-04-28, for forward-tracking):
           3fd86c73e744b7e2faaf7f1c17366bfb9ff4cd6f"
      These are two different SHAs at two different points in time, and the actual schema bytes
      in src/main/resources/schemas/ correspond to the FIRST one (the 2026-04-17 fetch).
      ADR-002's intent is that pom.xml records the SHA the bundled schemas were derived from —
      that is the 2026-04-17 SHA, which is "not pinned in manifest." So even when GAP-2 is
      addressed by adding `<connected-systems-yaml.sha>` to pom.xml, the value to write is
      currently unknown (or 3fd86c73, which would be a forward-tracking pin that does NOT match
      the bundled bytes). This is a deeper schema-provenance gap that GAP-2 alone does not
      resolve.
    recommended_fix: |
      Two options: (a) re-fetch the schemas from upstream at the current SHA 3fd86c73 and
      commit any diffs in a follow-up sprint, then GAP-2's pom.xml pin matches reality; (b)
      compute the true 2026-04-17 fetch SHA from
      csapi_compliance/scripts/fetch-schemas.ts + git-blame the
      csapi_compliance/schemas/manifest.json's `generatedAt: 2026-04-17T01:18:41.614Z`, and
      pin THAT SHA in pom.xml. Option (a) is cleaner long-term but a Sprint 2+ task. Option
      (b) is a same-turn doc fix that satisfies ADR-002's literal text.
    address_in_turn: optional (option b same-turn; option a Sprint 2+)

