verdict_rationale: |
  Sprint 5 delivers 5-of-6 stories cleanly (S-ETS-05-02 SMOKE_OUTPUT_DIR, S-ETS-05-04
  doc/ADR-010 v3, S-ETS-05-05 Procedures, S-ETS-05-06 Deployments, AND
  S-ETS-05-01 Java/bash glue all structurally landed) but TWO Sprint 5 live execs
  surface NEW gate-time defects:

  (1) S-ETS-05-01 GAP-1 closure (Quinn live exec #1, scripts/credential-leak-e2e-
      test.sh from /tmp/quinn-fresh-ets05/) DID NOT pass three-fold cross-check.
      Outcome differs from Sprint 4: the synthetic credential NOW reaches the
      wire (Sprint 4 had Authorization=<absent> on all 11 inbound stub requests;
      Sprint 5 Quinn observed 12 inbound stub requests carrying Authorization
      headers). However, the wire credential is the MASKED form `Bear***WXYZ`,
      not the unmasked `Bearer ABCDEFGH12345678WXYZ`. The MaskingRequestLogging
      Filter is now intercepting the request itself (mutating header value before
      transport) rather than masking only the log line — try/finally restoration
      is missing or broken. Result: prong (a) PASS (0 unmasked hits in TestNG
      XML/container/smoke logs); prong (b) PARTIAL (12 masked-form hits in
      stub-iut.log NOT counted by the script because it greps only
      container/testng/smoke logs — the masked form IS visible at the wire layer);
      prong (c) FAIL (0 unmasked-credential hits at stub IUT — the wire request
      carries the masked sentinel instead of the live credential, which means
      this ETS would fail authenticated-IUT scenarios in production). Script
      verdict: FAIL. This is a NEW Sprint 5 GAP — call it GAP-1' (sibling
      of Sprint 4's GAP-1; the wire is now wired, but the masking pattern is
      destructive instead of log-only).

  (2) S-ETS-05-03 sabotage --target=systemfeatures live exec FAILED at docker build
      step. Root cause: scripts/sabotage-test.sh `rsync -a --exclude='.git/'`
      copies the worktree minus .git, but the project Dockerfile's `COPY .git
      ./.git` step requires a .git directory in the build context. ERROR:
      "failed to compute cache key: failed to calculate checksum of ref ...
      \"/.git\": not found". No cascade XML produced; the two-level cascade
      Procedures+Deployments → SystemFeatures → Core could NOT be live-verified
      this gate. The structural cascade IS verified separately (a) at the
      testng.xml structural-lint layer (VerifyTestNGSuiteDependency 13 tests
      including 6 new Procedures+Deployments structural assertions PASS in mvn
      test) and (b) at the @BeforeClass SkipException defense-in-depth layer
      (ProceduresTests + DeploymentsTests both implement the inert-insurance
      pattern per ADR-010 v3). The Sprint 4 archived Raze sabotage XML
      (sprint-ets-04-05-sabotage-systemfeatures-cascade-2026-04-29.xml total=26
      passed=16 failed=1 skipped=9) remains the load-bearing live evidence for
      the Subsystems→SystemFeatures one-level cascade, but Sprint 5's two new
      classes have NOT been live-cascade-verified. This is GAP-2 (sabotage script
      structural defect, MEDIUM — fix is ~1 LOC bash: drop `--exclude='.git/'`
      OR add `git init && git -C "$SABOTAGE_WORKTREE" checkout HEAD --` after
      rsync to seed a minimal .git dir).

  Strengths counterbalancing:
   - mvn test 78/0/0/3 BUILD SUCCESS in /tmp/quinn-fresh-ets05/ (exact byte match
     to Dana's claim; +6 lint tests vs Sprint 4 baseline of 64 — 3 Procedures + 3
     Deployments structural assertions).
   - testng.xml correctly declares all 4 group dependencies in single-block
     consolidation (`systemfeatures`, `subsystems`, `procedures`, `deployments`,
     each `depends-on="systemfeatures"` for the latter 3, `core` for the former).
   - ProceduresTests structurally clean: 4 @Tests, ALL ETSAssert helpers, zero
     production bare-throw, canonical OGC URI form, geometry=null invariant
     UNIQUE-to-Procedures asserted on every item, defense-in-depth @BeforeClass.
   - DeploymentsTests structurally clean: 4 @Tests including SKIP-with-reason
     for unique deployed-system-resource encoding-class declaration check; single-
     item shape (1 GeoRobotix deployment) handled gracefully via non-empty check
     without >=2 assumptions.
   - Subsystems javadoc fix: enumerates 6 .adoc files (lines 100-103) explicitly
     citing Sprint 5 S-ETS-05-04 correction per Raze CONCERN-1.
   - ADR-010 v3 amendment landed in-place (not a new ADR file): lines 257-303
     of ADR-010-dependency-skip-verification-strategy.md record TestNG 7.9.0
     transitive cascade VERIFIED LIVE with full Sprint 4 Raze evidence
     (total=26/passed=16/failed=1/skipped=9), preserves @BeforeClass fallback
     as belt-and-suspenders, documents forward extension to Sprint 5+ classes.
   - SMOKE_OUTPUT_DIR mitigation v2 WORKS: all live execs wrote to
     /tmp/quinn-fresh-ets05/test-results-quinn or sabotage-results; user worktrees
     at ~/docker/gir/{csapi_compliance,ets-ogcapi-connectedsystems10}/ both
     `git status` clean post-execs. Sprint 2 incident pattern broken.
   - 26 unique OGC canonical URIs across all conformance.* classes; every Sprint
     5 URI matches /req/{procedure,deployment}/<X> form per OGC source.
   - Zero new production bare-throw sites; all 19 conformance/* hits go through
     ETSAssert.failWithUri (the library helper, not a bare AssertionError).

  Confidence 0.82 (vs Sprint 4 0.84): the two NEW live-exec gaps (GAP-1' wire-masking
  destructive, GAP-2 sabotage docker-build) outweigh the strong code-quality wins
  on Procedures + Deployments + ADR-010 v3 + SMOKE_OUTPUT_DIR. Sprint 5 is a slight
  trend DOWN (-0.02) from Sprint 4 — the new conformance classes are clean (would
  warrant 0.92+ alone), but TWO live-exec gates produced concrete defects, both
  Sprint 5-introduced (not carried-over from earlier sprints). The five other items
  are all PASS. Recommend Sprint 6 wedge fix for GAP-1' (try/finally restoration in
  MaskingRequestLoggingFilter wrap chain) AND a 1-LOC bash fix for GAP-2 (sabotage
  script .git inclusion).

