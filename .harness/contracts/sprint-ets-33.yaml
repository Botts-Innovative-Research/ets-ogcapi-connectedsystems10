description: |
  Sprint 33 plans the populated-IUT follow-up to Sprint 32's read-only
  Observation/Command binding closure. The planning target is a documented,
  mutation-gated local OSH dynamic-data seed fixture path that can create
  DataStream, Observation, ControlStream, Command, and optional CommandStatus
  and CommandResult evidence under explicit dedicated mutable-IUT opt-in. It
  also carries forward Sprint 32 Raze's non-blocking concern: add focused helper
  regressions for inline CommandStatus/CommandResult skip/fail behavior before
  positive populated-IUT closure is reported.

