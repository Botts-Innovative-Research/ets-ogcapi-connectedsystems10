      - "  Line 158: total > 0 die — would catch this."
      - "Could the script accept a partial / parse-failed report?"
      - "  Line 157: `[[ $total =~ ^[0-9]+$ ]]` → die if total can't be parsed (e.g. 'NA' from regex miss)."
      - "Could the SEVERE filter mask a genuine startup error?"
      - "  3 filtered patterns: `did not find a matching property` (Tomcat property warnings, NOT errors), `maxActive is not used in DBCP2` (DBCP2 deprecation warning), `encoding ['utf-8']` (UTF-8 encoding header issue)."
      - "  The `encoding ['utf-8']` filter is the noteworthy one. ALL utf-8 SEVERE entries in container log occur at runtime (after Server startup at line 49+), NOT during startup (lines 1-48). The awk gate `/Server startup in/{print; exit}` already truncates the log to the startup block before grep runs. The grep -v exclusion is belt-and-suspenders, not load-bearing."
