gaps_found:
  - id: GAP-1
    severity: medium
    description: |
      architect-handoff.yaml `constraints_for_generator.must` item #9 says: "Use EtsAssert
      with structured FAIL messages including the /req/* URI; do not throw bare TestNG
      AssertionError." S-ETS-01-02 ships 3 conformance test classes containing 21 bare
      `throw new AssertionError(...)` invocations and ZERO calls to EtsAssert (or to the
      existing ETSAssert.java helper class at the root package).

      Concretely:
        ConformanceTests.java: 6 bare AssertionError throws (lines 88, 108, 124, 128, 133, 154)
        LandingPageTests.java: 7 bare AssertionError throws (lines 107, 128, 141, 145, 160, 183, 216)
        ResourceShapeTests.java: 8 bare AssertionError throws (lines 99, 103, 111, 116, 121, 126, 143, 148)

      The intent of the constraint is "FAIL messages always include the canonical /req/*
      URI." This intent IS met — every bare AssertionError ctor call includes the
      requirement URI as a message prefix (e.g. "REQ_ROOT_SUCCESS + ' — expected HTTP 200
      from landing page (GET ' + iutUri + '), got ' + status"). So at the user-visible-FAIL-
      message level, the design intent holds. What's violated is the literal directive
      to use a helper rather than raw ctors.

      The repo HAS an ETSAssert class (capitalization differs from architect's "EtsAssert"
      — possibly a clue Dana intended to write a new EtsAssert and didn't get to it) at
      org.opengis.cite.ogcapiconnectedsystems10.ETSAssert, but inspection shows it's
      Schematron/XML-Document/XPath-oriented (assertQualifiedName, assertXPath, assertSchemaValid
      against XSD) with no JSON-friendly methods (assertStatus, assertJsonHas, etc.) suitable
      for the new conformance.core.* classes. Dana would have had to extend it. She didn't.

      Why medium not low: the constraint was an explicit `must` from the architect; ignoring
      it without rationale in the (missing) generator-handoff is process-discipline issue,
      not a correctness bug. Future maintainers refactoring the conformance classes will
      need to add an `EtsAssert.assertXXX` helper anyway when the suite scales beyond 12
      methods to ~150 (Part 1 full); doing that NOW would be cheaper than touching 21 sites
      later.
    recommended_fix: |
      Add a Sprint-2 cleanup story (call it S-ETS-02-00 or fold into S-ETS-02-01 CommonTests):
        1. Add JSON-friendly EtsAssert helper methods:
             EtsAssert.assertStatus(Response resp, int expected, String reqUri)
             EtsAssert.assertJsonObjectHas(Map body, String key, Class type, String reqUri)
             EtsAssert.assertJsonArrayContains(List array, Predicate<Object> pred, String desc, String reqUri)
             EtsAssert.fail(String reqUri, String message)
        2. Refactor the 21 bare AssertionError sites in conformance/core/*.java to call them.
        3. Update architect-handoff `must` constraint #9 in retrospect: capture the
           "extend ETSAssert with REST-Assured/JSON helpers" sub-task as part of the next
           generator-handoff template.
      Not blocking S-ETS-01-02 merge.

  - id: GAP-2
    severity: medium
    description: |
      URI-mapping fidelity (sprint-contract evaluation Q1) is PARTIAL. The TS registry's
      common.ts uses URI form `/req/ogcapi-common/<X>` (6 distinct URIs); Java's
      conformance.core.* uses URI form `/req/core/<X>-success` (4 distinct URIs). Per
      OGC 19-072 adoc the actual canonical form is `/req/landing-page/root-success` — a
      third form, used by neither.

      csapi_compliance v1.0 KNEW about this — ops/known-issues.md and prior Raze
      adversarial review (sprint-rubric-6-1-sweep) flagged "URI-path imprecision: cited as
      /req/core/root-success but actual is /req/landing-page/root-success". Deferred from
      v1.0 to a follow-up sprint that never happened (because the project pivoted to Java).

      Now we have TWO repos with imprecise but DIFFERENT URI forms. csapi_compliance still
      has `/req/ogcapi-common/<X>`; ets-ogcapi-connectedsystems10 has `/req/core/<X>-success`.
      The latter is closer to the OGC 19-072 adoc form than the former (they both use
      "core" not "ogcapi-common", though neither uses "landing-page"). Dana's choice is
      a reasonable interpretation of "import the v1.0 spec knowledge and modernize the
      URI to be more canonical" — but it CHANGED a load-bearing URI without an ADR.

      Why medium not low: the architect-handoff evaluation_focus #1 explicitly says "Did
      the Java port preserve the URI-mapping fidelity from the TS registry?" — the answer
      is "preserved at concept level, drifted at URI-path-segment level, undocumented".
      A future automated diff (REQ-ETS-SYNC-001 — the deferred TS↔Java URI-coverage CI
      script) will need an allowlist entry per drifted URI to pass green; absent that
      allowlist the script will fail when it lands. Tracking the drift now is cheaper than
      reverse-engineering it later.
    recommended_fix: |
      Option A (cleanup pass): change Java REQ_ROOT_SUCCESS et al. to the OGC 19-072 adoc-
      verified canonical form `/req/landing-page/root-success` (etc.) AND patch v1.0's
      common.ts to the same form. Single-commit canonical-URI pass across both repos. ~10
      string replacements + test updates.
      Option B (allowlist + ADR): land an ADR in _bmad/adrs/ documenting "Java ETS uses
      `/req/core/<X>-success` form because <reason>; v1.0 TS registry uses
      `/req/ogcapi-common/<X>` form (legacy); both are imprecise per OGC 19-072 adoc but
      neither breaks normative-text accuracy. REQ-ETS-SYNC-001's allowlist will need an
      entry per pair." 1 ADR + future allowlist work.
      Recommend Option A as the cleaner path; defer if Sprint 2 has higher priorities.

  - id: GAP-3
    severity: low
    description: |
      openspec/capabilities/ets-ogcapi-connectedsystems/spec.md "Implementation Status
      (2026-04-28)" reflects S-ETS-01-01 close (REQ-ETS-SCAFFOLD-001..007) but does NOT
      yet reflect S-ETS-01-02 deliverables. The "Deferred" section line 355 still says
      "REQ-ETS-CORE-001..004 (CS API Core conformance class — LandingPageTests,
      ConformanceTests, ResourceShapeTests) → S-ETS-01-02" — but those classes now exist
      and pass live. Spec needs flipping from "Deferred" to "What's Built (Sprint ets-01 /
      S-ETS-01-02)".

      _bmad/traceability.md should also flip REQ-ETS-CORE-001..004 from Active to Done.
      ops/changelog.md and ops/status.md per CLAUDE.md step 6 / step 7.
    recommended_fix: |
      After Quinn + Raze gates close, append to spec.md Implementation Status:
        ### What's Built (Sprint ets-01 / S-ETS-01-02)
        Sub-deliverable 2 — CS API Core Conformance Class (REQ-ETS-CORE-001..004, Implemented):
        - REQ-ETS-CORE-001: 12 @Test methods across 3 classes (LandingPageTests=6,
          ConformanceTests=4 partially, ResourceShapeTests=2). Each carries description
          attr beginning with the canonical OGC requirement URI per design.md.
          PARTIAL caveat: bare AssertionError used instead of EtsAssert helper; tracked
          as Sprint-2 cleanup (Quinn GAP-1).
        - REQ-ETS-CORE-002: LandingPageTests preserves v1.0 GH#3 fix (sentinel
          landingPageDoesNotRequireSelfRel) and v1.0 service-doc fallback
          (landingPageHasApiDefinitionLink). 6 @Tests / 6 PASS at smoke 2026-04-28.
        - REQ-ETS-CORE-003: ConformanceTests with conformsTo capture into ISuite for
          downstream classes (CONFORMS_TO_ATTR = "declaredConformanceClasses"). 4 @Tests
          / 4 PASS at smoke 2026-04-28.
        - REQ-ETS-CORE-004: ResourceShapeTests Sprint-1-narrowed to api-def + /conformance
          shape per design.md "single representative resource" pattern. 2 @Tests / 2 PASS.
          PARTIAL caveat for true link-crawl deferred to Sprint 2 once Common lands.
        Smoke artifact: ops/test-results/s-ets-01-02-georobotix-smoke-2026-04-28.xml
        (12/12 PASS against https://api.georobotix.io/ogc/t18/api).
        Subpackage refactor: closed CONCERN-3 from S-ETS-01-01 gates (level1/ deleted;
        conformance/core/ + listener/ subpackages live per ADR-003).
      And in traceability.md flip REQ-ETS-CORE-001..004 status to Done.

concerns:
  - id: CONCERN-1
    description: |
      ResourceShapeTests is intentionally minimal per Sprint 1 narrowing in design.md
      ("Sprint 1 may scope ResourceShapeTests to a single representative resource — likely
      /api or /conformance itself — and expand to a true crawl in Sprint 2 once Common is
      implemented."). Dana's class javadoc lines 25-49 acknowledge this with the cited
      design.md quote and a note that "Spec Implementation Status reflects this as PARTIAL
      per ops/changelog reconciliation." But the spec has not yet been updated (GAP-3) so
      the PARTIAL is currently undocumented. Resolves with GAP-3 closure.

  - id: CONCERN-2
    description: |
      Dana's smoke ran against `https://api.georobotix.io/ogc/t18/api` directly, NOT
      through TeamEngine. That's the right call for S-ETS-01-02 (TeamEngine container
      smoke is S-ETS-01-03 work). But the Sprint 1 critical SCENARIO-ETS-TEAMENGINE-LOAD-001
      and SCENARIO-ETS-CORE-SMOKE-001 still need the full TeamEngine + Docker + scripts/
      smoke-test.sh path to close. S-ETS-01-03 readiness was CONCERNS in architect-handoff;
      now that the test classes exist, S-ETS-01-03 has all dependencies. Recommend
      orchestrator schedule S-ETS-01-03 immediately after Quinn + Raze gates on S-ETS-01-02
      close.

  - id: CONCERN-3
    description: |
      Dana included an OGC API Common PART 2 URI (`http://www.opengis.net/spec/ogcapi-common-2/0.0/req/oas30/oas-impl`)
      in ResourceShapeTests:55. That's NOT the same thing as OGC API Connected Systems
      Part 2 (which is what `must_not` constraint #1 forbids — REQ-ETS-PART2-* /
      OGC 23-002 / `connectedsystems-2` / Datastream / ControlStream / etc.). OGC API
      Common Part 2 (OGC 21-053) is the "OpenAPI 3.0" descriptor spec — completely
      separate from CS API Part 2. The Part-2-contamination grep correctly returned ZERO
      because the regex looks for `connectedsystems-2|Datastream|ControlStream|swecommon`,
      not for `ogcapi-common-2`.

      However, this is the FIRST appearance of OGC API Common Part 2 in either repo — the
      v1.0 TS registry doesn't model it. Dana introduced a forward-leaning citation. It
      tests that the api-definition link resolves to non-empty content (HTTP 200 + body)
      — a sensible REQ-ETS-CORE-004 narrowing. Quinn finds this ACCEPTABLE because (a)
      the assertion logic is sound, (b) it's not Part 2 in the architect-forbidden sense,
      and (c) it's structurally additive. But: an ADR row would be cleaner ("Why does Sprint
      1 cite ogcapi-common-2/0.0 when v1.0 didn't?"). Tracking as a Sprint-2 documentation
      hygiene item.

  - id: CONCERN-4
    description: |
      `landingPageReturnsHttp200` (LandingPageTests:104) does NOT have `dependsOnMethods`,
      while `landingPageHasLinks` and downstream tests DO depend on `landingPageReturnsJson`.
      This means a server returning HTTP 500 + a body that happens to be parseable JSON
      could show landingPageReturnsHttp200=FAIL but landingPageHasLinks=PASS — a TestNG
      report inconsistency (FAIL on the broader assertion, PASS on the narrower-but-not-
      gated-by-it dependent). Probably fine in practice (HTTP 500 bodies rarely have a
      `links` array) but slightly looser than ideal. Add `dependsOnMethods =
      "landingPageReturnsHttp200"` to landingPageReturnsJson for cleaner DAG. Sprint-2
      cleanup.

