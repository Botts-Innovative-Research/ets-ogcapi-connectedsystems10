      georobotix_smoke: "ops/test-results/sprint-ets-26-georobotix-smoke-failed-2026-05-22.xml reports 146 total / 27 passed / 5 failed / 114 skipped."
      local_osh_smoke: "ops/test-results/sprint-ets-26-local-osh-smoke-failed-2026-05-22.xml reports 146 total / 61 passed / 4 failed / 81 skipped."
      docs_honesty: "ops/status.md, ops/test-results.md, story, contract, and traceability all mark the Generator partial/E2E-blocked rather than complete."
    required_fix:
      - "Do not report Sprint 26 done or all tests passing."
