    verdict: "pass"
    evidence:
      - "Contract, story, OpenSpec, traceability, status, test-results, and planner handoff use /req/api-common and /conf/api-common for Part 2 Common."
      - "The same docs reject frozen web-app dynamic-common / dynamic-json naming for Java ETS @Test descriptions."
      - "Official OGC 23-002 Clause 8 and Annex A.1 confirm the chosen identifiers."
  dynamic_names_rejected:
    verdict: "pass"
    evidence:
