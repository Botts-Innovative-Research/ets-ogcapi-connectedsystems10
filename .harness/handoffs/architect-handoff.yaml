surfaced_risks:
  - id: "TWO-LEVEL-DEPENDENCY-CASCADE-MAY-NOT-WORK"
    severity: "high (preserved from Pat)"
    architect_mitigation: |
      ADR-010 v2 amendment ratifies defense-in-depth (testng.xml + @BeforeSuite
      fallback). Generator MUST implement BOTH; the @BeforeSuite is a
      pre-ratified fallback (no Architect re-cycle needed if testng.xml form
      alone underperforms). Runtime verification mandatory; archived testng-
      results.xml is canonical evidence.

  - id: "CHOWN-LAYER-ATTACK-MAY-NOT-MATERIALIZE-EXPECTED-SAVINGS"
    severity: "medium (preserved from Pat)"
    architect_mitigation: |
      ADR-009 v2 amendment documents PARTIAL acceptance band (600-650MB) +
      tier-2 version-overlap dedupe fallback (~7-8MB additional per Sprint 3
      empirical analysis intra-WEB-INF/lib duplicate-version table) +
      Sprint 5+ alpine-variant roadmap. Generator runtime verification
      empirically determines actual outcome; PARTIAL is contractually
      acceptable.

  - id: "TESTNG-BEFORE-SUITE-VS-DEPENDS-ON-GROUPS-INTERACTION-ORDERING"
    severity: "low (NEW Architect-surfaced risk)"
    description: |
      If both testng.xml <group depends-on> and @BeforeSuite SkipException
      activate, the result is idempotent SKIP either way. However, if @BeforeSuite
      reads SuiteAttribute keys (core.failed / systemfeatures.failed) BEFORE
      Core/SystemFeatures @Tests have run (TestNG @BeforeSuite fires once per
      suite, before ANY test), the keys may be null / absent. SuiteFixtureListener
      extension to populate these keys via ITestListener.onTestFailure runs AFTER
      individual test failures — so the @BeforeSuite check on subsequent test
      classes (Subsystems' @BeforeSuite for the Subsystems class) needs careful
      ordering verification. Mitigation: Generator empirically verifies in
      S-ETS-04-05; if ordering is wrong, fall back to @BeforeClass on
      SubsystemsTests (fires per-class, after upstream classes).

  - id: "STUB-IUT-PORT-LEAK-ACROSS-SCRIPT-RUNS"
    severity: "low (NEW Architect-surfaced risk)"
    description: |
      If scripts/verify-credential-leak.sh aborts mid-run, the stub-IUT Python
      process may continue running on the ephemeral port; subsequent runs would
      fail to bind OR get a different port confusing /tmp/stub-iut-port readers.
      Mitigation: trap cleanup EXIT per S-ETS-04-04 fix pattern MUST kill the
      stub-IUT process by PID (not by port). Document the PID-tracking pattern
      in scripts/stub-iut.sh.

  - id: "GEOROBOTIX-SUBSYSTEMS-SHAPE-MISMATCH"
    severity: "medium (preserved from Pat)"
    architect_mitigation: |
      design.md §'Sprint 4 hardening: Subsystems conformance class scope'
      explicitly accepts SKIP-with-reason if GeoRobotix returns 404 — the
      testng.xml + bash sabotage two-level cascade verification still proves
      the dependency wiring (architectural goal). 4-@Test scope minimizes
      structural commitment if GeoRobotix shape diverges.

