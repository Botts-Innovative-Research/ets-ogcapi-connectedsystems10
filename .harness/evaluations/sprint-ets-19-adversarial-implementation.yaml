findings:
  - id: "RAZE-ETS19-IMPL-CONCERN-001"
    severity: "LOW"
    status: "OPEN_FOLLOWUP"
    title: "Positive mutable-IUT mediatype-write evidence remains unproven"
    details: >
      The implementation correctly skips the new GeoJSON and SensorML mediatype-write
      lifecycle checks in default GeoRobotix smoke and does not claim full closure.
      However, the request bodies have not yet been exercised against a dedicated
      mutable IUT with application/geo+json or application/sml+json. This is acceptable
      for Sprint 19's safety-gated partial scope, but it remains the next proof point
      before either requirement class can advance beyond PARTIAL.
    required_fix: null
  - id: "RAZE-ETS19-IMPL-CONCERN-002"
    severity: "LOW"
    status: "OPEN_FOLLOWUP"
    title: "Cleanup DELETE result is best-effort only"
    details: >
      Created resource cleanup is attempted in finally blocks, but DELETE status is
      not asserted or reported. This does not create a false PASS for mediatype-write
      because PASS evidence depends on POST status, resource URI discovery, follow-up
      GET status, and UID preservation. It does leave dedicated mutable-IUT runs with
      weaker cleanup diagnostics if a server accepts create and dereference but rejects
      delete.
    required_fix: null

