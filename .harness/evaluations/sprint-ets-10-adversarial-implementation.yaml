summary: |
  SensorML implementation is directionally sound and avoids the major false-PASS traps:
  it documents partial scope, does not implement write-side checks, rejects CS API
  `items` wrappers and generic `Feature` JSON as SensorML evidence, records alternate-link
  fallback in the TeamEngine report, and wires TestNG group dependency/lint coverage.
  However, completion cannot be approved yet because the implementation has one
  generality gap where alternate-link support is unnecessarily gated by collection-level
  SensorML `Accept` returning 200. A narrower documentation gap remains because
  `ops/status.md` still describes Sprint 10 as planned despite other reconciliation docs
  being updated.

findings:
  - id: RAZE-ETS10-GAP-001
    severity: MEDIUM
    title: "Alternate-link fallback is still gated by collection-level SensorML Accept 200"
    file: "src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/sensorml/SensorMlTests.java"
    lines: "94-99, 166-178"
    evidence: |
      `fetchSensorMlInputs` probes `GET /systems` with `Accept: application/sml+json`,
      then `sensorMlRepresentationDiscoveredForSystem` unconditionally asserts
      `systemsAcceptSensorMlResponse` status 200 before accepting the already-selected
      direct or alternate item-level representation. The contract allows discovering
      SensorML through an item-level `alternate` link with `type=application/sml+json`.
      An IUT that returns 406 or another non-200 response for collection-level SensorML
      negotiation but exposes a valid item-level alternate SensorML link would fail this
      Sprint 10 subset despite satisfying the planned fallback route.
    impact: |
      GeoRobotix smoke does not expose the issue because its collection-level probe returns
      HTTP 200 with a CS API `items` wrapper. Other conforming implementations may be
      incorrectly failed before alternate-link evidence can count.
    required_fix: |
      Do not assert collection-level `Accept: application/sml+json` status 200 when a
      direct item SensorML response or explicit item-level alternate link has been found.
      Keep the existing `items` wrapper rejection, but treat the collection probe as
      diagnostic/fallback-honesty evidence rather than a prerequisite for alternate-link PASS.

  - id: RAZE-ETS10-GAP-002
    severity: LOW
    title: "ops/status.md still describes Sprint 10 as planned"
    files:
      - "ops/status.md"
    evidence: |
      A concurrent reconciliation edit updated the story to Generator Complete,
      traceability to PARTIAL-IMPLEMENTED, OpenSpec with Maven/smoke evidence,
      ops/changelog, ops/test-results, known issues, and the epic. But `ops/status.md`
      still has `Last updated: 2026-05-05T17:41Z`, says `Current sprint status:
      Sprint ets-10 PLANNED`, and lists the next action as running Generator and
      implementing SensorML.
    impact: |
      Future-session handoff remains misleading even though the main spec/story/result
      artifacts now support the Generator-complete claim.
    required_fix: |
      Update `ops/status.md` to Sprint 10 Generator Complete - Pending Quinn/Raze Gates,
      include Maven/smoke evidence, and replace the Generator-next-action list with the
      gate/fix-next-action list. Keep full SensorML class closure open.

