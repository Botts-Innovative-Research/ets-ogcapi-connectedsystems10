upstream_ogc_verification:
  repo: "opengeospatial/ogcapi-connected-systems"
  branch: "master"
  requirement_class_source: "api/part1/standard/requirements/encoding/geojson/requirements_class_geojson.adoc"
  source_http_status: "HTTP/2 200 on 2026-05-06"
  identifier: "/req/geojson"
  inherits:
    - "/req/api-common"
    - "http://www.opengis.net/spec/ogcapi-features-1/1.0/req/geojson"
  subrequirements:
    - "/req/geojson/mediatype-read"
    - "/req/geojson/mediatype-write"
    - "/req/geojson/relation-types"
    - "/req/geojson/feature-attribute-mapping"
    - "/req/geojson/system-schema"
    - "/req/geojson/system-mappings"
    - "/req/geojson/deployment-schema"
    - "/req/geojson/deployment-mappings"
    - "/req/geojson/procedure-schema"
    - "/req/geojson/procedure-mappings"
    - "/req/geojson/sf-schema"
    - "/req/geojson/sf-mappings"

planning_probes:
  georobotix:
    iut_url: "https://api.georobotix.io/ogc/t18/api"
    conformance: "HTTP 200; declares /conf/geojson, /conf/deployment, /conf/procedure, /conf/sf, /conf/property, /conf/system, and /conf/sensorml."
    deployments_accept_geojson: "HTTP 200; Content-Type application/json; top-level keys ['items']."
    procedures_accept_geojson: "HTTP 200; Content-Type application/json; top-level keys ['items', 'links']."
    samplingfeatures_accept_geojson: "HTTP 200; Content-Type application/json; top-level keys ['items', 'links']."
    deployment_item_mapping_observed: "First default-JSON item has properties.uid/name/validTime and properties.deployedSystems@link[]."
    procedure_item_mapping_observed: "First default-JSON item has geometry null and properties.uid/featureType/name/validTime."
    sampling_feature_item_mapping_observed: "First default-JSON item has properties.uid/featureType/name plus hostedProcedure@link and radius."
    interpretation: "Current public IUT supports the resource collections but does not provide GeoJSON FeatureCollection responses for these paths under Accept: application/geo+json. Generator must SKIP fallback wrappers rather than count them as GeoJSON PASS."

resource_specific_predicates:
  deployment:
    schema_requirement: "/req/geojson/deployment-schema"
    mapping_requirement: "/req/geojson/deployment-mappings"
    predicates:
      - "GeoJSON response is FeatureCollection/features before PASS."
      - "First feature is type=Feature with id, geometry, and properties."
      - "properties.uid is present as a string."
      - "properties.name is present as a string when supplied by the IUT."
      - "properties.deployedSystems@link is present as an array or deployment-specific mapping SKIPs with reason."
  procedure:
    schema_requirement: "/req/geojson/procedure-schema"
    mapping_requirement: "/req/geojson/procedure-mappings"
    predicates:
      - "GeoJSON response is FeatureCollection/features before PASS."
      - "First feature is type=Feature with id, geometry, and properties."
      - "geometry is null for Procedure features, matching /req/procedure/location."
      - "properties.uid and properties.featureType are present as strings."
  sampling_feature:
    schema_requirement: "/req/geojson/sf-schema"
    mapping_requirement: "/req/geojson/sf-mappings"
    predicates:
      - "GeoJSON response is FeatureCollection/features before PASS."
      - "First feature is type=Feature with id, geometry, and properties."
      - "properties.uid and properties.featureType are present as strings."
      - "At least one sampling-feature-specific association or attribute such as properties.hostedProcedure@link or properties.radius is present, or the mapping assertion SKIPs with reason."

generator_must_do:
  - "Record exact HEAD before editing."
  - "Extend GeoJsonTests with deployment, procedure, and samplingFeature read-only schema/mapping checks."
  - "For each new resource type, assert at least one resource-specific predicate beyond generic Feature shape before claiming schema/mapping PASS."
  - "Use the same fallback honesty as Sprint 9: a CS API `items` wrapper without `features` is not a GeoJSON PASS."
  - "Keep all new tests read-only and scoped to GET requests."
  - "Add focused unit coverage if helper extraction logic grows beyond trivial local code."
  - "Run Docker Maven and default GeoRobotix TeamEngine smoke."
  - "Run the no-mutation oracle or otherwise verify zero IUT-bound POST/PUT/DELETE/PATCH."
  - "Update OpenSpec/story/traceability/status/changelog/test-results."

generator_must_not_do:
  - "Do not implement /req/geojson/mediatype-write."
  - "Do not issue POST, PUT, PATCH, or DELETE."
  - "Do not count CS API default `items` wrappers as GeoJSON FeatureCollection PASS."
  - "Do not treat generic Feature shape alone as deployment/procedure/sampling-feature schema/mapping closure."
  - "Do not implement SensorML or Part 2 work in this sprint."
  - "Do not promote REQ-ETS-PART1-012 beyond PARTIAL unless write behavior, relation-types, and all planned schema/mapping gaps are actually closed."

evaluation_focus:
  quinn:
    - "Verify new non-system GeoJSON tests are read-only and dependency-gated."
    - "Verify fallback `items` wrappers SKIP or document fallback, not PASS."
  raze:
    - "Attack false-positive GeoJSON claims from Content-Type application/json or CS API `items` wrappers."
    - "Check no IUT-bound mutation appears in default smoke."

confidence: 0.84
