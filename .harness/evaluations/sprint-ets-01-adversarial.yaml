  then run mandatory Gate 4 adversarial review (gate_4_required: true, force_run: true).

verdict_summary: |
  The substantive engineering work is sound: independent reproducibility is genuine (two fresh
  `mvn clean install` runs in /tmp/raze-fresh-checkout/ both produced sha256
  fe1c90c54537facf73ddd5172deec4b866e0071eae78834606bf92b229746385); JDK 17 + ets-common:17 +
  TeamEngine 5.6.1 are correctly pinned; META-INF/services file is single-line FQCN exactly as
  ADR-001 requires; Jersey is exclusively Glassfish 3.1.8 with zero com.sun.jersey 1.x
  transitives; .gitattributes enforces LF on all OGC text resources; the 126-schema bundle is
  byte-identical (`diff -r` empty) to csapi_compliance@v1.0-frozen; no Part 2 leakage in
  production code; no PRD-stale strings (connectedsystems-1, ogcapi.cs10, ets-common:14,
  teamengine 5.5) anywhere in the new repo. However, three real gaps must be closed before the
  sprint formally closes: (1) the sha256 hash that Dana self-reported and that propagated into
  csapi_compliance/ops/status.md is WRONG — Dana reported `5021b1d3275d8ff438c2bcd0d78881b2d3e9dd3f0ee3c71aa2648469462bbd9a`
  but the actual deterministic hash is `fe1c90c54537facf73ddd5172deec4b866e0071eae78834606bf92b229746385`,
  reproduced 3× (twice fresh-clone, once user worktree); (2) ADR-002 explicitly mandates the
  upstream OGC OpenAPI YAML SHA be pinned in `pom.xml` (a Maven property + comment block) — it
  is recorded only in `ets-ogcapi-connectedsystems10/ops/server.md`, not in pom.xml; sprint
  contract success_criterion `openapi_yaml_pinned_by_sha: true` is therefore not met as
  written; (3) `openspec/capabilities/ets-ogcapi-connectedsystems/spec.md` Implementation
  Status section (line 322) still reads "Not Started" — CLAUDE.md Step 6 (Reconcile Specs) was
  not performed post-Sprint-1. Plus three lower-severity concerns on commit-message ADR
  citations and CI workflow being staged-not-live. Verdict: GAPS_FOUND. All three gaps are
  fixable in the same turn (no rebuild, no code changes — pom.xml metadata + spec.md text +
  status.md hash correction).

gaps:
  - id: GAP-1
    severity: medium
    title: Dana's self-reported reproducibility hash is provably wrong; the falsehood propagated into ops/status.md
    description: |
      Dana's generator handoff and ops/status.md both report sha256
      `5021b1d3275d8ff438c2bcd0d78881b2d3e9dd3f0ee3c71aa2648469462bbd9a` for
      `target/ets-ogcapi-connectedsystems10-0.1-SNAPSHOT.jar`. Independent verification:
        - Fresh clone → /tmp/raze-fresh-checkout (HEAD 35d5154d6394b5...)
        - Build 1 (mvn clean install -DskipTests):
          `fe1c90c54537facf73ddd5172deec4b866e0071eae78834606bf92b229746385`
        - Build 2 (mvn clean install -DskipTests, fresh `rm -rf target`):
          `fe1c90c54537facf73ddd5172deec4b866e0071eae78834606bf92b229746385`
        - Build 3 (mvn clean install WITH tests):
          `fe1c90c54537facf73ddd5172deec4b866e0071eae78834606bf92b229746385`
        - User worktree (already-built) at /home/nh/docker/gir/ets-ogcapi-connectedsystems10:
          `fe1c90c54537facf73ddd5172deec4b866e0071eae78834606bf92b229746385`
      Reproducibility is GENUINE (the `<project.build.outputTimestamp>` + .gitattributes plumbing
      works as designed and produces identical bytes across invocations). The reported hash
      simply does not match any actual artifact at HEAD 35d5154. Either Dana ran a different
      build sequence and conflated, or the hash was fabricated from a different artifact (e.g.
      the AIO jar, or an interim commit). The danger: if this propagates into the OGC CITE
      submission as "this is the canonical reproducible-build artifact hash for v0.1," any
      reviewer who tries to reproduce will get a different number and (correctly) conclude the
      build is not reproducible.
    evidence: |
      sha256sum target/ets-ogcapi-connectedsystems10-0.1-SNAPSHOT.jar in fresh clone — see
      verified_independently below.
      ops/status.md:3 contains "sha256-identical jars on consecutive `-DskipTests` builds,
      `5021b1d3...`".
    recommended_fix: |
      Replace `5021b1d3...` in csapi_compliance/ops/status.md with
      `fe1c90c54537facf73ddd5172deec4b866e0071eae78834606bf92b229746385`. Update Dana's
      generator-handoff.yaml in .harness/handoffs/ if it records the same wrong hash. Add a
      one-line note to ops/changelog.md acknowledging the correction. The build itself does not
      need to change — reproducibility is sound.
    address_in_turn: yes

  - id: GAP-2
    severity: medium
    title: OGC OpenAPI YAML SHA not pinned in pom.xml as ADR-002 mandates; sprint contract success_criterion `openapi_yaml_pinned_by_sha` not met as written
    description: |
      ADR-002 says verbatim: "pom.xml step: add a Maven property `<connected-systems-yaml.sha>`
      and reference it in a comment block at the top of `pom.xml`. Initial value: the SHA
      pinned by `csapi_compliance/scripts/fetch-schemas.ts` at commit ab53658." Sprint contract
      `success_criteria.openapi_yaml_pinned_by_sha: true`. `evaluation_focus` says "Is the OGC
      OpenAPI YAML pinned by commit SHA in pom.xml, not by branch name? Verify via
      `mvn dependency:list` or by grep on pom.xml."

      Verification: `grep -i "yaml\|sha\|connected-systems" pom.xml` returns one hit, and it is
      a Maven properties comment unrelated to the YAML pin (it's the
      `<project.build.outputTimestamp>` reproducibility comment). No
      `<connected-systems-yaml.sha>` property exists. No comment block at the top of pom.xml
      records the upstream OGC SHA.

      The SHA IS recorded in
      `ets-ogcapi-connectedsystems10/ops/server.md` (`3fd86c73e744b7e2faaf7f1c17366bfb9ff4cd6f`,
      2026-04-20T20:23:50Z). That partly mitigates: provenance is recorded somewhere. But the
      contract and ADR-002 specifically say `pom.xml`, and that is the file CITE SC reviewers
      will look at first. A reviewer who only sees the pom and not the ops/ tree will (correctly)
      conclude the schema source is unpinned.
    evidence: |
      `grep -i "openapi\|connected-systems-yaml\|sha\|pinned" pom.xml` (1 hit, unrelated)
      `cat ets-ogcapi-connectedsystems10/ops/server.md` records SHA but pom.xml does not.
    recommended_fix: |
      Add to pom.xml `<properties>`:
        <connected-systems-yaml.sha>3fd86c73e744b7e2faaf7f1c17366bfb9ff4cd6f</connected-systems-yaml.sha>
      And a top-of-pom comment block citing ADR-002:
        <!-- Schema bundle provenance (ADR-002):
             src/main/resources/schemas/ is a verbatim copy from
             csapi_compliance@ab53658 (v1.0-frozen tag), originally derived from
             opengeospatial/ogcapi-connected-systems@${connected-systems-yaml.sha}.
             Update the SHA in lockstep with any schemas/ refresh.
        -->
      No build/runtime change needed; Maven does not consume the property. It exists for
      auditability per ADR-002.
    address_in_turn: yes

  - id: GAP-3
    severity: medium
    title: openspec spec.md Implementation Status not updated; CLAUDE.md Step 6 (Reconcile Specs) skipped
    description: |
      `openspec/capabilities/ets-ogcapi-connectedsystems/spec.md:322` reads:
