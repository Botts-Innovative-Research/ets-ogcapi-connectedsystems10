strategic_decisions:
  q1_next_work:
    question: "After Sprint 14, what is the next Sprint item?"
    decision: "S-ETS-15-01 GeoJSON non-system read-only expansion"
    rationale: |
      Update remains blocked from positive promotion because local OSH does not
      advertise PATCH. GeoJSON has a clear open Part 1 gap from Sprint 9:
      deployment/procedure/sampling-feature schema and mapping checks. The work
      is read-only, low mutation risk, and directly advances REQ-ETS-PART1-012.

  q2_scope_boundary:
    question: "Should Sprint 15 close full GeoJSON?"
    decision: "No. Keep REQ-ETS-PART1-012 PARTIAL."
    rationale: |
      Sprint 15 covers deployment/procedure/sampling-feature read-only schema
      and mapping checks only. `/req/geojson/mediatype-write`,
      `/req/geojson/relation-types`, property mapping, full schema validation,
      SensorML, and Part 2 remain out of scope.

  q3_fallback_honesty:
    question: "How should default CS API JSON responses be treated?"
    decision: "CS API `items` wrappers without GeoJSON `features` are fallback evidence, not PASS."
    rationale: |
      GeoRobotix currently declares `/conf/geojson`, but deployment, procedure,
      and sampling feature collection requests with `Accept: application/geo+json`
      returned `Content-Type: application/json` and top-level `items`. Counting
      that as GeoJSON FeatureCollection PASS would repeat the Sprint 9 false-positive
      risk that Raze already identified and fixed.

