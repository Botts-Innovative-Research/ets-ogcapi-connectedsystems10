  container: "field-hub-osh-1"
  credential_handling: "Basic auth derived from local OSH config or environment; credential values are never recorded."
  planning_probe:
    artifact: "ops/test-results/sprint-ets-33-plan-local-osh-dynamic-data-probes-2026-06-02.txt"
    result: |
      Authenticated local OSH still has empty dynamic-data collections:
      /datastreams, /observations, /controlstreams, and
      /systems/040g/{datastreams,controlstreams} all return HTTP 200 JSON with
      empty items. /commands returns HTTP 400 for GET. OPTIONS advertises write
      methods on dynamic-data collection paths, but Sprint 33 planning did not
      issue POST, PUT, PATCH, or DELETE.

official_api_contract_probe:
  source_url: "https://opengeospatial.github.io/ogcapi-connected-systems/api/part2/openapi/openapi-connectedsystems-2.yaml"
  checked_at: "2026-06-02T01:07:13Z"
  relevant_post_paths:
    - path: "/systems/{systemId}/datastreams"
      request_body_ref: "../schemas/json/dataStream.json"
      media_types:
        - "application/json"
    - path: "/datastreams/{dataStreamId}/observations"
      request_body_ref: "../schemas/json/observation.json"
      media_types:
        - "application/json"
        - "application/swe+json"
        - "application/swe+csv"
    - path: "/systems/{systemId}/controlstreams"
      request_body_ref: "../schemas/json/controlStream.json"
      media_types:
        - "application/json"
    - path: "/controlstreams/{controlStreamId}/commands"
      request_body_ref: "../schemas/json/command.json"
      media_types:
        - "application/json"
        - "application/swe+csv"
    - path: "/commands/{cmdId}/status"
      request_body_ref: "../schemas/json/commandStatus.json"
      media_types:
        - "application/json"
    - path: "/commands/{cmdId}/result"
      request_body_ref: "../schemas/json/commandResult.json"
      media_types:
        - "application/json"
  caveat: |
    The bundled write schemas mark some readOnly fields as required. Generator
    must discover actual OSH POST acceptance before committing exact fixture
    payloads and must record any accepted deviation rather than treating the
    OpenAPI schema alone as proof.

