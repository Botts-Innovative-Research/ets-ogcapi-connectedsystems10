  Test quality is high — 6 net-new tests across 2 files, with
  load-bearing regression tests that close EACH of the two loopholes
  independently. Fixtures in the legacy-id-loophole tests contain NO
  featureType anywhere, proving the new check doesn't silently still
  admit old-style collections.

  Source-spec accuracy verified against 4 upstream adoc files (deployment,
  system, sf, property). The sibling asymmetry (sampling=sosa:Sample;
  property uses itemType not featureType) is correctly captured in the
  new Active issue's fix-guidance — a load-bearing detail for the next
  sprint.

  Scope expansion to system-features.ts is legitimate (same class of bug,
  declared explicitly, not drive-by refactoring). Deferral of the three
  sibling files (procedures/properties/sampling) is honest — Raze grep
  and direct-read confirmed those files have a DIFFERENT bug (missing
