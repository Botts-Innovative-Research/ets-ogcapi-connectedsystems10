      Optionally also record the aio + javadoc + site SHAs there for the future
      reproducible-build CI assertion.

  - id: GAP-2
    severity: low
    description: |
      ADR-002 directs Generator to "Pin upstream OGC SHA in pom.xml comment block" with the
      initial value being the SHA that csapi_compliance/scripts/fetch-schemas.ts pinned at
      commit ab53658. The new repo's pom.xml does NOT contain such a comment block — there is
      no <connected-systems-yaml.sha> property, no upstream-OGC comment near the dependencies.
      The SHA `3fd86c73e744b7e2faaf7f1c17366bfb9ff4cd6f` IS recorded in ops/server.md schema-
      provenance section, which is acceptable for audit but does not satisfy ADR-002's specific
      pom.xml directive.
      The architect-handoff surfaced_risks_pat_missed.OPENAPI-PARSER-NOT-USED-IN-SPRINT-1
      explicitly anticipated this trade-off: Sprint 1 does NOT use Kaizen openapi-parser to
      drive validation, so the YAML pin is currently informational rather than build-time
      consumed. That makes GAP-2 a documentation discipline issue, not a build/test correctness
      issue.
    recommended_fix: |
      In Sprint 2 (when CS API Core conformance class lands and openapi-parser may begin to be
      consumed), add to pom.xml properties:
      ```xml
      <!--
        Upstream OGC OpenAPI YAML provenance (per ADR-002).
        Source repo: github.com/opengeospatial/ogcapi-connected-systems
        Pinned commit: 3fd86c73e744b7e2faaf7f1c17366bfb9ff4cd6f (2026-04-20)
        Source via csapi_compliance@v1.0-frozen (ab53658) schemas/ verbatim copy.
      -->
      <connected-systems-yaml.sha>3fd86c73e744b7e2faaf7f1c17366bfb9ff4cd6f</connected-systems-yaml.sha>
      ```
      Or defer to S-ETS-01-02 prep — same Generator pass that wires CoreTests can land the
      pom.xml comment block.

