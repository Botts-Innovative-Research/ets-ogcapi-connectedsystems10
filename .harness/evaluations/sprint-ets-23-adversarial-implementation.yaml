findings:
  - id: RAZE-ETS23-IMPL-GAP-001
    severity: high
    category: false-pass-risk
    status: open
    summary: "`globalFeasibilityCollectionReadableWhenAvailable` can PASS `/req/feasibility/canonical-url` without actual Feasibility resource evidence."
    details: >
      Sprint 23 planning and OpenSpec require actual Feasibility resource evidence
      before canonical/status/result PASS, and require SKIP when no Feasibility
      resources are exposed. The runtime method
      `globalFeasibilityCollectionReadableWhenAvailable` is described under
      `REQ_CANONICAL_URL`, but after `/conf/feasibility` declaration it passes
      whenever `GET /feasibility` returns HTTP 200 with an `items` array, including
      an empty array. That creates a future false PASS on a declaring IUT that
      exposes an empty `/feasibility` collection, or a generic collection shell,
      without any actual Feasibility resource that can prove canonical URL behavior.
    evidence:
      - "OpenSpec scenario `SCENARIO-ETS-PART2-004-FEASIBILITY-RESOURCE-CLOSURE-001`: require actual Feasibility resource evidence before PASS and SKIP when no resources exist."
      - "`Part2FeasibilityTests.globalFeasibilityCollectionReadableWhenAvailable` cites `REQ_CANONICAL_URL` and only checks HTTP 200 plus `items[]` shape."
      - "`hasItemsOnlyCollectionShape` intentionally allows empty `items`, so an empty Feasibility collection can PASS this canonical-url-labeled assertion."
      - "`VerifyPart2FeasibilityTests.itemsOnlyCollectionShapeAllowsEmptyFeasibilityCollections` locks in that empty collection shape as true."
    required_fix: >
      Change `globalFeasibilityCollectionReadableWhenAvailable` so it cannot PASS
      `/req/feasibility/canonical-url` on collection shape alone. Acceptable fixes
      include: SKIP when `/feasibility` has an empty `items` array, require at
      least one item with Feasibility resource-specific evidence before PASS, or
      remove/re-scope the method so only `feasibilityCanonicalResourceReadableWhenAvailable`
      can PASS canonical resource evidence. Add/update helper regression coverage
      to prevent empty `/feasibility` collections from satisfying canonical-url
      resource evidence.

