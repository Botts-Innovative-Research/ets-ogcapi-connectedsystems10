risks:
  highest:
    - id: "URI-CANONICALIZATION-BREAKS-SMOKE"
      description: |
        S-ETS-02-03 changes 30-40 URI strings across spec.md + traceability.md + Java
        @Test descriptions. If the OGC canonical form differs from what we assume for any
        single URI (e.g. /conformance might be `/req/core/conformance-success` not
        `/req/conformance/conformance-success`), the @Test description carries a wrong URI
        but the assertion logic still passes — silent regression of audit-trail integrity.
      severity: high
      mitigation: |
        Generator MUST fetch the actual OGC `.adoc` source for each URI (not assume the
        pattern). Use the same upstream-fetch methodology Raze used 2026-04-17. Build a
        short table in the story implementation notes mapping (Java constant) → (verified
        canonical URI) → (.adoc source URL) before executing the sweep. Quinn verifies the
        table during gate review.
    - id: "ETSASSERT-REFACTOR-BREAKS-12-12-PASS"
      description: |
        S-ETS-02-02 mechanically refactors 21 bare-throw sites to call ETSAssert helpers.
        If the helper signatures diverge from architect's ratified API surface, or if
        the refactor accidentally changes assertion semantics (e.g. swapping operands in
        an OR check, or unifying assertions that should remain separate), the 12/12 PASS
        smoke could regress to 11/12 or worse.
      severity: high
      mitigation: |
        Refactor + test in lockstep: each helper method gets a unit test BEFORE the bare-
        throw sites are migrated to use it. After every 3-5 site migrations, re-run smoke
        to catch regressions early. Generator MUST NOT batch all 21 site migrations into a
        single commit; one commit per test class (3 commits) for Quinn-bisectability.
  medium:
    - id: "DOCKERFILE-MULTISTAGE-BREAKS-SMOKE"
      description: |
        S-ETS-02-05 rewrites the Dockerfile to multi-stage. Build artifacts and runtime
        layout may shift in ways that break the smoke pipeline (e.g. classpath ordering,
        WEB-INF/lib content order affecting Jersey 3.x vs TE-bundled Jersey 1.x conflict
        resolution). Raze's adversarial sabotage test in s03 confirmed smoke-test.sh
        catches assertion failures cleanly; it does NOT confirm that a Dockerfile change
        is automatically caught.
      severity: medium
      mitigation: |
        Generator MUST re-run smoke END-TO-END after the Dockerfile rewrite — exit 0 + 12/12
        PASS — BEFORE committing the Dockerfile change. Architect ratifies the multi-stage
        pattern (Maven cache mount vs deps-staged-outside vs Maven-inside-container) so
        Generator doesn't ad-lib.
    - id: "GH-WORKFLOW-SCOPE-STILL-MISSING"
      description: |
        S-ETS-02-05 includes the `git mv` of `ci/github-workflows-build.yml` to
        `.github/workflows/build.yml`. This requires a gh token with `workflow` scope at
        push time. The same scope was missing for 3 sprints (S-ETS-01-01 commit time,
        plus s02 and s03). If the orchestrator's session at Sprint 2 close still doesn't
        have it, the move-to-live cannot land in this sprint either.
      severity: medium
      mitigation: |
        User-action item flagged in story S-ETS-02-05: orchestrator runs
        `gh auth refresh -s workflow` at sprint start. If the scope still cannot be
        granted, S-ETS-02-05 closes with the workflow file still under `ci/` and an
        explicit deferral note in ops/status.md. Sprint 2 success_criterion
        `ci_workflow_live` then converges to a Sprint 3+ carryover.
    - id: "SYSTEMFEATURES-GEOROBOTIX-EMPTY-COLLECTION"
      description: |
        Sprint 2 assumes GeoRobotix's `/systems` collection is non-empty (per v1.0 E2E
        history). If GeoRobotix has changed since then (e.g. /systems now empty or
        returns 404), some SystemFeatures @Tests may legitimately PASS-by-vacuity in ways
        that are misleading. Architect-handoff `risks_for_generator.medium.GENERATOR-USES-PAT-COORDINATES`
        equivalent here: Generator should curl /systems before writing assertions.
      severity: medium
      mitigation: |
        Generator MUST: `curl -sf https://api.georobotix.io/ogc/t18/api/systems | head` as
        the first step of S-ETS-02-06 implementation; archive the response shape into the
        story's Implementation Notes section before writing assertions. If /systems is
        empty/404, pivot to `/conf/common` (REQ-ETS-PART1-001) as the new feature class
        with rationale captured in the generator-handoff.
  low:
    - id: "ADR-DOCS-MAY-NEED-CONTENT-PAT-CANT-RATIFY"
      description: |
        Pat (Planner) can identify that ADR-006 + ADR-007 are NEEDED but cannot author the
        ADR text content (decision, alternatives considered) unilaterally — that's
        Architect domain. Sprint 2 may need an Architect cycle BEFORE Generator can land
        S-ETS-02-01.
      severity: low
      mitigation: |
        next_agent: architect (see handoff_to_generator below). If Architect ratifies the
        ADR templates + EtsAssert API + Dockerfile multi-stage pattern + SystemFeatures
        coverage scope quickly (1 cycle, low complexity since the empirical evidence is
        already captured by Quinn s03/Raze s03 reports), Generator can then proceed with
        all 6 stories.

handoff_to_generator:
  next_agent: "architect"
  rationale: |
    Architect (Alex) MUST land before Generator (Dana) for 5 deferred decisions:

    1. **ADR-006 content** — Jersey 1.x → Jakarta EE 9 / Jersey 3.x port for JDK 17
       archetype util layer. Architect authors the actual ADR text covering the 6 Sprint 1
       commits (`8e031ef` `3979709` `9ca229f` `87c6fe2` `9b42cb7` `d01c187`). Pat can
       point at the empirical evidence (architect-handoff `must` constraint cited
       features10's java17 branch as the pattern; Raze s01 CONCERN-1 documented the gap)
       but cannot ratify alternatives-considered.

    2. **ADR-007 content** — Dockerfile base image deviation (`tomcat:8.5-jre17` not
       `ogccite/teamengine-production:5.6.1`). Both Quinn s03 GAP-1 and Raze s03 CONCERN-1
       provide complete empirical justification (Docker Hub tag enumeration, JDK version
       check, JDK 17 ETS bytecode requirement). Architect formalizes into ADR with
       alternatives section (build TE 5.6.1 from source, use tomcat:10.1-jre17 with
       jakarta shim, fork ogccite/teamengine-production with JDK 17 base).

    3. **EtsAssert helper API surface** — what method signatures should the architect
       ratify for Generator to extend `ETSAssert.java`? Pat's proposal:
         EtsAssert.assertStatus(Response resp, int expected, String reqUri)
         EtsAssert.assertJsonObjectHas(Map<String,Object> body, String key, Class<?> type, String reqUri)
         EtsAssert.assertJsonArrayContains(List<?> array, Predicate<Object> pred, String desc, String reqUri)
         EtsAssert.failWithUri(String reqUri, String message)
       But Architect ratifies (or proposes alternative signatures, possibly mirroring
       ets-common's existing assertion helpers if they have a closer-to-OGC-convention
       form Pat doesn't know about).

    4. **Multi-stage Dockerfile pattern** — Architect picks ONE of three patterns:
         (a) Build-stage `mvn dependency:copy-dependencies` with `--mount=type=cache,
             target=/root/.m2`, then `COPY --from=build target/lib-runtime/`. Eliminates
             host ~/.m2 dependency.
         (b) Pre-staged `target/lib-runtime/` outside Docker (current pattern, just split
             across stages). Doesn't fix the ~/.m2 dependency.
         (c) Full `mvn package` inside the build stage (current single-stage but split).
             Cleanest end-to-end but slowest builds (~30-60s instead of ~4s cached).
       Architect's call drives Generator's implementation in S-ETS-02-05.

    5. **SystemFeatures coverage scope** — Sprint-1-style minimal-then-expand (4-6
       @Tests covering the 2-3 highest-priority assertions, narrowed PARTIAL with explicit
       deferral notes) OR full-coverage from day 1 (12-15 @Tests covering all
       /conf/system-features assertions in OGC 23-001 Annex A)? Pat recommends the
       Sprint-1-style narrowing for risk control (the architectural pattern is being
       extended for the first time; minimize the per-class surface area until the
       extension is proven to work). But Architect ratifies based on whether the
       remaining 12 classes need full-coverage rigor from day 1 to hit beta milestone.

    Architect ALSO surfaces (a) whether CredentialMaskingFilter (S-ETS-02-04) needs its
    own ADR — Pat's call: probably yes, because the masking semantics carry security-audit
    weight; (b) whether ADR-001 should be amended to cross-reference ADR-007 (the
    "production-docker:5.6.1 loads our jar without modification" claim in ADR-001 is FALSE
    for our JDK 17 ETS jar per Quinn s03 GAP-1 evidence).

    Architect produces an updated architect-handoff.yaml with `next_agent: generator` (or
    revised `next_agent: planner` if any of the 5 decisions surface a Sprint 2 contract
    rewrite — Pat's hypothesis is no rewrite needed). Once Architect lands, Generator
    implements all 6 stories in dependency order.

    Generator may sequence: S-ETS-02-01 (ADRs, doc-only — fast) → S-ETS-02-04 (logback —
    parallel-safe) → S-ETS-02-02 (EtsAssert — 3 commits, one per test class) → S-ETS-02-03
    (URI canonicalization sweep — 1 large commit) → S-ETS-02-05 (Dockerfile multi-stage
    + tighter smoke + CI git-mv) → S-ETS-02-06 (SystemFeatures, can begin in parallel
    after S-ETS-02-02 + S-ETS-02-03 land). Total est wall-clock 8-12h Generator time
    (vs Sprint 1's ~6h); the cleanup work is genuine doubled scope and S-ETS-02-06 should
    be ~50% the per-class effort of S-ETS-01-02 because the EtsAssert + URI patterns are
    already in place.

  next_agent_inputs_for_architect:
    - "Sprint 2 contract: .harness/contracts/sprint-ets-02.yaml (this file)"
    - "Quinn s02 GAP-1 + Raze s02 GAP-1 (EtsAssert refactor evidence)"
    - "Quinn s02 GAP-2 + Raze s02 GAP-2 (URI form drift evidence)"
    - "Quinn s03 GAP-1 + Raze s03 CONCERN-1 (Dockerfile deviation evidence + Docker Hub tags)"
    - "Raze s01 CONCERN-1 (Jersey port commits ADR-citation gap)"
    - "Raze s03 CONCERN-2 + CONCERN-3 (multi-stage Dockerfile rationale)"
    - "Raze s02 CONCERN-3 (logback.xml + CredentialMaskingFilter rationale)"
    - "csapi_compliance/src/lib/credential-masker.ts (v1.0 reference for masking semantics)"
    - "openspec/capabilities/ets-ogcapi-connectedsystems/design.md (placeholder SystemFeaturesTests at conformance.systemfeatures.*)"
