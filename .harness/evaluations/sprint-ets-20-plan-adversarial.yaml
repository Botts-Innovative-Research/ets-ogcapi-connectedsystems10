external_sources_checked:
  - source: "https://docs.ogc.org/is/23-002/23-002.html"
    evidence:
      - "Clause 8 Requirements Class Common lists Identifier /req/api-common, Conformance class /conf/api-common, prerequisite Part 1 /req/api-common, and normative statements /req/api-common/resources plus /req/api-common/resource-collection."
      - "Annex A.1 lists Conformance class /conf/api-common and tests /conf/api-common/resources and /conf/api-common/resource-collection."
      - "No dynamic-common identifier was found in the official source."
  - source: "https://api.georobotix.io/ogc/t18/api"
    evidence:
      - "Live /conformance probe confirms Part 2 sibling declarations /conf/datastream, /conf/controlstream, /conf/system-history, /conf/system-event, /conf/create-replace-delete, /conf/json, /conf/swecommon-json, /conf/swecommon-text, and /conf/swecommon-binary."
      - "Live /conformance probe confirms /conf/api-common is absent."
      - "Live GET probes: /datastreams?limit=1, /observations?limit=1, and /controlstreams?limit=1 returned HTTP 200 application/json with top-level items and links; /commands?limit=1 returned HTTP 400 text/html;charset=iso-8859-1."
      - "Landing page with Accept: application/json exposes datastreams and observations links."

findings:
  - id: "RAZE-ETS20-PLAN-CONCERN-001"
    severity: "low"
    area: "future Part 2 placeholder taxonomy"
    status: "open_followup"
    title: "Epic/spec placeholder still describes 14 Part 2 conformance classes"
    detail: >
      The Sprint 20 API Common plan itself uses the correct official identifiers,
      but the broader Part 2 placeholder text still says "14 OGC 23-002
      conformance classes" and the REQ-ETS-PART2-002..014 placeholder list still
      includes api-common even though REQ-ETS-PART2-001 now owns API Common.
      Official Annex A presents 12 conformance classes, grouping Datastreams
      with Observations and Control Streams with Commands. This does not create
      a Sprint 20 API Common false PASS path, but it should be cleaned up before
      planning later Part 2 class decomposition.
    required_fix: null

checks:
