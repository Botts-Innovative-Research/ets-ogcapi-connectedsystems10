verdict_policy:
  declaration_gate:
    - "If /conf/advanced-filtering is not declared, all Advanced Filtering conformance assertions SKIP with a precise reason."
    - "Do not infer /conf/advanced-filtering PASS from successful undeclared query behavior or sibling Part 2 declarations."
  prerequisite:
    - "Keep /req/api-common and Part 1 /req/advanced-filtering prerequisite handling visible and honest."
    - "Do not report full /conf/advanced-filtering closure when prerequisites cannot be established."
  filter_predicate_honesty:
    - "A filtered non-empty collection PASS requires verifying returned resources satisfy the requested predicate."
    - "An empty filtered collection is not predicate evidence by itself; SKIP unless a narrow endpoint-support assertion is explicitly intended."
    - "HTTP 400 command and systemEvents responses are not PASS evidence."
    - "Streaming-only /systems/{sysId}/events responses are not JSON eventType filter PASS evidence."
  taxonomy_correction:
    - "Do not add a System History TestNG group for OGC 23-002."
    - "Do not treat GeoRobotix /conf/system-history as an OGC conformance class."

generator_must_do:
  - "Record exact HEAD before editing."
  - "Use official OGC 23-002 identifiers: /req/advanced-filtering and /conf/advanced-filtering."
  - "Add Part 2 Advanced Filtering TestNG group and dependency/prerequisite handling."
  - "Implement declaration-gated behavior when /conf/advanced-filtering is absent."
  - "Preserve GeoRobotix honesty: some filter URLs return HTTP 200 but /conf/advanced-filtering is absent."
  - "Add tests/comments referencing REQ-ETS-PART2-006 and SCENARIO-ETS-PART2-006-* IDs."
  - "Run formatter, scripts/mvn-test-via-docker.sh, and GeoRobotix TeamEngine smoke after implementation."
  - "Update spec/story/traceability/status/changelog/test-results after implementation."

generator_must_not_do:
  - "Do not implement or wire a System History group for OGC 23-002."
  - "Do not use stale /req/systemhistory, /req/system-history, /conf/system-history, dynamic-* authoritative naming, or lower-case /systemevents endpoint spelling as PASS evidence."
  - "Do not PASS Advanced Filtering from endpoint HTTP 200 alone."
  - "Do not PASS filter predicates from empty result collections alone."
  - "Do not POST seed resources or mutate public GeoRobotix."
  - "Do not implement streaming/SSE event filter consumption in the first subset."

