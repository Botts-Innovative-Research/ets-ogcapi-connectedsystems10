# Sprint 11 contract - advanced-filtering-read-only
# Created 2026-05-05 after Sprint 10 gates closed.

sprint: "ets-11"
sprint_name: "advanced-filtering-read-only-subset"
type: "feature-expansion"
created: "2026-05-05T19:32:08Z"
description: |
  Sprint 11 implements one Part 1 class subset:

  S-ETS-11-01 - AdvancedFiltering systems/common-resource read-only subset
  (`/conf/advanced-filtering`) (P0/M).

  Scope is PARTIAL for REQ-ETS-PART1-009:
    - `/conformance` declares `/conf/advanced-filtering`, otherwise SKIP-with-reason.
    - Local ID_List schema helper for explicit valid/invalid examples derived from upstream clause 15 and `idListSchema.yaml`.
    - `/systems?id=<known-id>` non-empty result evidence and selected-id preservation after selecting a seed System id.
    - `/systems?q=<known keyword>` non-empty result evidence and keyword evidence in name/description after selecting a seed keyword.
    - `/systems?geom=<broad WKT polygon>` HTTP 200 + JSON shape smoke only.
    - Runtime or structural dependency proof: `advancedfiltering` depends on `systemfeatures`.
    - Separate default-smoke no-regression evidence: total PASS+SKIP >= 63 and failed=0.

  Explicitly excluded:
    - create-replace-delete and update mutation behavior
    - Part 2 query requirements
    - full association filters across deployments/procedures/sampling features/properties
    - full geometry intersection correctness
    - combined-filter truth-table validation
    - endpoint parity across every CS API resource endpoint

