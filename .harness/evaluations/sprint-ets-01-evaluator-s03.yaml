evaluation_questions_answered:
  - question: |
      Does scripts/smoke-test.sh enforce both non-empty TestNG report AND zero ERROR-level
      container logs? Or could it exit 0 with empty report + zero logs (false-pass)?
    answer: |
      ENFORCES BOTH. Adversarial-style read of smoke-test.sh:
      Line 24: `set -eo pipefail` — pipeline failures and unset-var refs propagate as errors
      Line 140: `[[ -s "$REPORT_XML" ]] || die "TestNG report is empty"` — REPORT_XML must
        exist AND be non-empty (the `-s` test). False-pass blocked at this gate.
      Line 157: `[[ "$total" =~ ^[0-9]+$ ]] || die "could not parse <testng-results total=...>"`
        — Python regex must extract a numeric total. If XML doesn't have testng-results header,
        die. Note: a malformed XML that did contain testng-results headers but with no
        test-method bodies would still extract total="0" and trigger line 158 below.
      Line 158: `(( total > 0 )) || die "TestNG report total=0 (no @Test methods ran)"` —
        explicitly catches the "empty test list" false-pass scenario.
      Line 159: `(( failed == 0 )) || die "TestNG report has failed=$failed (>0); see $REPORT_XML"`
        — any failed @Test triggers exit 1.
      Lines 162-176: container log scan via awk extracting startup_block (everything before
        "Server startup in"), then grep for SEVERE/ERROR with three known-benign filter excludes
        (`did not find a matching property`, `maxActive is not used in DBCP2`, `encoding ['utf-8']`).
        Any unfiltered SEVERE/ERROR triggers die.

      Adversarial scenarios that would ALSO fail correctly:
        - Malformed XML with 0 bytes → die at line 140 (-s test).
        - Valid testng-results header with no <test-method> children → total="0" → die at line 158.
        - Server crash during run, partial XML retrieved → curl line 134-135 catches HTTP != 200
          → die.
        - Container starts cleanly but suite never registers → curl /rest/suites at line 113
          dies on missing etscode element → line 117-118 die.

      Conclusion: the script is robust against the obvious false-pass shapes. PASS.

