stories:
  - id: "S-ETS-02-01"
    title: "Author ADR-006 (Jersey 1.x → Jakarta EE 9 / Jersey 3.x port) + ADR-007 (Dockerfile base image deviation), retroactive"
    file: "epics/stories/s-ets-02-01-adr-backfill.md"
    epic: "epic-ets-04-teamengine-integration"  # both ADRs are TeamEngine-adjacent decisions
    priority: "P1"
    complexity: "S"
    depends_on: []
    parallelizable: true  # doc-only; can run alongside any code story
    rationale: |
      ADR-006 retroactively documents the 6 Jersey port commits in S-ETS-01-01
      (`8e031ef` `3979709` `9ca229f` `87c6fe2` `9b42cb7` `d01c187`) — Raze s01 CONCERN-1
      flagged the missing ADR; architect-handoff `must` constraint (commit-message ADR
      citation) was letter-violated. ADR-007 documents the Dockerfile deviation from
      `ogccite/teamengine-production:5.6.1` to `tomcat:8.5-jre17` per Quinn s03 GAP-1
      (`:5.6.1` tag doesn't exist; production image is JDK 8). Both deviations are
      empirically justified and honestly documented in code comments + ops/server.md;
      the ADRs are the audit-trail formalization. Architect (Alex) authors the actual
      ADR text; Generator (Dana) commits and cross-references existing decisions.

  - id: "S-ETS-02-02"
    title: "Extend ETSAssert with REST-friendly helpers + refactor 21 bare-throw sites to use them"
    file: "epics/stories/s-ets-02-02-etsassert-refactor.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P1"
    complexity: "M"
    depends_on: []
    parallelizable: false  # touches all 3 conformance.core test classes; must not collide with S-ETS-02-03 URI sweep
    rationale: |
      Architect-handoff `must` constraint #9 ("Use EtsAssert with structured FAIL messages
      including the /req/* URI; do not throw bare TestNG AssertionError") is letter-
      violated — Quinn s02 GAP-1 + Raze s02 GAP-1 both flagged 21 bare AssertionError sites
      across `LandingPageTests` (7), `ConformanceTests` (6), `ResourceShapeTests` (8). Intent
      was met (every FAIL message embeds the `/req/*` URI), but the helper layer was missing.
      Doing this refactor now (when there are 21 sites) is much cheaper than after Sprint 5
      when the SystemFeatures + 4 other classes will have grown the count to ~80-100 sites.
      Architect ratifies the EtsAssert helper API surface (signatures listed in
      `deferred_to_architect`); Generator extends ETSAssert.java with the 4 helper methods +
      refactors the 21 sites mechanically. Smoke must still 12/12 PASS post-refactor.

  - id: "S-ETS-02-03"
    title: "URI form drift sweep: spec.md + traceability.md + Java @Test descriptions to OGC canonical .adoc form"
    file: "epics/stories/s-ets-02-03-uri-canonicalization-sweep.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"  # closes uri_mapping_fidelity_preserved (the only outstanding Sprint 1 success_criterion)
    complexity: "M"
    depends_on: []
    parallelizable: false  # touches spec.md, Java @Test descriptions, and the Java REQ_* string constants
    rationale: |
      Quinn s02 GAP-2 + Raze s02 GAP-2 + Quinn s03 + Raze s03 INHERITED PARTIAL all flag
      the same gap: Java cites `/req/core/<X>-success`; v1.0 TS uses `/req/ogcapi-common/
      <X>`; OGC's normative `.adoc` canonical (independently verified by Raze on
      2026-04-17 at `https://raw.githubusercontent.com/opengeospatial/ogcapi-common/master/
      19-072/requirements/landing-page/REQ_root-success.adoc`) is `/req/landing-page/
      <X>-success`. Source is upstream of S-ETS-01-02 — spec.md text already used the
      `/req/core/<X>-success` form before Dana wrote a line of Java. CITE SC reviewers
      dereferencing the @Test description URIs against the OGC normative document will
      get a 404, so this is a real audit risk. ~30-40 sites across spec.md (Common Part 1
      URIs in REQ-ETS-CORE-002..004 + scenarios), traceability.md (cross-references), and
      the Java port (4 `static final String REQ_*` constants in `conformance.core.*` +
      every @Test description that names them). **Closing this story flips Sprint 1's
      `uri_mapping_fidelity_preserved` from PARTIAL → PASS — the last open Sprint 1
      success_criterion**. Smoke must still 12/12 PASS post-sweep.

  - id: "S-ETS-02-04"
    title: "Add logback.xml + CredentialMaskingFilter (REST-Assured request filter) wired via SuiteFixtureListener"
    file: "epics/stories/s-ets-02-04-logback-credential-masking.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"
    complexity: "M"
    depends_on: []
    parallelizable: true  # logging + filter scaffolding doesn't collide with conformance.core.* refactors
    rationale: |
      Architect-handoff `should` constraint #3 ("logback.xml configured to NEVER log
      Authorization or X-API-Key headers; CredentialMaskingFilter pattern equivalent to
      v1.0's CredentialMasker"). Sprint 1 didn't exercise auth (GeoRobotix is open IUT)
      so this stayed deferred-without-blocker. **Sprint 2 needs it because**: (a) the
      next Part 1 class after SystemFeatures is `Common` then `Subsystems` — both
      foundationally untested-against-auth-protected IUTs; once we wire auth-bearer or
      api-key parameters into the suite, ANY accidental Authorization-header logging
      becomes an audit incident. (b) Raze s02 CONCERN-3 explicitly flagged this for
      Sprint 2 scope. Cleanest moment to land it is BEFORE S-ETS-02-06 wires SystemFeatures
      since SystemFeatures often has restricted-system fixtures in real deployments.
      v1.0 reference: `csapi_compliance/src/lib/credential-masker.ts` shows the masking
      semantics (first 4 + last 4 chars; full redaction below 8 chars).

  - id: "S-ETS-02-05"
    title: "Multi-stage Dockerfile + non-root USER + tighter `/rest/suites/<code>` parse + CI workflow `git mv` to `.github/workflows/`"
    file: "epics/stories/s-ets-02-05-dockerfile-cleanup.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"
    complexity: "M"
    depends_on: ["S-ETS-02-01"]  # ADR-007 lands first so the multi-stage decision has an ADR row to cite
    parallelizable: false  # touches Dockerfile + scripts/smoke-test.sh both
    rationale: |
      Bundles three Raze s03 follow-ups + the carryover CI-workflow `git mv`:
      (1) **Multi-stage Dockerfile** (Raze s03 CONCERN-2/3): bake
      `mvn dependency:copy-dependencies` deps closure into the build stage (eliminates
      the smoke-time mvn dependency on host ~/.m2 + makes the runtime image self-contained
      for fresh CI runners); add USER directive (non-root); image-size goal: 600MB → 400MB.
      (2) **Tighter smoke-test suite-metadata parse** (Raze s03 CONCERN-4): step 5
      currently only `grep -q '<etscode>${ETS_CODE}</etscode>'`; tighter check parses
      `/rest/suites/<code>` metadata XML and asserts version + title + code match
      ets.properties. ~10 LOC.
      (3) **CI workflow `git mv`** (Quinn s01 + Raze s01 CONCERN-2 + Quinn s02 + Quinn s03
      deferred): one-line move of `ci/github-workflows-build.yml` →
      `.github/workflows/build.yml` so GitHub Actions actually runs it on push. Requires
      `gh auth refresh -s workflow` from a session with that scope (USER ACTION may be
      needed before Generator can run; Generator should attempt and fall through to
      orchestrator escalation if scope still missing).
      Architect (Alex) ratifies the multi-stage pattern (build-stage Maven cache mount vs
      pre-staged target/lib-runtime/ vs Maven-inside-container — see deferred_to_architect).

  - id: "S-ETS-02-06"
    title: "Implement CS API SystemFeatures conformance class (`/conf/system-features`) end-to-end against GeoRobotix"
    file: "epics/stories/s-ets-02-06-systemfeatures-conformance-class.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"
    complexity: "M"
    depends_on: ["S-ETS-02-02", "S-ETS-02-03"]  # use the new EtsAssert helpers + canonical URI form from day 1
    parallelizable: false  # depends on EtsAssert refactor + URI canonicalization landing first
    rationale: |
      First additional Part 1 conformance class beyond Core. Mirrors the S-ETS-01-02
      architectural pattern: new `conformance.systemfeatures.*` subpackage with at least
      one TestNG @Test per ATS assertion in OGC 23-001 Annex A `/conf/system-features/`,
      REQ-ETS-PART1-002 expanded from PLACEHOLDER → SPECIFIED with full per-assertion
      enumeration, SCENARIO-ETS-PART1-002-* added (CRITICAL + NORMAL split), testng.xml
      wired with `dependsOnGroups="core"` so SystemFeatures SKIPs gracefully if Core
      FAILs (closes SCENARIO-ETS-PART1-DEPENDENCY-SKIP-001 against SystemFeatures
      specifically), smoke-test verified against GeoRobotix (which serves a non-empty
      `/systems` collection per v1.0 E2E history). Generator MUST: (a) use the new
      EtsAssert helpers from S-ETS-02-02 from day 1 (no new bare-throw sites); (b) use
      the canonical OGC `.adoc` URI form from S-ETS-02-03 from day 1; (c) preserve any
      v1.0 known-issue handling for SystemFeatures (none currently catalogued at
      `csapi_compliance/ops/known-issues.md` for /systems specifically, but Generator
      should sweep `csapi_compliance/src/engine/registry/csapi-system-features.ts` for
      tolerance comments before writing assertions).

      **Architectural deferral**: Architect ratifies (i) full per-assertion coverage now
      vs Sprint-1-style minimal-then-expand (i.e. is this story 4-6 @Tests like
      ResourceShapeTests Sprint-1-narrowed, or 12-15 @Tests like LandingPageTests
      full-coverage); (ii) whether to also wire the spec-trap fixture
      `asymmetric-feature-type/` from v1.0 (likely defer to epic-ets-06).

