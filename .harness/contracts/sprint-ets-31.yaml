upstream_ogc_verification:
  standard: "OGC API - Connected Systems - Part 2: Dynamic Data"
  source_url: "https://docs.ogc.org/is/23-002/23-002.html"
  checked_at: "2026-05-27T01:08:40Z"
  requirement_class: "Clause 16.4, Requirements Class SWE Common Binary Encoding"
  requirement_class_identifier: "/req/swecommon-binary"
  conformance_class_identifier: "/conf/swecommon-binary"
  media_type: "application/swe+binary"
  prerequisites:
    - "http://www.opengis.net/spec/SWE/3.0/req/binary-encoding-rules"
  conformance_prerequisites:
    - "http://www.opengis.net/spec/SWE/3.0/conf/binary-encoding-rules"
  normative_statements:
    - "/req/swecommon-binary/mediatype-read"
    - "/req/swecommon-binary/mediatype-write"
    - "/req/swecommon-binary/obsschema-schema"
    - "/req/swecommon-binary/obsschema-mapping"
    - "/req/swecommon-binary/observation-encoding"
    - "/req/swecommon-binary/cmdschema-schema"
    - "/req/swecommon-binary/cmdschema-mapping"
    - "/req/swecommon-binary/command-encoding"
  source_inconsistencies:
    - "Clause 16.4 media-type note says SWE Common Text encoding while discussing application/swe+binary; Generator must require binary evidence."
    - "Annex A.127 and A.130 say Text encoding rules for binary Observation/Command resources; Generator must not use TextEncoding or a Text validator as SWE Common Binary PASS evidence."
  condition_gates:
    observation:
      requirements:
        - "/req/swecommon-binary/obsschema-schema"
        - "/req/swecommon-binary/obsschema-mapping"
        - "/req/swecommon-binary/observation-encoding"
      required_conformance: "/conf/datastream"
      verdict_when_missing: "SKIP prerequisite-incomplete; do not PASS from /conf/swecommon-binary, endpoint availability, sibling declarations, or media-format list evidence."
    command:
      requirements:
        - "/req/swecommon-binary/cmdschema-schema"
        - "/req/swecommon-binary/cmdschema-mapping"
        - "/req/swecommon-binary/command-encoding"
      required_conformance: "/conf/controlstream"
      verdict_when_missing: "SKIP prerequisite-incomplete; do not PASS from /conf/swecommon-binary, endpoint availability, sibling declarations, or media-format list evidence."
    write_media:
      requirements:
        - "/req/swecommon-binary/mediatype-write"
      required_conformance: "/conf/create-replace-delete"
      verdict_when_missing: "SKIP prerequisite-incomplete; first increment uses non-mutating API-definition evidence only."

