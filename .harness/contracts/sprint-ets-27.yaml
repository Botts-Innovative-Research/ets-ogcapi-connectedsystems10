    - "Attack any path that can PATCH public GeoRobotix."
    - "Attack missing Part 2 CRD or Features Part 4 Update prerequisite handling."
    - "Attack missing Clause 15 condition gates for /conf/datastream, /conf/controlstream, /conf/feasibility, and /conf/system-event."
