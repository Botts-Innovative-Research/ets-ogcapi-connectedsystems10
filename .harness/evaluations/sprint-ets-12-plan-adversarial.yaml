findings:
  - id: RAZE-ETS12-PLAN-GAP-001
    severity: HIGH
    title: "OPTIONS readiness checks are planned as @Tests but OPTIONS is not the OGC create/replace/delete assertion"
    evidence:
      - "Spec Sprint 12 coverage scope plans `OPTIONS /systems` and `OPTIONS /systems/{id}` @Tests as two of six Create/Replace/Delete tests."
      - "Story Planned Test Surface items 3 and 4 require Allow: POST/PUT/DELETE without issuing mutating requests."
      - "Upstream clause 16 `/req/create-replace-delete/system` requires CREATE via HTTP POST at `/systems` and REPLACE/DELETE via HTTP PUT/DELETE at `/systems/{id}`; it does not define OPTIONS advertisement as conformance."
    impact: "A declaring IUT can produce PASS results for Create/Replace/Delete readiness while zero normative lifecycle operations have run. That is a false PASS risk if reports or traceability read these as OGC CRD assertion closure."
    required_fix: "Reclassify OPTIONS checks as explicit ETS safety/readiness preconditions in names, descriptions, story, and traceability. Do not present their PASS status as satisfying `/req/create-replace-delete/system`; keep lifecycle conformance SKIP by default and PARTIAL overall until POST/PUT/DELETE run against a dedicated mutable IUT."
  - id: RAZE-ETS12-PLAN-GAP-002
    severity: HIGH
    title: "Mutation opt-in plumbing is underspecified for TeamEngine and public-IUT hard denial"
    evidence:
      - "Plan requires `mutation-tests-enabled=true` and `mutation-iut-policy=dedicated-mutable-iut`, and mentions TestRunArg/SuiteAttribute/SuiteFixtureListener propagation."
      - "Current `TestNGController.validateTestRunArgs` only requires `iut`; current CTL form emits only `iut` and `ics`; current smoke script only forwards optional `auth-credential`."
      - "Story DoD says the implementation refuses GeoRobotix only 'If opt-in is implemented in Generator', making the public-IUT denial sound conditional."
    impact: "The safety gate can be half-wired: invisible from TeamEngine UI/REST smoke, or enabled by self-attestation while still targeting GeoRobotix. That leaves both false SKIP coverage and accidental public-IUT mutation risk."
    required_fix: "Make end-to-end parameter paths explicit and mandatory: TestRunArg, SuiteAttribute, SuiteFixtureListener, TestNGController validation semantics, CTL/TeamEngine REST inputs if supported, and smoke-script env forwarding if smoke is allowed to exercise opt-in. Add a hard deny for known shared public GeoRobotix URLs whenever mutation tests are enabled, regardless of the policy string."
  - id: RAZE-ETS12-PLAN-GAP-003
    severity: MEDIUM
    title: "No-mutation smoke evidence needs a precise IUT-bound request log oracle"
    evidence:
      - "Contract requires 'no POST/PUT/DELETE from the CRD suite' and asks Raze to inspect TeamEngine container logs."
      - "scripts/smoke-test.sh itself logs `step 6/8 - POST suite/ogcapi-connectedsystems10/run`, which is a TeamEngine control-plane POST, not an IUT mutation."
      - "Container logs include REST-Assured request records with `Request method:` and `Request URI:` lines; these can distinguish GeoRobotix-bound requests from control-plane execution."
    impact: "A naive grep for POST/PUT/DELETE can either fail because of the TeamEngine control POST or pass without proving the mutating method was absent for GeoRobotix-bound REST-Assured requests."
    required_fix: "Define the smoke oracle as adjacent `Request method` plus `Request URI` pairs where the URI starts with the IUT base URL, and require zero POST/PUT/DELETE pairs for GeoRobotix in default smoke. Keep TeamEngine control-plane POST out of that check."
  - id: RAZE-ETS12-PLAN-GAP-004
    severity: MEDIUM
    title: "Sprint 11 traceability/status reconciliation is inconsistent before Sprint 12 starts"
    evidence:
      - "_bmad/traceability.md still says Sprint 11 AdvancedFiltering is 'pending Raze/Quinn gates'."
      - "epics/epic-ets-02-part1-classes.md and ops/status.md say Sprint 11 Quinn/Raze gates approved with concerns."
      - "ops/status.md Dirty Worktree Notes still says no dirty files are expected after the Sprint 10 gate-close commit, which is stale during Sprint 12 planning."
    impact: "The handoff tells Generator two different states for the previous sprint and leaves stale worktree guidance. That weakens spec-anchored traceability before implementing a higher-risk mutation class."
    required_fix: "Update Sprint 11 traceability to the gate-closed state with exact Quinn/Raze evidence, and refresh ops/status Dirty Worktree Notes for the current Sprint 12 planning worktree."
