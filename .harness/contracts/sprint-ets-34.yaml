selected_fixture:
  driver: "sensorhub-driver-sapient-0.1.0.jar"
  source_repo: "/home/nh/docker/gir/sapient"
  rationale: |
    Sapient has a local OSH driver, a local TCP protocol peer/test harness,
    LOOK_AT ControlStream creation, and TaskAck-to-CommandStatus E2E evidence.
    UniversalController is an input source rather than a Command receiver, and
    Kirby/Lattice candidates imply external hardware or credentials.
  local_osh:
    compose_dir: "/home/nh/docker/gir/sar-ops/field-hub"
    service: "osh"
    cs_api_url_host: "http://localhost:8081/sensorhub/api"
    cs_api_url_teamengine: "http://field-hub-osh-1:8081/sensorhub/api"
    docker_network: "field-hub_default"
    sapient_tcp_port: 12000
    credential_handling: "Credentials derived from local config/environment; values are never recorded."
  disposition: |
    Sapient is suitable as a real task-accepting Command fixture: a local SAPIENT
    peer registered a LOOK_AT-capable node and completed a CS API Command with
    terminal COMPLETED status. It is not suitable as a persistent primary smoke
    fixture because its module-owned dynamic DataStreams/ControlStreams trigger
    broader Part 2 schema-validation failures and cannot be deleted through the
    CS API. Keep Sapient configured but disabled by default; activate it only for
    isolated tasking-fixture runs, then reset the OSH datastore and reseed the
    static local fixtures before primary TeamEngine smoke.

