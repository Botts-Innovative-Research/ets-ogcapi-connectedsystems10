concerns:
  - id: CONCERN-1
    severity: low
    description: |
      Live break-Core dependency-skip verification (Acceptance Criterion 7 in story:
      "temporarily make Core FAIL... confirm SystemFeatures @Tests emit SKIP not
      FAIL/ERROR") was NOT executed. Dana documents the deferral in story
      Implementation Notes lines 156-158: "Verified by inspection (no live break-Core
      test executed — would require modifying GeoRobotix or pointing IUT at a 500-server)."
      Static evidence is strong (depends-on-groups attribute is recorded in TestNG XML
      output, which proves TestNG resolved the group dependency correctly), but a true
      end-to-end skip-cascade demonstration is missing.
    recommendation: |
      Sprint 3 wedge: add a SuitePreconditions-level integration test that points the
      iut parameter at a deliberately-broken local stub server (e.g. Python http.server
      returning 500 on /conformance), runs the testng.xml suite, parses the output, and
      asserts the 4 SystemFeatures @Tests show status="SKIP" not "FAIL"/"ERROR". ~30
      minutes Dana time. Out of scope for Sprint 2 close.
  - id: CONCERN-2
    severity: low
    description: |
      Story line 30 acceptance criterion lists "VerifySystemFeaturesTests" as a baseline
      surefire item. No such test class exists in src/test/java/ (verified by directory
      listing — VerifyETSAssert.java covers the helper layer, but there's no @VerifyX for
      SystemFeaturesTests business logic itself). Dana's surefire 49/0/0/3 holds because
      the existing VerifyETSAssert tests cover the helper invocations SystemFeaturesTests
      uses; the story criterion's wording is over-specific given the actual coverage
      strategy. This is a story-language nit, not a substantive gap (the helper-layer
      coverage IS the SystemFeatures regression check per ADR-008's "every helper has a
      unit test" mandate).
    recommendation: |
      Defer; if Sprint 3+ adds SystemFeaturesTests-specific business logic that isn't
      covered by helper tests (e.g. extractFirstSystemId edge cases), add a
      VerifySystemFeaturesTests then. Update story acceptance criterion language at next
      planner cycle.

