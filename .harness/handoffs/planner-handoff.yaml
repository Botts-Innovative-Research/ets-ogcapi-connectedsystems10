strategic_decisions:
  q1_next_work:
    question: "After Sprint 13 gates, what is the next Sprint item?"
    decision: "S-ETS-14-01 Update positive mutable-IUT hardening"
    rationale: |
      Part 1 already has at least partial coverage for all remaining named classes.
      Sprint 13 gates left specific Update follow-ups: positive PATCH needs a dedicated
      mutable IUT, the positive path must assert a changed field, and OPTIONS PATCH
      readiness semantics must be decided. Sprint 14 addresses those without starting
      Part 2 or overclaiming local OSH support.

  q2_options_semantics:
    question: "Should missing OPTIONS Allow: PATCH fail, skip, or be supplemented?"
    decision: "Use an explicit verdict matrix."
    rationale: |
      Sprint 13 currently uses OPTIONS as ETS readiness evidence, not a normative
      lifecycle PASS. Raze correctly identified that unconditional SKIP could hide
      a declared `/conf/update` violation. Sprint 14 distinguishes states: missing
      `/conf/update`, absent mutation opt-in, public IUT, no candidate System, or
      inconclusive OPTIONS are SKIP-before-PATCH states; declared `/conf/update`
      plus successful OPTIONS whose Allow omits PATCH FAILs the readiness assertion
      for `/req/update/system`, while lifecycle still skips before PATCH because
      the precondition failed.

  q3_positive_patch_oracle:
    question: "What evidence is required before a positive PATCH lifecycle can count?"
    decision: "GET after PATCH must assert the intended changed field value."
    rationale: |
      Sprint 13 accepts PATCH status codes and then only checks GET 200. Quinn and
      Raze both identified that as insufficient for future promotion. Sprint 14
      requires `properties.name` changed-field assertion after PATCH, with focused
      unit coverage so status-only PATCH cannot pass.

