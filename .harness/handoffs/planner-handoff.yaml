strategic_decisions:
  q1_next_work:
    question: "After Sprint 16, what is the next Sprint item?"
    decision: "S-ETS-17-01 Encoding relation-types read-only link checks"
    rationale: |
      GeoJSON and SensorML both still have open relation-types
      subrequirements. The work is read-only, lower risk than additional
      mutation-side work, and directly advances both encoding classes.

  q2_scope_boundary:
    question: "Should Sprint 17 close full GeoJSON or SensorML?"
    decision: "No. Keep REQ-ETS-PART1-012 and REQ-ETS-PART1-013 PARTIAL."
    rationale: |
      Sprint 17 covers links-member association relation types only.
      mediatype-write, full schema validation, property GeoJSON mapping,
      positive populated-property SensorML evidence, mutation-side behavior,
      and Part 2 remain out of scope.

  q3_false_positive_policy:
    question: "What should count as relation-types evidence?"
    decision: "Only associations encoded in a JSON links member."
    rationale: |
      The OGC clause text says the rule applies to associations encoded in the
      `links` member. Canonical/alternate/pagination/service links are generic
      web links, not association evidence. Property-level @link members such as
      deployedSystems@link and hostedProcedure@link belong to mapping checks.

