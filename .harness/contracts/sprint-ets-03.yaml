stories:
  - id: "S-ETS-03-01"
    title: "Live break-Core dependency-skip sabotage test (closes Sprint 2 systemfeatures CONCERN-1)"
    file: "epics/stories/s-ets-03-01-dependency-skip-sabotage-test.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"  # Foundational — all future multi-class work depends on group-dependency wiring being live-verified
    complexity: "S"
    depends_on: []
    parallelizable: true
    rationale: |
      Quinn s06 CONCERN-1 + Raze s06 CONCERN-1 both flagged the same gap: Sprint 2
      verified dependency-skip wiring at 3 STATIC layers (source `groups = "core"`
      annotations + testng.xml `<group depends-on="core"/>` declaration + smoke
      XML `depends-on-groups="core"` attribute on each of the 4 SystemFeatures
      @Tests at runtime) but the actual cascading-SKIP behavior under a FAILing
      Core test was NOT live-exercised. Prior Raze run TIMED OUT (~13 min) trying
      this exact test. Sprint 3 closes via two parallel approaches (whichever
      Generator finds simpler):
      (a) **TestNG group-dependency unit test** — `src/test/java/.../VerifyTestNGSuiteDependency.java`
          using TestNG's programmatic API (TestNG class + XmlSuite) with a mocked
          Core test that throws AssertionError; assert SystemFeatures @Tests
          report `status=SKIP` not `FAIL`/`ERROR`. ~30-50 LOC, runs in <5s, no
          Docker required, no IUT required. Hermetic.
      (b) **Bash sabotage script** — `scripts/sabotage-test.sh` that injects
          `ETSAssert.assertStatus(landingResponse, 999, REQ_ROOT_SUCCESS)`
          (always-fail) into LandingPageTests, rebuilds via multi-stage Dockerfile,
          runs smoke against GeoRobotix, parses TestNG XML, asserts the 4
          SystemFeatures @Tests show `status="SKIP"` (not FAIL/ERROR), then
          restores and verifies recovery. Mirrors Raze cleanup sabotage pattern
          from sprint-ets-02-adversarial-cleanup.yaml verdict_summary §(7).
      Architect (or Generator) picks one or both. Acceptance Criterion: the
      cascading SKIP is observably true at runtime, not just declared. Closes
      Sprint 2 contract success_criterion gap that the SystemFeatures dependency
      wiring is FUNCTIONALLY proven not just STRUCTURALLY proven.

  - id: "S-ETS-03-02"
    title: "CredentialMaskingFilter integration test + REST-Assured RequestLoggingFilter wrap (closes Sprint 2 PARTIAL + Raze cleanup CONCERN-2)"
    file: "epics/stories/s-ets-03-02-credential-leak-integration.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P0"  # Closes the only Sprint 2 PARTIAL success_criterion + the medium-severity Raze concern about the unmasked side channel
    complexity: "M"
    depends_on: []
    parallelizable: true
    rationale: |
      Combines two related Sprint 2 carryover items because both touch the
      credential-leak surface:
      (1) **Integration test** (Sprint 2 PARTIAL `no_credential_leak_in_test_logs`):
          Sprint 2 verified the 15-test unit-test layer with substantive leak
          guards (literal `EFGH12345678WXYZ` not in masked output) but the
          end-to-end smoke claim from SCENARIO-ETS-CLEANUP-LOGBACK-MASKING-001
          ("literal substring MUST NOT appear anywhere in TestNG report
          attachments + container logs") was NEVER live-verified. Suite doesn't
          yet wire `auth-credential` CTL parameter → no synthetic credential
          flows through REST-Assured at smoke time → no end-to-end check possible.
          Sprint 3: wire `auth-credential` as a CTL/TestNG suite parameter, set
          it to `Bearer ABCDEFGH12345678WXYZ` in smoke-test.sh, run smoke against
          GeoRobotix, grep TestNG report XML attachments + container logs for the
          literal substring `EFGH12345678WXYZ` (zero hits required), AND grep for
          the masked form `Bear***WXYZ` (must be present, proving filter ran
          rather than dropping the field entirely).
      (2) **REST-Assured RequestLoggingFilter wrap** (Raze cleanup CONCERN-2 +
          design.md §529 deferral text):
          Current CredentialMaskingFilter emits a parallel FINE-level masked log
          but does NOT wrap REST-Assured's built-in `RequestLoggingFilter`.
          design.md §529 explicitly flags the unmasked side-channel as Sprint 3
          hardening: "wrap or replace REST-Assured's RequestLoggingFilter with a
          masking variant so the unmasked side channel is closed." Sprint 3
          implementation: extend CredentialMaskingFilter to wrap the built-in
          RequestLoggingFilter (delegate to a chained Filter that masks header
          values BEFORE RequestLoggingFilter sees them) OR provide a
          MaskingRequestLoggingFilter subclass that overrides `print` to apply
          the masking. Architect (Alex) ratifies the wrapping pattern (deferred —
          see deferred_to_architect).
      Both items together close design.md §529 ("Sprint 3 hardening: wrap or
      replace REST-Assured's RequestLoggingFilter with a masking variant; until
      then, the integration test (synthetic-credential smoke + zero-leak grep)
      is deferred and the logback pattern is the primary leak-prevention layer").

  - id: "S-ETS-03-03"
    title: "CI workflow `git mv` to `.github/workflows/build.yml` + workflow_dispatch verification"
    file: "epics/stories/s-ets-03-03-ci-workflow-live.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"  # User-action blocked; pure orchestration once unblocked
    complexity: "S"
    depends_on: []
    parallelizable: true
    rationale: |
      Sprint 2 success_criterion `ci_workflow_live` is DEFERRED-WITH-RATIONALE
      across 4 sprints (S-ETS-01-01..03 + S-ETS-02-05). Pure user-action blocker:
      gh token at orchestrator session-time has scopes `gist`, `read:org`, `repo`
      only — NO `workflow`. Three-step Sprint 3 path:
      (a) **Pre-condition (USER ACTION)**: orchestrator runs `gh auth refresh -s
          workflow` from a session with that scope. Without this, story is
          Generator-blocked (mark DEFERRED-WITH-RATIONALE again, push to Sprint 4
          with same Sprint-2-style mitigation).
      (b) **Generator action**: `cd ets-ogcapi-connectedsystems10 && mkdir -p
          .github/workflows && git mv ci/github-workflows-build.yml
          .github/workflows/build.yml && git commit -m "chore: move CI workflow
          to .github/workflows/" && git push`. One-line move; orchestrator
          verifies push success.
      (c) **Verification**: trigger one workflow_dispatch run (or push a no-op
          commit), capture the GitHub Actions run URL + green-build status into
          Sprint 3 close artifact `ops/test-results/sprint-ets-03-ci-workflow-live-<date>.txt`.
      Acceptance Criterion: GitHub Actions UI shows at least one
      successful `workflow_run` on a Sprint 3 commit; Quinn independently verifies
      via `gh api repos/<org>/<repo>/actions/runs?event=workflow_dispatch`.

  - id: "S-ETS-03-04"
    title: "Image size optimization (Sprint 2 GAP-1 carryover; ADR-009 §Negative Sprint 3 deferral)"
    file: "epics/stories/s-ets-03-04-image-size-optimization.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"  # Stretch goal — meets Sprint 3 stretch target; full ADR-009 target may need Sprint 4
    complexity: "M"
    depends_on: []
    parallelizable: false  # touches Dockerfile; must NOT collide with S-ETS-03-02 if logging filter wrap requires Dockerfile changes (it shouldn't — it's a Java code change, but Generator should sequence cautiously)
    rationale: |
      Sprint 2 close: image size 815MB (build-test variant) / 663MB (smoke
      variant) MISSED ADR-009's 450MB soft target by 47-81%. ADR-009 §"Negative"
      explicitly allows Sprint 3 deferral with rationale (Quinn cleanup GAP-1 +
      Raze cleanup CONCERN-2). Three approach options Quinn cleanup GAP-1
      enumerated:
      (a) **TE common-libs ↔ deps-closure dedupe (recommended)**: the 60-80 jars
          in `/usr/local/tomcat/lib` (from `teamengine-web-common-libs.zip`)
          overlap with the 96 jars in `/usr/local/tomcat/webapps/teamengine/
          WEB-INF/lib` (from our `mvn dependency:copy-dependencies` closure).
          De-dupe by listing the TE common-libs and excluding from the
          `COPY --from=builder lib-runtime`. **Estimate: 200-300MB savings,
          brings runtime image to ~360-460MB**. Minimal layout change, no runtime
          risk (smoke 12+4=16/16 PASS preservation easy to verify).
      (b) **Distroless runtime stage** (`gcr.io/distroless/java17-debian12`):
          ~60-100MB image. **High risk**: TomCat 8.5 + TE 5.6.1's bash-script-
          based startup may not work in a no-shell distroless image. ADR-009
          §Alternatives explicitly REJECTED this for Sprint 2 (and probably
          Sprint 3 too — defer to Sprint 5+).
      (c) **Multi-stage refinement** (alpine variant of tomcat:8.5-jre17 base
          OR explicit `mvn dependency:copy-dependencies -DincludeScope=runtime`
          to drop test-scope transitives): incremental savings, ~50-100MB,
          mitigated by the dedupe path being more impactful.
      Architect ratifies which approach (or combination) — see
      deferred_to_architect. Sprint 3 acceptance: image size < 550MB (Sprint 3
      stretch goal — more permissive than ADR-009's 450MB soft target; if
      Generator hits 450MB, even better; if Generator misses 550MB, mark PARTIAL
      with explicit rationale and defer to Sprint 4). Smoke must still 16/16
      PASS post-optimization.

