    system_item_links: "Default System item /systems/0mqcvdnfoca0 has canonical, alternate, samplingFeatures, and datastreams links. Association links use rel=samplingFeatures and rel=datastreams."
    deployment_item_links: "Default Deployment item /deployments/16sp744ch58g has canonical and alternate links only; deployedSystems is encoded under properties/deployedSystems@link, not links."
    procedure_item_links: "Default Procedure item /procedures/164p7ed8l47g has canonical and alternate links only."
    sampling_feature_item_links: "Default SamplingFeature item /samplingFeatures/0mtff3l0oofg has no links member; hostedProcedure@link is under properties."
