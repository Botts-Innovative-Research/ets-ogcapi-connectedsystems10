verdict_policy:
  declaration_gate:
    - "If /conf/swecommon-json is not declared exactly, SWE Common JSON assertions SKIP with a precise reason."
  prerequisites:
    - "Keep SWE Common 3.0 /conf/json-encoding-rules visible before reporting full class closure."
  condition_gates:
    - "Observation-side assertions require /conf/datastream."
    - "Command-side assertions require /conf/controlstream."
    - "Mediatype-write requires /conf/create-replace-delete and non-mutating API-definition evidence."
  mediatype_honesty:
    - "Mediatype-read PASS requires advertised/retrieved Observation or Command evidence, HTTP 200, exact application/swe+json content type, and parseable JSON."
    - "Format-list evidence, application/json fallback, auto content type, HTTP errors, and empty candidate collections cannot PASS."
  schema_honesty:
    - "Schema PASS requires retrieved Observation Schema or Command Schema evidence and bundled schema validation."
    - "Schema PASS also requires application/swe+json media member, recordSchema, and JSONEncoding evidence."
  mapping_honesty:
    - "Observation mapping PASS requires a Time component with canonical phenomenonTime, SamplingTime, or resultTime definition evidence from retrieved recordSchema."
    - "Command mapping PASS requires a Time component with canonical IssueTime definition evidence from retrieved recordSchema."
  encoding_honesty:
    - "Observation and Command encoding PASS requires parent schema, child resource candidate, and SWE Common JSON encoding-validator evidence; otherwise SKIP."
  mutation_safety:
    - "Default public GeoRobotix smoke must issue zero IUT-bound POST, PUT, PATCH, or DELETE."
    - "Requirement 108 mediatype-write is API-definition/readiness only in the first increment and must be scoped to Observation or Command resource endpoints."

