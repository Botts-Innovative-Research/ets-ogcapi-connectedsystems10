# Sprint 12 contract - create-replace-delete safety-gated systems subset
# Created 2026-05-05 after Sprint 11 gates closed.

sprint: "ets-12"
sprint_name: "create-replace-delete-safety-gated-systems-subset"
type: "feature-expansion"
created: "2026-05-05T20:59:24Z"
description: |
  Sprint 12 implements one Part 1 class subset:

  S-ETS-12-01 - Create/Replace/Delete safety-gated systems subset
  (`/conf/create-replace-delete`) (P0/M).

  Scope is PARTIAL for REQ-ETS-PART1-010:
    - `/conformance` declares `/conf/create-replace-delete`, otherwise SKIP-with-reason.
    - Default smoke MUST NOT issue IUT-bound POST, PUT, or DELETE.
    - Add explicit mutation opt-in parameters: `mutation-tests-enabled=true`
      and `mutation-iut-policy=dedicated-mutable-iut`.
    - `OPTIONS /systems` readiness precondition records POST advertisement without issuing POST.
    - `OPTIONS /systems/{id}` readiness precondition records PUT and DELETE advertisement without issuing PUT/DELETE.
    - OPTIONS readiness evidence MUST NOT be reported as satisfying OGC lifecycle conformance.
    - Systems lifecycle create/replace/delete assertion SKIPs by default before POST;
      only an explicitly enabled dedicated mutable IUT may execute it.
    - Runtime or structural dependency proof: `createreplacedelete` depends on `systemfeatures`.
    - Separate default-smoke no-mutation evidence: failed=0 and no IUT-bound POST/PUT/DELETE request-log entries from the CRD suite.

  Explicitly excluded:
    - unguarded mutation against GeoRobotix or any shared public IUT
    - deployments, subdeployments, procedures, sampling features, and properties CRUD
    - system delete cascade
    - custom collection propagation and text/uri-list add-to-collection
    - update/PATCH
    - Part 2 mutation classes

