  CLAIMS "ADR-009 §Negative deferral noted" but ADR-009's §Negative section
  actually discusses build-stage intermediate image overhead, NOT runtime image
  size; the runtime image size is in §"Image size target" lines 154-157. So
  Dana's deferral citation is approximately correct (the deferral language exists)
  but loose about which §; Architect should re-confirm whether §157's conditional
  language ("defer if missed") constitutes acceptance of a 815MB Sprint-2-close
  image. Either way it's not a Sprint 2 blocker — the sub-task is consciously and
  honestly marked PARTIAL, NOT silently passed.

