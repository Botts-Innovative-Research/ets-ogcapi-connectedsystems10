summary:
  completion_can_be_reported: false
  rationale: >
    The archived XML supports the local OSH full-health evidence as failed=0 with
    exact totals 69 total / 50 passed / 0 failed / 19 skipped, and the CRD lifecycle
    issued real POST/PUT/DELETE only under explicit dedicated mutable-IUT parameters.
    However, scripts/smoke-test.sh still formats the terminal PASS line as total/total
    @Test methods, which would overstate a skipped run as 69/69. That is exactly the
    false-confidence class this review was asked to find.

findings:
  - id: "RAZE-OSH-FULLHEALTH-GAP-001"
    severity: HIGH
    status: "required_fix"
    title: "Smoke PASS summary can falsely report all @Tests as passed when skips exist"
    evidence:
      - "scripts/smoke-test.sh:213-218 parses total, passed, failed, skipped."
      - "scripts/smoke-test.sh:234 only fails on failed > 0, so skipped tests can coexist with SMOKE PASS."
      - "scripts/smoke-test.sh:278 prints `SMOKE PASS: ${total}/${total} @Test methods ...`, which would render the r2 run as 69/69 even though the XML says passed=50 skipped=19."
      - "/tmp/ets-csapi-osh-full-health-r2/s-ets-01-03-teamengine-smoke-2026-05-06.xml header: total=\"69\" passed=\"50\" failed=\"0\" skipped=\"19\"."
    impact: >
      Anyone relying on smoke stdout instead of the XML or reconciled docs can conclude
      all 69 tests passed. That directly undermines the exact-totals discipline and can
      mask expected SKIP-with-reason outcomes as PASS.
    required_fix: >
      Change the smoke PASS line to include exact parsed totals, for example
      `SMOKE PASS: total=$total passed=$passed failed=$failed skipped=$skipped ...`.
      After the fix, update docs that say "smoke script reported SMOKE PASS" so they
      either cite the exact totals or the archived XML, not an all-pass shorthand.

  - id: "RAZE-OSH-FULLHEALTH-GAP-002"
    severity: MEDIUM
    status: "required_fix"
    title: "Seeded OSH health state is documented but not reproducible from a versioned seed manifest"
    evidence:
      - "ops/server.md documents long-lived seed resources /systems/040g, /procedures/040g, /deployments/040g, and /samplingFeatures/040g."
      - "ops/test-results.md says these resources exist and the System seed uses featureType=http://www.w3.org/ns/sosa/System."
      - "No reviewed diff adds a checked-in seed payload, seed script, or artifact containing the exact POST bodies used to create those resources."
    impact: >
      The current r2 evidence is valid for the current local H2 datastore, but future
      maintainers cannot recreate the fixture exactly from this repo plus the single
      proxyBaseUrl diff. That creates false confidence if "local OSH full-health" is
      treated as a maintained target rather than a one-off health snapshot.
    required_fix: >
      Add a fixture manifest or seed script reference with the exact synthetic resource
      payloads, or explicitly downgrade the docs to "one-off local H2 state snapshot"
      rather than a reproducible full-health fixture.

  - id: "RAZE-OSH-FULLHEALTH-CONCERN-001"
    severity: LOW
    status: "non_blocking_concern"
    title: "proxyBaseUrl fix is correct for TeamEngine network reachability but is environment-specific"
    evidence:
      - "External diff changes field-hub/osh/config/config.json proxyBaseUrl from https://osh.gis.tw to http://field-hub-osh-1:8081."
      - "r2 XML reporter output uses local alternate link http://field-hub-osh-1:8081/sensorhub/api/systems/040g?f=sml3."
      - "No https://osh.gis.tw hits were found in the r2 XML/log artifacts."
    assessment: >
      This closes the prior public-link leak for the Docker-network smoke. The tradeoff
      is that the OSH config is no longer a public-host config; commit it only if that
      field-hub repo is intended to be a local TeamEngine fixture configuration.
    required_fix: null

  - id: "RAZE-OSH-FULLHEALTH-CONCERN-002"
    severity: LOW
    status: "non_blocking_concern"
    title: "Explicit mutable smoke correctly bypasses the no-mutation oracle, but default safety still depends on separate GeoRobotix evidence"
    evidence:
      - "scripts/smoke-test.sh:239-240 skips the no-mutation oracle only when SMOKE_MUTATION_TESTS_ENABLED=true and SMOKE_MUTATION_IUT_POLICY=dedicated-mutable-iut."
      - "CreateReplaceDeleteTests hard-denies api.georobotix.io before mutation."
      - "r2 container log shows POST /systems, PUT /systems/0410, and DELETE /systems/0410 against field-hub-osh-1 only."
    assessment: >
      The mutation behavior matches the story: explicit local mutable runs should mutate,
      default public smoke should not. The docs preserve that distinction.
    required_fix: null

  - id: "RAZE-OSH-FULLHEALTH-CONCERN-003"
    severity: LOW
    status: "non_blocking_concern"
    title: "External sar-ops worktree has substantial unrelated dirty state"
    evidence:
      - "git -C /home/nh/docker/gir/sar-ops diff --stat reports 64 modified tracked files."
      - "Only field-hub/osh/config/config.json is in this review scope."
      - "The ETS repo status contains the expected local OSH follow-up files plus this new evaluation artifact."
    assessment: >
      The reviewed external config change is isolated, but any commit from sar-ops must
      stage only field-hub/osh/config/config.json unless the unrelated TAK/infrastructure/
      OSH viewer changes are intentionally part of that repo's work.
    required_fix: null

