risks:
  highest:
    - id: "DEPENDENCY-SKIP-SABOTAGE-FLAKY-OR-SLOW"
      description: |
        S-ETS-03-01's live break-Core sabotage test is EXACTLY what prior Raze
        runs TIMED OUT attempting (~13 min wall-clock with no report produced).
        Risk: the sabotage approach (Docker rebuild + smoke loop) is
        inherently slow if it requires a full rebuild per cycle; the unit-test
        approach (TestNG programmatic API with mocked Core failures) may not
        actually exercise the testng.xml dependency mechanism (which relies on
        the suite-XML parsing + group resolution at runtime, not at TestNG-
        unit-API level).
      severity: high
      mitigation: |
        Generator MUST sequence: try the unit-test approach FIRST (~30 min,
        contained); if it doesn't faithfully exercise the testng.xml mechanism
        (e.g. groups don't resolve through the programmatic XmlSuite API),
        fall back to the bash sabotage script with one Docker rebuild +
        one smoke run + one restoration cycle (~5 min wall-clock once
        multi-stage Dockerfile cache is warm). Architect (Alex) ratifies
        the approach in advance — see deferred_to_architect.
        Acceptance: ANY approach is acceptable as long as the cascading-SKIP
        behavior is observably true at runtime. If neither approach lands
        within S budget (~1h), defer to Sprint 4 with explicit rationale.
    - id: "REST-ASSURED-LOGGING-FILTER-WRAP-COMPLEXITY"
      description: |
        S-ETS-03-02's REST-Assured RequestLoggingFilter wrap (per design.md §529
        Sprint 3 hardening) requires either subclassing the built-in
        RequestLoggingFilter (REST-Assured public API allows this — verified by
        Pat against `io.restassured.filter.log.RequestLoggingFilter` Javadoc) OR
        chaining a CredentialMaskingFilter that mutates the FilterableRequestSpecification
        before RequestLoggingFilter sees it. The mutation approach is fragile
        (REST-Assured filters are visited in registration order; if user code
        adds RequestLoggingFilter AFTER CredentialMaskingFilter, the chain works;
        if BEFORE, it doesn't). The subclass approach is more robust but
        requires understanding REST-Assured's logging-filter internals.
      severity: high
      mitigation: |
        Architect (Alex) ratifies the wrap pattern — picks subclass-based
        MaskingRequestLoggingFilter (preferred) OR chained-filter-with-
        registration-order-enforcement (fallback). Generator implements per
        Architect's choice. Quinn + Raze independently verify by running the
        credential-leak integration smoke with EXPLICIT RequestLoggingFilter
        attached (not just the parallel FINE-level masked log Sprint 2
        already verified). Architect ALSO ratifies whether this warrants
        ADR-010 (Pat's call: probably yes, since the wrap pattern carries
        security-audit weight similar to Sprint 2's CredentialMaskingFilter
        question — but Sprint 2 ruled NO ADR for the bare filter; so the
        precedent suggests inline design.md amendment rather than new ADR).
  medium:
    - id: "IMAGE-SIZE-OPTIMIZATION-BREAKS-SMOKE"
      description: |
        S-ETS-03-04 modifies the Dockerfile (TE common-libs dedupe OR runtime-
        scope-only deps OR alpine variant). Build artifacts and runtime layout
        may shift in ways that break the smoke pipeline (classpath ordering,
        WEB-INF/lib content order affecting Jersey 3.x vs TE-bundled Jersey 1.x
        conflict resolution). Sprint 2 cleanup precedent: multi-stage Dockerfile
        REQUIRED smoke verification at every commit boundary; Generator MUST do
        the same.
      severity: medium
      mitigation: |
        Generator MUST re-run smoke END-TO-END after the image-size optimization
        — exit 0 + 12+6+N PASS — BEFORE committing the Dockerfile change.
        Sequence: verify baseline 18+N PASS at S-ETS-03-04 start, apply
        optimization, re-verify 18+N PASS, commit. If smoke regresses, revert
        and try a different approach or defer to Sprint 4.
    - id: "GH-WORKFLOW-SCOPE-STILL-MISSING-4TH-SPRINT"
      description: |
        S-ETS-03-03 includes the `git mv` of `ci/github-workflows-build.yml` to
        `.github/workflows/build.yml`. Same `gh workflow` scope blocker as
        Sprint 1+2; if user has not granted it before Sprint 3 starts, story
        is Generator-blocked. Pat explicitly flags as 4th-sprint-defer-risk:
        if Sprint 3 ALSO defers, the carryover becomes structural.
      severity: medium
      mitigation: |
        User-action item flagged in story S-ETS-03-03: orchestrator runs
        `gh auth refresh -s workflow` at sprint start. If the scope still cannot
        be granted, S-ETS-03-03 closes with the workflow file under `ci/` and
        an explicit deferral note in ops/status.md. Sprint 3 success_criterion
        `ci_workflow_live` then converges to a Sprint 4+ carryover, AND Pat
        flags the structural risk in Sprint 4 planning (consider escalating
        to user as a hard-stop blocker).
    - id: "COMMON-GEOROBOTIX-SHAPE-MISMATCH"
      description: |
        Sprint 3 assumes GeoRobotix serves OGC API Common Part 1 base shapes
        (landing-page link relations beyond Core's subset, /collections endpoint
        if it exists, content negotiation via f= parameter). Sprint 2 SystemFeatures
        precedent: design.md predicted /systems shape that GeoRobotix didn't
        actually serve (no top-level links; no per-item links); Generator
        adapted (`systemsCollectionLinksDiscipline` operates on /systems/{id}).
        Common may have similar drift — e.g. /collections might return 404
        (GeoRobotix's CS API may not implement Common /collections at all,
        only /systems-style direct collection access).
      severity: medium
      mitigation: |
        Generator MUST: `curl -sf https://api.georobotix.io/ogc/t18/api/`,
        `https://api.georobotix.io/ogc/t18/api/conformance`, AND
        `https://api.georobotix.io/ogc/t18/api/collections` (if 200, else
        document 404) as the FIRST step of S-ETS-03-07; archive curl evidence
        into Implementation Notes BEFORE writing assertions. If `/collections`
        is 404, narrow Common scope to landing-page + conformance + content-
        negotiation assertions only (skip /req/common/collections @Test or
        SKIP-with-reason at runtime). Same adapt-to-IUT-shape pattern Sprint 2
        SystemFeatures used successfully.
  low:
    - id: "ADR-010-RESTLOGGING-WRAP-MAY-NEED-CONTENT-PAT-CANT-RATIFY"
      description: |
        Pat (Planner) can identify that REST-Assured RequestLoggingFilter
        wrap pattern needs a design decision but cannot author the ADR text
        unilaterally — that's Architect domain. Sprint 3 may need an Architect
        cycle BEFORE Generator can land S-ETS-03-02 (similar to Sprint 2
        ADR-008 EtsAssert helper API). Sprint 2 precedent: NO ADR for the
        bare CredentialMaskingFilter; only inline design.md treatment. So
        Architect's answer might be "extend design.md §529 inline; no
        new ADR." Pat hypothesis: design.md amendment + 1-2 line
        ADR-006 cross-reference (Jersey 3.x is the underlying REST-Assured
        host) is sufficient.
      severity: low
      mitigation: |
        next_agent: architect (see handoff_to_generator below). Architect's
        cycle expected to be quick (low complexity since Sprint 2 precedent
        + REST-Assured public API is well-trodden + Pat's hypothesis is
        already plausible); 30-60 min Architect time.
    - id: "QUINN-RAZE-GATE-VERIFICATION-TIME-BUDGET"
      description: |
        Sprint 3 has 7 stories — comparable to Sprint 2's 6 stories. Sprint 2's
        SystemFeatures gate-run TIMED OUT in the first parallel-spawn attempt
        (Quinn 72m / Raze 13m, no reports produced; both polluted worktree).
        Mitigation in second attempt: tight constraints + smaller scope.
        Sprint 3 must scope tight from the start to avoid the timeout.
      severity: low
      mitigation: |
        Per evaluation_focus + evaluation_questions_for_quinn: gate run scoped
        to ≤30 min each via NO docker pull/build/run loops, ONE smoke run +
        curl-based external checks + `mvn test`, deferred S-ETS-03-04 image
        verification to a single `docker images --format '{{.Size}}'` check
        (no rebuild). Static-only verification of S-ETS-03-01 dependency-skip
        wiring is acceptable IF the live sabotage test artifact is archived
        AND parseable; Quinn / Raze re-verify by reading the archive, not by
        re-running the sabotage. Worktree-pollution constraint:
        gates verify against `/tmp/` clones OR archived artifacts only;
        NEVER against the user's worktree at `~/docker/gir/ets-ogcapi-connectedsystems10/`.

# Worktree-pollution mitigation per Sprint 2 systemfeatures gate incident
