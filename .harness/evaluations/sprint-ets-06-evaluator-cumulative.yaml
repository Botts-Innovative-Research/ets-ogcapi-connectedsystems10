# ---------- GAPs (numbered; ranked by severity) ----------

gaps:
  - rank: 1
    severity: medium
    id: GAP-Q1-CRED-LEAK-PRONG-B-MISDIRECTED
    description: |
      scripts/credential-leak-e2e-test.sh line 127 runs `docker logs $CONTAINER_NAME` AFTER
      smoke-test.sh has already executed cleanup_silent (which tears down the container at
      die() trigger when smoke FAIL=10). Result: $ARCHIVE_DIR/container.log = "Error response
      from daemon: No such container" (1 vacuous line) instead of catalina.out content.
      Prong (b) at line 164 then greps this empty log for `Bear***WXYZ` and finds 0 hits.
      Although the prong-b grep target was expanded to include $STUB_LOGFILE in Sprint 6
      (line 168 — diff c25e44a..c17a534), the stub-IUT only sees the wire (which carries
      the original credential, not the masked form by design), so this expansion does NOT
      help. The masked form lands in the smoke-test.sh's $LOG_FILE (in $SMOKE_OUTPUT_DIR/
      s-ets-01-03-teamengine-container-*.log, 235 lines, 12 masked hits) — but the
      credential-leak script doesn't grep there.
    impact: |
      Orchestration script reports `FAIL: one or more cross-check prongs failed (see above)`
      with exit code 1, even though the structural fix (filter design + wire payload + masking
      log emission) is correct. Future regressions could be masked because the script now
      always reports prong-b failure regardless of the underlying fix's correctness.
    sprint_6_disposition: |
      The structural fix IS correct — the underlying GAP-1' is closed at the wire layer.
      Quinn's manual grep across the correct artifacts (smoke-test.sh's archived container
      log) confirms all three prongs PASS. This GAP is purely an orchestration-script bug.
    fix_recommendation: |
      Sprint 7 carryover: in scripts/credential-leak-e2e-test.sh, change line 127 to
      `cp -f "${SMOKE_OUTPUT_DIR:-ops/test-results}/s-ets-01-03-teamengine-container-*.log" "$CONTAINER_LOG" 2>/dev/null || docker logs "$CONTAINER_NAME" > "$CONTAINER_LOG" 2>&1 || true`
      so the script first tries to use smoke-test.sh's already-archived container log
      (where the timing fix lands the catalina.out content), and only falls back to live
      `docker logs` if the archive doesn't exist.
    severity_rationale: "Severity MEDIUM — does not invalidate the underlying fix (which is correct), does not break smoke regression (smoke-test.sh internally PASS 34/34), does not affect the unit-test wire-side proof (mvn 80/0/0/3 PASS). Affects only the automated three-fold verdict-flag layer. Falsifiability gameability noted by Plan-Raze (PASS_BUT_GAMEABLE) is separate from this script bug."

  - rank: 2
    severity: low
    id: GAP-Q2-PRONG-B-STUB-LOG-EXPANSION-MISDIRECTED
    description: |
      The Sprint 6 prong-b grep expansion (CONCERN-2 from Sprint 5 Raze; line 168 of
      credential-leak-e2e-test.sh) was added to grep the stub-IUT log for the masked form
      `Bear***WXYZ`. By design, the stub-IUT only sees the wire (which under approach (i)
      now correctly carries the ORIGINAL credential, NOT the masked form). So this
      expansion can never produce a hit — it's structurally a no-op.
    impact: |
      Misleading; reads as if it would help close prong (b). Should either be removed
      (with rationale captured in javadoc) OR re-aimed at the correct artifact (smoke-
      test.sh's archived container log).
    sprint_6_disposition: |
      Bundled fix; not load-bearing.
    fix_recommendation: |
      Sprint 7 carryover: as part of GAP-Q1 fix, remove the $STUB_LOGFILE grep in prong (b)
