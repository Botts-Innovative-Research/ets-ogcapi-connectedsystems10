success_criteria:
  all_critical_scenarios_pass_or_skip_with_reason: true
  spec_updated: true
  story_updated: true
  traceability_updated: true
  no_regression: true
  build_green_jdk17: true
  smoke_test_green_against_georobotix: true
  no_part2_work_in_sprint: true
  zero_bare_assertionerror_in_conformance: true
