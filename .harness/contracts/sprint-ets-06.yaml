description: |
  Sprint 6 is a pure wedge sprint: NO new OGC conformance classes; NO feature expansion.
  The sprint closes 3 carryover items from Sprint 5's adversarial review, all verified
  cross-corroborated by Quinn 0.82 + primary Raze 0.74 + meta-Raze 0.83:

  (1) GAP-1' MASKING-FILTER-WIRE-CORRUPTION (P0 / HIGH):
      MaskingRequestLoggingFilter.filter() mutates requestSpec to masked form BEFORE
      super.filter() calls ctx.next() (HTTP send). The finally-block restore runs
      AFTER the wire send. All 12 stub-IUT wire requests carry Authorization=Bear***WXYZ
      (masked form) instead of Bearer ABCDEFGH12345678WXYZ (original credential).
      Fix: redesign filter to NOT mutate requestSpec; log masked form DIRECTLY to
      configured PrintStream; call ctx.next(originalSpec) — wire carries original.
      (~30-50 LOC Java; closes credential_leak_e2e_full_pass for the THIRD attempt.)

  (2) GAP-2 SABOTAGE-TARGET-DOCKER-BROKEN (P1 / MEDIUM reclassified from HIGH):
      sabotage-test.sh --target=systemfeatures rsync --exclude='.git/' strips .git
      from temp worktree. Dockerfile COPY .git ./.git fails at Docker build step.
      Fix: remove --exclude='.git/' from rsync call (~1-2 LOC bash) + improve log
      message to correctly distinguish Docker build failure from smoke @Test failure.

  (3) META-GAP-1 STUB-CONTEXT-DECORATIVE-TESTS (P1 / MEDIUM new from meta-review):
      16 unit tests (VerifyAuthCredentialPropagation 8 + VerifyMaskingRequestLoggingFilter 8)
      use StubFilterContext returning null from ctx.next(); they cannot exercise wire-side
      ordering. Add VerifyWireRestoresOriginalCredential (CapturingFilterContext records the
      requestSpec passed to ctx.next(); asserts it carries ORIGINAL credential not masked form).
      Reclassify 16 existing tests in spec.md + story notes as "wiring-only".

  Sprint 6 explicitly EXCLUDES:
  - Sampling conformance class (/conf/sampling-features) — deferred to Sprint 7
  - Properties conformance class (/conf/property-definitions) — deferred to Sprint 7
  - Any new OGC Part 1 conformance classes (Subdeployments, AdvancedFiltering, etc.)
  - Part 2 work (continuing the 2026-04-27 user gate)
  - CI workflow live (PERMANENTLY DROPPED at Sprint 4 close)

  Meta-Raze key recommendation: "Sprint 6 framing = wedge sprint, NOT feature expansion.
  Resist any temptation to batch in Sampling + Properties. Gate-fatigue risk; would
  obscure whether Sprint 6's wedges actually closed the 2-sprint-old credential-leak gap."

