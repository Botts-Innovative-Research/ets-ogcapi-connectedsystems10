      a log path, while ops/test-results.md is still planning-only. This weakens
      reproducibility of the implementation evidence.
    evidence:
      - "find/rg did not locate an ops/test-results Sprint 21 Maven log."
      - "target/surefire-reports shows VerifyPart2DatastreamTests 5/0/0/0 and VerifyTestNGSuiteDependency 43/0/0/0, but target/ is build output, not an archived evidence artifact."
      - "The supplied Maven total is not yet reflected in ops/test-results.md."
    required_fix: >
