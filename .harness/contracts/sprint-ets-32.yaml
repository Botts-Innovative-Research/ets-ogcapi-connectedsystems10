# Sprint 32 contract - Local OSH primary E2E and Observation/Command binding planning

sprint: "ets-32"
sprint_name: "part2-observation-command-binding-local-osh"
type: "feature-expansion-planning"
created: "2026-05-27T19:54:20Z"
updated: "2026-06-02T00:47:39Z"
description: |
  Sprint 32 plans two related changes. First, development E2E gates now use a
  self-provisioned local OpenSensorHub instance as the primary IUT; GeoRobotix's
  public instance is advisory-only and is no longer a default or required
  development target. Second, Sprint 32 specifies REQ-ETS-PART2-013 as an
  internal Observation/Command binding cross-class closure. OGC 23-002 does not
  define a standalone /conf/observation-binding class, so the ETS must not
  require or advertise one.

