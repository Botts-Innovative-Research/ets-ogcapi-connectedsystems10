risks:
  highest:
    - id: "TWO-LEVEL-DEPENDENCY-CASCADE-MAY-NOT-WORK"
      description: |
        Sprint 4 S-ETS-04-05 introduces the FIRST two-level dependency chain
        (Subsystems→SystemFeatures→Core). Sprint 3 proved one-level
        (SystemFeatures→Core) live cascading-skip via S-ETS-03-01 sabotage exec.
        Risk: TestNG's group-dependency mechanism may NOT cascade transitively —
        i.e. when SystemFeatures FAILs, Subsystems may report status="FAIL" or
        status="ERROR" rather than status="SKIP" (because the dependency is
        declared on systemfeatures group which is in the "ran but failed" state,
        not the "did not run" state that triggers SKIP). TestNG `dependsOnGroups`
        documentation says SKIP fires when dependency-group methods didn't run
        successfully — but multi-level chaining specifics aren't documented.
      severity: high
      mitigation: |
        Generator MUST verify the two-level cascade BEFORE claiming Subsystems
        complete: extend bash sabotage script (or VerifyTestNGSuiteDependency
        unit test) to sabotage SystemFeatures (not Core), observe BOTH
        SystemFeatures FAIL AND Subsystems SKIP. If Subsystems FAILs instead of
        SKIPs, Architect MUST cycle: alternative is BeforeSuite SkipException
        pattern noted in design.md "testng.xml single-block consolidation"
        Sprint 3+ migration path. Architect ratifies which pattern survives;
        Sprint 4 acceptance permits SKIP via either dependsOnGroups OR
        SkipException (whichever TestNG actually delivers).
    - id: "CHOWN-LAYER-ATTACK-MAY-NOT-MATERIALIZE-EXPECTED-SAVINGS"
      description: |
        Sprint 4 S-ETS-04-02 attacks the 80MB chown layer via
        `COPY --chown=tomcat:tomcat`. Sprint 3 empirical analysis identified
        chown as the dominant cost, but the prediction is based on layer-size
        inspection, not on a materialized rebuild. Risk: Docker buildkit
        `--chown` may still create a 30-50MB layer (not 0MB) due to filesystem
        attribute changes, OR the savings may be partially offset by other
        layout shifts (cache invalidation triggering rebuild of larger
        upstream layers).
      severity: medium
      mitigation: |
        Generator MUST baseline current image size BEFORE applying the
        chown-layer attack, apply the change, rebuild (cache cold), measure
        delta. If <80MB savings, layer in iterative version-overlap dedupe per
        Sprint 3 empirical-dedupe-list tier-2 (~7-8MB additional). If <600MB
        unreachable even with both, mark PARTIAL with explicit rationale and
        defer to Sprint 5 (alpine variant per ADR-009 §Alternatives).
        Acceptance Criterion: PARTIAL acceptable at 600-650MB; GAP if >650MB.
  medium:
    - id: "USER-ACTION-CI-WORKFLOW-5TH-SPRINT-DEFER"
      description: |
        S-ETS-04-01 binary close depends on user running `gh auth refresh -s
        workflow` from a session where they're at the terminal AND can complete
        the OAuth browser flow. If user CANNOT or DOES NOT do this before the
        Generator run: contract success_criterion `ci_workflow_live_or_formally_
        dropped` flips to formal-drop, perpetual-environmental-blocker mode
        (Raze CONCERN-3 recommendation). This is the binary close — no more
        4-sprint-style retries.
      severity: medium
      mitigation: |
        Sprint 4 contract success_criterion is `ci_workflow_live_or_formally_
        dropped: true` (binary OR — either resolution counts). User-action
        flagged in story S-ETS-04-01 with explicit hard-stop note: orchestrator
        runs `gh auth refresh -s workflow` at sprint start; if scope still
        cannot be granted, S-ETS-04-01 closes with formal deferral note in
        ops/status.md AND `ci_workflow_live` is DROPPED from future sprint
        success criteria. Pat documents alternative (manual GitHub UI move
        via web — ~5 min user time) in story Implementation Notes.
    - id: "CREDENTIAL-LEAK-E2E-STUB-IUT-COMPLEXITY"
      description: |
        S-ETS-04-03 deeper E2E may need a stub IUT supporting Bearer auth
        (Pat's recommended path). Stub IUT requires composing with S-ETS-04-04
        sabotage-script bug fixes (stub bind 0.0.0.0 + docker --add-host).
        Risk: stub-server choreography is non-trivial in the smoke pipeline
        (port-collision avoidance, container-side reachability, Bearer
        validation). Alternative: pivot to GeoRobotix-with-auth or another
        IUT — unknown availability.
      severity: medium
      mitigation: |
        Architect ratifies stub vs alternative-IUT path before Generator
        starts S-ETS-04-03. If stub: Generator implements AFTER S-ETS-04-04
        (sabotage-script bug fixes are prerequisites for hermetic stub
        operation). If alternative-IUT unreachable: Generator falls back to
        unit-layer-extended verification (more VerifyMaskingRequestLoggingFilter
        @Tests covering REST-Assured RequestLoggingFilter activation paths)
        + closes S-ETS-04-03 as PARTIAL-with-rationale (closer to Sprint 3
        outcome but with explicit "infrastructure unavailable" deferral).
        Architect picks; Generator executes.
    - id: "GEOROBOTIX-SUBSYSTEMS-SHAPE-MISMATCH"
      description: |
        Sprint 4 assumes GeoRobotix serves OGC API CS Part 1 Subsystems base
        shapes (per `/systems/{id}/subsystems` collection + per-subsystem
        canonical endpoint + parent-system link discipline). Sprint 2/3
        precedent: design.md predicted shapes that GeoRobotix didn't serve
        exactly (no top-level links on /systems collection, validTime nested
        under properties not top-level). Subsystems may have similar drift
        — e.g. /systems/{id}/subsystems may return 404 (GeoRobotix may not
        implement Subsystems at all, only direct system access).
      severity: medium
      mitigation: |
        Generator MUST: `curl -sf https://api.georobotix.io/ogc/t18/api/systems`,
        pick a system id, `curl /systems/<id>/subsystems` (if 200, else
        document 404 + scope-narrowing), archive curl evidence into
        Implementation Notes BEFORE writing assertions. If `/systems/<id>/
        subsystems` is 404, narrow Subsystems scope to landing-page-discovery
        + collection-shape only (skip per-item @Tests or SKIP-with-reason at
        runtime). Same adapt-to-IUT-shape pattern Sprint 2 SystemFeatures
        used successfully.
  low:
    - id: "ADR-009-V2-AMENDMENT-VS-NEW-ADR-011"
      description: |
        Pat (Planner) can identify that ADR-009 v2 amendment OR new ADR-011
        superseding is needed but cannot author the ADR text unilaterally —
        that's Architect domain. Sprint 4 may need an Architect cycle BEFORE
        Generator can land S-ETS-04-02 (similar to Sprint 3 ADR-010 dual-pattern
        ratification). Sprint 2/3 precedent: NO new ADR for Sprint 2
        CredentialMaskingFilter (inline design.md treatment); NEW ADR-010
        for Sprint 3 dual-pattern dependency-skip (because two competing
        approaches needed reconciliation). Sprint 4 ADR-009-v2 is more
        analogous to Sprint 2's CredentialMaskingFilter precedent (in-place
        amendment of an existing ADR with empirical falsification of an
        illustrative table — single-decision update).
      severity: low
      mitigation: |
        next_agent: architect (see handoff_to_generator below). Architect's
        cycle expected to be quick (low complexity since precedent + empirical
        evidence is already in Sprint 3 archive); 30-60 min Architect time.
        Pat's hypothesis: in-place ADR-009 amendment is sufficient (NO new
        ADR-011), with a Sprint 4 close addendum recording (a) the empirical
        falsification of the illustrative 200-300MB jar-dedupe projection,
        (b) the chown-layer attack approach + measured delta from Sprint 3
        660MB baseline, (c) the 80MB-as-dominant-cost identification, and
        (d) the Sprint 5+ next-target roadmap (alpine variant per ADR-009
        §Alternatives if Sprint 4 chown-attack underperforms).
    - id: "QUINN-RAZE-GATE-VERIFICATION-TIME-BUDGET"
      description: |
        Sprint 4 has 5 stories — comparable to Sprint 3's 7 stories but more
        intricate (two-level dependency chain + chown-layer materialization +
        E2E auth flow). Sprint 3 SystemFeatures gate-run timed out in the
        first parallel-spawn attempt (mitigation in second attempt: tight
        constraints + smaller scope). Sprint 4 must scope tight from the start.
      severity: low
      mitigation: |
        Per evaluation_focus + evaluation_questions_for_quinn: gate run scoped
        to ≤30 min each via NO docker pull/build/run loops, ONE smoke run +
        curl-based external checks + `mvn test`, deferred S-ETS-04-02 image
        verification to a single `docker build` + `docker images --format
        '{{.Size}}'` check (no rebuild loops). Two-level dependency-skip
        verification via reading archived sabotage XML OR VerifyTestNGSuiteDependency
        unit test (NEVER re-running sabotage in the gate). Worktree-pollution
        constraint preserved: gates verify against `/tmp/` clones OR archived
        artifacts only; NEVER against the user's worktree at
        `~/docker/gir/ets-ogcapi-connectedsystems10/`.

