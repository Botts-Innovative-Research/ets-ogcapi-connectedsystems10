  - id: CONCERN-3
    severity: low
    title: logback.xml + CredentialMaskingFilter not present; architect-handoff `should` constraint not addressed
    description: |
      architect-handoff.yaml line 146: "Use logback.xml configured to NEVER log
      Authorization or X-API-Key headers (CredentialMaskingFilter pattern equivalent
      to v1.0's CredentialMasker)."

      Verification:
        find src -name "logback*.xml" → no results
        grep -rn "Authorization\|Bearer\|CredentialMasking" src/main/java src/main/resources
          → only `Authorization` mentions are in /req/* URIs (not header logging)

      Defensible-by-deferral: this is a `should` (not `must`) constraint. Sprint 1 Core
      tests run unauthenticated against GeoRobotix (open API), so there are no
      Authorization headers TO log. The smoke artifact at
      ops/test-results/s-ets-01-02-georobotix-smoke-2026-04-28.xml has zero hits for
      authorization/bearer/api-key/password/secret (verified). No real credential
      leak risk in Sprint 1.

      Sprint 2+ when Part 1 conformance classes that do CRUD + auth land, this becomes
      a `must`. Should be tagged for that sprint's contract.
    recommended_fix: |
      Tag a Sprint 2 (or earlier-cleanup) story to add:
        - src/main/resources/logback.xml with <pattern> excluding Authorization, X-API-Key,
          Cookie headers from log output;
        - A REST Assured Filter implementing CredentialMaskingFilter (pattern equivalent
          to csapi_compliance/src/engine/credential-masker.ts);
        - Wire the filter into the SuiteFixtureListener's REST Assured baseline config.
      Not a Sprint 1 blocker; flagged for visibility.
    address_in_turn: no (defer to Sprint 2)

