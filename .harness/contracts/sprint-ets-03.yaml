handoff_to_generator:
  next_agent: "architect"
  rationale: |
    Architect (Alex) MUST land before Generator (Dana) for 3 deferred decisions
    that gate Sprint 3 execution:

    1. **Live break-Core dependency-skip approach** (S-ETS-03-01) — Architect
       picks: (a) TestNG programmatic API with mocked Core failures (~30 LOC
       unit test, hermetic, fast); (b) bash sabotage script + Docker rebuild +
       smoke + restoration (~5 min wall-clock once cache warm; touches Docker);
       (c) BOTH (defense-in-depth — unit test for fast feedback + bash for
       end-to-end behavioral verification). Pat recommends (c) as belt-and-
       suspenders, but Architect ratifies based on whether the unit-test
       approach can actually exercise the testng.xml dependency mechanism
       (which depends on TestNG XmlSuite parsing — Architect verifies feasibility).

    2. **REST-Assured RequestLoggingFilter wrap pattern** (S-ETS-03-02) —
       Architect picks: (a) `MaskingRequestLoggingFilter extends RequestLoggingFilter`
       (subclass-based, robust); (b) chained-filter-with-registration-order
       enforcement (fragile but minimal change); (c) replace RequestLoggingFilter
       entirely with a custom logger (most invasive, most controllable).
       Pat recommends (a) — REST-Assured public API allows subclassing per
       Pat's verification of `io.restassured.filter.log.RequestLoggingFilter`
       Javadoc; subclass overrides `print()` or `applyMasking()` cleanly.
       Architect ratifies based on whichever pattern is cleanest given the
       existing CredentialMaskingFilter implementation (might want to keep
       parallel-FINE-level log AND wrap RequestLoggingFilter for defense-in-depth).

    3. **Image-size optimization approach** (S-ETS-03-04) — Architect picks
       from Quinn cleanup GAP-1 enumeration: (a) TE common-libs ↔ deps-closure
       dedupe (recommended; 200-300MB savings); (b) distroless runtime stage
       (rejected per ADR-009 §Alternatives — defer to Sprint 5+); (c) multi-
       stage refinement (alpine/runtime-scope-only deps; ~50-100MB).
       Pat recommends (a) per Quinn's recommendation; Architect ratifies and
       may also amend ADR-009 with the actual list of TE common-libs jars to
       exclude (or write ADR-010 covering the empirical Dockerfile adjustments
       Raze cleanup CONCERN-3 anticipated).

    Architect ALSO surfaces (a) whether REST-Assured RequestLoggingFilter wrap
    warrants its own ADR or just design.md §529 amendment (Pat's hypothesis:
    design.md amendment is sufficient given Sprint 2 NO-ADR-for-CredentialMaskingFilter
    precedent; but if Architect prefers ADR-010 to cover the wrap pattern PLUS
    the credential-leak integration test pattern together as a security-audit
    artifact, that's also acceptable); (b) Common conformance class coverage
    scope (Sprint-1-style minimal — 4-5 @Tests covering 3-4 highest-priority
    OGC 23-001 Annex A `/conf/common` ATS items — vs full coverage from day 1;
    Pat recommends Sprint-1-style for risk control on second pattern extension);
    (c) testng.xml strategy for Common (extend single-block consolidation OR
    split into `<test name="Common"/>` + `<test name="Core+SystemFeatures"/>`
    OR adopt the BeforeSuite SkipException pattern noted in Sprint 2 testng.xml
    inline comment — Pat recommends extending single-block since Sprint 3 still
    has ≤3 conformance classes and the full migration is better postponed to
    Sprint 4 when 4+ classes need it).

    Architect produces an updated architect-handoff.yaml with `next_agent:
    generator` (or revised `next_agent: planner` if any of the 3 decisions
    surface a Sprint 3 contract rewrite — Pat's hypothesis is no rewrite
    needed; the 3 decisions are scoped to specific story acceptance criteria
    and don't change the contract surface). Once Architect lands, Generator
    implements all 7 stories in dependency order.

    Generator may sequence: S-ETS-03-06 (doc cleanups, doc-only — fastest)
    → S-ETS-03-01 (dependency-skip sabotage test, isolated; can be a TestNG
    unit test, no Docker required if Architect picks option (a))
    → S-ETS-03-03 (CI workflow git mv, fast; assumes user-action complete)
    → S-ETS-03-02 (credential-leak integration + RequestLoggingFilter wrap;
       2 commits — wrap implementation, then integration test wiring)
    → S-ETS-03-05 (SystemFeatures expansion, mechanical extension; can run
       in parallel with S-ETS-03-07 since they touch different files)
    → S-ETS-03-07 (Common conformance class, new feature work)
    → S-ETS-03-04 (image-size optimization, last because it touches Dockerfile
       and benefits from full smoke baseline of all prior stories)
    Total est wall-clock: 8-12h Generator time (comparable to Sprint 2's 8-12h
    estimate which actually closed at ~20h Dana time across 2 turns — Sprint 3
    has more carryover items but per-class new-feature effort for Common is
    ~30-40% the cost of S-ETS-01-02 since architectural pattern is now
    established AND ETSAssert + URI canonicalization + multi-stage Dockerfile
    + CredentialMaskingFilter are all in place from Sprint 2).

  next_agent_inputs_for_architect:
    - "Sprint 3 contract: .harness/contracts/sprint-ets-03.yaml (this file)"
    - "Sprint 2 close changelog entry (csapi_compliance/ops/changelog.md 2026-04-29T00:25Z) — full carryover analysis"
    - "Quinn cleanup GAP-1 (image size) + GAP-2 (CI workflow): .harness/evaluations/sprint-ets-02-evaluator-cleanup.yaml"
