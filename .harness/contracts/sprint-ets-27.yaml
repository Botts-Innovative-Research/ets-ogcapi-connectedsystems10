verdict_policy:
  declaration_gate:
    - "If /conf/update is not declared, Update assertions SKIP with a precise reason."
  prerequisites:
    - "Keep Part 2 /conf/create-replace-delete and OGC API Features Part 4 /conf/update visible before reporting full class closure."
  condition_gates:
    - "Requirements 79-82 require /conf/datastream before PASS."
    - "Requirements 83-88 require /conf/controlstream before PASS."
    - "Requirements 89-91 require /conf/feasibility before PASS."
    - "Requirement 92 requires /conf/system-event before PASS."
    - "Missing condition classes SKIP prerequisite-incomplete rather than PASS from /conf/update, endpoint availability, sibling declarations, or OPTIONS."
  mutation_safety:
    - "Default public GeoRobotix smoke must issue zero IUT-bound PATCH, POST, PUT, or DELETE."
    - "Positive PATCH lifecycle checks require mutation-tests-enabled=true and mutation-iut-policy=dedicated-mutable-iut."
    - "Hard-deny public GeoRobotix PATCH before dispatch."
  options_honesty:
    - "OPTIONS method evidence is readiness only and cannot PASS lifecycle behavior."
    - "Declared /conf/update plus successful OPTIONS omitting PATCH should FAIL readiness for the selected endpoint while lifecycle skips before PATCH."
  endpoint_honesty:
    - "HTTP 400, HTTP 500, streaming-only, or empty/non-resource endpoints cannot produce Update lifecycle PASS evidence."

generator_must_do:
  - "Record exact HEAD before editing."
  - "Use official OGC 23-002 identifiers: /req/update and /conf/update."
  - "Use OGC API Features Part 4 Update as the prerequisite authority for PATCH semantics."
  - "Implement Clause 15 condition gates before PASSing any R79-R92 assertion."
  - "Reuse existing mutation safety parameters and public-IUT hard-denial policy."
  - "Add tests/comments referencing REQ-ETS-PART2-008 and SCENARIO-ETS-PART2-008-* IDs."
  - "Run formatter, scripts/mvn-test-via-docker.sh, and TeamEngine smoke after implementation."
  - "Verify public smoke logs contain zero IUT-bound PATCH/POST/PUT/DELETE by default."
  - "Update spec/story/traceability/status/changelog/test-results after implementation."

generator_must_not_do:
  - "Do not mutate public GeoRobotix."
  - "Do not PASS lifecycle assertions from OPTIONS alone."
  - "Do not infer Update support from sibling declarations or broad Allow headers."
  - "Do not PASS R79-R92 assertions when their Clause 15 condition class is absent."
  - "Do not issue PATCH unless /conf/update, mutation opt-in, non-public dedicated mutable IUT policy, and endpoint PATCH readiness are all satisfied."
  - "Do not implement Part 2 JSON, SWE Common, or observation-binding closure in this sprint."

evaluation_focus:
