risk_register:
  - id: "GEOJSON-MEDIATYPE-NEGOTIATION-OVERCLAIM"
    severity: "MEDIUM"
    mitigation: "Allow an explicitly recorded fallback only when representation is valid GeoJSON; do not claim mediatype-read PASS solely from default JSON without a note."
  - id: "GEOJSON-ITEMS-VS-FEATURES-WRAPPER"
    severity: "MEDIUM"
    mitigation: "Require `type=FeatureCollection` and `features` for PASS. If the IUT returns only `items`, record fallback/SKIP/CONCERN, not PASS."
  - id: "SENSORML-SCOPE-CREEP"
    severity: "LOW"
    mitigation: "Contract excludes SensorML; any SensorML edit is out of scope unless separately requested."
