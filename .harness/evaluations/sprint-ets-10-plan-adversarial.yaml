findings:
  - id: "CONCERN-1"
    severity: "MEDIUM"
    title: "Alternate-link fallback must not be reported as full mediatype-read closure"
    status: "requires_generator_attention"
    evidence:
      - "The plan is honest that collection-level Accept application/sml+json currently returns Content-Type application/json with a top-level items wrapper and that this alone must not PASS."
      - "The spec and contract allow a single-system alternate link with type application/sml+json to satisfy discovery/fetch checks, but Sprint 10 remains PARTIAL and does not close the full SensorML class."
      - "Upstream class file at commit 3fd86c73e744b7e2faaf7f1c17366bfb9ff4cd6f lists /req/sensorml/mediatype-read and inherited SensorML JSON classes, but no separate per-subrequirement files were present under api/part1/standard/requirements/encoding/sensorml/ at that commit."
    impact: "If Generator names the alternate-link path as a full /req/sensorml/mediatype-read PASS without checking fetched representation type/body and documenting fallback, the ETS could overclaim SensorML media-type support from generic CS API JSON."
    required_fix: "During implementation, keep this as partial/fallback evidence unless the fetched response proves SensorML JSON representation support. Test descriptions/messages must distinguish direct Accept negotiation from alternate-link fallback."

  - id: "CONCERN-2"
    severity: "LOW"
    title: "AdvancedFiltering is incorrectly grouped with mutation-side work in ops wording"
    status: "documentation_cleanup_recommended"
    evidence:
      - "ops/changelog.md says the plan avoids mutation-side AdvancedFiltering/CRUD/Update work."
      - "ops/status.md next action excludes AdvancedFiltering/CRUD/Update together; this is fine as exclusion, but AdvancedFiltering is query/filtering behavior, not mutation-side behavior."
      - "Planner handoff itself correctly describes AdvancedFiltering as cross-cutting query semantics."
    impact: "This is not a blocker for SensorML planning, but it is a terminology error that can confuse future sprint selection and risk classification."
    required_fix: "When touching ops docs next, change wording to distinguish AdvancedFiltering query semantics from CRUD/Update mutation-side work."

evidence:
  scope_honesty:
    verdict: "acceptable"
    notes:
      - "Contract, story, spec, traceability, status, changelog, and known-issues consistently call Sprint 10 a SensorML systems read-only subset, not full SensorML."
      - "mediatype-write, relation-types, deployment/procedure/property schema/mapping, full SensorML 3.0 JSON Schema validation, AdvancedFiltering, CRUD, Update, and Part 2 are excluded."
      - "Traceability marks REQ-ETS-PART1-013 as PLANNED, not implemented."
  generic_json_overclaim:
    verdict: "guarded"
    notes:
      - "The plan explicitly says CS API items wrappers must not count as SensorML PASS."
      - "The plan requires alternate-link fallback to be recorded explicitly."
      - "Residual risk remains if Generator treats parseable JSON alone as SensorML mediatype-read success."
  upstream_reference_accuracy:
    verdict: "accurate_for_class_file"
    notes:
      - "Commit SHA and commit date verified through GitHub API."
      - "requirements_class_sensorml.adoc lines 5-26 verify identifier /req/sensorml, inherited classes, and the 15 listed subrequirements."
      - "No separate REQ_*.adoc files were found under the SensorML encoding requirements directory at that commit, so implementation should avoid claiming finer textual semantics than the class file supports unless another upstream source is verified."
  documentation_consistency:
    verdict: "mostly_consistent"
    notes:
      - "Handoff, contract, story, spec, traceability, epic, status, changelog, and known-issues align on S-ETS-10-01 and REQ-ETS-PART1-013."
      - "Smoke threshold 57 is consistently based on Sprint 9 baseline 51 plus six planned SensorML tests."
      - "Only noted inconsistency is low-severity AdvancedFiltering mutation terminology in ops wording."

required_fixes:
  before_generator_completion:
    - "Do not count collection-level CS API items JSON as SensorML PASS."
    - "Do not mark full REQ-ETS-PART1-013 implemented after Sprint 10; use PARTIAL-IMPLEMENTED only if live verification supports the subset."
    - "Keep mediatype-write, relation-types, deployment/procedure/property schema/mapping, full SensorML schema validation, and all mutation operations out of Sprint 10."
    - "Record whether SensorML fetch used direct Accept negotiation or alternate-link fallback in test descriptions/messages and post-implementation docs."
  cleanup_recommended:
