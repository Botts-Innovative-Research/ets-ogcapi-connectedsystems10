      ops/status.md and ops/changelog.md ARE updated (Step 7 done). So the gap is specifically
      Step 6 + Step 8 (the spec/traceability reconciliation), not the ops trail.
    evidence: |
      Read openspec/capabilities/ets-ogcapi-connectedsystems/spec.md line 322-336.
      Read _bmad/traceability.md REQ-ETS-SCAFFOLD-* rows — all "Active".
    recommended_fix: |
      Update spec.md §"Implementation Status (2026-04-27)" → §"Implementation Status (2026-04-28)":
        - Status: Sprint 1 / S-ETS-01-01 PASS (HEAD 35d5154 in sibling repo).
        - What's Built: green build (mvn clean install 24-28s, surefire 26/0/0/3),
          reproducible (sha256 fe1c90c5..., not Dana's reported 5021b1d3...), 126 schemas
          bundled (verbatim copy from csapi_compliance@ab53658), JDK 17 + ets-common:17 +
          TeamEngine 5.6.1 pinned, META-INF/services SPI registration in place per ADR-001.
        - Deviations: (a) Acceptance criterion "Repo layout matches features10" is a PARTIAL —
          archetype's flat `level1/Capability1Tests` retained instead of features10 java17 branch's
          `listener/`+`conformance/` subpackage refactor, deferred to S-ETS-01-02 per Dana's
          self-report (note this in deviations); (b) `.github/workflows/build.yml` is staged
          under `ci/github-workflows-build.yml` because the gh token used at commit time
