mutation_opt_in_parameters:
  mutation_tests_enabled:
    suite_parameter: "mutation-tests-enabled"
    required_value: "true"
  mutation_iut_policy:
    suite_parameter: "mutation-iut-policy"
    required_value: "dedicated-mutable-iut"
  default_behavior: "Lifecycle mutation assertions SKIP before POST/PUT/DELETE."
  end_to_end_wiring_required:
    - "TestRunArg exposes mutation-tests-enabled and mutation-iut-policy."
    - "SuiteAttribute stores both mutation controls."
    - "SuiteFixtureListener copies suite parameters onto the TestNG suite."
    - "TestNGController accepts the optional parameters without requiring them."
    - "CTL exposes explicit mutation controls."
    - "scripts/smoke-test.sh may forward SMOKE_MUTATION_TESTS_ENABLED and SMOKE_MUTATION_IUT_POLICY; default env leaves them unset."
  hard_denies:
    - "https://api.georobotix.io/ogc/t18/api"
    - "Any IUT host equal to api.georobotix.io"
  hard_deny_behavior: "If mutation tests are enabled against a hard-denied public IUT, lifecycle test SKIPs or FAILs before POST; it MUST NOT issue POST/PUT/DELETE."

no_mutation_smoke_oracle:
  description: "Default smoke must prove absence of IUT-bound mutation, not absence of every POST string in all logs."
  method: "Parse current `Request: METHOD URI` entries and older adjacent `Request method:` / `Request URI:` pairs from REST Assured logs."
  filter: "Only pairs whose URI starts with the IUT base URL are in scope."
  pass_condition: "Zero in-scope pairs with method POST, PUT, or DELETE."
  excluded: "TeamEngine control-plane POST that starts the suite run."

evaluation_focus:
  - "Generator must re-verify GeoRobotix /conformance for /conf/create-replace-delete before implementing."
  - "Generator must not issue IUT-bound POST/PUT/DELETE during default smoke."
  - "Raze should inspect TeamEngine container logs using recognized REST Assured request entries filtered to GeoRobotix-bound requests."
  - "Quinn should verify mutation opt-in parameters are present in TestRunArg/SuiteAttribute and default to disabled."
  - "Quinn should verify CTL and smoke-script parameter wiring is closed by default."
  - "For default GeoRobotix, lifecycle mutation tests must SKIP with reason before issuing POST."
  - "Even with mutation parameters enabled, known shared public GeoRobotix URLs must be hard-denied before POST."
  - "OPTIONS checks must be named and reported as readiness preconditions, not as OGC lifecycle conformance PASS."
  - "Generator must keep full REQ-ETS-PART1-010 status PARTIAL-IMPLEMENTED."
  - "Generator must not implement /conf/update or Part 2 mutation behavior."

risk_register:
  - id: "CRD-PUBLIC-IUT-MUTATION"
    severity: "HIGH"
    mitigation: "Default smoke disables lifecycle tests. Mutating methods require mutation-tests-enabled=true and mutation-iut-policy=dedicated-mutable-iut."
  - id: "CRD-READINESS-OVERCLAIM"
    severity: "MEDIUM"
    mitigation: "OPTIONS Allow evidence is readiness only, not lifecycle conformance PASS; lifecycle test remains SKIP by default."
  - id: "CRD-CLEANUP-FAILURE"
    severity: "MEDIUM"
    mitigation: "Positive lifecycle execution remains skipped by default and must record best-effort cleanup if enabled."
  - id: "UPDATE-SCOPE-CREEP"
    severity: "LOW"
    mitigation: "Contract excludes PATCH/update and Part 2 mutation classes."
