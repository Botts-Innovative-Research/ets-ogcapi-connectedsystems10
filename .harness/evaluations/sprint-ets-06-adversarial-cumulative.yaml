# ----- GAPs found -----
gaps:
  - id: GAP-1
    severity: HIGH
    title: "Sabotage-marker injection produces UNREACHABLE-STATEMENT compile error; Sprint 5 GAP-2 .git-exclude masked it; cascade live-exec for systemfeatures cannot run end-to-end"
    description: |
      Sprint 5 S-ETS-05-03's python sed-patch (line 232 of sabotage-test.sh)
      injects `throw new AssertionError("SABOTAGED ...")` as the FIRST statement
      of `systemsCollectionReturns200()`. The original
      `ETSAssert.assertStatus(this.systemsResponse, 200, REQ_RESOURCES_ENDPOINT)`
      below it then becomes UNREACHABLE under JLS rules; javac rejects with
      a hard compilation error (`unreachable statement`).

      Sprint 5 never observed this because the rsync `--exclude='.git/'` killed
      the Docker build at `COPY .git ./.git` BEFORE `mvn package` had a chance
      to compile the patched file. Sprint 6 fixed the .git issue (correctly!),
      exposing this latent Sprint 5 bug.

      Consequence: REQ-ETS-CLEANUP-017's acceptance criterion ("cascade XML
      produced showing 3-class SKIP") is UNVERIFIED at the live-exec layer
      because the script fails before producing any XML. The structural .git
      fix is necessary but NOT sufficient.

      Fix surface: scripts/sabotage-test.sh line ~232 python script. Replace
      bare `throw new AssertionError(...)` with `if (true) throw new
      AssertionError(...)` (defeats javac reachability analysis), or
      replace the original method body entirely (drop the now-unreachable
      assertStatus line), or wrap in try { } catch (Throwable t) { throw t; }.
    cross_corroboration_prediction: "MEDIUM-HIGH likelihood Quinn flags this if she ran live cascade; unknown if her script suite included the cascade probe. Quinn's primary live-exec (credential-leak-e2e-test.sh) is unaffected by this gap. If Quinn's secondary did NOT exercise sabotage --target=systemfeatures end-to-end, only Raze flags it."
    blocking_for_sprint_close: "ARGUABLE — does NOT block GAP-1' wire-side closure (which is the headline question); but DOES block clean closure of REQ-ETS-CLEANUP-017 / GAP-2. Recommend address in Sprint 7 wedge-2 or as fast-follow patch."
    archive_evidence: "/tmp/raze-fresh-sprint6/test-results/sprint-ets-06-cascade-three-class-2026-04-30-FAILED.log + /tmp/raze-sab-trace.log (bash -x trace)"

  - id: GAP-2
    severity: MEDIUM
    title: "REQ-ETS-CLEANUP-017 status is IMPLEMENTED in spec.md but live-exec at gate failed"
    description: |
      spec.md line 345 declares REQ-ETS-CLEANUP-017 status `IMPLEMENTED` with
      the rationale that the structural fix landed and live cascade verification
      was deferred to Raze. Raze's live-exec FAILED (see GAP-1). Per the
      sprint-anchored discipline, status should be DEFERRED-LIVE-EXEC or
      PARTIAL until the cascade XML can be produced.

      This is a status-honesty gap, not a code gap — but the spec.md text is
      load-bearing for future agents reading the sprint close.
    fix_surface: "spec.md line 345 — change `IMPLEMENTED` to e.g. `STRUCTURAL-IMPLEMENTED-LIVE-EXEC-FAILED` with cross-reference to GAP-1 above; update the description to note the unreachable-statement failure mode."
    cross_corroboration_prediction: "MEDIUM likelihood Quinn flags this if she audits spec.md vs live-exec evidence. If Quinn doesn't run cascade, she may accept Generator's IMPLEMENTED claim at face value."

  - id: GAP-3
    severity: MEDIUM
    title: "Sprint 6 honest-log-message conditional is unreachable under `set -eo pipefail`"
    description: |
      The conditional block at scripts/sabotage-test.sh lines 287-298 is
      structurally well-designed (SMOKE_EXIT_CODE capture + presence/absence
      of TestNG report) BUT the LATEST_REPORT assignment immediately above it:

        LATEST_REPORT="$(ls -t "${SABOTAGE_TMPDIR}/test-results"/s-ets-01-03-teamengine-smoke-*.xml 2>/dev/null | head -1)"

      runs as a PIPELINE under `set -eo pipefail`. When the glob doesn't match
      (the common case after Docker build failure — no XML exists yet), the
      `ls` step exits non-zero, pipefail propagates, and the script EXITS
      with code 2 BEFORE reaching the disambiguation log message. bash -x
      trace confirms: control jumps from `LATEST_REPORT=` directly to
      `cleanup_all`, skipping lines 289-298 entirely.

      Consequence: Sprint 6 S-ETS-06-02's claimed honest log message
      ("Docker build FAILED (not a sabotage-marker hit)") never fires in
      the actual Docker-build-failure mode it was designed to disambiguate.

      Fix surface: wrap the assignment with `set +o pipefail` / `set -o pipefail`
      pair, OR use a different idiom: `LATEST_REPORT=""; for f in
      "${SABOTAGE_TMPDIR}/test-results"/s-ets-01-03-teamengine-smoke-*.xml;
      do [[ -f "$f" ]] && LATEST_REPORT="$f"; done`, OR use `compgen -G`.
    cross_corroboration_prediction: "LOW-MEDIUM likelihood Quinn flags this — depends on whether she traced bash -x or just read the static script. Quinn's domain is the credential-leak closure-proof; cascade scripts are Raze's primary."

  - id: GAP-4
    severity: LOW
    title: "Reproducibility check did not include the multi-stage Docker jar"
    description: |
      Raze byte-compared `target/ets-ogcapi-connectedsystems10-0.1-SNAPSHOT.jar`
      across two clones (md5 58b8433b... matched). However, the all-in-one
      `*-aio.jar` (39MB, used by TeamEngine) was NOT compared. The aio jar
      embeds dependency jars and is more sensitive to repackager-side
      timestamp drift; if it differs across builds, the `byte_identical` claim
      is incomplete. Sprint invariant should compare BOTH jars or explicitly
      scope to the SNAPSHOT jar.
    fix_surface: "Future Quinn / Raze invariant: md5sum both *.jar artefacts."
    cross_corroboration_prediction: "Quinn likely covers reproducibility too — independence is preserved if both flag this as LOW or one of us is silent."

