risks:
  highest:
    - id: "GAP-1-WIRING-FIX-COMPLEXITY-UNDERESTIMATE"
      description: |
        The GAP-1 fix requires coordinated changes across bash (smoke-test.sh),
        CTL XML (ogcapi-connectedsystems10-suite.ctl — does it already accept
        auth-credential as a TestNG parameter?), Java (CommonFixture or new
        AuthFixture — reads suite param and injects into REST-Assured RequestSpec),
        and unit tests (VerifyAuthCredentialPropagation). If the CTL → Java
        parameter plumbing chain has additional gaps beyond what the handoff
        described (~30-50 LOC), the fix could balloon. Sprint 3 precedent:
        the CredentialMaskingFilter chain required 3 separate Java classes
        (filter + subclass + SuiteFixtureListener wiring) when initially
        estimated as ~20 LOC.
      severity: high
      mitigation: |
        Generator MUST read the existing CTL file to confirm auth-credential
        is already declared as a ctl:form-param (it should be — REQ-ETS-TEAMENGINE-002
        says CTL accepts auth-credential). If NOT present in CTL, Generator
        adds it (small CTL edit). Java side: Generator reads SuiteFixtureListener.java
        + CommonFixture.java to find where suite params are read and where
        REST-Assured RequestSpec is built. If the plumbing already exists but
        just doesn't propagate SMOKE_AUTH_CREDENTIAL at the bash layer, the
        fix is truly ~5 LOC bash. If not, escalate scope and sequence with Architect.
        Acceptance: scripts/credential-leak-e2e-test.sh live exec produces (b)>=1
        AND (c)>=1 before closing S-ETS-05-01.
    - id: "TWO-CLASS-BATCH-GATE-FATIGUE"
      description: |
        Sprint 5 introduces 2 new conformance classes (Procedures + Deployments)
        plus GAP-1 closure. Sprint 4's gate drop (0.95/0.93 → 0.84/0.84) was
        partly caused by a single GAP-1 defect. Sprint 5 has 6 stories total;
        if Generator ships any defect in the new conformance classes (e.g. wrong
        URI form, missing dependency wiring, geometry check logic error), Quinn+Raze
        gate may catch it and drop confidence again. Two defects (one per class)
        could push confidence below 0.80 for the first time.
      severity: high
      mitigation: |
        Generator sequences Procedures BEFORE Deployments (same pattern as Sprint 4
        Subsystems-only: prove the new assertion surface first, then extend). Generator
        MUST curl-verify both /procedures and /deployments IUT shapes BEFORE writing
        any assertions (Pat provided shape data above but Generator should re-verify
        at sprint time — GeoRobotix shape can change). Sprint-1-style minimal (4 @Tests
        each) preserves gate-verification budget. If any @Test fails against GeoRobotix,
        Generator applies the adapt-to-IUT-shape pattern (SKIP-with-reason or narrow
        scope) rather than shipping a FAIL.
  medium:
    - id: "GEOROBOTIX-PROCEDURES-LOCATION-INVARIANT"
      description: |
        /req/procedure/location says Procedure SHALL NOT include location/geometry.
        GeoRobotix returns type=Feature for procedures — GeoJSON Feature objects
        typically INCLUDE a geometry key (even if null). Generator MUST check that
        geometry=null or geometry key absent. If GeoRobotix returns non-null geometry
        for any procedure, the assertion would FAIL against the IUT. This would be
        a real conformance gap in GeoRobotix, not an ETS bug.
      severity: medium
      mitigation: |
        Generator checks geometry field in the GeoRobotix /procedures/{id} response
        BEFORE writing the assertion. If geometry is consistently null, assert null.
        If geometry is non-null, flag as an IUT conformance gap and implement the
        assertion with SKIP-with-reason ('IUT returns non-null geometry; /req/procedure/
        location compliance uncertain') rather than FAIL (same adapt-to-IUT-shape
        pattern Sprint 2/3 used for SystemFeatures shape drift). Pat's curl verification
        did not explicitly check geometry value; Generator MUST verify before asserting.
    - id: "GEOROBOTIX-DEPLOYMENTS-SINGLE-ITEM"
      description: |
        GeoRobotix /deployments returns 1 item (not multiple). If Generator writes
        assertions that assume multiple items or rely on pagination, they may either
        pass trivially (non-empty check is easy with 1 item) or inadvertently scope
        assumptions about deployment structure. The deployed-system-resource assertion
        is the unique risk: if GeoRobotix's single deployment doesn't link to a system
        resource, the assertion would need to SKIP-with-reason.
      severity: medium
      mitigation: |
        Generator checks /deployments/{id} links for system-referencing rel before
        writing /req/deployment/deployed-system-resource assertion. If absent, assert
        with SKIP-with-reason ('IUT deployment does not include deployed-system-resource
        link; checking if IUT declares related conformance class'). Non-empty check (>=1
        item) passes with the single GeoRobotix deployment.
    - id: "GAP-1-CTL-PARAMETER-CHAIN-GAP"
      description: |
        The credential-leak E2E flow requires: smoke-test.sh injects auth-credential
        into the curl POST → CTL/TeamEngine receives it → Java SuiteFixtureListener
        reads it → passes to REST-Assured RequestSpec. Each link could be broken.
        The Sprint 4 defect was specifically at the bash layer (smoke-test.sh never
        read SMOKE_AUTH_CREDENTIAL). The CTL and Java layers may also need changes.
      severity: medium
      mitigation: |
        Generator reads each layer in sequence: (1) scripts/smoke-test.sh — add
        SMOKE_AUTH_CREDENTIAL reading; (2) CTL file — confirm auth-credential is
        declared as a param; (3) SuiteFixtureListener.java — confirm it reads the
        TestNG suite param; (4) CommonFixture or REST-Assured setup — confirm it
        injects into RequestSpec. Fix each gap found. Unit test covers all 4 layers.
  low:
    - id: "ADR-010-V3-SCOPE-DRIFT"
      description: |
        ADR-010 v3 amendment is listed as P2 doc-only. Risk: the amendment text
        could inadvertently modify ADR-010's architectural decisions (not just the
        empirical evidence addendum) in ways that drift from Sprint 3/4 intent.
        Architect is the authoritative author of ADR text; Generator should treat
        the amendment as a narrow addendum (3-5 sentences + Sprint 4 evidence
        citation), not a rewrite.
      severity: low
      mitigation: |
        Generator adds an "Amendment v3 (Sprint 5 close, 2026-04-29)" subsection
        to ADR-010 with: the Raze Sprint 4 sabotage live-exec evidence (total=26/
        passed=16/failed=1/skipped=9), the statement "TestNG 7.9.0 dependsOnGroups
        cascades transitively across multi-level chains — VERIFIED LIVE" (replaces
        "hypothesized" in the original text), and a forward note that Sprint 5+
        classes (Procedures, Deployments) are added to the dependency DAG using
        the same dependsOnGroups mechanism. No change to the architectural decision
        itself; amendment scope is empirical evidence only.
    - id: "QUINN-RAZE-GATE-VERIFICATION-TIME-BUDGET"
      description: |
        Sprint 5 has 6 stories + 2 new conformance classes. Gate verification
        could exceed the 30-min-per-gate budget if Quinn or Raze runs docker
        rebuild loops or attempts per-class smoke runs separately.
      severity: low
      mitigation: |
        Per evaluation_focus + evaluation_questions_for_quinn: gate run scoped via
        NO docker pull/build/run loops; ONE combined smoke run (all 6+ classes in
        one testng.xml pass); worktree-pollution mitigation v2 (SMOKE_OUTPUT_DIR)
        prevents worktree contamination. Two-class batch verification leverages
        the existing archived Sprint 4 sabotage XML plus structural lint extension
        rather than re-running full sabotage at gate time.

