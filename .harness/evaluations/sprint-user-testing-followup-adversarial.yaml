  gaps:
    - "[GAP-1] RUBRIC-6.1 APPLIED TO FEATURES-CORE ONLY — SEVEN OTHER MODULES REMAIN UNAUDITED. REQ-TEST-CITE-002 was introduced as a PROJECT-WIDE mandate ('every conformance assertion in src/engine/registry/**/*.ts that requires the presence of a specific rel=* link SHALL include an inline comment citing the normative source'), but the audit only applied it to features-core.ts. A grep of `rel=` and `foundRels.has` in src/engine/registry/ finds 7 other rel-link assertions across 6 modules, NONE carrying source citations: procedures.ts:245 (self), properties.ts:236 (self), sampling.ts:245 (self), deployments.ts:250 (self), system-features.ts:260 (self), subsystems.ts:338-342 (parent/up), subdeployments.ts:339 (parent/up). The scope of the audit was narrower than the scope of the new REQ. Either widen the audit or explicitly scope REQ-TEST-CITE-002 to features-core only. Either way, SCENARIO-FEATURES-LINKS-002's claim ('grep for `rel=` in the codebase produces zero matches where the cited source is only an informative example') is UNVERIFIED for the 7 uncited assertions — they may or may not be normatively grounded, nobody's checked."
    - "[GAP-2] existing-datastream fallback path lacks a dedicated regression test. The code at part2-crud.ts:382-384 correctly handles the case where `createdDsLocation` is null (existing-datastream path) — it still performs `GET datastreams/{dsId}` and feeds the result through the builder. The Raze prompt specifically flagged this edge case ('Edge case: what happens if ctx.discoveryCache.datastreamId is used (existing datastream path, no location header)?'). The source CODE handles it, but none of the 4 new/updated unit tests exercise this branch (all 4 set up a successful POST returning a Location header, so createdDsLocation is set). The branch is unit-test-unreachable today. Not a correctness bug, but a test-coverage gap — a future refactor could break the fallback path silently."

  scope_creep: []

  buried_caveats:
    - "[CAVEAT-1] The loosened DatastreamShapeForObservation = { [key: string]: unknown } interface means the builder will accept literally any object shape at runtime. The only validation is the resultType === 'measure' check inside the builder. A server that returns a datastream with resultType: 'measure' but a completely wrong schema.resultSchema (say, a Text schema labeled as measure) would pass through the builder and produce an observation with a numeric result, which would be wrong. Current code doesn't inspect schema.resultSchema at runtime. The builder comment acknowledges this ('Extending to Count/Text/Category requires synthesizing a matching result value') but doesn't acknowledge that the current code trusts resultType alone without cross-checking the resultSchema. Minor; not raised in the contract."

