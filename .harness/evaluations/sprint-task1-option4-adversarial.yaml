spec_gaps:
  - id: "SCENARIO-SESS-DESTRUCTIVE-001 (missing)"
    issue: "Destructive-confirm UX gate is tested but not specified. No SCENARIO-* in progress-session/spec.md describes the Given/When/Then."
  - id: "REQ-CONF-DESTRUCTIVE-BACKEND (designed, not implemented)"
    issue: "design.md describes backend HTTP 400 enforcement; src/server/routes/assessments.ts does not enforce it."
  - id: "SCENARIO-SESS-PROG-001"
    issue: "Spec requires counter/bar/class-name observations; E2E test verifies only page-load. A proper test needs to mock a slow assessment (or run against a deliberately slow IUT) so multiple progress events are observable, and assert at least two distinct progress states (e.g., 0/N then >0/N)."
  - id: "SCENARIO-RPT-TEST-001"
    issue: "Spec calls out pass/fail/skip filtering. No test clicks the filter buttons. Should be covered either by a component-level unit test (render results with mixed statuses, click filter, assert class visibility) or by an extension of TC-E2E-001."

