  - id: "RAZE-ETS11-GATE-CONCERN-001"
    severity: "LOW"
    status: "OPEN"
    title: "Default GeoRobotix smoke cannot execute positive AdvancedFiltering query paths"
    evidence: |
      GeoRobotix does not declare /conf/advanced-filtering on 2026-05-05, so all six
      AdvancedFiltering @Tests correctly SKIP in the Raze smoke report. This is honest
      and contract-compliant, but it leaves systemsFilterById, systemsFilterByKeyword,
      systemsFilterByGeomSmoke, and the local ID_List helper unexercised end-to-end
      against a declaring IUT at Gate 4.
    impact: "Residual confidence gap only; not a blocker because Sprint 11 explicitly required declaration-gated SKIP honesty for the default IUT."
    required_fix: null

