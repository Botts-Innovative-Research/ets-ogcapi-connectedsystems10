verdict_summary: |
  Sprint 5 cumulative adversarial review. The good news: 5 of 6 stories
  ship clean adversarial integrity — Procedures + Deployments mirror the
  Subsystems pattern correctly (zero new bare-throw sites; OGC canonical
  URIs all HTTP-200; geometry-null Procedures invariant is mechanically
  asserted across all 19 GeoRobotix items; deployed-system-resource
  encoding-class assertion uses graceful SKIP-with-reason fallback);
  ADR-010 v3 amendment is in-place (NOT a separate ADR-011) and
  empirically grounded in Sprint 4 Raze sabotage XML; SubsystemsTests
  javadoc 6-not-5 fix landed; SMOKE_OUTPUT_DIR override works (gate run
  proven hermetic — user worktree clean post-credential-leak + post-
  sabotage); --target=foo correctly exits 2; mvn surefire 78/0/0/3 BUILD
  SUCCESS independently verified per-class (15+1+13+8+15+8+2+5+2+9 = 78,
  skipped 1+2 = 3); two repository builds in /tmp/raze-fresh-ets05/ +
  /tmp/raze-fresh-ets05-bis/ both successful.

  Bad news: TWO HIGH-SEVERITY GAPS surfaced by deferred-to-gate live
  execs — neither caught by Generator's mvn-only verification, neither
  predicted by Quinn's 0.84 Sprint 4 prediction; both are SHIPPED-DEFECTS
  at Sprint 5 close.

  GAP-1 (HIGH, NEW Sprint 5 surfaced): the credential-leak three-fold
  cross-check live exec produces verdict FAIL because the stub-IUT log
  shows wire requests carrying `Authorization: Bear***WXYZ` (the MASKED
  form) instead of the unmasked synthetic `Bearer ABCDEFGH12345678WXYZ`.
  This is the OPPOSITE of the design.md §"Sprint 3 hardening:
  MaskingRequestLoggingFilter wrap pattern" promise that "try/finally
  guarantees the IUT receives the real credential header" — observed
  reality: 12 stub-IUT wire requests, ALL with the masked form on the
  wire. Sprint 5 S-ETS-05-01 wedge fix DOES work correctly (the
  Authorization header IS being injected into the wire — proven by
  stub-IUT seeing it; Sprint 4 GAP-1 IS structurally closed) — but in
  doing so, Sprint 5 has SURFACED a deeper Sprint 3 design defect in
  MaskingRequestLoggingFilter.filter() ordering. The mutation of
  requestSpec to masked happens BEFORE super.filter() invokes ctx.next()
  which performs the actual HTTP transmission; the finally-block restore
  runs AFTER the wire send. The unit test VerifyMaskingRequestLoggingFilter
  uses a StubFilterContext that returns null from ctx.next(...) so it
  never exercises the wire-side semantics — the unit-level guarantee is
  decorative for this aspect. The wedge fix S-ETS-05-01 ITSELF is
  mechanically correct (3-layer wiring + 8 unit tests + auth header
  visibly on wire) but the deeper E2E credential-leak verification
  (REQ-ETS-CLEANUP-011 success_criteria.credential_leak_e2e_full_pass)
  CANNOT close because the wire delivers the masked form. Quinn cumulative
  Sprint 4 `credential_leak_e2e_test_green: GAP` does NOT close in Sprint 5
  — it merely shifts cause from "missing wiring" to "filter ordering bug
  in MaskingRequestLoggingFilter".

  GAP-2 (HIGH, Sprint 5 INTRODUCED): scripts/sabotage-test.sh
  --target=systemfeatures is NON-FUNCTIONAL at the Docker build step.
  Live exec at gate (cd /tmp/raze-fresh-ets05; SABOTAGE_TMPDIR=/tmp/raze-
  sabotage-ets05 bash scripts/sabotage-test.sh --target=systemfeatures)
  produced docker build error at builder step 6/8: "COPY .git ./.git" →
  "/.git: not found". Root cause: the sabotage script's rsync at line 205
  uses --exclude='.git/' which strips .git from the temp worktree, but
  the project's Dockerfile line 59 has COPY .git ./.git as a build step
  (used for git-commit-sha pinning of the manifest per ADR-002 / Sprint
  2). The two are incompatible. The sabotage script's design intent is
  hermetic; the rsync exclude was meant to avoid committing .git into
  Docker layers, but Dockerfile assumes .git presence for the cache-key
  step. Result: cascade verification cannot be exercised at gate; the
  Sprint 5 success_criterion `dependency_skip_cascade_three_class_verified`
  is unverified at live-exec layer. Generator's claim "live exec deferred
  to gate per Sprint 5 mitigation pattern" papers over the fact that
  the deferred exec, when actually run, fails. The sabotage marker DID
  inject correctly (grep-verified in temp tree); the worktree-pollution
  guard DID work (user worktree at ~/docker/gir/ets-ogcapi-
  connectedsystems10/ remains clean post-run); ONLY the Docker rebuild
  fails. Sprint 5 success_criterion `procedures_dependency_skip_verified`
  + `deployments_dependency_skip_verified` cannot be live-exec verified
  through the new sabotage flag (the very tool S-ETS-05-03 was meant to
  provide for this purpose).

  Net Sprint 5 score: 0.74 (down -0.10 from Sprint 4 cumulative 0.84).
  Verdict GAPS_FOUND: 4 of 6 Sprint 5 success_criteria materially fail
  live verification despite all mvn-level structural lint passing. Sprint
  6 carryover MUST close (a) MaskingRequestLoggingFilter ordering defect
  (real production bug; carries Sprint 3 → Sprint 5 silent-pass history),
