  Sprint 8 inherits Sprint 5+6+7 SMOKE_OUTPUT_DIR mitigation. Gate runs MUST use:
  - SMOKE_OUTPUT_DIR=/tmp/<role>-fresh-sprint8/test-results/
  - SABOTAGE_TMPDIR=/tmp/<role>-sabotage-sprint8/
  - /tmp/ clones: git clone <repo> /tmp/<role>-fresh-sprint8/
  - SMOKE_AUTH_CREDENTIAL from environment (not committed to disk)

  Sprint 8 gate briefings MUST explicitly forbid:
    - Running smoke or docker against ~/docker/gir/ets-ogcapi-connectedsystems10/
    - Modifying ANY file in ~/docker/gir/ets-ogcapi-connectedsystems10/ worktree
    - Writing test results to ~/docker/gir/csapi_compliance/ops/test-results/ at gate time

handoff_to_generator:
  next_agent: "generator"
  rationale: |
    Sprint 8 routes DIRECTLY to Generator. No Architect cycle required:
    (1) Wedge fixes: all fix surfaces precisely bounded (sabotage stdout bash edit, doc edits, pom.xml pin,
        new bash wrapper script). No new architecture decisions.
    (2) Subdeployments: mechanical ADR-010 v3 pattern extension per SubsystemsTests/DeploymentsTests.
        No new architectural decisions. Pattern proven 5 times (Subsystems Sprint 4, Procedures Sprint 5,
        Deployments Sprint 5, SamplingFeatures Sprint 7, PropertyDefinitions Sprint 7).
    (3) mvn-test-via-docker.sh: simple Docker wrapper ~20-30 LOC; no ADR needed.

    Architect escalation trigger:
    - If Generator discovers that /conf/subdeployments requires new SKIP semantics beyond
      @BeforeClass SkipException + group depends-on. Probability: very low.
    - If Generator discovers that GeoRobotix requires Subdeployments to depend on a class
      other than Deployments. Probability: essentially zero (OGC spec is clear on parent→child).

  generator_sequencing: |
    Pat's recommended Generator sequence for Sprint 8 (dependency-aware):
    1. S-ETS-08-01 (P1/S carryover wedges) — FIRST. All wedges before new class.
       Within S-ETS-08-01 order:
         a. Wedge 4 (ops/test-results.md — doc-only, fastest)
         b. Wedge 2 (spec.md REQ-018 + ADR-010 v4 — doc-only)
         c. Wedge 3 (project-wide grep — run grep, review hits, annotate, archive grep output)
         d. Wedge 5 (spring-javaformat pin — pom.xml + mvn help:effective-pom verify)
         e. Wedge 6 (mvn-test-via-docker.sh — create script, test from /tmp clone)
         f. Wedge 1 (sabotage stdout fix — requires Docker build; last because longest)
         g. Verify: run sabotage-test.sh from /tmp clone; archive stdout transcript showing 5-class summary
    2. S-ETS-08-02 (P0/M Subdeployments) — SECOND.
       a. curl-verify GeoRobotix /deployments/16sp744ch58g/subdeployments + /conformance
       b. HTTP-200-verify OGC /req/subdeployment/ .adoc files
       c. Create conformance/subdeployments/SubdeploymentsTests.java
       d. Extend testng.xml + VerifyTestNGSuiteDependency
       e. Run mvn-test-via-docker.sh; verify lint tests pass
       f. Run smoke-test.sh from /tmp clone; verify no regression + new subdeployments @Tests appear
    Total est Generator wall-clock: 2.5-3.5h
