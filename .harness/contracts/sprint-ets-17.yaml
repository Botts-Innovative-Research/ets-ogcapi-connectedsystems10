type: "feature-expansion"
created: "2026-05-06T23:38:16Z"
description: |
  Sprint 17 extends the existing GeoJSON and SensorML encoding requirements
  rather than adding a new Part 1 conformance class. It targets the shared
  read-only relation-types subrequirement: when an association is encoded in
  a JSON `links` member, the link relation type must be the association name.

