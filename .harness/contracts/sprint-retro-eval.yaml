# Retroactive Evaluation Sprint Contract
# This contract covers the FULL v1.0 implementation for retroactive quality evaluation.
# All 9 epics and 39 stories are in scope.
# Purpose: First-ever evaluator invocation against the complete codebase.

sprint: "retro-eval"
type: "retroactive-evaluation"
description: |
  Full retroactive evaluation of the v1.0 implementation.
  All code was written in Sprints 1-6 (March 30-31, 2026) without any evaluator
  gate checks. This contract exists so the evaluator can independently assess
  the entire implementation against the specs.

  Known issues already found during user testing (April 2, 2026):
  - .js import extensions broke Next.js webpack (fixed)
  - POST /api/assessments response shape mismatch with client (fixed)
  - registerAllModules() never called - 0 tests ran (fixed)
  - new URL('/path', baseUrl) discarded base path - 67 calls (fixed)
  - Results page filters operated at class level not test level (fixed)
  - SSE reconnection gave dead-end error (fixed)
  - Skip reasons not displayed in results (fixed)

