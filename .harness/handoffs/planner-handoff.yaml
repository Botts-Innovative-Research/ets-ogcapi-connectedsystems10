      AdvancedFiltering is the only remaining non-mutation Part 1 requirement class. It can be
      advanced with read-only query checks and declaration-gated SKIP behavior, while create-replace-delete
      and update remain deferred until a write-safety/IUT policy exists.
    alternatives_rejected:
      - create_replace_delete: "Mutation-side class; requires explicit write target, cleanup, and shared-IUT safety policy."
