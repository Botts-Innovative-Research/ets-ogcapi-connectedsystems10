description: |
  Sprint 34 configures a local OSH tasking-capable driver fixture to unblock
  REQ-ETS-PART2-013 populated Command binding closure. Sprint 33 showed that a
  manually created ControlStream is insufficient because OSH waits for a
  receiving module acknowledgement. The selected path is the sibling Sapient OSH
  driver plus a local SAPIENT TCP peer that can register LOOK_AT tasking support
  and reply with TaskAck terminal status.

