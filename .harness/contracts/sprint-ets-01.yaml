# Sprint 1 contract — ETS smallest vertical slice
# Generated by Planner (Pat) 2026-04-27 from product-brief v2.0 + PRD v2.0 + capability spec v1.0.
# This is the FIRST sprint after the user pivot from Next.js web app to Java/TestNG TeamEngine ETS.

sprint: "ets-01"
sprint_name: "scaffold-plus-csapi-core-plus-teamengine-smoke"
type: "vertical-slice-foundation"
created: "2026-04-27T21:50:00Z"
description: |
  The smallest end-to-end vertical slice that proves the new ETS architecture works.
  Three stories wire together: (1) generate the Maven scaffold and prove it builds
  green on JDK 17, (2) implement the first conformance class (CS API Core) with at
  least one TestNG @Test per ATS assertion, (3) integrate the ETS into TeamEngine
  5.5 via SPI + CTL + Docker and run a smoke test against the GeoRobotix demo
  server. If all three land green, Sprint 1 succeeds and the pattern extends to
  the remaining 13 Part 1 conformance classes (post-Sprint-1 work).

  This sprint explicitly EXCLUDES Part 2 work per user gate 2026-04-27 ("Part 1
  first, Part 2 follows"). Any Part 2 work that creeps in is a contract violation
  and must be rejected by Quinn / Raze.

upstream_inputs:
  - "_bmad/product-brief.md (v2.0)"
  - "_bmad/prd.md (v2.0)"
  - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md (v1.0)"
  - ".harness/handoffs/discovery-handoff.yaml (Mary 2026-04-27)"
  - ".harness/handoffs/planner-handoff.yaml (Pat 2026-04-27)"

new_repo:
  url: "github.com/<our-org>/ets-ogcapi-connectedsystems10"
  layout_reference: "github.com/opengeospatial/ets-ogcapi-features10"
  archetype: "org.opengis.cite:ets-archetype-testng:2.7"
  build: "JDK 17 + Maven 3.9 + TestNG + REST Assured + Kaizen openapi-parser + ets-common:17"

stories:
  - id: "S-ETS-01-01"
    title: "Generate archetype, modernize to JDK 17, first green build"
    file: "epics/stories/s-ets-01-01-archetype-jdk17-build.md"
    epic: "epic-ets-01-scaffold"
    priority: "P0"
    complexity: "M"
    depends_on: []

  - id: "S-ETS-01-02"
    title: "Implement CS API Core conformance class end-to-end against GeoRobotix"
    file: "epics/stories/s-ets-01-02-csapi-core-conformance-class.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"
    complexity: "M"
    depends_on: ["S-ETS-01-01"]

  - id: "S-ETS-01-03"
    title: "TeamEngine 5.6.x (currently 5.6.1) Docker smoke test runs Core suite against GeoRobotix"
    file: "epics/stories/s-ets-01-03-teamengine-docker-smoke.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P0"
    complexity: "M"
    depends_on: ["S-ETS-01-01", "S-ETS-01-02"]

