stories:
  - id: "S-ETS-05-01"
    title: "GAP-1 wedge fix: wire SMOKE_AUTH_CREDENTIAL through smoke-test.sh → CTL → Java → REST-Assured header"
    file: "epics/stories/s-ets-05-01-credential-leak-wiring-fix.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P0"
    complexity: "M"
    depends_on: []
    parallelizable: false  # foundational; smoke-test.sh changes affect subsequent smoke runs
    rationale: |
      Sprint 4 GAP-1 (cross-corroborated Quinn + Raze): SMOKE_AUTH_CREDENTIAL env var
      set by scripts/credential-leak-e2e-test.sh:118 is NEVER read by scripts/smoke-test.sh.
      The synthetic credential never enters the REST-Assured request chain; MaskingRequest
      LoggingFilter is never exercised. Three-fold cross-check prong (a) PASSES by accident
      (zero leak hits because zero credential ever transmitted); prongs (b)+(c) FAIL.
      Fix: (1) ~5 LOC bash: smoke-test.sh reads SMOKE_AUTH_CREDENTIAL env and injects
      as `auth-credential` TestNG suite parameter via the existing curl POST
      `--data-urlencode` call to /suite/.../run; (2) ~30-50 LOC Java: CommonFixture or
      new AuthFixture reads the suite param and injects into REST-Assured RequestSpec
      via existing MaskingRequestLoggingFilter ordering (per ADR-010 + design.md §529);
      (3) ~10-15 LOC Java: new VerifyAuthCredentialPropagation unit test; (4) re-run
      Raze's live-exec (or Quinn's equivalent) to verify three-fold cross-check
      (b)>=1 masked-form hits + (c)>=1 unmasked-credential hits at stub-IUT.
      Closes S-ETS-04-03 PARTIAL → PASS. Acceptance criterion: bash scripts/credential-
      leak-e2e-test.sh exits 0 with three-fold (a) PASS + (b)>=1 + (c)>=1.

  - id: "S-ETS-05-02"
    title: "Worktree-pollution mitigation v2: SMOKE_OUTPUT_DIR override in smoke-test.sh"
    file: "epics/stories/s-ets-05-02-smoke-output-dir-override.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"
    complexity: "S"
    depends_on: ["S-ETS-05-01"]  # both touch smoke-test.sh; sequence after GAP-1 fix
    parallelizable: false
    rationale: |
      Quinn GAP-2 (Sprint 4 gate run): smoke-test.sh wrote to ops/test-results/s-ets-01-03-
      teamengine-smoke-2026-04-29.xml in the user's worktree, violating the contract's
      worktree_pollution_constraint (Sprint 2 incident pattern recurred). Fix: add
      SMOKE_OUTPUT_DIR env var override to smoke-test.sh; when set, smoke-test.sh writes
      TestNG XML artifacts to ${SMOKE_OUTPUT_DIR} instead of ops/test-results/. Gate
      briefings use SMOKE_OUTPUT_DIR=/tmp/<role>-fresh-<sprint>/test-results/ so the
      user's worktree is never touched. Default (when unset) preserves existing behavior
      for normal developer runs. ~10 LOC bash. No Java changes required.

  - id: "S-ETS-05-03"
    title: "sabotage-test.sh --target=systemfeatures mode (native flag for gate invocation)"
    file: "epics/stories/s-ets-05-03-sabotage-target-flag.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P2"
    complexity: "S"
    depends_on: []
    parallelizable: true
    rationale: |
      Sprint 4 Raze carryover: the sabotage-test.sh script only supports in-place Java
      editing (modify SystemFeaturesTests.java directly). Quinn invoked it without Java
      edits (used the archived sabotage XML); Raze modified SystemFeaturesTests in-place.
      A native --target=<class> flag would let Quinn invoke sabotage hermetically without
      Java edits — sabotage script would either (a) patch the target class at a temp path
      and run smoke, or (b) accept a pre-sabotaged WAR path. Pat recommends approach (a):
      --target=systemfeatures causes the script to unconditionally fail the first @Test
      in the target class via a temp-patched copy (sed or Java source patch) and run
      smoke; restores after. ~30-50 LOC bash. Architect confirms no structural concern
      (this is a pure test-infrastructure improvement with no impact on conformance code).

  - id: "S-ETS-05-04"
    title: "SubsystemsTests javadoc fix + ADR-010 v3 amendment (doc-only)"
    file: "epics/stories/s-ets-05-04-doc-javadoc-adr010-v3.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P2"
    complexity: "S"
    depends_on: []
    parallelizable: true
    rationale: |
      Two bundled doc-only items:
      (1) Raze CONCERN-1: SubsystemsTests.java javadoc enumerates 5 .adoc files but
          independent listing shows 6 (req_recursive_param, req_recursive_search_
          subsystems, req_recursive_search_systems, req_subcollection, req_subcollection_
          time, requirements_class_system_components). Doc enumeration should list 6 not 5;
          also clarify the subcollection_time vs recursive-assoc confusion noted by Raze.
          ~5 LOC javadoc only.
      (2) Raze recommendation: ADR-010 v3 amendment recording TestNG 7.9.0 transitive
          cascade VERIFIED LIVE (Sprint 4 Raze sabotage live-exec 2026-04-29T16:40Z;
          total=26/passed=16/failed=1/skipped=9 pattern confirmed two-level cascade
          fires: Subsystems→SystemFeatures→Core). ADR-010 currently says "hypothesized"
          for the cascade behavior; it should now say "VERIFIED LIVE at Sprint 4 close".
          ~10-20 LOC ADR amendment.
      Bundle as a single S story (2 file edits, no Java behavior changes).

  - id: "S-ETS-05-05"
    title: "Implement CS API Procedures (/conf/procedure-features) conformance class end-to-end against GeoRobotix"
    file: "epics/stories/s-ets-05-05-procedures-conformance-class.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"
    complexity: "M"
