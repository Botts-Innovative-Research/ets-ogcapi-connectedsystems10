        - Build 2 (rm -rf target; mvn clean install -DskipTests):
            b1ffdc8eeed0dd777af243e0c77812391c60468c17979405dca320de9d20f680
        - Build 3 (mvn clean install -DskipTests, third invocation):
            b1ffdc8eeed0dd777af243e0c77812391c60468c17979405dca320de9d20f680
        - User worktree (existing target/, NOT cleaned) before this run:
            c4a8029440a31a588308008fee7dc165b11207b02faae51d4f1c78b2bfc0b57a
        - User worktree, after `rm -rf target && mvn clean install -DskipTests`:
            b1ffdc8eeed0dd777af243e0c77812391c60468c17979405dca320de9d20f680
            (matches fresh clone — reproducibility confirmed)

      Diagnosis: the stale c4a8029 jar in the user worktree was from an earlier HEAD
      (likely b249aa1 or earlier — committed BEFORE the smoke-test artifact landed at
      ea2c91f). Dana captured `sha256sum target/*.jar` without first running
      `mvn clean install`, so she got the cached pre-ea2c91f artifact. Same class of
      honesty-issue as S-ETS-01-01 GAP-1 (Dana's `5021b1d3` was also a wrong number
