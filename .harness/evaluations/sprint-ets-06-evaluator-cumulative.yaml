# ---------- CONCERNs ----------

concerns:
  - id: CONCERN-Q1-DOCKER-LOG-TIMING-RACE-EDGE
    severity: low
    description: |
      The smoke-test.sh container-log capture timing fix (line 215, BEFORE die() triggers)
      depends on docker logs returning content SYNCHRONOUSLY before the container is removed.
      In edge cases (e.g. log-rotation race; container crash before step 7 reaches line 215),
      the capture may still produce empty content. In my actual run the capture was
      non-vacuous (235 lines, 12 masked hits) so the fix worked, but I cannot rule out
      flakiness in other environments.
    sprint_6_disposition: "Acceptable; the fix is structurally correct."

  - id: CONCERN-Q2-CONTAINER-LOG-RUN-DEFERRED
    severity: low
    description: |
      The credential-leak-e2e-test.sh script run produced container.log = 1 line ("Error
      response from daemon: No such container") because the smoke-test.sh die()/cleanup
      sequence removed the container before the credential-leak script's docker logs call.
      Generator's confidence note (lines 187-191 of generator-handoff.yaml) anticipated this:
      "the container-log timing fix may still produce empty content if the actual log
      content is on stderr rather than stdout (the docker logs command captures both, but
      if there's a log-rotation race, the capture may still be incomplete). Both are
      addressable at gate time without re-spinning Generator." Quinn confirms: structural
      code is correct; orchestration script bug is the issue (GAP-Q1).
    sprint_6_disposition: "Sprint 7 carryover follow-up; not blocking Sprint 6 close."

