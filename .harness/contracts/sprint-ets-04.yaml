handoff_to_generator:
  next_agent: "architect"
  rationale: |
    Architect (Alex) MUST land before Generator (Dana) for 3 deferred decisions
    that gate Sprint 4 execution:

    1. **ADR-009 v2 amendment vs new ADR-011 superseding** (S-ETS-04-02) —
       Architect picks: (a) in-place ADR-009 amendment (Pat's hypothesis;
       single-decision update with Sprint 3 empirical falsification + Sprint 4
       chown-layer rationale; analogous to Sprint 2 CredentialMaskingFilter
       NO-ADR precedent + ADR-001 cross-reference amendment for ADR-007); (b)
       new ADR-011 superseding ADR-009 (more invasive; appropriate if Architect
       judges the chown-layer attack + post-empirical-falsification roadmap
       qualifies as a substantive new architectural decision rather than an
       amendment). Pat recommends (a). Architect ratifies, then writes the
       ADR text (Pat does not author ADR content).

    2. **Two-level dependency-skip cascade strategy** (S-ETS-04-05) —
       Architect picks: (a) extend testng.xml single-block consolidation with
       `<group name="subsystems" depends-on="systemfeatures"/>` and rely on
       TestNG's transitive cascade (Pat's hypothesis; cleanest if TestNG
       actually cascades transitively); (b) BeforeSuite SkipException pattern
       per design.md "Sprint 3+ migration path" (more reliable but heavier
       refactor; required if TestNG doesn't cascade cleanly); (c) BOTH
       (defense-in-depth — start with (a) and add (b) as fallback if test
       fails). Architect ratifies based on TestNG documentation + a quick
       test in a /tmp/ scratch project. Generator implements per Architect's
       ratification.

    3. **Deeper E2E credential-leak smoke approach** (S-ETS-04-03) —
       Architect picks: (a) stub IUT in /tmp/ per Sprint 3 sabotage-script
       pattern (Pat recommends; composable with S-ETS-04-04 sabotage-script
       bug fixes; hermetic); (b) pivot to a different IUT that requires auth
       (lower hermeticity; depends on external IUT availability); (c)
       extended unit-layer verification (lower architectural ambition;
       falls back to unit-test-layer if both stub and alternative IUT
       unavailable). Architect ratifies; Generator executes.

    Architect ALSO surfaces: (a) whether the Sprint 4 chown-layer attack
    warrants a quick scratch-rebuild verification BEFORE Generator commits
    (Pat suggests yes — Architect does a 5-min scratch rebuild to verify the
    chown-layer attack actually materializes the predicted ~80MB savings;
    if it doesn't, Architect surfaces an alternative attack vector before
    Generator wastes time); (b) Subsystems conformance class coverage scope
    (Sprint-1-style minimal — 4 @Tests covering 4 highest-priority OGC 23-001
    Annex A `/conf/subsystem/` ATS items — vs full coverage; Pat recommends
    Sprint-1-style for risk control on third pattern extension AND first
    two-level dependency chain); (c) testng.xml strategy for Subsystems
    (extend single-block since Sprint 4 is still ≤4 conformance classes;
    Sprint 5+ needs the BeforeSuite SkipException migration when 5+ classes
    need it).

    Architect produces an updated architect-handoff.yaml with `next_agent:
    generator` (or revised `next_agent: planner` if any of the 3 decisions
    surface a Sprint 4 contract rewrite — Pat's hypothesis is no rewrite
    needed; the 3 decisions are scoped to specific story acceptance criteria
    and don't change the contract surface). Once Architect lands, Generator
    implements all 5 stories in dependency order.

    Generator may sequence: S-ETS-04-04 (sabotage-script bug fixes, mechanical
    + prerequisite for S-ETS-04-03 stub-IUT path) → S-ETS-04-01 (CI workflow
    git mv if user-action complete; else immediately formal-drop with
    documented rationale) → S-ETS-04-03 (credential-leak E2E using fixed
    sabotage-script primitives) → S-ETS-04-02 (chown-layer attack; touches
    Dockerfile; sequence after Java + script work to preserve smoke baseline)
    → S-ETS-04-05 (Subsystems new feature; new conformance class +
    two-level dependency wiring + cascade verification). Total est wall-clock:
    8-12h Generator time (comparable to Sprint 3's effective ~50min cumulative
    distributed across 3 Generator runs — Sprint 4 has 5 stories vs Sprint 3's
    7, but more intricate per-story; per-class new-feature effort for
    Subsystems is ~30-40% the cost of S-ETS-01-02 since architectural pattern
    is now well-established AND ETSAssert + URI canonicalization + multi-stage
    Dockerfile + CredentialMaskingFilter + MaskingRequestLoggingFilter are all
    in place from Sprint 1+2+3).

