verdict_policy:
  declaration_gate:
    - "If /conf/system-event is not declared, all System Events conformance assertions SKIP with a precise reason."
    - "Do not infer /conf/system-event PASS from sibling /conf/system-history, /conf/datastream, /conf/controlstream, or /conf/json declarations."
  prerequisite:
    - "Keep /req/api-common and Part 1 /req/system prerequisite handling visible and honest."
    - "Do not report full /conf/system-event closure when /conf/api-common cannot be established."
  endpoint_honesty:
    - "Requirement 42 canonical endpoint PASS requires /systemEvents evidence."
    - "Requirement 43 system-reference endpoint PASS uses normative /systems/{sysId}/events."
    - "Annex A.43 /systems/{sysId}/systemEvents is diagnostic only unless a standards-backed correction is documented."
    - "GeoRobotix HTTP 400 streaming-only responses are not JSON resources-endpoint PASS evidence."
  resource_evidence:
    - "Canonical URL PASS requires actual SystemEvent resource evidence."
    - "Empty or absent SystemEvent resources produce SKIP, not PASS."
    - "SystemEvent collections are optional unless itemType SystemEvent is advertised."

