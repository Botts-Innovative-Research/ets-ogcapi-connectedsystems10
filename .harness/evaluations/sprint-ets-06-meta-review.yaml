severity_calibration_check:
  raze_high_gap_1_sabotage_javac:
    raze_severity: HIGH
    meta_severity: HIGH (CONFIRMED)
    rationale: |
      HIGH is correctly calibrated. This GAP falsifies a primary Sprint 6
      success criterion (sabotage_target_flag_works_fully + cascade_three_
      class_verified — both PASS_DEFERRED in Quinn's verdict, FAIL in
      Raze's). The cascade XML cannot be produced; ADR-010 v3's 3-class
      forward-extends claim is unverified live. Third-corroboration
      reproduced (this meta-review) — exact error message
      `SystemFeaturesTests.java:[210,17] unreachable statement` reproduces
      deterministically. The fix surface is small (~5-10 LOC python in
      sabotage-test.sh line 232 — replace bare `throw new AssertionError(...)`
      with `if (true) throw new AssertionError(...)` to defeat javac
      reachability analysis, OR use try/catch wrapper, OR replace the method
      body entirely). Should NOT shift higher than HIGH (HIGHEST would
      imply project-blocking; the headline GAP-1' is closed and Sprint 7
      can ship Sampling+Properties without this fix).
    fix_simpler_than_raze_suggests: |
      Raze suggests three options. The simplest is `if (true) throw new
      AssertionError("SABOTAGED ...");` — this is the standard Java idiom
      for injecting unreachable-then-reachable code; javac's reachability
      analysis treats `if (constant-expression)` as reachable in both
      branches (JLS §14.21 — "A switch statement... an if statement
      where the condition is a constant expression"). My quick test
      (sabotage script line 231 patches the python to inject `if (true)
      throw new AssertionError(...);` instead of bare `throw new
      AssertionError(...);`) — this would pass javac reachability AND
      preserve the sabotage semantics (test still throws when invoked).
      ~1-3 LOC python edit.
  raze_medium_gap_2_req017_status_overconfident:
    raze_severity: MEDIUM
    meta_severity: HIGH (RECALIBRATE +1)
    rationale: |
      Recalibrate UP from MEDIUM to HIGH. spec.md REQ-ETS-CLEANUP-017 line
      345 declares status `IMPLEMENTED` with the rationale "live cascade
      verification deferred to Raze adversarial sabotage exec at Sprint 6
      gate". Raze's live exec FAILED. Per the spec-anchored development
      discipline, status should be `STRUCTURAL-IMPLEMENTED-LIVE-EXEC-
      FAILED` or similar. This is the SAME class of defect that meta-Raze
      Sprint 5 M-3 flagged: status-honesty matters because future agents
      reading the close cannot tell that REQ-017's live-acceptance is
      open. The structural implication is more serious than MEDIUM
      suggests — REQ-017 is the load-bearing requirement for ADR-010 v3's
      3-class cascade verification claim.
    proposed_status_text: |
      Recommend Sprint 7 carryover or fast-follow patch: change spec.md
      line 345 from "Status: IMPLEMENTED" to "Status: STRUCTURAL-
      IMPLEMENTED-LIVE-EXEC-FAILED (Sprint 6 close 2026-04-30; structural
      .git fix landed sister c25e44a..c17a534; live cascade unverified
      because Sprint 5 sabotage-marker injection produces javac
      unreachable-statement compile error — Sprint 5 GAP-2 .git-exclude
      previously masked this latent bug; cross-reference Raze HIGH GAP-1
      sprint-ets-06-adversarial-cumulative.yaml + meta-review meta_gap_
      M-2)."
  raze_medium_gap_3_pipefail_unreachable:
    raze_severity: MEDIUM
    meta_severity: MEDIUM (CONFIRMED)
    rationale: |
      MEDIUM is correctly calibrated. Independent bash test confirmed:
      under `set -eo pipefail`, `LATEST_REPORT="$(ls -t glob-no-match
      2>/dev/null | head -1)"` exits the script with code 2 when ls
      returns non-zero (no glob match). This kills the script before
      lines 289-298 can fire. The disambiguation log message Sprint 6
      added doesn't fire in the actual Docker-build-failure case it was
      designed to handle. This is a real defect with real impact (the
      script's reported failure mode is misleading) but it doesn't
      block Sprint 6 close — the underlying cascade is broken anyway
      (HIGH GAP-1), so the disambiguation doesn't matter until GAP-1
      is fixed. Fix surface ~3 LOC bash (use `compgen -G` or wrap with
      `set +o pipefail` / `set -o pipefail`).
  raze_low_gap_4_aio_jar_reproducibility:
    raze_severity: LOW
    meta_severity: LOW (CONFIRMED)
    rationale: |
      LOW is correctly calibrated. The byte-identical jar invariant is a
      project-wide success criterion; the SNAPSHOT jar matched md5
      across two clones. The aio jar (39MB) was not compared. This is a
      test-of-the-test concern; not blocking.
  quinn_medium_gap_q1_prong_b_misdirected:
    quinn_severity: MEDIUM
    meta_severity: MEDIUM (CONFIRMED) |
      MEDIUM is correctly calibrated. Quinn correctly noted the script-
      failure-vs-structural-fix ASYMMETRY: the underlying GAP-1' is
      closed at the wire layer (third-corroborated), but the orchestration
      script returns FAIL exit 1 because prong-(b) grep targets the wrong
      file. Raising this to HIGH would conflate "script reports wrong
      verdict" with "structural fix incorrect" — Quinn correctly avoided
      that conflation. The fix is ~3-5 LOC bash. Sprint 7 carryover.
  quinn_low_gap_q2_stub_log_grep_no_op:
    quinn_severity: LOW
    meta_severity: LOW (CONFIRMED)
    rationale: |
      LOW is correctly calibrated. Cosmetic; should be removed or
      redirected when GAP-Q1 is fixed. Bundle into the GAP-Q1 fix.
  net_calibration_outcome: |
    Raze MEDIUM GAP-2 should shift to HIGH. All other severities are
    correctly calibrated. Net Raze score should remain 0.78 because the
    severity recalibration is offset by the third-corroboration of HIGH
    GAP-1 (which strengthens the GAP) and the simpler-fix observation
    (which weakens it slightly). Net effect on cumulative gate close:
    no score change recommended; status-honesty in spec.md REQ-017 is
    the practical action item.

