findings:
  - id: RAZE-S41-READINESS-001
    severity: high
    title: "Primary local OSH TeamEngine 6 E2E remains unclosed"
    status: open_expected_blocker
    evidence:
      - "ops/test-results/sprint-ets-41-readiness-local-osh-e2e-2026-07-21.txt records docker networking failure: network field-hub_default not found."
      - "ops/status.md, ops/test-results.md, _bmad/traceability.md, the story, and sprint contract correctly keep Sprint 41 incomplete."
      - "No current artifact contains primary local OSH TestNG totals or local-OSH no-mutation evidence for Sprint 41."
    impact: "Sprint 41 cannot be closed or represented as ready-for-release conformance proof until a real local OSH IUT run completes through TeamEngine 6."
    required_fix: "Restore or replace the real field-hub OSH stack, network, container, seed state, and credential source; rerun scripts/smoke-test.sh from a clean /tmp clone with output outside the worktree; archive exact TestNG totals and no-mutation evidence."
  - id: RAZE-S41-READINESS-002
    severity: medium
    title: "ops/server.md mixes absent field-hub status with active-looking restored-stack instructions"
    status: open_doc_consistency_gap
    evidence:
      - "ops/server.md states the historical field-hub path and field-hub_default network were absent on 2026-07-21 and must be restored before claiming primary local OSH E2E."
      - "The same section then states 'The OSH service container is field-hub-osh-1' and gives runnable full-health commands, which can be read as current-state guidance rather than restore-time guidance."
    impact: "A future operator may misread the runbook and assume the local OSH container/credentials already exist, repeating the blocked smoke attempt."
    required_fix: "Rewrite the post-absence local OSH section as conditional restore guidance, for example 'When restored, the expected service container is ...', and identify the credential source or explicitly require user-provided credentials."
  - id: RAZE-S41-READINESS-003
    severity: low
    title: "Architecture still has a historical PLANNED sentence that names already-archived runtime gates"
    status: open_editorial_consistency_gap
    evidence:
      - "_bmad/architecture.md v2.0.8 top matter and sections 2/20.4 correctly say Maven, image build, runtime verifier, Compose health, and suite registration are archived while local OSH E2E remains incomplete."
      - "_bmad/architecture.md section 19 still says the migration remains PLANNED until Maven verification, image build, filesystem checks, startup, health, SPI/CTL registration, linkage inspection, and full local OSH execution are archived."
    impact: "This is an underclaim, not an overclaim, but it creates ambiguity about which TeamEngine 6 gates remain open."
    required_fix: "Qualify the section 19 sentence as 2026-07-20 planning context or update it to say the non-IUT runtime gates are archived and only primary local OSH E2E remains."
  - id: RAZE-S41-READINESS-004
    severity: low
    title: "Story labels the earlier policy-guidance Maven artifact as Final while later readiness Maven supersedes it"
    status: open_editorial_consistency_gap
    evidence:
      - "epics/stories/s-ets-41-01-teamengine-6-runtime-migration.md acceptance criterion 56 says 'Final Docker Maven verification' and points at sprint-ets-41-policy-guidance-maven-2026-07-21.txt."
      - "The same story later records the readiness Maven artifact sprint-ets-41-readiness-maven-2026-07-21.txt with the same 303/0/0/3 totals."
      - "ops/test-results.md correctly names the readiness artifact as the current latest artifact."
    impact: "No false pass is created, but the duplicate 'final' label weakens traceability to the actual latest gate evidence."
    required_fix: "Change the story acceptance criterion to point at the readiness Maven artifact as latest, or label the policy-guidance artifact as earlier post-policy evidence."
  - id: RAZE-S41-READINESS-005
    severity: low
    title: "Older retained generator handoff block still says final Maven was not run"
    status: open_handoff_staleness
    evidence:
      - ".harness/handoffs/generator-handoff.yaml starts with a 13:05Z block that correctly records full Maven PASS 303/0/0/3 and local OSH blocked."
      - "A lower retained 05:35Z block still has final_maven: NOT_RUN_INFRASTRUCTURE and next action 'Run final Maven...'."
    impact: "The latest block is first and correct, so this is not a current overclaim. It can still mislead context-reset agents that scan older blocks."
    required_fix: "Mark the older block as superseded by the 13:05Z readiness handoff, or update its final_maven note to point to the later readiness artifact."
