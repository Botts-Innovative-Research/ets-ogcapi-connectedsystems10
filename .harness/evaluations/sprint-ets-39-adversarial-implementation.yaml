concerns:
  - id: RAZE-ETS39-CONCERN-001
    severity: medium
    summary: REQ-ETS-SYNC-001 is still only report-first and must not be promoted as CI closure.
    details: >
      The current `scripts/uri-drift-audit.py` scans all Java source for Connected Systems URI strings, while
      FR-ETS-90 in `_bmad/prd.md` still requires comparison against Java `@Test` description attributes for the
      future CI-failing closure. This is acceptable for Sprint 39 because OpenSpec, traceability, story, contract,
      ops status, and test-results all label the drift result as report-only with unallowlisted drift still present.
      Future closure must either narrow extraction to `@Test` descriptions or explicitly revise FR-ETS-90 with rationale.
  - id: RAZE-ETS39-CONCERN-002
    severity: low
    summary: The archived clean-local-OSH hygiene JSON records `/tmp` source paths.
    details: >
      `ops/test-results/sprint-ets-39-artifact-hygiene-clean-local-osh-2026-06-03.json` points at the original
      `/tmp/ets-ogcapi-connectedsystems10-s39-clean-local-osh-results/...` XML/log paths. The archived copies under
      `ops/test-results/` exist and hash-match the `/tmp` files, so the evidence is durable enough for this review.
      Regenerating future hygiene JSON against archived paths would make the artifact self-contained.
  - id: RAZE-ETS39-CONCERN-003
    severity: low
    summary: Credential scans do not record whether explicit secret inputs were supplied.
    details: >
      The hygiene tool intentionally avoids printing supplied secret values, but the JSON only reports
      `explicitSecretValueHits`; it does not record a non-sensitive `explicitSecretInputsProvided` count. That makes
      archived zero-hit evidence less auditable. Reviewer reran a current-local-OSH-secret scan against the Sprint 39
      clean XML/log without printing the secret and observed zero hits.
  - id: RAZE-ETS39-CONCERN-004
    severity: low
    summary: The drift artifact does not record sibling web-app commit or dirty-state metadata.
    details: >
      The audit inputs correctly point at `/home/nh/docker/gir/csapi_compliance/src/engine/registry` and
      `/home/nh/docker/gir/csapi_compliance/schemas`, and schema counts match `126/126`. Reviewer observed the sibling
      repo at commit `1568f36` with unrelated dirty files outside the scanned registry/schema targets. Recording commit
      and dirty-state metadata in the JSON would strengthen reproducibility.
