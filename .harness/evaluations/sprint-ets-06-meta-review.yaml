gap_corroboration_assessment:
  quinn_gap_q1:
    script: scripts/credential-leak-e2e-test.sh
    line: 127
    failure_mode: "Script greps $ARCHIVE_DIR/container.log (which is empty post-teardown stub) instead of smoke-test.sh's archived $SMOKE_OUTPUT_DIR/s-ets-01-03-teamengine-container-*.log (where the masked form actually lands). Prong (b) returns 0 hits despite the structural fix being correct."
    severity: medium
    surface_type: "wrong-target grep (control-flow runs to completion; produces incorrect verdict)"
  raze_gap_3:
    script: scripts/sabotage-test.sh
    line: 288
    failure_mode: "LATEST_REPORT pipeline assignment under `set -eo pipefail` exits the script with code 2 when the glob doesn't match, BEFORE reaching the disambiguation block at lines 289-298. The very feature Sprint 6 added (honest log message disambiguating Docker build failure from smoke @Test failure) doesn't fire when it's needed."
    severity: medium
    surface_type: "control-flow termination (pipefail propagation kills script before disambiguation)"
  same_root_cause: false
  same_class_of_defect: PARTIALLY |
    Both are bash defects in Sprint 6's own scripts, but in DIFFERENT
    SCRIPTS and DIFFERENT FAILURE MODES. Quinn's GAP-Q1 is a wrong-target
    issue (script reaches the right code path but greps the wrong file).
    Raze's GAP-3 is a control-flow termination issue (script exits before
    reaching the right code path). They do NOT share a root cause.
    However, they DO share a meta-pattern: "Sprint 6 ships shell scripts
    that haven't been adversarially stress-tested under their own failure
    modes." The Generator wrote both fixes correctly *under the assumption
    that the surrounding bash flow would deliver the right artifacts at
    the right time*; both assumptions were violated by environmental
    realities (smoke-test.sh's cleanup_silent runs synchronously before
    docker logs; ls failure under pipefail kills the script before the
    branch fires).
  meta_pattern_finding: |
    The shared meta-pattern matters for Sprint 7+: any Sprint 6 wedge that
    bundles a Java fix + a bash patch should mandate `bash -x` trace
    verification of the BASH PATH at gate time (not just `bash -n` syntax
    check + visual inspection). Plan-Raze's gameability mitigation
    recommendation included "diff scripts/* between sprint-5-close and
    sprint-6-close" but did not include "trace bash -x of expected failure
    paths." Adding the latter to Sprint 7 contract would have caught both
    GAP-Q1 and GAP-3 at Generator time.
  triangulation_signal: |
    Quinn + Raze surfacing different bash defects in different scripts is
    a STRONG independence signal — they did not converge on the same
    defect surface. This corroborates that the parallel spawn preserved
    independence. If Quinn had surfaced GAP-3 too (or Raze had surfaced
    GAP-Q1), it would suggest the briefings telegraphed the surface; the
    fact that they each found a different one suggests genuinely
    different attention paths.

