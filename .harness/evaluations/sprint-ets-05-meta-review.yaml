live_exec_reproduction:
  reproducer_target: GAP-2 (sabotage --target=systemfeatures docker build)
  reproducer_path: /tmp/raze-meta-fresh-ets05
  reproducer_commands: |
    git clone /home/nh/docker/gir/ets-ogcapi-connectedsystems10 /tmp/raze-meta-fresh-ets05
    cd /tmp/raze-meta-fresh-ets05
    SMOKE_OUTPUT_DIR=/tmp/raze-meta-fresh-ets05/sabotage-results \
    SABOTAGE_TMPDIR=/tmp/raze-meta-sabotage-ets05 \
    bash scripts/sabotage-test.sh --target=systemfeatures
  reproducer_outcome: |
    Reproduced EXACTLY the failure both prior gates documented. Build failed
    at "#14 [builder 6/8] COPY .git ./.git" with error:
      "failed to compute cache key: failed to calculate checksum of ref
       b2iyoz1ee8i5kjs0c0gc0ozkg::jlpvavecrf4rsfn9llfvid167: '/.git': not
       found"
    Steps 1-13 succeeded (image pulls cached; pom.xml + dependency:go-offline
    cached); step 14 (COPY .git) is the deterministic failure. Misleading log
    line "smoke exited non-zero (EXPECTED — SystemFeatures FAIL on first
    @Test)" appeared as primary Raze flagged — the script doesn't distinguish
    docker build failure from smoke @Test failure.
  third_corroboration_status: CONFIRMED
  matching_root_cause: TRUE
  build_step_offset: |
    My reproducer hit error at builder step 6/8; primary Raze reported
    builder step 6/8; Quinn reported builder step 4/6. Step counting differs
    between reports (BuildKit step numbering varies based on cache state +
    perspective) but the failing instruction (COPY .git ./.git) is identical.

  GAP-1_prime_source_inspection:
    inspected: TRUE
    file: /tmp/raze-meta-fresh-ets05/src/main/java/org/opengis/cite/ogcapiconnectedsystems10/listener/MaskingRequestLoggingFilter.java
    lines_inspected: 105-139
    findings: |
      The filter() method's structure is:
        Line 109: try {
        Line 110-117: collect sensitiveNames from requestSpec.getHeaders()
        Line 118-125: for each sensitive name: snapshot value into originals
                      map, removeHeader, set masked value (header mutation)
        Line 127: return super.filter(requestSpec, responseSpec, ctx);
        Line 129: } finally {
        Line 132-137: restore originals from snapshot map
        Line 138: }
      super.filter() is REST-Assured RequestLoggingFilter.filter() which:
        (a) uses requestSpec to format and emit the log line
        (b) calls ctx.next(requestSpec, responseSpec) — which performs the
            HTTP transmission
      Therefore: HTTP send happens INSIDE super.filter() BEFORE the finally
      block runs. The wire receives the masked spec. Original is restored
      after the wire send completes — too late. Diagnosis confirmed.
    diagnosis_match_with_prior_gates: |
      Quinn: "MaskingRequestLoggingFilter (or one of the wrap chain filters)
      is mutating the request header BEFORE HTTP transport, rather than
      masking only at log time. The original design.md §'wrap pattern'
      mandates a try/finally restoration: log the masked form, then restore
      the original header value before the request goes out. The restoration
      step is missing or broken." — partially correct (try/finally exists,
      but finally runs AFTER super.filter() not BEFORE wire send within it).
      Raze: "MaskingRequestLoggingFilter.filter() at line 106 does (1)
      snapshot original Authorization, (2) requestSpec.removeHeader +
      requestSpec.header(masked), (3) super.filter(...) → REST-Assured's
      RequestLoggingFilter.filter() invokes ctx.next() which performs the
      HTTP send with the now-masked spec, (4) finally: restore — TOO LATE,
      wire already sent." — exact code-trace match with my inspection.
      Both diagnoses correct; Raze's is more precise at the call-stack
      level. Sprint 6 fix should follow Raze's recommendation (i): masking
      filter logs masked form directly without delegating to super.filter()
      for log emission, then calls ctx.next(originalSpec).

meta_gaps:
  - id: META-GAP-1
    severity: medium
    title: "Unit-test pattern decorative for filter wire-side semantics"
    description: |
      Both VerifyAuthCredentialPropagation (8 PASS) and
      VerifyMaskingRequestLoggingFilter (8 PASS) — 16 unit tests total —
      use a StubFilterContext that returns null from ctx.next(...) and
      doesn't perform actual HTTP transmission. They verify wiring, header
      mutation behavior, and snapshot/restore roundtrip in ISOLATION but
      they CANNOT exercise the wire-side ordering semantics of
      super.filter() → ctx.next() → HTTP send. The 16 PASS metric
      structurally cannot detect the GAP-1' defect.

      Primary Raze identified this within GAP-1' as an inline observation
      ("StubFilterContext returns null from ctx.next so wire-send semantics
      are never exercised") but did NOT call out that Sprint 5's "8/8 PASS"
      strength claim and Sprint 3+4 cumulative masking-test confidence are
      partially decorative. Quinn's gate report listed the 8 unit tests as
      a strength without flagging the StubFilterContext limitation. This is
      an UNFLAGGED gap.
    sprint_6_recommended_inclusion: |
      Add a NEW E2E unit test VerifyWireRestoresOriginalCredential using a
      non-stub FilterContext that records the spec passed to ctx.next();
      assert spec carries the ORIGINAL credential not the masked form.
      Retroactively reclassify the 16 existing unit tests as "wiring-only"
      coverage in spec.md / traceability.md.
    sprint_6_priority: P1
    estimated_effort: ~30 LOC Java + spec.md cleanup

  - id: META-GAP-2
    severity: low
    title: "credential-leak-e2e-test.sh prong (b) script-grep scope is mis-targeted relative to filter design"
    description: |
      Quinn's CONCERN-1 and primary Raze's CONCERN-2 both flag that prong
      (b) doesn't grep stub-IUT log for masked-form hits. Both tagged
      MEDIUM/LOW. But the deeper issue is: prong (b) was designed to verify
      "masked form appears in test artifacts" — which presumes the masking
      filter logs to System.out or a configured stream that ends up in
      container.log or smoke.log. With CONCERN-1 (container.log empty due
      to teardown timing), the masking filter's output stream is never
      captured. Prong (b) is essentially decorative until the container.log
      capture is fixed AND the masking filter is re-architected.
    sprint_6_recommended_inclusion: |
      Bundle with REC-3 (container.log capture timing) + REC-4 (expand
      prong b grep to stub-IUT log). After GAP-1' fix, prong (b) should be
      verifiable by capturing the masking filter's PrintStream during smoke
      run.
    sprint_6_priority: P3
    estimated_effort: ~10 LOC bash

