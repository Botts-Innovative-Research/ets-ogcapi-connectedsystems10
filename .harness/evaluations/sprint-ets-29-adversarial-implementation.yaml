findings:
  - id: "RAZE-ETS29-IMPL-GAP-001"
    severity: "HIGH"
    title: "SWE Common Time mapping can PASS from substring labels or non-canonical example definitions"
    status: "CLOSED"
    evidence:
      - "Part2SweCommonJsonTests.java:217-223 passes Observation mapping when containsTimeComponentWithAnyTerm finds any term matching phenomenon/result/sampling."
      - "Part2SweCommonJsonTests.java:269-275 SKIPs or reports command mapping based on containsIssueTimeComponent."
      - "Part2SweCommonJsonTests.java:738-746 builds a searchable string from context/name/id/label/definition and accepts substring matches."
      - "VerifyPart2SweCommonJsonTests.java:109-130 codifies this by accepting http://example.test/phenomenonTime and http://example.test/IssueTime as positive evidence."
      - "OpenSpec spec.md:719-724 says Observation mapping PASS requires a Time component with a definition for phenomenon/result/sampling time."
    impact: "A retrieved recordSchema could PASS Requirements 110 or 113 when the Time component merely has a convenient name, label, id, or bogus example definition. This is the exact false-PASS class the sprint guardrails intended to block."
    required_fix: "Require canonical SWE mapping definitions, not substring terms. Observation mapping should accept only the normative definition URIs for phenomenonTime, SamplingTime, or resultTime; Command mapping should accept only the normative IssueTime URI. Add regressions that reject Time components named phenomenonTime/issueTime when the definition is missing or non-canonical, and update any story/spec wording if it remains looser than the code."
    closure:
      status: "closed"
      reviewed_at: "2026-05-26T21:59:06Z"
      evidence:
        - "Part2SweCommonJsonTests.java now defines OBSERVATION_TIME_DEFINITIONS as exact canonical URIs: http://www.w3.org/ns/sosa/phenomenonTime, http://www.opengis.net/def/property/OGC/0/SamplingTime, and http://www.w3.org/ns/sosa/resultTime."
        - "Part2SweCommonJsonTests.java now defines COMMAND_ISSUE_TIME_DEFINITION as exact http://www.opengis.net/def/property/OGC/0/IssueTime."
        - "Runtime mapping checks now call containsTimeComponentWithDefinition and containsIssueTimeComponentWithCanonicalDefinition instead of substring matching helper names/labels/context."
        - "VerifyPart2SweCommonJsonTests.java covers positive phenomenonTime, SamplingTime, resultTime, and IssueTime cases and rejects example/noncanonical definitions plus missing definitions."
      assessment: "The original false-PASS risk from substring labels, missing definitions, and example definitions is closed for the reviewed gap."
  - id: "RAZE-ETS29-IMPL-GAP-002"
    severity: "HIGH"
    title: "Mediatype-write advertisement can PASS from any POST/PUT path, not only Observation or Command endpoints"
    status: "CLOSED"
    evidence:
      - "Part2SweCommonJsonTests.java:306-317 reports mediatype-write evidence from apiDefinitionAdvertisesSweJsonWrite."
      - "Part2SweCommonJsonTests.java:676-704 iterates every OpenAPI path item and accepts any POST or PUT requestBody content key equal to application/swe+json."
      - "VerifyPart2SweCommonJsonTests.java:134-152 checks method/media filtering but does not reject unrelated paths."
      - "OGC 23-002 A.108 scopes the mediatype-write check to Observation and/or Command resources endpoints for CREATE or REPLACE operations."
    impact: "An API definition advertising application/swe+json on an unrelated or administrative POST/PUT endpoint would incorrectly PASS /req/swecommon-json/mediatype-write without proving support on Observation or Command transactional endpoints."
    required_fix: "Filter candidate OpenAPI operations to Observation and Command resource paths before accepting application/swe+json requestBody evidence. Add regressions showing unrelated POST/PUT paths do not pass, while /observations, /datastreams/{id}/observations, /commands, or /controlstreams/{id}/commands style CREATE/REPLACE paths can pass when they advertise exact application/swe+json."
    closure:
      status: "closed"
      reviewed_at: "2026-05-26T21:59:06Z"
      evidence:
        - "Part2SweCommonJsonTests.java writeOperations now filters OpenAPI path entries through isObservationOrCommandResourcePath before inspecting POST or PUT requestBody content."
        - "isObservationOrCommandResourcePath accepts collection or item paths for observations and commands, covering /observations, /observations/{id}, /datastreams/{id}/observations, /commands, /commands/{id}, and /controlstreams/{id}/commands style paths."
        - "The helper rejects subresources by requiring no remaining segment after the collection name, or exactly one template item segment; /commands/{id}/status is therefore rejected."
        - "VerifyPart2SweCommonJsonTests.java adds positive endpoint evidence and rejects OPTIONS, application/json, vendor media type, unrelated /systems/{id}/datastreams, and /commands/{id}/status."
      assessment: "The original false-PASS risk from arbitrary POST/PUT OpenAPI operations is closed for the reviewed gap."

