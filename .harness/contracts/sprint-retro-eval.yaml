success_criteria:
  all_critical_scenarios_pass: true
  normal_scenario_pass_rate: 0.90
  spec_updated: true
  no_regression: true
  # Additional criteria for retroactive eval
  unit_tests_pass: true
  typecheck_pass: true
  lint_pass: true
  e2e_tests_pass: true
  conformance_accuracy_verified: true

evaluation_focus:
  - "URL construction correctness in all 27 conformance test modules"
  - "Frontend-backend API contract consistency (CreateAssessmentResponse, StartAssessmentResponse shapes)"
  - "Results page filtering logic (test-level, not class-level)"
  - "SSE reconnection and polling fallback behavior"
  - "Test assertions match OGC spec text (spot-check 5 assertions)"
  - "All test modules actually registered and executed"
  - "SCENARIO-* traceability in test comments (expected: present, currently: absent)"
