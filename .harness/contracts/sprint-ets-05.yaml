handoff_to_generator:
  next_agent: "generator"
  rationale: |
    Sprint 5 does NOT require an Architect cycle before Generator. Rationale:
    (1) GAP-1 wiring fix (S-ETS-05-01): pure implementation, no new architectural
        decision. The approach is fully specified: read SMOKE_AUTH_CREDENTIAL in
        bash; inject as auth-credential param; wire in Java. No competing approaches
        requiring Architect arbitration (unlike Sprint 3's CredentialMaskingFilter
        dual-approach decision or Sprint 4's E2E credential-leak IUT-path decision).
    (2) Procedures + Deployments (S-ETS-05-05 + S-ETS-05-06): mechanical pattern
        extension of Subsystems. The two-level cascade pattern is VERIFIED LIVE
        (Raze Sprint 4 sabotage run). The testng.xml strategy (extend single-block
        consolidation + dependsOnGroups) is the same as Sprint 4 S-ETS-04-05.
        No competing approaches. Sprint-1-style minimal coverage scope is Pat's
        recommendation; Generator proceeds without Architect ratification (per Sprint 4
        Architect precedent: Architect ratified Sprint-1-style minimal once; the
        precedent holds for all subsequent sibling classes).
    (3) ADR-010 v3 amendment (S-ETS-05-04): narrow addendum, not a new decision.
        Generator adds the empirical evidence section; no Architect approval needed.
    (4) Sabotage --target flag (S-ETS-05-03): test infrastructure improvement,
        no conformance code impact. Generator implements directly.
    (5) SMOKE_OUTPUT_DIR override (S-ETS-05-02): mechanical bash change. No
        architectural concern.

    Architect cycle is DEFERRED until one of these triggers occurs:
      - A new dependency pattern arises (e.g. a class depending on BOTH SystemFeatures
        AND Common — not the case for Procedures or Deployments which depend only on
        SystemFeatures per OGC 23-001 ATS)
      - The testng.xml single-block consolidation reaches 6+ classes and the
        BeforeSuite SkipException migration becomes mandatory (Sprint 6+ trigger)
      - A Common expansion or Part 2 decision lands requiring competing-approach
        arbitration

  generator_sequencing: |
    Pat's recommended Generator sequence for Sprint 5 (dependency-aware):
    1. S-ETS-05-01 (GAP-1 wiring fix) — P0; touches smoke-test.sh; FIRST because
       subsequent smoke runs in the sprint must carry the credential correctly.
    2. S-ETS-05-02 (SMOKE_OUTPUT_DIR override) — P1; also touches smoke-test.sh;
       sequence immediately after S-ETS-05-01 while the script is open.
    3. S-ETS-05-04 (SubsystemsTests javadoc + ADR-010 v3 amendment) — P2 doc-only;
       sequence here while SubsystemsTests is fresh in context; no regression risk.
    4. S-ETS-05-05 (Procedures conformance class) — P0 new feature; new Java class,
       testng.xml extension; sequence before Deployments (prove the pattern first).
    5. S-ETS-05-06 (Deployments conformance class) — P0 new feature; mirrors Procedures;
       sequence after Procedures to re-use established patterns in the same session.
    6. S-ETS-05-03 (sabotage --target flag) — P2; sequence last (pure test-infra;
       clean up after all conformance work is done).
    Total est Generator wall-clock: 3-5h (vs Sprint 4's 8-12h: Sprint 5 is pattern
    extension not proof-of-concept; GAP-1 fix is ~1h; each new class is ~30-45 min
    since pattern is well-established; carryover items are mechanical).

  next_agent_inputs_for_generator:
