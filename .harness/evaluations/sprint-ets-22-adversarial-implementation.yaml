findings:
  - id: RAZE-ETS22-IMPL-GAP-001
    severity: high
    category: spec-doc-reconciliation
    status: open
    summary: Sprint 22 implementation is not reconciled consistently across ops and handoff docs.
    details: >
      The code is now a Generator implementation, but key operational handoff
      records still describe Sprint ets-22 as planning complete with the next
      action to start Generator. `ops/status.md` still has a "Sprint ets-22
      Planning Evidence" section and says "Next action: start Generator for
      S-ETS-22-01". `ops/test-results.md` still records Sprint 22 as a
      planning-only change set with no Java code changed and no Maven/TeamEngine
      gates required. `.harness/handoffs/planner-handoff.yaml` remains the active
      planner handoff with "Generator can start" language. These stale records
      create audit drift after the Generator code and smoke artifacts exist.
    required_fix: >
      Reconcile the Sprint 22 implementation state across OpenSpec/story,
      traceability, epic, contract if retained as sprint contract, ops/status,
      ops/test-results, ops/changelog, known issues if applicable, and the
      generator handoff. Record the exact Maven and smoke evidence, scoped
      ControlStream PASS/SKIP behavior, missing `/conf/api-common` prerequisite
      honesty, and that `/commands` and `/controls/{id}` remain non-200 false-PASS
      guardrails.

  - id: RAZE-ETS22-IMPL-GAP-002
    severity: medium
    category: evidence-durability
    status: open
    summary: Maven success is claimed but no durable Sprint 22 Maven log is archived under ops/test-results.
    details: >
      User-supplied evidence says Maven via Docker passed with 167 run, 0
      failures, 0 errors, 3 skipped. I found smoke XML and container logs under
      `ops/test-results`, and local `target/surefire-reports` is consistent with
      the new structural tests, but no `ops/test-results/*sprint-ets-22*maven*`
      artifact exists. `target/` is not a durable review artifact.
    required_fix: >
      Archive or add a durable Sprint 22 Maven log, for example
      `ops/test-results/sprint-ets-22-maven-2026-05-08.log`, and reference it
      from `ops/test-results.md` and the generator handoff.

