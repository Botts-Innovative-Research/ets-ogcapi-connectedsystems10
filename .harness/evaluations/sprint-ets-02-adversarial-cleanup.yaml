concerns:
  - id: CONCERN-1
    severity: medium
    title: "CredentialMaskingFilter wired but functionally weaker than design.md/architect-handoff implies; integration test deferred"
    description: |
      The CredentialMaskingFilter Java implementation has two semantic divergences
      from the v1.0 reference and the design.md §529 wording, both honestly
      disclosed in source comments but materially weaker than Sprint 2's spec text:

      (a) **Outgoing request not actually masked**: filter() at lines 152-170 does
      NOT mutate the outgoing request (correct — would break auth). It iterates
      headers and emits a FINE-level log entry of the masked form, then proceeds
      via ctx.next(requestSpec, responseSpec). The actual request still carries the
      unmasked Authorization header. This is the correct behavior for a working
      auth handshake; v1.0's `maskExchange()` semantics (mutate the captured
      exchange representation) don't have an analog in REST-Assured's filter SPI.

      (b) **REST-Assured's built-in RequestLoggingFilter is not wrapped/intercepted**:
      Source comment lines 145-150 explicitly state: "REST-Assured's built-in
      RequestLoggingFilter (when explicitly added by user code) will still log the
      unmasked header because it reads the specification directly. Future enhancement
      (Sprint 3+): wrap or replace the built-in logging filter. For Sprint 2 the
      suite does not chain RequestLoggingFilter, so the masked-form FINE log is the
      sole observable."

      Combined with Dana's deferral of the integration test (auth-credential CTL
      parameter not yet wired; deferred to Sprint 3+ with rationale "the unit test
      layer fully verifies the load-bearing semantic"), the END-TO-END "Authorization
      header in REST-Assured request log is masked" claim is UNPROVEN. design.md
      §529 says "The CredentialMaskingFilter does the actual masking BEFORE the
      request/response reaches the logger" — this is FALSE for any future test
      that adds RequestLoggingFilter. design.md §531-534 mandates an integration
      test (auth-credential=Bearer ABCDEFGH12345678WXYZ + grep TestNG XML
      attachments + container logs for `EFGH12345678WXYZ` zero hits + masked
      form `Bear...WXYZ` present). That integration test does not exist at HEAD
      7f05eb6.

      The unit-test layer (VerifyCredentialMaskingFilter, 15 tests) genuinely proves
      maskValue semantics + isSensitive set membership + null/edge handling. But it
      does NOT prove that any Sprint 2+ end-to-end run cannot leak a credential
      through REST-Assured logging chains, because the wiring point Sprint 2
      established is a parallel-log emitter, not a request-mutator.

      **Adversarial consequence**: a future Generator who adds REST-Assured
      RequestLoggingFilter to the suite (perhaps for a debug-mode TestNG report
      enrichment) will silently bypass the CredentialMaskingFilter — the masked-form
      FINE log will exist, but so will the unmasked Authorization header in the
      RequestLoggingFilter's output. SCENARIO-ETS-CLEANUP-LOGBACK-MASKING-001
      acceptance ("any Authorization or X-API-Key header in REST-Assured logging is
      masked") would silently regress without any unit-test FAIL.
    evidence: |
      File: ets-ogcapi-connectedsystems10/src/main/java/.../listener/CredentialMaskingFilter.java
        Lines 136-150 disclose the divergence:
          "the filter does NOT mutate the actual outgoing request — masking the real
           header would break the auth handshake. Instead, the filter logs the masked
           form to the structured-logging stream so observers (TestNG report
           attachments, container logs, REST-Assured RequestLoggingFilter chained
           after this filter) see only the masked form."
        Lines 146-150 acknowledge the bypass:
          "Note: REST-Assured's built-in RequestLoggingFilter (when explicitly added
           by user code) will still log the unmasked header because it reads the
           specification directly. Future enhancement (Sprint 3+): wrap or replace
           the built-in logging filter."
      File: openspec/capabilities/ets-ogcapi-connectedsystems/design.md
        Line 529: "The CredentialMaskingFilter does the actual masking BEFORE the
        request/response reaches the logger" — INCONSISTENT with implementation
        for any test that chains RequestLoggingFilter.
        Lines 531-534 mandate the integration test that is currently deferred.
      File: .harness/handoffs/generator-handoff.yaml
        Lines 130-132 acknowledge the integration-test deferral.
      File: ets-ogcapi-connectedsystems10/src/main/java/.../listener/SuiteFixtureListener.java
        Line 62 wires the filter via RestAssured.filters(new CredentialMaskingFilter()).
        Wiring point IS correct; the limitation is in what the filter can do.
      v1.0 reference: csapi_compliance/src/engine/credential-masker.ts
        Lines 53-85: `maskExchange()` returns a NEW HttpExchange object with masked
        request.headers / response.headers / url query params / JSON body password
        fields. Mutates the captured representation; the v1.0 web app stores
        masked exchanges. The Java port has no equivalent — REST-Assured's filter
        SPI doesn't expose the same hook.
    recommended_fix: |
      Sprint 3 work (no Sprint 2 same-turn fix possible):
      (1) Update design.md §529 wording to match implementation reality: "The
          CredentialMaskingFilter logs the masked form of credential headers to
          the structured-logging stream. It does not mutate the outgoing request
          (would break auth). Tests that explicitly chain REST-Assured's
          built-in RequestLoggingFilter MUST configure it after the masking filter
          AND apply the .replaceFiltersWith(...) wrapper pattern to suppress
          duplicate unmasked logging. Sprint 3+ adds a wrapping
          MaskedRequestLoggingFilter."
      (2) Sprint 3 implements MaskedRequestLoggingFilter (decorator that wraps
          RequestLoggingFilter and substitutes masked header values in the log
          output stream) — closes the future-bypass risk.
      (3) Sprint 3 wires the auth-credential CTL parameter and lands the
          integration test design.md §531-534 mandates. Verify both the masked-form
          presence (`Bear...WXYZ`) and the unmasked-substring absence (`EFGH12345678WXYZ`)
          across TestNG XML attachments + container logs.
      (4) Until (1)-(3) land, Quinn should NOT interpret SCENARIO-ETS-CLEANUP-LOGBACK-MASKING-001
          as functionally PASS — it's PASS at the unit-test layer (maskValue
          semantics) but UNPROVEN at the end-to-end layer.
    address_in_turn: no (defer to Sprint 3+; integration test + filter-decorator
                         is a multi-commit story)

  - id: CONCERN-2
    severity: low
    title: "Image size 815MB vs ADR-009 §156 ≤450MB target; Dana cites §Negative deferral but the deferral language is in §157 'Image size target'"
    description: |
      Story S-ETS-02-05 sub-task A acceptance criterion: "Final image size < 450MB
      target — MISSED (815MB image / 663MB smoke); ADR-009 §Negative deferral
      noted." Dana's citation is approximately correct in intent (ADR-009 does
      contain deferral language) but loose about WHICH section. ADR-009 §Negative
      (lines 187-191) actually discusses BUILD-STAGE intermediate image overhead
      (eclipse-temurin:17-jdk-jammy adds ~440MB during build, discarded after) —
      NOT runtime-image size.

      The runtime-image size deferral lives at ADR-009 lines 154-157 ("Image size
      target"). Line 156 says: "Multi-stage target: ≤ 450 MB (S-ETS-02-05 sub-task
      A acceptance threshold; soft target 400 MB)." Line 157 says: "Savings come
      from: (a) build stage discarded ..., (b) duplicate jars between TE common-libs
      and our deps removed by dedupe RUN steps if needed (defer to Sprint 3 if
      450 MB is missed)."

      Line 157's "(defer to Sprint 3 if 450 MB is missed)" IS the deferral
      language Dana invokes. It exists, but it's a parenthetical conditional
      ("defer to Sprint 3 IF missed"), not an explicit "Sprint 2 acceptance is
      relaxed to N MB." So architectural-rigor question: does that conditional
      constitute Sprint 2 acceptance of an 815MB runtime image, or does it require
      a same-turn ADR-009 amendment to formally relax line 156's "≤ 450 MB
      sub-task A acceptance threshold"?

      Dana's story file (S-ETS-02-05) ALSO marks the sub-task acceptance criterion
      as a NEGATIVE checkbox ("[ ] Final image size < 450MB target — MISSED"),
      so this isn't being silently papered over — it's consciously flagged. ADR-009
      §157's conditional language is what Dana invokes, and that's a defensible
      interpretation, but a strict reader could push back that line 156's
      threshold language wasn't formally relaxed via ADR amendment.

      Not a Sprint 2 blocker. The sub-task is honestly partial.
    evidence: |
      docker images report (Raze independent verification):
        ets-ogcapi-connectedsystems10:multistage-test  815MB  (Dana's user-worktree build)
        ets-ogcapi-connectedsystems10:smoke            663MB  (smaller; built earlier)
        ets-raze-nomvn:test (built by Raze)            663MB
      ADR-009 line 156: "Multi-stage target: ≤ 450 MB (S-ETS-02-05 sub-task A
        acceptance threshold; soft target 400 MB)."
      ADR-009 line 157: "...(defer to Sprint 3 if 450 MB is missed)."
      ADR-009 lines 187-191 (Dana's cited "§Negative" — actually about build-stage
        intermediate image, not runtime image size).
      Story S-ETS-02-05 line 67: "[ ] Final image size < 450MB target — MISSED
        (815MB image / 663MB smoke); ADR-009 §"Negative" deferral noted"
    recommended_fix: |
      Sprint 3 housekeeping: either (a) achieve <450MB via the dedupe RUN step
      ADR-009 §157 hints at, or (b) formal ADR-009 amendment relaxing line 156's
      threshold to a Sprint-3-realistic number (e.g. 700MB) with rationale.
      Neither is Sprint 2 close-blocking.

      Optional same-turn micro-fix: edit story S-ETS-02-05 sub-task A line citing
      "ADR-009 §Negative" to instead cite "ADR-009 §Image size target line 157
      conditional deferral language" — accuracy improvement, not a substantive
      issue.
    address_in_turn: no (defer to Sprint 3 — image-size optimization is a
                         multi-step refactor; documentation tweak is optional)

