stories:
  - id: "S-ETS-04-01"
    title: "CI workflow `git mv` ESCALATION (5th-sprint-defer-risk; user-action prerequisite)"
    file: "epics/stories/s-ets-04-01-ci-workflow-escalation.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P0"  # Raze cumulative CONCERN-3 escalation territory; 4-sprint defer in a row = structural risk if 5th-sprint defers
    complexity: "S"
    depends_on: []
    parallelizable: true
    rationale: |
      Sprint 4 inherits the 4-CONSECUTIVE-SPRINT defer on `gh auth refresh -s
      workflow` user-action (S-ETS-01-01..03 + S-ETS-02-05 + S-ETS-03-03). Raze
      cumulative explicitly flagged as ESCALATION TERRITORY. Sprint 4 path:
      (a) **Pre-condition (USER ACTION, ESCALATED)**: orchestrator runs
          `gh auth refresh -s workflow` from a session at the terminal where
          the user can complete the OAuth browser flow. **5th-sprint-defer
          flag**: if user CANNOT or DOES NOT grant the scope before the next
          Generator run, Sprint 4 contract DROPS `ci_workflow_live` from
          success criteria entirely (perpetual environmental blocker, NOT
          story scope per Raze recommendation). Pat's escalation note
          documents the alternative: manual GitHub UI move via web (open
          .github/workflows/build.yml in browser, paste contents from
          ci/github-workflows-build.yml, commit via web — ~5 min user-time;
          bypasses the gh-cli-scope blocker entirely).
      (b) **Generator action (if user-action complete)**: `cd
          ets-ogcapi-connectedsystems10 && mkdir -p .github/workflows &&
          git mv ci/github-workflows-build.yml .github/workflows/build.yml &&
          git commit -m "chore: move CI workflow to .github/workflows/" &&
          git push`. One-line move; orchestrator verifies push success.
      (c) **Verification**: trigger one workflow_dispatch run (or push a no-op
          commit), capture the GitHub Actions run URL + green-build status into
          Sprint 4 close artifact `ets-ogcapi-connectedsystems10/ops/test-results/
          sprint-ets-04-01-ci-workflow-live-<date>.txt`.
      Acceptance Criterion: GitHub Actions UI shows at least one
      successful `workflow_run` on a Sprint 4 commit; OR the contract
      success_criterion `ci_workflow_live` is FORMALLY DROPPED with explicit
      "perpetual environmental blocker" deferral note in ops/status.md.
      No more 4-sprint-style "let's try again" defers — Sprint 4 forces
      the binary outcome.

  - id: "S-ETS-04-02"
    title: "Image-size v2: chown-layer attack + ADR-009 v2 amendment (Sprint 3 PARTIAL → PASS at <600MB)"
    file: "epics/stories/s-ets-04-02-image-size-chown-layer.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"  # Sprint 3 PARTIAL with empirical analysis identifying chown-layer as next target
    complexity: "M"
    depends_on: []
    parallelizable: false  # touches Dockerfile; sequence cautiously with S-ETS-04-04 sabotage-script fixes
    rationale: |
      Sprint 3 S-ETS-03-04 PARTIAL (660MB vs <550MB stretch). Empirical analysis
      at sprint-ets-03-04-empirical-dedupe-list-2026-04-29.txt identified two
      truths: (i) ADR-009's illustrative 200-300MB jar-dedupe projection was
      EMPIRICALLY FALSIFIED — exact-basename overlap is only 4 jars / 1.8MB on
      the actual TE 5.6.1 + ETS 0.1-SNAPSHOT post-ADR-006 (Jersey 3.x) layout;
      (ii) the dominant cost is an 80MB `RUN chown -R tomcat:tomcat /usr/local/
      tomcat` layer that creates a duplicate copy of the entire tomcat tree.
      Sprint 4 attacks the chown layer via Docker buildkit `COPY --chown=tomcat:
      tomcat` syntax on each `COPY` directive — the chown happens in-place
      during COPY, no second layer materializes. Estimated savings: ~80MB →
      ~580MB image (Sprint 4 PASS target).

      **Generator MUST**: (a) baseline current image size pre-change; (b) refactor
      every `COPY` in the Dockerfile to add `--chown=tomcat:tomcat`; (c) DELETE
      the standalone `RUN chown -R ...` directive; (d) re-build (cache cold);
      (e) verify image size <600MB AND smoke 22+M PASS preserved (where M is
      Subsystems @Test count from S-ETS-04-05). If chown-layer attack alone
      doesn't reach <600MB, Generator may layer in iterative version-overlap
      dedupe per Sprint 3 empirical-dedupe-list tier-2 analysis (~7-8MB
      additional, smoke verification cycle required).

      **Architect deferral**: ADR-009 v2 amendment (or new ADR-011 superseding)
      to record the empirical falsification of the illustrative table + chown-
      layer attack rationale + the Sprint 3 jar-list. Pat hypothesis:
      ADR-009 in-place amendment (not new ADR) — same precedent as Sprint 2
      ADR-001 cross-reference amendment for ADR-007. Architect ratifies.

      Acceptance: image size <600MB (Sprint 4 PASS target — more permissive
      than ADR-009's 450MB original soft target which is now empirically
      proven unreachable on multi-jar runtime classloader requirements);
      smoke 22+M PASS preserved post-optimization.

  - id: "S-ETS-04-03"
    title: "Deeper E2E credential-leak smoke (S-ETS-03-02 PARTIAL → PASS at IUT-auth layer)"
    file: "epics/stories/s-ets-04-03-credential-leak-e2e.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"  # Sprint 3 PARTIAL closure: deeper E2E IUT-auth wiring deferred to Sprint 4 per Dana verdict
    complexity: "M"
    depends_on: []
    parallelizable: true  # touches scripts + smoke pipeline; orthogonal to Subsystems Java work
    rationale: |
      Sprint 3 S-ETS-03-02 closed `credential_leak_integration_test_green` at
      the unit-test layer (8/8 VerifyMaskingRequestLoggingFilter + grep mvn
      output + grep surefire XML for literal credential body, all zero hits)
      but explicitly deferred the deeper E2E architect-vision: synthetic
      auth-credential flowing through REST-Assured against an authenticated
      IUT at smoke time, with grep against ops/test-results/ XML AND container
      catalina.out for the literal substring (zero hits required) AND for the
      masked form (>=1 hit required, proving filter ran rather than dropping
      the field entirely).

      **Sprint 4 path**: wire `auth-credential` CTL/TestNG suite parameter
      end-to-end in `scripts/smoke-test.sh` (or new `scripts/credential-leak-
      e2e-test.sh`). Two architectural sub-options Pat surfaces for Architect
      ratification:
      (a) **Stub IUT in /tmp/** (per Sprint 3 sabotage-script pattern): spin
          up a Python http.server (or equivalent stub) bound to 0.0.0.0 on
          ephemeral OS-assigned port, configured to require Bearer auth.
          Hermetic; reproducible in CI; defense-in-depth same as ADR-010
          dual-pattern (~30 LOC bash). Aligns with Sprint 4 sabotage-script
          bug fixes from S-ETS-04-04 (stub-server bind 0.0.0.0 + docker
          --add-host).
      (b) **Pivot to a different IUT that requires auth** (e.g., a
          GeoRobotix-with-auth endpoint if one exists, or another OSH
          deployment). Higher real-world signal; lower hermeticity (depends
          on external IUT availability + the IUT honoring auth).
      Pat recommends (a) — composable with S-ETS-04-04 sabotage-script
      bug fixes; hermetic; reproducible.

      Acceptance: smoke against authenticated IUT (or stub) with `auth-credential
      =Bearer ABCDEFGH12345678WXYZ`; grep ops/test-results/ XML returns zero
      hits for `EFGH12345678WXYZ`; grep container catalina.out returns zero
      hits; grep both surfaces for masked `Bear***WXYZ` (or equivalent) returns
      >=1 hit. Closes design.md §529 deferral text fully + Quinn CONCERN-1.

  - id: "S-ETS-04-04"
    title: "Sabotage-script 2 bug fixes (stub bind 0.0.0.0 + docker --add-host=host.docker.internal)"
    file: "epics/stories/s-ets-04-04-sabotage-script-fixes.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P2"  # 2 small mechanical fixes; identified in Sprint 3 close as carryover
    complexity: "S"
    depends_on: []
    parallelizable: true  # script-only changes; orthogonal to Java/Dockerfile work
    rationale: |
      Sprint 3 ADR-010 §"Defense-in-depth role split" landed the bash sabotage
      script with two known issues that prevented hermetic CITE-SC-grade
      execution (Dana's verdict log + Raze cumulative architect_surfaced_risks_
      status §STUB-SERVER-PORT-COLLISION-IN-CI noted both):
      (a) **Stub bind 127.0.0.1 → 0.0.0.0**: the stub server binds to localhost
          only, so a Docker container running smoke against `host.docker.internal:
          <port>` cannot reach the stub. One-line edit:
          `python3 -m http.server <port> --bind 0.0.0.0` (was `--bind 127.0.0.1`
          or default localhost binding).
      (b) **Docker --add-host=host.docker.internal:host-gateway**: Docker on
          Linux without Docker Desktop does NOT auto-resolve `host.docker.internal`
          (only Docker Desktop's macOS/Windows variants do). The smoke-test.sh
          docker run command needs `--add-host=host.docker.internal:host-gateway`
          to expose the host's Docker bridge IP to the container.
      Both fixes are mechanical, ~5 LOC each, no architecture decision required.
      Generator implements directly without Architect cycle. Sequence after
      S-ETS-04-03 if S-ETS-04-03 picks the stub-IUT path (the fixes are
      prerequisites for hermetic stub-IUT operation).

      Acceptance: bash sabotage script runs hermetically end-to-end on
      Linux-without-Docker-Desktop hosts; smoke container can reach the stub
      via host.docker.internal:<port>; live execution evidence archived at
      `ops/test-results/sprint-ets-04-04-sabotage-script-hermetic-<date>.{xml,log}`.

  - id: "S-ETS-04-05"
    title: "Implement CS API Subsystems (`/conf/subsystem`) conformance class end-to-end against GeoRobotix"
    file: "epics/stories/s-ets-04-05-subsystems-conformance-class.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"  # New feature; first TWO-LEVEL dependency chain (Subsystems→SystemFeatures→Core)
    complexity: "M"
    depends_on: []  # No story-level dependency; runtime depends on SystemFeatures via group dependency
    parallelizable: true
    rationale: |
      Third additional Part 1 conformance class beyond Core + SystemFeatures +
      Common. Mirrors the S-ETS-02-06 (SystemFeatures) and S-ETS-03-07 (Common)
      architectural pattern: new `conformance.subsystems.SubsystemsTests`
      subpackage with at least one TestNG @Test per ATS assertion in OGC 23-001
      Annex A `/conf/subsystem/`, REQ-ETS-PART1-003 expanded from PLACEHOLDER →
      SPECIFIED with full per-assertion enumeration, SCENARIO-ETS-PART1-003-*
      added, testng.xml wired (Subsystems DEPENDS ON SystemFeatures via
      `<group name="subsystems" depends-on="systemfeatures"/>`), smoke verified
      against GeoRobotix.

      **Why Subsystems over Procedures/Sampling/Properties/Deployments** (Pat's
      pick — single class for Sprint 4):
      (i) **First TWO-LEVEL dependency chain**: Subsystems→SystemFeatures→Core.
          Sprint 3 proved one-level (SystemFeatures→Core) live cascading-skip
          via S-ETS-03-01 sabotage exec. Subsystems extends to two levels —
          critical proof point before Sprint 5+ scales. If two-level cascade
          works, the multi-class strategy is fully validated for the remaining
          10 Part 1 classes (most depend on either SystemFeatures or
          SystemFeatures+Common).
      (ii) **GeoRobotix readily exercises Subsystems**: `/systems/{id}/subsystems`
           is the canonical CS API path; GeoRobotix's open IUT serves it (per
           OGC 23-001 §`/req/subsystem/resources-endpoint`). Empirical curl-
           verification trivial — Generator MUST: `curl -sf https://api.
           georobotix.io/ogc/t18/api/systems` → pick a system id → `curl -sf
           https://api.georobotix.io/ogc/t18/api/systems/<id>/subsystems` BEFORE
           writing assertions; archive curl evidence into Implementation Notes.
           If GeoRobotix returns 404 or empty `items` array, Generator narrows
           Subsystems scope to landing-page-discovery + collection-shape only
           (skip per-item @Tests or SKIP-with-reason at runtime, same adapt-
           to-IUT-shape pattern Sprint 2 SystemFeatures used successfully).
      (iii) **Procedures/Sampling/Properties/Deployments are siblings**: all 4
            depend on SystemFeatures (per OGC 23-001 ATS dependency graph).
            Once Subsystems proves the two-level pattern, Sprint 5+ can BATCH
            2-3 of these classes per sprint with confidence.
      (iv) **Subsystems has the smallest assertion surface among the
           SystemFeatures-dependents** (~4-5 ATS items per OGC 23-001 Annex A
           `/conf/subsystem/`: resources-endpoint, canonical-url, canonical-
           endpoint, parent-system-link, possibly collections). Sprint-1-style
           minimal (4 @Tests covering 3-4 highest-priority assertions) for risk
           control on the third pattern extension AND the first two-level
           dependency chain.

      **Generator MUST**: (a) curl `https://api.georobotix.io/ogc/t18/api/systems`,
      pick a system id, `curl /systems/<id>/subsystems`, archive curl evidence
      into Implementation Notes BEFORE writing assertions; (b) verify OGC
      `.adoc` canonical URI form for each Subsystems sub-requirement at
      `raw.githubusercontent.com/opengeospatial/ogcapi-connected-systems/master/
      api/part1/standard/requirements/subsystem/`; (c) use ETSAssert helpers +
      canonical URI form from day 1; (d) do NOT introduce new bare-throw
      sites (Sprint 2 invariant `zero_bare_assertionerror_in_conformance`
      preserved); (e) preserve any v1.0 known-issue handling for Subsystems
      (sweep `csapi_compliance/src/engine/registry/` for Subsystems tolerance
      comments before writing assertions); (f) testng.xml extension follows
      Sprint 3's single-block consolidation pattern AND adds Subsystems to
      the `<dependencies>` block with `<group name="subsystems" depends-on=
      "systemfeatures"/>` — first two-level chain.

      **Architectural deferral**: Architect ratifies (i) full per-assertion
      coverage now vs Sprint-1-style minimal (Pat recommends Sprint-1-style
      minimal — 4 @Tests covering 3-4 highest-priority assertions, narrow
      with explicit deferral notes — to preserve gate verification time and
      the Quinn 0.95 trend); (ii) testng.xml strategy for two-level dependency
      (extend single-block consolidation OR consider BeforeSuite SkipException
      pattern — Pat recommends extending single-block since Sprint 4 is still
      ≤4 conformance classes and the full migration is better postponed to
      Sprint 5+ when 5+ classes need it); (iii) Subsystems→SystemFeatures
      dependency-skip live-cascade verification (Pat recommends extending the
      bash sabotage script from S-ETS-04-04 fixes to also sabotage SystemFeatures
      and observe Subsystems cascade-SKIP — single archive proves both one-level
      AND two-level cascades work; deferred to Architect or Generator's
      discretion). See deferred_to_architect.

