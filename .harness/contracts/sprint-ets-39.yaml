sprint: ets-39
story: S-ETS-39-01
title: Artifact hygiene and URI/schema drift harness
status: IMPLEMENTED_RAZE_APPROVED_WITH_CONCERNS
triggered_by: 'User instruction: "Do them"'
requirements:
  - REQ-ETS-CLEANUP-020
  - REQ-ETS-SYNC-001
scenarios:
  - SCENARIO-ETS-CLEANUP-ARTIFACT-HYGIENE-SUMMARY-001
  - SCENARIO-ETS-CLEANUP-ARTIFACT-CREDENTIAL-SCAN-001
  - SCENARIO-ETS-SYNC-URI-SCHEMA-DRIFT-AUDIT-001
scope:
  include:
    - Add self-tested report tooling for TeamEngine artifact hygiene.
    - Add self-tested report tooling for URI and schema bundle drift.
    - Archive Sprint 38 evidence summaries and current drift audit outputs.
    - Preserve strict ETS assertions and read-only smoke safety.
  exclude:
    - Weakening schema media-type, SWE Common Text, Annex A.9, or populated binding assertions.
    - Enabling CI-failing URI drift enforcement before the allowlist is stabilized.
    - Recording current local OSH credential values in artifacts.
success_criteria:
  - OpenSpec/story/contract/traceability/epic artifacts define Sprint 39 before code changes.
  - Artifact hygiene self-test passes and references the Sprint 39 requirement/scenarios.
  - URI/schema drift self-test passes and references the Sprint 39 requirement/scenarios.
  - Sprint 38 clean and populated TeamEngine artifact hygiene reports are archived.
  - Current URI/schema drift audit output is archived without treating report-only drift as a conformance failure.
  - Docker Maven and mandatory clean local OSH TeamEngine E2E are run, or blockers are documented with exact evidence.
  - Raze review returns no required fixes or all required fixes are closed.
guardrails:
  - Do not print supplied secret values in JSON or text reports.
  - Treat IUT-bound POST/PUT/PATCH/DELETE as a hygiene failure for read-only smoke summaries.
  - Keep report-first URI drift behavior separate from future CI-failing enforcement.
