verdict_policy:
  declaration_gate:
    - "If /conf/controlstream is not declared, ControlStream conformance judgment SKIPs with a precise reason."
    - "Do not infer /conf/api-common or API Common PASS from /conf/controlstream or ControlStream endpoint success."
  prerequisite:
    - "Keep /req/api-common prerequisite handling visible and honest."
    - "When /conf/controlstream is declared but /conf/api-common is absent, scoped endpoint checks may run but the ETS must not report full /conf/controlstream class closure."
    - "Prerequisite-dependent assertions SKIP rather than failing noisily when the prerequisite cannot be established."
  read_only_probe:
    - "Only HTTP GET requests are allowed in Sprint 22 Generator."
    - "Empty ControlStream-scoped Command collections are acceptable endpoint availability evidence when HTTP 200 JSON with items is returned."
    - "Empty ControlStream-scoped Command collections must not PASS /req/controlstream/cmd-ref-from-controlstream; require actual Command/reference evidence or SKIP."
    - "Do not PASS /req/controlstream/canonical-url from /controlstreams/{id} alias evidence when /controls/{id} returns non-200."
    - "Do not PASS /req/controlstream/cmd-canonical-endpoint when /commands returns non-200."

generator_must_do:
  - "Record exact HEAD before editing."
  - "Use official OGC 23-002 identifiers: /req/controlstream and /conf/controlstream."
  - "Add Part 2 ControlStream TestNG group and dependency/prerequisite handling."
  - "Implement declaration-gated SKIP honesty when /conf/controlstream is absent."
  - "Implement read-only ControlStream, schema, nested Command, and selected System-scoped endpoint checks."
  - "Require actual nested Command/reference evidence for cmd-ref-from-controlstream or SKIP on empty IUT state."
  - "Run scripts/mvn-test-via-docker.sh and default GeoRobotix TeamEngine smoke."
  - "Update spec/story/traceability/status/changelog/test-results after implementation."

generator_must_not_do:
  - "Do not use stale dynamic-* identifiers."
  - "Do not implement Command creation, feasibility, Part 2 JSON, SWE Common, CRD, or Update behavior."
  - "Do not mutate GeoRobotix or local OSH."
  - "Do not claim /conf/api-common PASS from ControlStream evidence."
  - "Do not report full /conf/controlstream closure while /req/api-common is absent."
  - "Do not require non-empty nested Command collections."
  - "Do not PASS cmd-ref-from-controlstream on empty nested Command collections."
  - "Do not PASS canonical-url from the /controlstreams/{id} alias while /controls/{id} is non-200."
  - "Do not PASS global Command endpoint assertions while /commands is non-200."

