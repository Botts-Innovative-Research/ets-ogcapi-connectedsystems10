handoff_to_generator:
  next_agent: "generator"
  rationale: |
    Sprint 6 routes DIRECTLY to Generator. No Architect cycle required. Rationale:
    (1) MaskingRequestLoggingFilter fix (S-ETS-06-01): meta-Raze + primary Raze both
        recommend approach (i) — log masked form directly, call ctx.next(originalSpec).
        The approach is uniquely identified and corroborated by 3 independent reviewers.
        No competing approaches require Architect arbitration. The fix is ~30-50 LOC Java.
        The CapturingFilterContext design is straightforward (record requestSpec in ctx.next).
    (2) Sabotage rsync fix (S-ETS-06-02): ~1-2 LOC bash change (remove --exclude='.git/'
        or add explicit cp). No architectural decision.
    (3) Spec reclassification (S-ETS-06-03): pure documentation update. No code decision.

    Architect cycle triggers that would escalate BEFORE Generator:
    - If Generator discovers that bypassing super.filter() requires reimplementing more
      than ~50 LOC of RequestLoggingFilter payload formatting (URL, method, body, params
      in addition to headers) — escalate to Architect for "log format vs wire-safety trade-off"
      decision (approach i vs approach ii/iii).
    - If CapturingFilterContext requires a test framework not in pom.xml that would need
      Architect approval to add (e.g. a mocking library not already present).
    Generator should self-escalate to Architect only if EITHER trigger fires. Probability: low.

  generator_sequencing: |
    Pat's recommended Generator sequence for Sprint 6 (dependency-aware):
    1. S-ETS-06-01 (P0 masking filter fix) — touches MaskingRequestLoggingFilter.java,
       adds VerifyWireRestoresOriginalCredential.java, fixes smoke-test.sh container-log
       timing and credential-leak-e2e-test.sh prong (b) grep. FIRST because it's the
       load-bearing fix and the wire-side test is DoD.
    2. S-ETS-06-02 (P1 sabotage rsync fix) — reads sabotage-test.sh line 205; removes
       --exclude='.git/'; improves log message conditional. SECOND because it's
       independent of S-ETS-06-01 but sequenced after to keep filter-fix in focus.
    3. S-ETS-06-03 (P1 spec reclassification) — amends spec.md + story notes.
       LAST because it references the wire-side test implemented in S-ETS-06-01.
    Total est Generator wall-clock: 2-3h
      - S-ETS-06-01: ~1.5-2h (Java filter redesign + new test class + bash fixes)
      - S-ETS-06-02: ~20-30min (1-2 LOC rsync + log message conditional)
      - S-ETS-06-03: ~15-20min (spec.md + story notes text edits)
    Note: This is significantly less than Sprint 5's estimated 3-5h because (a) no new
    conformance classes to implement; (b) the fix surfaces are precisely bounded by
    gate evidence; (c) the approach is uniquely specified (no competing approaches
    to explore). The primary risk is the CapturingFilterContext / mock-Response design.

