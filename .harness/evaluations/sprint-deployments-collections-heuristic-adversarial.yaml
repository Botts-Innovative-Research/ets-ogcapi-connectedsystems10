story_verdicts:
  deployments-collections-heuristic:
    verdict: "APPROVE"
    confidence: 0.93
    notes: |
      Sprint cleanly closes P0 #1 (Quinn's 2026-04-02 finding on the
      deployments collection heuristic). The fix is SPEC-CORRECT in a
      deeper sense than just adding documentation: the old heuristic was
      both over-broad (id convention admits non-conformant servers) AND
      wrong (itemType.includes() would never match a spec-conformant
      server, which sets itemType='feature' as a fixed string). The
      generator diagnosed both defects and fixed both with a single
      spec-grounded check `collections.some((c) => c.featureType === 'sosa:<X>')`.

      Failure messages are operator-friendly (name featureType verbatim +
      cite /req/<X>/collections). Regression tests lock in the two
      loophole closures with fixtures that have NO featureType — proving
      the new check doesn't silently still admit old-style collections.

      Scope expansion to system-features.ts is legitimate and declared —
      same class of bug, same fix pattern. The 3-sibling deferral
      (procedures/properties/sampling) is honest: Raze grep-verified
      those files have a DIFFERENT bug (missing check entirely, not wrong
      check), with spec-pattern asymmetry (sampling featureType='sosa:Sample';
      property itemType='sosa:Property') correctly captured in the new
      Active issue's fix-guidance.

      Source-spec accuracy verified: Raze independently fetched the 2
      primary requirement adocs + 2 sibling adocs (property, sf) and
      confirmed all values verbatim — capitalization, namespace, and
      distinct property-pattern are correct.

      Gates match claims exactly: vitest 992/992, tsc 0, eslint 0/18.
      Scope discipline is clean (10 files touched, all expected).

      Confidence 0.93 (slightly higher than api-def-fallback's 0.92)
      reflects the quality of the regression tests — closing TWO distinct
      loopholes with per-loophole fixtures, plus the honest scope
      expansion and the correctly-scoped deferral of the sibling bug.

