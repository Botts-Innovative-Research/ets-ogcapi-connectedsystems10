    iut_url: "https://api.georobotix.io/ogc/t18/api"
    conformance: "Declares /conf/system-event and /conf/system-history, but not /conf/api-common."
    system_seed: "GET /systems?limit=1 returned System id 0mqcvdnfoca0."
    canonical_endpoint: "GET /systemEvents?limit=2 returned HTTP 400 Invalid resource name: 'systemEvents'."
    system_scoped_normative: "GET /systems/0mqcvdnfoca0/events?limit=2 returned HTTP 400 JSON: Only streaming requests supported on this resource."
    system_scoped_annex_alias: "GET /systems/0mqcvdnfoca0/systemEvents?limit=2 returned HTTP 400 Invalid resource name: 'systemEvents'."
