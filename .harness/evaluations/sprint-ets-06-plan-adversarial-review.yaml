      classification: TIGHTLY_BOUND_TO_GAP-1_PRIME
      rationale: |
        CONCERN-1 from primary Raze: prong (a) currently passes
        vacuously because container.log is empty (captured AFTER
        teardown). Without this fix, GAP-1' prong (a) cannot verify
        non-vacuous PASS even after the filter fix. This is NOT scope
        creep; it's required for the gate's three-fold cross-check
        to be meaningful.
      verdict: KEEP_BUNDLED
    prong_b_grep_expansion:
      classification: TIGHTLY_BOUND_TO_GAP-1_PRIME
      rationale: |
        CONCERN-2 from primary Raze: prong (b) doesn't grep stub-IUT log,
        only TestNG XML. The masked form Bear***WXYZ does appear in
        stub-IUT log (12 hits per Sprint 5 evidence). After the filter
        fix, the masked form will appear in the FILTER'S log output
        (PrintStream / System.out / catalina.out) — prong (b) needs to
        grep there too. Trivial bash addition.
      verdict: KEEP_BUNDLED
    sabotage_log_message_honest_failure_conditional:
      classification: PARTIAL_SCOPE_CREEP_BUT_DEFENSIBLE
      rationale: |
        S-ETS-06-02 includes "improve log message conditional ... ~5-10
        LOC bash conditional" to distinguish Docker build failure from
        smoke @Test failure. This is honest log messaging, NOT a fix
        for the underlying defect. It's a P2-level improvement bundled
        with a P1 fix. Defensible (~5-10 LOC) but pushes the wedge a
