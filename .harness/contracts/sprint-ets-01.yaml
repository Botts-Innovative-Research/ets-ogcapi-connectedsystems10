scenarios:
  critical:
    - "SCENARIO-ETS-SCAFFOLD-BUILD-001"     # mvn clean install green
    - "SCENARIO-ETS-CORE-LANDING-001"       # landing page assertion passes against GeoRobotix
    - "SCENARIO-ETS-CORE-CONFORMANCE-001"   # /conformance assertion passes against GeoRobotix
    - "SCENARIO-ETS-TEAMENGINE-LOAD-001"    # TeamEngine container loads ETS without registration error
    - "SCENARIO-ETS-CORE-SMOKE-001"         # smoke-test.sh end-to-end exits 0
  normal:
