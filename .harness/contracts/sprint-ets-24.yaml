  - "Add tests/comments referencing REQ-ETS-PART2-005 and SCENARIO-ETS-PART2-005-* IDs."
  - "Run formatter, scripts/mvn-test-via-docker.sh, and GeoRobotix TeamEngine smoke after implementation."
  - "Update spec/story/traceability/status/changelog/test-results after implementation."

generator_must_not_do:
