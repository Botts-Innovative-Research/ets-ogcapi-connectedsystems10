gaps:
  - id: "GAP-1-MASKING-FILTER-WIRE-CORRUPTION"
    severity: high
    description: |
      Sprint 5 S-ETS-05-01 wedge fix (REQ-ETS-CLEANUP-013) is mechanically
      correct: bash + 3-layer Java propagation + 8 unit tests all PASS;
      auth header DOES reach the wire (stub-IUT sees Authorization=
      Bear***WXYZ on every one of 12 requests). HOWEVER, the wire request
      carries the MASKED form, not the unmasked synthetic credential. The
      design.md §"Sprint 3 hardening" claims try/finally restoration so
      "the IUT receives the real credential header" — observed reality
      contradicts this claim.

      Trace: MaskingRequestLoggingFilter.filter() at line 106 does
      (1) snapshot original Authorization, (2) requestSpec.removeHeader +
      requestSpec.header(masked), (3) super.filter(...) → REST-Assured's
      RequestLoggingFilter.filter() invokes ctx.next() which performs the
      HTTP send with the now-masked spec, (4) finally: restore — TOO LATE,
      wire already sent.

      Unit test VerifyMaskingRequestLoggingFilter uses StubFilterContext
      that returns null from ctx.next(...) so the wire-send semantics are
      never exercised — the unit-level guarantee is decorative for this
      aspect. This is why Sprint 3 + 4 + 5 cumulative gates all passed
      unit-level masking checks while the production filter ordering bug
      went undetected.

      Three-fold cross-check live exec (Raze 2026-04-29T23:56:50Z;
      archive /tmp/raze-fresh-ets05/test-results-raze/credleak/):
        (a) PASS — 0 unmasked literal hits in TestNG XML + container log
            + smoke log (BUT: the container log is essentially empty — 1
            line "No such container" — because the smoke-test.sh container
            lifecycle teardown happened before catalina.out capture; this
            prong PASSes vacuously, not by filter merit)
        (b) FAIL — 0 masked-form hits in container log + TestNG XML +
            smoke log (BUT the stub-IUT log has 12 masked-form hits — the
            cross-check script doesn't grep there for prong (b))
        (c) FAIL — 0 unmasked-credential hits in stub-IUT log; 12 hits
            of the MASKED form instead. Wire is corrupted.

      Sprint 4 GAP-1 (cross-corroborated by Quinn + Raze) was "wiring
      missing"; Sprint 5 closes the wiring; the now-visible deeper defect
      is filter ordering. Calling Sprint 4 GAP-1 "closed" is technically
      accurate at the wedge layer but misleading at the
      credential_leak_e2e_test_green success-criterion layer.
    impact: |
      (1) Sprint 5 success_criterion `credential_leak_e2e_full_pass` is
          FALSE; cannot be honestly evaluated TRUE. (Quinn/Raze Sprint 4
          GAP-1 NOT actually closed at the deeper-E2E layer.)
      (2) Production behaviour: any future test against an authenticated
          IUT will fail authentication because the wire delivers a masked
          credential the IUT cannot decode.
      (3) The Sprint 3 + 4 + 5 unit-test confidence in masking filter
          correctness is partially decorative — the StubFilterContext
          pattern fundamentally cannot exercise wire-side ordering.
    recommendation: |
      Sprint 6 P0 candidate: redesign the masking-filter pattern so the
      wire receives the original credential. Three approaches:
        (i) The masking filter does NOT mutate requestSpec; instead it
            captures a SNAPSHOT of headers, builds a masked-string
            representation, prints to System.out (or configured stream)
            DIRECTLY (don't delegate to super.filter() for log output).
            Then call ctx.next(originalSpec) — wire stays original.
        (ii) Insert a sentinel filter AFTER the masking filter that
             restores headers from a thread-local snapshot before the
             actual transport runs. (Brittle — depends on filter chain
             ordering.)
        (iii) Subclass FilterableRequestSpecification with a "masked-for-
              logging-only" wrapper that returns masked values from
              getValue() but allows the underlying transport to read the
              original via a back-door. (Complex; brittle.)
      Approach (i) is the cleanest. Add a NEW E2E test
      VerifyWireRestoresOriginalCredential that uses a real (non-stub)
      FilterContext that records the spec passed to ctx.next() — verify
      that spec carries the ORIGINAL credential, not the masked form.
      Re-run Raze live-exec for three-fold (a)+(b)+(c) all PASS.

  - id: "GAP-2-SABOTAGE-TARGET-SYSTEMFEATURES-DOCKER-BUILD-BROKEN"
    severity: high
    description: |
      scripts/sabotage-test.sh --target=systemfeatures (S-ETS-05-03)
      is NON-FUNCTIONAL at the Docker build step. Live exec at gate
      (Raze 2026-04-29T23:57:49Z; archive
      /tmp/raze-sabotage-ets05/sprint-ets-05-03-sabotage-systemfeatures-
      cascade-2026-04-29T235747Z.log) produced docker build ERROR at
      builder step 6/8:

        #14 [builder 6/8] COPY .git ./.git
        #14 ERROR: failed to calculate checksum of ref ...: "/.git": not found

      Root cause: the sabotage script line 204-207 does `rsync -a
      --exclude='.git/' ... "$REPO_ROOT/" "$SABOTAGE_WORKTREE/"`, which
      excludes .git from the temp worktree. But the project's Dockerfile
      line 59 has `COPY .git ./.git` (added Sprint 2 for git-commit-sha
      pinning per ADR-002). The temp worktree has no .git so the Docker
      build fails immediately on COPY .git.

      The sabotage marker DID inject correctly into the temp worktree's
      SystemFeaturesTests.java (grep-verified in step 3); the worktree-
      pollution guard at line 254 DID work (user worktree at ~/docker/gir/
      ets-ogcapi-connectedsystems10/ remains clean post-run); ONLY the
      Docker build path is broken. The cascade verification (steps 5-6 of
      the script) never executed.

      Generator's testing in the sprint did NOT run a real Docker build
      — only `bash -n`, `--help`, and `--target=foo` exit-code checks.
      The Docker build step was never exercised. The Sprint 5 contract's
      `gate_4_evaluation_question_for_quinn` line 330 said "OR run bash
      scripts/sabotage-test.sh --target=systemfeatures (if S-ETS-05-03
      implemented the flag) to produce fresh evidence" — Quinn or Raze
      was expected to discover this defect at gate.

      The misleading log line "[sabotage-test 23:57:49] smoke exited
      non-zero (EXPECTED — SystemFeatures FAIL on first @Test)" is bad
      messaging — the smoke exited non-zero because Docker build failed,
      NOT because SystemFeatures.systemsCollectionReturns200 fired the
      sabotage marker. The script then dies at step 4 because
      SMOKE_OUTPUT_DIR contains no XML. The script exit code is 2 (die).
    impact: |
      (1) Sprint 5 success_criterion `procedures_dependency_skip_verified`
          + `deployments_dependency_skip_verified` cannot be live-exec
          verified using the very tool S-ETS-05-03 was meant to provide.
          (They CAN be inferred from Sprint 4 Raze sabotage XML which
          showed the cascade firing for Subsystems — extending that
          inference to Procedures + Deployments via testng.xml lint is
          structurally sound; but Pat's Sprint 5 contract specifically
          asked for fresh evidence via the new flag.)
      (2) Sprint 5 success_criterion `sabotage_target_flag_works` is
          FALSE.
      (3) Future gates cannot use --target=systemfeatures to verify
          three-class cascade until fixed.
    recommendation: |
      Sprint 6 P1: trivial fix — sabotage-test.sh line 205 should change
      `--exclude='.git/'` to NOT exclude .git/ (rsync the .git directory
      so the temp tree's Dockerfile build can execute). Or, preserve the
      exclude for performance/space reasons but add a `cp -a $REPO_ROOT/
      .git $SABOTAGE_WORKTREE/.git` step explicitly. ~1 LOC bash change.
      Re-run Raze live-exec to verify the cascade pattern (Core+Common
      PASS, SystemFeatures 1×FAIL+5×SKIP, Subsystems+Procedures+
      Deployments all SKIP).

      Side fix: improve the misleading log message at line 266 ("smoke
      exited non-zero (EXPECTED — SystemFeatures FAIL on first @Test)")
      so it doesn't claim SystemFeatures FAIL when the actual failure was
      Docker build. Detect docker build failure vs smoke @Test failure
      and log accordingly.

concerns:
  - id: "CONCERN-1-CREDENTIAL-LEAK-SCRIPT-CONTAINER-LOG-CAPTURE"
    severity: medium
    description: |
      Even if the masking-filter ordering bug is fixed, the credential-
      leak-e2e-test.sh prong (a)+(b) cross-check is partially decorative
      because it captures container.log AFTER the smoke-test.sh container
      has already been torn down by smoke-test.sh's cleanup_silent trap.
      Live exec at /tmp/raze-fresh-ets05/test-results-raze/credleak/
      container.log shows 1 line: "Error response from daemon: No such
      container: ets-csapi-cred-leak-e2e".

      The container.log file is essentially empty for the entire smoke
      run, so prong (a) "0 unmasked in container log" passes vacuously
      regardless of filter behaviour, and prong (b) "0 masked in
      container log" can never be the source of confidence.
    impact: |
      Sprint 4 + Sprint 5 prong (a) confidence is partially overstated.
      Real container.log inspection requires capturing catalina.out
      DURING the smoke run, not after. Sprint 4 close artifact reading
      is misleading — Sprint 4's PARTIAL verdict actually had the same
      vacuous prong (a) behaviour.
    recommendation: |
      Sprint 6 trivial fix: smoke-test.sh's cleanup_silent should NOT
      tear down the container until after credential-leak-e2e-test.sh
      Step 3 has captured catalina.out. Or, capture catalina.out
      DURING smoke step 7 (before validation) so it's available for
      cross-check independent of teardown order. ~10 LOC bash.

  - id: "CONCERN-2-CREDENTIAL-LEAK-SCRIPT-MISSES-STUB-IUT-IN-PRONG-B"
    severity: medium
    description: |
      The credential-leak script's prong (b) check (line 156-162) greps
      `$CONTAINER_LOG`, `$ARCHIVE_DIR/testng-results.xml`, and `$SMOKE_LOG`
      for the masked form `Bear***WXYZ` — but does NOT grep `$STUB_LOGFILE`.
      The stub-IUT log has 12 masked-form hits in the live exec; prong (b)
      reports 0+0+0=0 hits (FAIL) when the actual masked-form-anywhere
      count is 12.

      This is structurally fine (the prong-b grep targets the test
      artifacts that the masking filter SHOULD log to), but if the
      masking filter doesn't log to System.out / configured stream
      visibly during the smoke run (because System.out goes inside the
      Tomcat container and the container log capture is broken — see
      CONCERN-1), prong (b) is doubly broken.
    impact: |
      Even with the GAP-1 ordering bug fixed, prong (b) might continue to
      report 0 hits unless the container.log capture (CONCERN-1) is also
      fixed.
    recommendation: |
      Sprint 6 trivial: add a grep of stub-IUT log to prong (b) as well —
      the stub-IUT log IS a "test artifact" in the spec sense (it's
      under $ARCHIVE_DIR). Or split prong (b) into "masked-in-test-
      artifacts" (current) and "masked-in-stub-iut-log" (new,
      complementary). The latter is empirical evidence that the filter
      ran somewhere in the chain.

  - id: "CONCERN-3-DEPLOYMENTS-DEPLOYED-SYSTEM-SUBSTRING-MATCH"
    severity: low
    description: |
      DeploymentsTests.deploymentDeployedSystemEncodingDeclared (line 404)
      asserts via substring match: `if (uri.contains(token))` over tokens
      `/conf/geojson`, `/conf/sensorml`, `/conf/json`, `/conf/html`. A
      strict OGC reviewer might prefer exact-URI matching against a
      canonical whitelist (e.g. `http://www.opengis.net/spec/ogcapi-
      connectedsystems-1/1.0/conf/geojson` exactly).

      The substring match is more forgiving (tolerates vendor-specific
      URI form drift), which Generator documents as intentional in the
      class javadoc. Trade-off acceptable for Sprint-1-style minimal
      scope but a future strict-mode option would be valuable.

      GeoRobotix at gate-time has both /conf/geojson + /conf/sensorml
      declared — no false-positive risk for this IUT today.
    impact: |
      Low-severity — graceful degradation by design. Could mask a
      future IUT that declares e.g. `/conf/geojson-v2` (which contains
      "/conf/geojson") but doesn't actually implement DeployedSystem
      encoding.
    recommendation: |
      No immediate action. Document in Sprint 7+ "encoding-class
      assertion strict-mode" as a forward improvement.

  - id: "CONCERN-4-SUITE-FIXTURE-LISTENER-FILTER-ORDERING"
    severity: low
    description: |
      SuiteFixtureListener.onStart calls `registerRestAssuredFilters()`
      before `configureRestAssuredAuthCredential()`. The filter chain
      is registered first; the requestSpecification is set second.
      Ordering is correct as long as `RestAssured.requestSpecification`
      is consulted on each given() call after filters are in place;
      this matches REST-Assured 5.x behaviour.

      However, if a future REST-Assured upgrade changes ordering
      semantics (e.g. snapshots filters at requestSpecification-set
      time), the wedge could silently break. Defensive: register filters
      LAST so the requestSpecification is built first and filters apply
      to all subsequent given() calls.
    impact: |
      Low — defensive concern only; current REST-Assured 5.x works.
    recommendation: |
      Sprint 6+ trivial: swap the call order in SuiteFixtureListener.
      onStart so filters are registered AFTER credential is configured.
      ~2 LOC swap. No behavior change today.

