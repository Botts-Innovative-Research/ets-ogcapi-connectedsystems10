risks:
  highest:
    - id: "MASKING-FILTER-APPROACH-I-COMPLETENESS"
      description: |
        The redesigned filter must produce a log output equivalent to REST-Assured's
        RequestLoggingFilter (200+ LOC of payload formatting) but WITHOUT delegating
        to super.filter(). If the masked log line is too sparse (e.g. only headers,
        not body, not URL, not HTTP method), Raze may flag that the "masking" is
        architecturally incomplete relative to what RequestLoggingFilter logs.
        Alternatively, if Generator doesn't fully understand what super.filter() logs
        and tries to reproduce it, the implementation may grow large or fragile.
        Meta-Raze recommendation (approach i) suggests "format masked-string
        representation, print directly" — the format can be minimal (not full
        REST-Assured payload format) as long as it captures the Authorization header
        in masked form. A simple "Request: [masked] Authorization=Bear***WXYZ" is
        sufficient for prong (b) grep evidence.
      severity: high
      mitigation: |
        Generator MUST read the existing super.filter() call chain (RequestLoggingFilter
        source in rest-assured 5.x) to understand what it logs. Generator SHOULD
        implement a MINIMAL masked log format first (just the header names + masked
        values, plus HTTP method + URL), verify prong (b) grep finds it, and only
        expand if Raze flags it as insufficient. The goal is correctness (wire carries
        original credential), not log aesthetic parity with RequestLoggingFilter.
        Pattern rationale: accept a simpler log format in exchange for structural clarity.
  medium:
    - id: "CAPTURING-FILTER-CONTEXT-MOCK-RESPONSE"
      description: |
        VerifyWireRestoresOriginalCredential requires a CapturingFilterContext that
        records requestSpec passed to ctx.next() but also returns a mock Response
        (since the filter's return value is Response). If the test class creates a
        Response object incorrectly (e.g. null), downstream filter logic may NPE.
      severity: medium
      severity_rationale: |
        Recalibrated from HIGH → MEDIUM by Plan-Raze adversarial review 2026-04-30.
        Mockito IS present in pom.xml test scope (org.mockito:mockito-core, verified
        in /home/nh/docker/gir/ets-ogcapi-connectedsystems10/pom.xml lines 152-153).
        `mock(Response.class)` compiles; the story's example code uses this pattern.
        Residual concern: if Mockito is too heavy or ResponseBuilder is preferable, an
        alternative exists (StubFilterContext already shows a working FilterContext
        implementation without Mockito). Severity is now MEDIUM, not HIGH.
      mitigation: |
        Generator uses Mockito (already present in pom.xml test scope) to implement
        CapturingFilterContext.next() returning mock(Response.class). Generator MUST
        run mvn test and verify the new test class compiles and passes before claiming
        S-ETS-06-01 done. If Mockito causes unexpected issues, use REST-Assured's
        ResponseBuilder or a minimal anonymous Response stub as fallback.
    - id: "SUPER-FILTER-BYPASS-REST-ASSURED-VERSION-DRIFT"
      description: |
        The current filter calls super.filter() which delegates to RequestLoggingFilter.
        After the fix, the filter calls ctx.next() directly. If a future REST-Assured
        upgrade changes what happens inside ctx.next() (e.g. adds retry logic, response
        caching, or interceptor chaining that the RequestLoggingFilter setup initiated),
        bypassing super.filter() could silently break something. However, in REST-Assured
        5.x (the pinned version in pom.xml), ctx.next() is the transport layer —
        there is no known additional behavior between RequestLoggingFilter.filter() and
        ctx.next() beyond the logging. Low probability of immediate impact.
      severity: medium
      mitigation: |
        Generator reads RequestLoggingFilter.filter() source (available in Maven Central
        io.rest-assured:rest-assured:5.x sources jar) to confirm there is no hidden
        logic between the logging step and ctx.next() in the Sprint 5 pinned version.
        Document the bypass decision in the updated MaskingRequestLoggingFilter javadoc
        as a version-pinned trade-off (with the pom.xml version cited). Add a TODO in
        the javadoc noting that if rest-assured is upgraded past 5.x, the bypass should
        be re-evaluated.
  low:
    - id: "SABOTAGE-GIT-TEMP-TREE-SIZE"
      description: |
        Removing --exclude='.git/' from rsync means the .git directory is copied into
        the temp sabotage worktree. This adds a small overhead proportional to .git size.
      severity: low
      severity_rationale: |
        Recalibrated from MEDIUM → LOW by Plan-Raze adversarial review 2026-04-30.
        Directly measured: `du -sh /home/nh/docker/gir/ets-ogcapi-connectedsystems10/.git/`
        = 5.2MB (confirmed by Plan-Raze). Well under Pat's 50MB threshold. Option A
        (remove --exclude='.git/') is the clear choice with no meaningful performance risk.
      mitigation: |
        Generator removes --exclude='.git/' from rsync call (Option A). No size check
        needed — 5.2MB is negligible. Option B (explicit cp -a) is not required.
    - id: "CONTAINER-LOG-CAPTURE-TIMING-FIX-SIDE-EFFECT"
      description: |
        Changing when container teardown happens in smoke-test.sh (to allow catalina.out
        capture before teardown) may change the smoke-test.sh exit code in edge cases
        (e.g. if the container crashes before the capture step, the smoke test may now
        see a non-zero exit from an intermediate cleanup step). Minimal risk since
        smoke-test.sh is defensive already.
      severity: low
      mitigation: |
        Generator reads the smoke-test.sh trap/cleanup logic carefully before modifying
        teardown timing. Change should be: capture catalina.out DURING step 7 (before
        validation + before cleanup_silent trap fires) rather than after the script exits.
        No teardown order change required — just an additional docker logs capture step
        at step 7. If the container is already stopped by the time step 7 runs (edge case),
        the capture produces an empty log — which is acceptable (docker logs returns empty
        for a stopped container vs "Error response from daemon: No such container" for a
        removed container; the CONCERN-1 fix is specifically about NOT removing before capture).

