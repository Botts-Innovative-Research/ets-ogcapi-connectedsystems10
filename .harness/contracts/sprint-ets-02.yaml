# Sprint 2 contract — ETS cleanup-plus-one-new-conformance-class
# Generated by Planner (Pat) 2026-04-28 from Sprint 1 close (3 stories shipped, 6 gates closed,
# all 5 critical + 5 normal SCENARIOs PASS, 1 inherited PARTIAL `uri_mapping_fidelity_preserved`
# carried over). Distilled from the 6 Sprint 1 gate reports (Quinn x3 + Raze x3) and the
# architect-handoff surfaced_risks_pat_missed items still pending.

sprint: "ets-02"
sprint_name: "cleanup-plus-systemfeatures"
type: "cleanup-plus-feature-expansion"
created: "2026-04-28T20:50:00Z"
description: |
  Sprint 2 has two intertwined goals: (a) close the 8 cleanup items inherited from
  Sprint 1's gate reports — most importantly the `uri_mapping_fidelity_preserved`
  PARTIAL that's the only outstanding success_criterion on the Sprint 1 contract; and
  (b) prove that the architectural pattern S-ETS-01-02 established (conformance.<class>.*
  package, EtsAssert plumbing, fixture wiring, testng.xml registration, smoke-test
  verification against GeoRobotix) extends mechanically to a second Part 1 conformance
  class. The new feature is `SystemFeatures` (REQ-ETS-PART1-002, `/conf/system-features`)
  — chosen because (i) every CS API endpoint exposes `/systems` collections so it's
  foundational for the remaining 12 classes, (ii) GeoRobotix actually serves a non-empty
  `/systems` collection (verified via curl in v1.0 web-app E2E tests), (iii) the
  dependency-skip SCENARIO-ETS-PART1-DEPENDENCY-SKIP-001 already references SystemFeatures
  by name, and (iv) it has a corresponding spec-trap fixture group in v1.0
  (`tests/fixtures/spec-traps/asymmetric-feature-type/`) that future S-ETS-06-* will port.

  Sprint 2 explicitly EXCLUDES Part 2 work (continuing the 2026-04-27 user gate),
  remaining 12 Part 1 classes (sprint-by-sprint after a successful S-ETS-02-06), spec-trap
  fixture port (epic-ets-06 still parallel), and CITE submission (still beta-bound).

  Carryover cleanup items 1-8 are P0/P1 scope (uri_mapping fidelity is the only one that
  unblocks closing the Sprint 1 contract; the others unblock Sprint 3+ specifically by
  removing cumulative refactor cost and adding the audit-trail rigor the architect requires
  before Sprint 2+ classes scale the assertion-site count from ~21 to ~150-200). The new
  conformance class S-ETS-02-06 is P0.

