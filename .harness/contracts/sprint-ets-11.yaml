evaluation_focus:
  - "Generator must re-verify GeoRobotix /conformance and preserve SKIP-with-reason when /conf/advanced-filtering is absent."
  - "Generator must not count undeclared GeoRobotix query behavior as conformance PASS."
  - "For a declaring IUT, Generator must fail empty `/systems?id=<seed-id>` and `/systems?q=<seed-keyword>` results after seed selection; only missing seed data may SKIP."
  - "Generator must implement the explicit ID_List helper examples from the story/contract without extending the sprint into full endpoint query semantics."
  - "Generator must not implement POST/PUT/PATCH/DELETE or create-replace-delete/update checks."
  - "Generator must keep geometry filtering at smoke level only unless a full spatial semantics oracle is implemented."
  - "Quinn should run scripts/mvn-test-via-docker.sh from a /tmp clone and verify surefire includes AdvancedFiltering lint tests."
  - "Raze should run scripts/smoke-test.sh from a separate /tmp clone and verify failed=0 and total PASS+SKIP >= 63."
  - "Raze should inspect for false PASS from absent /conf/advanced-filtering and from unvalidated query result semantics."

risk_register:
  - id: "ADVFILTER-IUT-NOT-DECLARED"
    severity: "MEDIUM"
    mitigation: "Default smoke should SKIP AdvancedFiltering with reason; do not fail or pass from undeclared query behavior."
  - id: "ADVFILTER-SEMANTIC-OVERCLAIM"
    severity: "MEDIUM"
    mitigation: "Sprint 11 validates only scoped systems/common-resource behavior and documents all unimplemented subrequirements."
  - id: "MUTATION-SCOPE-CREEP"
    severity: "LOW"
    mitigation: "Contract excludes create-replace-delete/update and all POST/PUT/PATCH/DELETE behavior."
