    - "OGC .adoc canonical URIs (Pat-verified 2026-04-29): /req/procedure/{resources-endpoint,canonical-url,canonical-endpoint,location,collections}; /req/deployment/{resources-endpoint,canonical-url,canonical-endpoint,deployed-system-resource,collections}"
