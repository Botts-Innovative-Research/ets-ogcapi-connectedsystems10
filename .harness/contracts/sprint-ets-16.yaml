# Sprint 16 contract - SensorML non-system read-only expansion
# Created 2026-05-06 after Sprint 15 Generator commit.

sprint: "ets-16"
sprint_name: "sensorml-non-system-readonly-expansion"
type: "feature-expansion"
created: "2026-05-06T19:03:00Z"
description: |
  Sprint 16 extends REQ-ETS-PART1-013 rather than adding a new Part 1 class.
  Sprint 10 implemented only the systems read-only SensorML subset. Sprint 16
  plans deployment, procedure, and property SensorML schema/mapping coverage
  while preserving fallback honesty when an IUT returns CS API default JSON
  instead of SensorML JSON.

stories:
  - id: "S-ETS-16-01"
    title: "SensorML non-system read-only expansion"
    file: "epics/stories/s-ets-16-01-sensorml-non-system-readonly-expansion.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"
