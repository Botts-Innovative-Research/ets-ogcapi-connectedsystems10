findings:
  - id: "RAZE-ETS25-IMPL-GAP-001"
    severity: "HIGH"
    status: "open"
    title: "Observation phenomenonTime filter can PASS using resultTime-only evidence"
    evidence:
      - "Part2AdvancedFilteringTests.assertObservationPhenomenonTimeFilterFromSeed queries /observations?phenomenonTime=<requestedTime>."
      - "firstObservationPhenomenonTime calls observationPhenomenonTime, and observationPhenomenonTime falls back to resultTime when phenomenonTime is absent."
      - "The returned-item check uses the same fallback, so an Observation with no phenomenonTime can satisfy /req/advanced-filtering/obs-by-phenomenontime through resultTime alone."
      - "Story and OpenSpec separate Observation phenomenonTime and resultTime filter predicates; resultTime-only evidence is not valid phenomenonTime predicate evidence."
    risk: "A declaring IUT that omits phenomenonTime, ignores the phenomenonTime filter, or returns resultTime-matching observations could get a false PASS for obs-by-phenomenontime."
    required_fix:
      - "For /req/advanced-filtering/obs-by-phenomenontime, seed and validate only the observation phenomenonTime member."
      - "If no phenomenonTime seed exists, SKIP that assertion with a precise reason instead of falling back to resultTime."
      - "Add a helper regression proving an Observation with only resultTime cannot satisfy phenomenonTime predicate evidence."
  - id: "RAZE-ETS25-IMPL-CONCERN-001"
    severity: "LOW"
    status: "open"
    title: "timeIntersects has a permissive substring shortcut before parsing"
    evidence:
      - "timeIntersects returns true when candidate contains requested or requested contains candidate before parsing either side as an Instant or interval."
    risk: "A malformed time string embedding the requested value could satisfy a time predicate without valid temporal evidence."
    required_fix: []
    recommendation:
      - "Prefer exact equality or parsed instant/interval intersection; avoid substring acceptance except for a narrowly justified, tested representation case."
