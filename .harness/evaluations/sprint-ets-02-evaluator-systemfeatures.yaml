verdict_rationale: |
  All 10 evaluator checks PASS independently. Dana's URI-form pivot from design.md's
  speculative `/req/system-features/<X>` (plural-with-suffix) to the OGC `.adoc`
  canonical `/req/system/<X>` (singular) is empirically correct: I curl-confirmed the
  GitHub Contents API returns HTTP 200 for the `/system/` path with 7 files including
  the 5 `req_*.adoc` Dana cites (`req_resources_endpoint`, `req_canonical_url`,
  `req_canonical_endpoint`, `req_collections`, `req_location_time`), and HTTP 404 for
  the speculative `/system-features/` path. Zero `system-features` references survive
  in production Java (the only hits are inside Javadoc cross-references to the
  `csapi_compliance` v1.0 TypeScript registry filename, which is correct cross-repo
  documentation and outside the audit-trail scope). Zero bare AssertionError /
  Assert.fail in the entire conformance.* package. The 4 SystemFeatures @Test methods
  all route through ETSAssert helpers (assertStatus, assertJsonObjectHas,
  assertJsonArrayContains, failWithUri) per ADR-008 — verified by reading
  SystemFeaturesTests.java line-by-line. Archived smoke XML at
  `ops/test-results/sprint-ets-02-systemfeatures-georobotix-smoke-2026-04-28.xml`
  reports `total="16" passed="16" failed="0" skipped="0"` with all 4 SystemFeatures
  @Test methods carrying the `depends-on-groups="core"` attribute confirming the
  group-dependency wiring resolved correctly. testng.xml is consolidated into a
  single `<test>` block (per the empirical TestNG group-scope discovery commit
  `02796dd`); group `systemfeatures` declares `depends-on="core"` via the
  `<dependencies>` element. v1.0 GH#3 sentinel preserved at SystemFeatures level
  (`systemsCollectionLinksDiscipline` lines 292-300 explicitly document both
  presence and absence of `rel="self"` as PASS). `mvn test -q -o` succeeds; surefire
  reports 49 tests / 0 failures / 0 errors / 3 skipped (15 ETSAssert + 1 TestNGController
  [skipped] + 2 ValidationUtils + 15 CredentialMaskingFilter + 9 XMLUtils + 2
  SuiteFixtureListener + 5 URIUtils [2 skipped]) — byte-exact match to Dana's claim.
  Reproducibility sha256 `b51577cfb48535c6322cfc117514bd501e4d180b6c1435f8628b56d31a7a000a`
  on the main jar matches Dana's claim verbatim. Spec.md REQ-ETS-PART1-002 reflects
  the `/req/system/<X>` URI form, and traceability.md row R-PIVOT-03 status is
  "Implemented (pending Quinn+Raze)" with full evidence trail. Confidence 0.96 (vs
  prior best 0.93) because (a) every Dana-claimed evidence item independently
  reproduced from disk + remote, (b) the URI pivot is the highest-risk surface and
  it survives the harshest check (live OGC Contents API), (c) the smoke XML is
  byte-readable and shows the depends-on-groups attribute explicitly. The 0.04
  uncertainty preserves space for the live break-Core dependency-skip verification
  that was deferred (see concerns).

