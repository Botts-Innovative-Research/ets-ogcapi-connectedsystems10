    rationale: |
      AdvancedFiltering is the only remaining non-mutation Part 1 requirement class.
      GeoRobotix does not declare /conf/advanced-filtering, so Sprint 11 must be
      declaration-gated and SKIP-honest in default smoke while still implementing the
      suite structure and read-only checks for IUTs that do declare the class.

