internal_consistency_check:
  quinn_score: 0.86
  quinn_severity_distribution: "1 MEDIUM (GAP-Q1) + 1 LOW (GAP-Q2) + 3 CONCERNs"
  raze_score: 0.78
  raze_severity_distribution: "1 HIGH (GAP-1) + 2 MEDIUM (GAP-2 + GAP-3) + 1 LOW (GAP-4) + 3 CONCERNs"
  score_gap: 0.08
  sprint_5_score_gap: 0.08 (Quinn 0.82 - Raze 0.74)
  is_0_08_gap_meaningful: PARTIALLY |
    Both Sprint 5 and Sprint 6 score gaps are 0.08. Sprint 5 meta-Raze
    flagged this as "project-largest" gap. Sprint 6 ties it. Some of this
    is structural: Quinn's role is "did the work meet the checklist?" and
    Raze's role is "is this the right checklist + are there gaps the
    Generator silently dropped?" — Raze's role inherently produces lower
    scores when GAPs exist. The 0.08 gap could indicate either (a) the
    rubrics are calibrated such that Quinn-Raze gap ≈ 0.08 when both find
    legitimate medium-severity gaps, or (b) Raze finds gaps Quinn misses
    by design. I lean (b) given the script-defect divergence (Quinn found
    GAP-Q1 in cred-leak script; Raze found GAP-3 in sabotage script).
  arithmetic_check_quinn:
    score: 0.86
    deduction: "1.00 - 0.05 (GAP-Q1 MEDIUM) - 0.02 (GAP-Q2 LOW) - 0.07 (CONCERNs + 3 deferred-to-Raze live-execs which Quinn explicitly notes is dependency on Raze) = 0.86. Internally consistent."
  arithmetic_check_raze:
    score: 0.78
    deduction: "1.00 - 0.10 (GAP-1 HIGH) - 0.05 (GAP-2 MEDIUM) - 0.05 (GAP-3 MEDIUM) - 0.02 (GAP-4 LOW) = 0.78. Score derivation block in Raze YAML matches; internally consistent."
  consistency_verdict: |
    Both verdicts are internally arithmetically consistent. The 0.08 gap
    between Quinn and Raze is meaningful but not anomalous — it reflects
    Raze's stronger finding (1 HIGH vs 0 HIGH for Quinn). The 0.86 + 0.78
    averaged at 0.82 is similar to Sprint 5's average (0.78), reflecting
    Sprint 6's partial rebound (+0.04 on each gate; +0.04 on the average).

