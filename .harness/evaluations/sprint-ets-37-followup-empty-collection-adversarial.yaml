        lines: "643-671"
        detail: "`hasNoRootDatastreams` and `hasNoReadableObservations` catch any RuntimeException and return true, causing list/count to emit empty Observation JSON."
      - path: "/home/nh/docker/gir/osh-core/sensorhub-service-consys/src/main/java/org/sensorhub/impl/service/consys/resource/BaseResourceHandler.java"
        lines: "292-302, 496-503"
        detail: "When `forceEmptyStoreJsonResponse()` is true, datastore query/count RuntimeExceptions can be converted into empty collection or zero-count JSON."
    risk: "A real datastore or serializer defect can become a clean PASS-looking empty response instead of a visible server failure, which is exactly the false-confidence class this sprint is trying to avoid."
    required_fix: "Narrow the recovery path to a proven empty-store or documented stale-reference condition. Do not convert arbitrary RuntimeException failures into empty JSON, especially when the store may contain matching records."
