verdict_policy:
  declaration_gate:
    - "If /conf/swecommon-binary is not declared exactly, SWE Common Binary assertions SKIP with a precise reason."
  prerequisites:
    - "Keep SWE Common 3.0 /conf/binary-encoding-rules visible before reporting full class closure."
  condition_gates:
    - "Observation-side assertions require /conf/datastream."
    - "Command-side assertions require /conf/controlstream."
    - "Mediatype-write requires /conf/create-replace-delete and non-mutating API-definition evidence."
  mediatype_honesty:
    - "Mediatype-read PASS requires advertised/retrieved Observation or Command evidence, HTTP 200, and exact application/swe+binary content type."
    - "Format-list evidence, application/vnd.ogc.swe+binary, application/swe+text, application/swe+csv, application/swe+json, application/json fallback, auto content type, HTTP errors, empty bytes, and empty candidate collections cannot PASS."
  schema_honesty:
    - "Schema PASS requires retrieved Observation Schema or Command Schema metadata and bundled schema validation."
    - "Schema PASS also requires application/swe+binary media member, recordSchema, and BinaryEncoding evidence."
  mapping_honesty:
    - "Observation mapping PASS requires canonical Time definition evidence from retrieved recordSchema, following the SWE Common JSON mapping rules."
    - "Command mapping PASS requires canonical IssueTime definition evidence from retrieved recordSchema, following the SWE Common JSON mapping rules."
  encoding_honesty:
    - "Observation and Command binary encoding PASS requires parent schema, child resource candidate, exact binary media type, non-empty body, and SWE Common Binary encoding-validator evidence; otherwise SKIP."
  mutation_safety:
    - "Default public GeoRobotix smoke must issue zero IUT-bound POST, PUT, PATCH, or DELETE."
    - "Requirement 124 mediatype-write is API-definition/readiness only in the first increment and must be scoped to Observation or Command resource endpoints."

