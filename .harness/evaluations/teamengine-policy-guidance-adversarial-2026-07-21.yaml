discovery_summary:
  - "OGC policy treats a compliance test package as versioned ETS, test data, standards package, and TEAM Engine build evidence; TeamEngine build provenance matters."
  - "TeamEngine 6 guidance and migration issues make Java 17, Tomcat 10.1, newer TestNG/Jakarta/Jersey behavior, REST registration, and dependency/classloader checks high-risk review areas."
  - "The digest-pinned TeamEngine 6 base-image direction is justified because public image tags are mutable."
  - "Sprint 41 is not complete until final Maven and real local OSH TeamEngine 6 E2E are archived."
  - "Connected Systems issue traffic highlights semantic risks around observation/result schema separation, SWE recordSchema/encoding wrappers, media-type/write advertising, PUT encoding loss, PATCH gaps, validTime, history, sorting, and bulk operations."
  - "OpenSensorHub is a useful real IUT but not an oracle; public issues show active drift and edge-case defects."

findings:
  - id: "RAZE-POLICY-001"
    severity: "HIGH"
    title: "CTL, TestNG, Java, smoke, and docs disagree about canonical run arguments"
    evidence:
      - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md:1068 says the CTL wrapper shall expose iut-url, auth-type, and auth-credential."
      - "src/main/java/org/opengis/cite/ogcapiconnectedsystems10/TestRunArg.java:12 and :36 define actual Java keys iut and auth-credential, with mutation keys at :43 and :49."
      - "src/main/resources/org/opengis/cite/ogcapiconnectedsystems10/testng.xml:4-7 declares iut, ics, mutation-tests-enabled, and mutation-iut-policy, but not auth-credential."
      - "src/main/scripts/ctl/ogcapi-connectedsystems10-suite.ctl:68-76 exposes mutation controls but no auth credential field."
      - "scripts/smoke-test.sh:196-215 forwards SMOKE_AUTH_CREDENTIAL and mutation env vars to TeamEngine REST, so the non-UI path is more complete than the CTL form and public docs."
    impact: "Authenticated local OSH runs, mutation safety gates, and user-facing TeamEngine UI execution are not described or exposed consistently."
    required_fix: "Choose one canonical argument contract and reconcile OpenSpec, CTL, testng.xml defaults, Java enum docs, smoke-test.sh docs, README, Javadoc, and site docs."

  - id: "RAZE-POLICY-002"
    severity: "HIGH"
    title: "The Maven docker profile remains a stale TeamEngine 6 alignment risk"
    evidence:
      - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md:2055 requires Dockerfile, Compose, POM runtime metadata, and smoke harness alignment."
      - "pom.xml:350-384 still defines a docker profile with fabric8 docker-maven-plugin plus maven-dependency-plugin:copy."
      - "Dockerfile:58-65 uses explicit dependency:get plus one selected resources jar, avoiding the broad copy path."
      - "scripts/verify-teamengine6-runtime.sh:37-49 guards the Dockerfile selected payload, but it does not fail on the stale POM docker profile path."
    impact: "A future operator invoking mvn -Pdocker could bypass the reviewed digest-pinned Dockerfile path or reintroduce broad dependency-copy classpath leakage."
    required_fix: "Remove the stale Maven docker profile or make it delegate to the same digest-pinned Dockerfile and selected payload, then add structural coverage for the profile."

  - id: "RAZE-POLICY-003"
    severity: "HIGH"
    title: "Public suite metadata and site docs still contain archetype placeholders"
    evidence:
      - "src/main/config/teamengine/config.xml:15 says 'Describe scope of testing' and :16 has the inherited placeholder comment."
      - "src/main/scripts/ctl/ogcapi-connectedsystems10-suite.ctl:33-43 lists XML and XML Base plus Level 1/Level 2 instead of Connected Systems conformance classes."
      - "src/main/scripts/ctl/ogcapi-connectedsystems10-suite.ctl:53 defaults the IUT to a W3Schools XML note."
      - "src/site/asciidoc/index.adoc:20-23 lists Class A/Class B placeholders, and :30-32 cites WCAG/XML/RFC 7231 instead of OGC 23-001/23-002/SensorML/SWE."
      - "src/site/asciidoc/changelog.adoc:3-7 still uses '${project.version} (YYYY-MM-DD)' and Class A/Class B."
      - "src/main/config/test-run-props.xml:5 and src/main/resources/test-run-props.xml:5 both default to the W3Schools XML note."
    impact: "This violates TeamEngine TestNG guidance to update suite metadata, docs, Javadoc overview, and CTL wrapper after archetype creation, and it misleads CITE reviewers and IUT operators."
    required_fix: "Replace archetype placeholders with actual OGC API Connected Systems scope, covered Part 1 and Part 2 status, real run arguments, and TeamEngine 6/local OSH execution guidance."

  - id: "RAZE-POLICY-004"
    severity: "MEDIUM"
    title: "README.adoc is obsolete relative to Sprint 41 and current implemented scope"
    evidence:
      - "README.adoc:28-38 says the ETS verifies only Part 1 and is built on TeamEngine 5.6.x/5.6.1."
      - "README.adoc:42-52 says conformance-class enumeration is deferred and Part 2 is out of scope."
      - "README.adoc:74-76 documents mvn -P docker and a TeamEngine 5.6.1 image tag that no longer matches the digest-pinned TeamEngine 6 Dockerfile."
    impact: "The repository front door contradicts Sprint 41, the traceability matrix, and current Part 2 implementation records."
    required_fix: "Refresh README.adoc to describe TeamEngine 6, current partial Part 1/Part 2 ETS coverage, smoke-test.sh usage, local OSH primary E2E, and incomplete Sprint 41 gates."

  - id: "RAZE-POLICY-005"
    severity: "MEDIUM"
    title: "Sprint 41 Maven evidence artifact has a misleading 'Final' label"
    evidence:
      - "ops/test-results/sprint-ets-41-teamengine6-verification-2026-07-21.txt:11 labels the 298/0/0/3 Docker Maven wrapper result as Final."
      - "The same artifact at :14-17 says the pass predates final structural additions and must not be treated as final post-Raze totals."
      - "epics/stories/s-ets-41-01-teamengine-6-runtime-migration.md:48 and :50 correctly keep final Maven and local OSH E2E open."
    impact: "The artifact can be quoted incorrectly even though the main story and ops status are honest."
    required_fix: "Relabel the artifact as earlier Maven evidence and keep final failed-before-tests attempts separate."

  - id: "RAZE-POLICY-006"
    severity: "MEDIUM"
    title: "Operational handoff has stale local-environment and remote-transport details"
    evidence:
      - "ops/status.md:10 points future sessions at /home/nh/docker/gir/ets-ogcapi-connectedsystems10, but this checkout is /home/nh/docker/ets-ogcapi-connectedsystems10 and the documented gir path is absent in this environment."
      - "ops/status.md:30 says the local origin uses SSH, but git remote -v reports HTTPS fetch and push URLs in this checkout."
      - "ops/status.md:36 accurately says the documented field-hub stack is absent; shell checks also show /home/nh/docker/gir/sar-ops/field-hub is absent."
    impact: "A future agent following the handoff can start in the wrong path or make wrong assumptions about push/auth state."
    required_fix: "Correct the entry path and origin note, while preserving the honest field-hub/local OSH blocker."

  - id: "RAZE-POLICY-007"
    severity: "LOW"
    title: "One retained generator handoff line still has the superseded TeamEngine resources inventory"
    evidence:
      - ".harness/handoffs/generator-handoff.yaml:7 records the corrected top-level state: resources 6.0.0 absent and RC2 present."
      - ".harness/handoffs/generator-handoff.yaml:50 in an older retained block still says the base supplies teamengine-resources-6.0.0.jar."
    impact: "The current top handoff is correct, but a resumed agent reading deeper can resurrect the old inventory mistake."
    required_fix: "Mark the older block as superseded or correct the stale resources line."

