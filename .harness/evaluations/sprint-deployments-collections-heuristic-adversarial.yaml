  Gates match claims exactly: vitest 992/992, tsc 0, eslint 0/18
  warnings (all pre-existing). Scope discipline clean (10 files touched,
  all expected).

  Two minor gaps: (1) no E2E live-IUT verification (defensible — same
  treatment as prior sprints); (2) the wrong-itemType regression test
  could also cover `itemType='feature' + no featureType` to prevent a
  future refactor that accidentally loosened the check to itemType only.
  Neither warrants downgrading to GAPS_FOUND.

final_conclusion: |
  Well-executed sprint with the tightest diagnostic work Raze has seen
  this session. The generator identified that the old heuristic had TWO
  distinct defects (over-broad id + wrong itemType), fixed both with one
  spec-grounded check, and wrote a dedicated regression test per
  loophole rather than bundling them into one vague "fails on bad
  collection" test. That test-level discipline is the pattern that makes
  the anti-regression guarantee structural rather than aspirational.

  The scope expansion to system-features.ts is the right call: fixing
  deployments-only would leave a visible inconsistency for any user
  running the assessor. The sister-bug deferral (procedures/properties/sampling)
  is genuinely a DIFFERENT class of bug, with a spec-pattern asymmetry
  (property uses itemType; sampling uses sosa:Sample not SamplingFeature)
  that warrants its own focused sprint rather than being rushed into
  this one.

  APPROVE and commit.
