  q2_scope:
    question: "Full AdvancedFiltering class or a read-only subset?"
    decision: "systems/common-resource read-only subset"
    rationale: |
      The upstream class is broad and cross-cuts resources, association filters, geometry filters,
      and combined filters. Sprint 11 targets a small verifiable subset: conformance declaration,
      local ID_List helper behavior, systems id/keyword filters, geometry smoke shape, and dependency wiring.
      Current GeoRobotix does not declare /conf/advanced-filtering, so default smoke must SKIP rather than PASS.

