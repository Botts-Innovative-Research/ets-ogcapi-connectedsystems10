  - "Current ETS repo HEAD after Sprint 10 gates: 58d70f5"
  - ".harness/evaluations/sprint-ets-10-evaluator-gate.yaml (Quinn APPROVE_WITH_CONCERNS 0.91)"
  - ".harness/evaluations/sprint-ets-10-adversarial-gate.yaml (Raze APPROVE 0.91)"
  - "openspec/capabilities/ets-ogcapi-connectedsystems/spec.md (REQ-ETS-PART1-009 SPECIFIED for Sprint 11)"
