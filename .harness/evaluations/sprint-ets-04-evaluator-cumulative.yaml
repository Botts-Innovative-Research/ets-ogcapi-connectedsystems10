gaps_found:
  - id: GAP-1
    severity: high
    description: |
      S-ETS-04-03 credential-leak E2E live exec FAILED at gate. Three-fold
      cross-check: prong (a) PASS (0 unmasked credential leaks in TestNG XML,
      container log, smoke log); prong (b) FAIL (0 masked-form `Bear***WXYZ`
      hits in any artifact); prong (c) FAIL (0 unmasked-credential hits in
      stub-IUT log — 11 inbound requests, ALL with `Authorization=<absent>`).
      Root cause: scripts/smoke-test.sh has ZERO references to
      `SMOKE_AUTH_CREDENTIAL`, `auth-credential`, or `Authorization`
      (verified via grep). The auth-credential plumbing claimed in
      credential-leak-e2e-test.sh line 112 ("smoke-test.sh propagates this to
      the CTL/TestNG suite parameter `auth-credential`") DOES NOT EXIST. The
      synthetic credential never enters the smoke pipeline; therefore the
      masking filter is never exercised (prong b zero) and the wire request
      never carries the credential (prong c zero). Dana's self-test in
      sprint-ets-04-03-credential-leak-2026-04-29.txt lines 36-47 only
      verifies the stub-IUT primitive itself works, NOT the end-to-end auth
      threading. This is a real Sprint 4 GAP, not just a deferral — when
      Quinn exec'd what Dana deferred, two of three prongs failed
      structurally.
    recommendation: |
      Sprint 5 wedge: extend smoke-test.sh to honor SMOKE_AUTH_CREDENTIAL by
      passing `-Dauth-credential=<value>` (or equivalent CTL/TestNG suite
      parameter) to the curl POST that runs the suite. Wire the resulting
      `auth-credential` parameter through SuiteFixtureListener (add a new
      SuiteAttribute.AUTH_CREDENTIAL) and inject into a REST-Assured filter
      chain that adds the Authorization header to all requests. Then re-run
      credential-leak-e2e-test.sh — expect prong (b) >=1 hit AND prong (c)
      >=1 hit. ~1-2h Generator time. The unit-layer credential-leak coverage
      (Sprint 3 8/8 VerifyMaskingRequestLoggingFilter + grep-evidence
      integration test) remains green and continues to be the load-bearing
      evidence for the masking filter itself; Sprint 4's deeper-E2E ambition
      requires the smoke-pipeline glue.

  - id: GAP-2
    severity: medium
    description: |
      Worktree pollution recurrence: when Quinn ran `bash scripts/credential-
      leak-e2e-test.sh` per the briefing's live-exec ITEM 1, the script
      transitively invoked smoke-test.sh which wrote to
      `ops/test-results/s-ets-01-03-teamengine-smoke-2026-04-29.xml` IN THE
      USER'S WORKTREE — exactly the violation the contract's
      worktree_pollution_constraint forbids. This is the SAME pattern as the
      Sprint 2 systemfeatures gate-run incident (changelog 2026-04-29T00:25Z).
      Quinn restored via `git checkout HEAD --` after capturing evidence; the
      worktree is now clean. The contract briefing forbade running smoke
      against the user's worktree but the credential-leak-e2e-test.sh
      hardcodes `IMAGE_TAG=ets-ogcapi-connectedsystems10:smoke` and
      smoke-test.sh writes to its own repo-relative ops/test-results/ — there
      is no way to run the live-exec WITHOUT polluting the worktree given
      the current script architecture.
    recommendation: |
      Sprint 5 contract: add an env var like `SMOKE_OUTPUT_DIR` to
      smoke-test.sh that overrides the default repo-relative
      ops/test-results/ path. Then gate briefings can set this to /tmp/
      before running live execs against the worktree. Alternative: the
      gate briefing should instruct Quinn/Raze to clone the repo to /tmp/
      first, then run scripts there — but this only works if the smoke
      image is rebuilt against the /tmp/ clone (slow). Document the
      smoke-output-dir override pattern in design.md.

concerns:
  - id: CONCERN-1
    severity: medium
    description: |
      S-ETS-04-04 sabotage-script does not have a `--target=systemfeatures`
      mode. The script targets ONLY Core (sabotages by stubbing every IUT
      response with HTTP 500, which fails Core's first @Test). To live-verify
      the two-level cascade Subsystems→SystemFeatures→Core, the script needs
      to sabotage SystemFeatures specifically (so Core PASSes, SystemFeatures
      FAILs, and Subsystems should cascade-SKIP). With Core sabotaged,
      Core FAILs and ALL of SystemFeatures+Subsystems SKIP via transitive
      cascade — which only proves the END-to-END SKIP works, not the
      MIDDLE-level isolation. The defense-in-depth @BeforeClass SkipException
      in SubsystemsTests is structural-lint visible (Quinn read source 196-
      299) and ADR-010 v2 amendment ratifies this is acceptable, but a
      sabotage-script extension would close the live-exec loop more decisively.
    recommendation: |
      Sprint 5: add a `--target=systemfeatures` flag to sabotage-test.sh that
      stubs only `/systems` (returning 500 for that path; Core's landing-
      page+conformance pass via the IUT's normal 200 responses; SystemFeatures
      @Tests fail because /systems is stubbed; Subsystems should cascade-SKIP
      due to depends-on=systemfeatures). 30-60 min Generator time. Single
      archive proves the two-level isolation works.

  - id: CONCERN-2
    severity: low
    description: |
      The Subsystems testng-results.xml shows `depends-on-groups="systemfeatures"`
      on each @Test method (NOT just at the group-level). This is double-
      declared: testng.xml has `<group name="subsystems" depends-on="systemfeatures"/>`
      AND each @Test has `dependsOnGroups = "systemfeatures"` literal Java
      annotation. Both are valid TestNG idioms; the redundancy is cheap but
      could surprise future maintainers (which one fires first, what happens
      if they diverge). ADR-010 v2 amendment defense-in-depth pattern
      explicitly endorses redundancy as risk-control, so this is by-design.
    recommendation: |
      Document the dual-declaration pattern explicitly in design.md as a
      defense-in-depth idiom. Sprint 5+ may simplify to a single declaration
      site once two-level cascade is empirically proven (currently structural-
      lint only because no live exec isolates the middle level — see CONCERN-1).

  - id: CONCERN-3
    severity: informational
    description: |
      The post-Subsystems testng-results.xml header shows total=26 passed=26
      failed=0 skipped=0 (12 Core + 6 SystemFeatures + 4 Common + 4 Subsystems).
      But the XML body also shows `<test-method is-config="true" name=
      "fetchSubsystemsCollection"` with `duration-ms="-1265"` — a NEGATIVE
      duration. This is a TestNG XML anomaly (start_time later than finish_time
      due to clock skew or @BeforeClass timing artifact across nested test
      contexts), not a test failure. The status="PASS" is correct (the
      @BeforeClass succeeded; the parent system was found). Cosmetic; Raze may
      flag as noise.
    recommendation: |
      No action required. If Raze flags, document as known TestNG XML
      reporter quirk (similar to Sprint 3's nested @BeforeClass duration
      observations).

