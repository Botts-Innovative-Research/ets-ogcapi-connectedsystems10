strategic_decisions:
  q1_next_class:
    question: "Which remaining Part 1 class should Sprint 10 implement?"
    decision: "sensorml"
    rationale: |
      SensorML systems read-only coverage keeps the project in the low-risk encoding lane after GeoJSON.
      It avoids AdvancedFiltering cross-cutting query semantics and avoids create-replace-delete/update mutation risk.
      GeoRobotix currently declares /conf/sensorml and exposes application/sml+json alternate links on single System resources.
    alternatives_rejected:
      - advanced_filtering: "Cross-cutting query semantics; better after read-only encoding classes are stable."
      - create_replace_delete: "Mutation-side risk; should be planned with explicit write-safety and target-IUT policy."
      - update: "Mutation-side risk; should follow create-replace-delete or a dedicated write-operation planning cycle."
      - remaining_geojson: "Viable, but SensorML is the last untouched Part 1 encoding class and GeoRobotix advertises it now."

  q2_scope:
    question: "Full SensorML class or systems read-only subset?"
    decision: "systems read-only subset"
    rationale: |
      The upstream class lists 15 subrequirements and inherits SensorML 3.0 JSON requirement classes.
      Sprint 10 deliberately targets only conformance declaration, system representation discovery, media-type read/fallback honesty,
      minimal system shape, identity mapping, and dependency wiring. Full schema closure and write-side behavior remain open.

