confidence: 0.85

confidence_rationale: |
  High confidence (0.85, not 0.95) because:
    + (+) GitHub evidence is direct and unambiguous: no CS API ETS exists.
    + (+) OGC governance documents are explicit about the certification path and policy
          gates.
    + (+) Reference ETSs (features10, processes10, edr10) provide concrete, recently
          maintained templates whose pom.xml dependency profiles I inspected directly.
    + (+) Existing-repo asset inventory (schemas, registry modules, fixtures) is grounded
          in direct file listing.
    - (-) Did not directly inspect the OGC Compliance Roadmap GitHub project board (#85)
          due to gh-cli scope limitation. Possible but unlikely that an in-flight CS API
          ETS effort exists there as a tracked-but-no-code item; recommend Pat or the
          user double-check the project board before sprint kickoff.
    - (-) CITE SC's actual review velocity in 2026 is not well documented; estimates
          around 6-12 months of beta are based on policy norms, not observed cadence.
    - (-) Did not estimate effort precisely in person-weeks; that is the Planner's and
          Architect's job once the spec is decomposed.
    - (-) The OpenSensorHub team's willingness to test against this ETS as one of the
          required three implementations is assumed, not confirmed. User may need to
          establish that relationship.

