gaps_found:
  - id: GAP-1
    severity: medium
    description: |
      ARCHITECT-MUST-VIOLATION-1: architect-handoff `constraints_for_generator.must` (item #N
      regarding TE 5.6.1 image base) directed `FROM ogccite/teamengine-production:5.6.1` for
      the Dockerfile. Dana implemented `FROM tomcat:8.5-jre17` and assembled TE 5.6.1 manually.
      The deviation is well-justified at the empirical level (the directed image literally
      doesn't exist on Docker Hub, and the closest substitute :latest runs JDK 8 which is
      incompatible with the JDK 17 ETS jar). But the deviation lives in two prose locations
      (Dockerfile comments + ops/server.md "Spec drift documented" section) rather than as a
      formal ADR.

      Why this is medium not low: ADR-001 + ADR-004 set the precedent that TeamEngine version
      pinning and Dockerfile base-image choice are ADR-tracked decisions (ADR-001 §Decision
      explicitly cites "TeamEngine 5.6.1 production Docker image (`opengeospatial/teamengine-
      docker/teamengine-production` master, `teamengine.version=5.6.1`) loads the resulting
      jar without modification" — a claim that turns out to be FALSE for our JDK 17 ETS jar).
      A future contributor reading ADR-001 will assume `FROM ogccite/teamengine-production:5.6.1`
      works; they need to discover the override in the Dockerfile to learn it doesn't.

      Quinn's verdict: design intent (TeamEngine 5.6.1, JDK 17 ETS jar, SPI route, GeoRobotix
      smoke) is met. ADR convention violated. The 12/12 PASS empirical evidence makes this an
      audit-trail issue, not a correctness issue.
    recommended_fix: |
      Sprint 2 cleanup story (call it S-ETS-02-00 / "ADR backfill"):
        1. Land ADR-006 "Dockerfile base image: tomcat:8.5-jre17, not ogccite/teamengine-
           production:5.6.1": ~1 page, sections Context (architect directive + Mary's
           5.5/5.6.1 drift) → Evidence inspected (Docker Hub tag enumeration + java -version
           on :latest + UnsupportedClassVersionError reproduction) → Decision (assemble TE 5.6.1
           on tomcat:8.5-jre17, three secondary patches: VirtualWebappLoader strip, JAXB jars
           in shared lib/, full deps closure with teamengine-*-6.0.0.jar filtered) → Alternatives
           considered (build TE 5.6.1 from source, use tomcat:10.1-jre17 with jakarta-ee9
           shim, fork ogccite/teamengine-production with JDK 17 base) → Consequences (Sprint
           2+ risk: when OGC publishes ogccite/teamengine-production:5.6.1-jdk17, we should
           pivot to it).
        2. Update ADR-001 §Decision to cross-reference ADR-006: "Note: the production-docker
           5.6.1 image runs JDK 8 and cannot host our JDK 17 ETS jar; see ADR-006 for the
           Sprint 1 Dockerfile assembly strategy."
        3. Update spec.md REQ-ETS-TEAMENGINE-003 wording per Dana's proposed amendment ("...SHALL
           produce a TeamEngine 5.6.1 webapp on a JDK 17 base image" — preserves Sprint 1
           semantics, acknowledges JDK 17 + missing :5.6.1 tag).
      Not a Sprint 1 blocker. Effort: ~1 hour.

concerns:
  - id: CONCERN-1
    description: |
      SMOKE-TEST-DEP-CLOSURE-WORKFLOW (low): scripts/smoke-test.sh stages target/lib-runtime/
      via `mvn dependency:copy-dependencies -DincludeScope=runtime` AT SMOKE TIME (lines 72-81)
      rather than the closure being baked into the Docker image at build time. Verified by Quinn:
      a fresh `mvn clean install` does NOT produce target/lib-runtime/. The smoke-test script's
      idempotent gate `if [[ ! -d target/lib-runtime ]] || [[ -z "$(ls -A target/lib-runtime)" ]]`
      creates it on demand. This works fine on any host with mvn on PATH and ~/.m2 populated
      (or with internet access for Maven Central downloads). The Dockerfile also assumes
      target/lib-runtime/ exists at COPY time (line 96), so building the Docker image without
      first running smoke-test.sh's step 1 (or running mvn dependency:copy-dependencies manually
      per the Dockerfile comment lines 91-95) will fail.

      Why this is a concern not a gap: the script is self-documenting about this requirement
      (lines 72-81 explicitly handle it; the Dockerfile comment lines 84-95 explain it). Dana's
      smoke 12/12 PASS proved the workflow runs cleanly on her host; Quinn's re-run from
      /tmp/quinn-fresh-s03/ (fresh clone, but Quinn's ~/.m2 had populated from prior builds)
      proved it runs cleanly on Quinn's host too. CI integration in a future sprint would need
      to either (a) pre-stage lib-runtime in the CI workflow before docker build, or (b)
      restructure the Dockerfile as multi-stage (stage 1 = full mvn build inside the container,
      stage 2 = runtime). Sprint 2 hardening item.
    recommended_fix: |
      Sprint 2 hardening story (could fold into the same ADR backfill story):
        Option A: Add a `pre-package` execution to maven-dependency-plugin in pom.xml that runs
                  `copy-dependencies -DoutputDirectory=target/lib-runtime` automatically. Then
                  scripts/smoke-test.sh's step 1 simplifies to a check that target/lib-runtime/
                  exists (no on-demand mvn invocation needed). Side benefit: `mvn package`
                  becomes self-sufficient for Docker image building.
        Option B: Multi-stage Dockerfile. Stage 1: FROM maven:3.9-jdk-17, copy pom.xml + src/,
                  mvn package + dependency:copy-dependencies, output target/lib-runtime. Stage 2:
                  FROM tomcat:8.5-jre17, COPY --from=stage1 target/lib-runtime → WEB-INF/lib.
                  Side benefit: Docker build is reproducible without any host-side mvn state.
                  Cost: image build time goes from ~4s (cached) to ~30-60s (full mvn run inside
                  the container).
        Recommend Option A for Sprint 2 — minimal pom.xml delta, no Dockerfile rewrite.

  - id: CONCERN-2
    description: |
      The architect-handoff `risks_for_generator.highest.TEAMENGINE-VERSION-DRIFT.severity`
      was rated medium-high; Dana's resolution (manual TE 5.6.1 assembly on JDK 17 base)
      empirically discharges the risk for THIS sprint, but creates a forward maintenance burden:
      when OGC publishes a new TeamEngine version (5.7, 6.0, etc.), the Dockerfile's
      ARG TEAMENGINE_VERSION=5.6.1 + the three Maven Central WAR/console/common-libs URLs
      (pinned to /maven2/org/opengis/cite/teamengine/teamengine-{web,console}/${TEAMENGINE_VERSION}/)
      need bumping — that's straightforward — but the secondary patches (VirtualWebappLoader
      strip, JAXB jars in shared lib/, deps closure with teamengine-*-6.0.0.jar filter) may
      need re-validation against the new TE version's WAR. Especially: TeamEngine 6.0 may
      switch to Tomcat 10 / Jakarta EE 9 namespace (per ets-common:17 docs), which would change
      ALL three patches.

      Why this is a concern not a gap: the Sprint 1 spec text targets "TeamEngine 5.6.x
      (currently 5.6.1)" — Dana's pin is on-spec. Forward maintenance is a beta-milestone
      concern, not a Sprint-1-correctness concern.
    recommended_fix: |
      Track in epic-ets-04-teamengine-integration.md: "When TeamEngine moves to 5.7+ or 6.0+,
      re-validate the three secondary patches in the Dockerfile against the new WAR's
      META-INF/context.xml + WEB-INF/lib classpath. May require a Tomcat 10 / Jakarta EE 9
      flavor of the Dockerfile if TE 6.0 ships with that namespace."

  - id: CONCERN-3
    description: |
      Idempotency of smoke-test.sh re-runs on the same host: verified by Quinn (re-running
      smoke-test.sh after Dana's prior run — same container name `ets-csapi-smoke` got cleanly
      removed by the script's `cleanup_silent` trap; new container `quinn-smoke-s03` started
      cleanly on port 8083 even though Dana's run used port 8082). The trap-based cleanup is
      sound. Note: the script does NOT clean up the Docker IMAGE (only the container), so
      repeated runs accumulate one image tag per SMOKE_IMAGE_TAG override. Acceptable behavior
      for a smoke test; documented at the script's own header.
    recommended_fix: "None required. Sprint 2 polish: add `--rm` to docker run and document SMOKE_IMAGE_TAG image-cleanup convention."

  - id: CONCERN-4
    description: |
      Dana did NOT capture a generator-handoff.yaml for S-ETS-01-03 (same as s02). Quinn's
      handoff-audit step had to verify Dana's claims from the prompt + commits + archived
      smoke artifacts rather than from a structured handoff. Recommend orchestrator capture
      Dana's s03-handoff before Sprint 2 starts.

