  - "Does Common (S-ETS-03-07) follow the S-ETS-01-02 / S-ETS-02-06 pattern with no new bare-throw sites and the OGC canonical URI form from day 1? Verify @Test methods all use ETSAssert helpers; verify @Test description URIs all match `/req/common/<X>` form against OGC `.adoc` source (Quinn / Raze independent curl)."
