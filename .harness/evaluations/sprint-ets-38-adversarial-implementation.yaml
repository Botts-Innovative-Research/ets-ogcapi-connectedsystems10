      details: >
        ops/test-results/sprint-ets-38-simuav-preseed-teamengine-smoke-r3-2026-06-03.xml root reports
        total=211, passed=83, failed=29, skipped=99. Docs consistently classify it as FAIL_OSH_LIMITATIONS_VISIBLE.
    - claim: Final clean local OSH E2E is pass with zero IUT-bound writes.
      result: verified_with_coverage_caveat
      details: >
        ops/test-results/sprint-ets-38-final-clean-local-osh-smoke-2026-06-03.xml root reports total=211, passed=67,
        failed=0, skipped=144. The final clean container log contains IUT-bound GET=130 and OPTIONS=2, with zero POST,
        PUT, PATCH, or DELETE request entries.
    - claim: SimUAV is disabled and clean local OSH state is restored.
      result: verified
      details: >
        Final reset artifact records field-hub_osh-data reset and OSH restart. Final reseed artifact records POST 201 for
        /systems/040g, /procedures/040g, /deployments/040g, and /samplingFeatures/040g with authCredentialRecorded=false.
        Live sanitized external config inspection showed sapient-driver autoStart=false and simuav-driver autoStart=false.
    - claim: Credential values are not recorded in Sprint 38 artifacts/docs.
      result: verified_with_low_risk_masking_note
      details: >
        The preseed and reseed JSON artifacts record authCredentialSupplied/authCredentialRecorded only. A redacted scan found
        no unmasked Basic credential token or password value in the scoped Sprint 38 artifacts/docs. TeamEngine container logs
        include masked Authorization header strings, not full credential values.
    - claim: Strict schema evidence is not weakened in the populated SimUAV evidence.
      result: verified_for_populated_e2e
      details: >
        The populated XML preserves FAIL/SKIP evidence for Content-Type auto schema responses, SWE Common Text HTTP 400 schema
        responses, empty /observations bodies, and empty nested /controlstreams/{id}/commands bodies. See required gap
        RAZE-ETS38-GAP-001 for clean empty-IUT root Observation coverage.
    - claim: Preseed evidence is partial and does not claim full Observation/Command/Status/Result closure.
      result: verified
      details: >
        sprint-ets-38-local-osh-simuav-preseed-r3 reports PARTIAL_MISSING_OBSERVATION_OR_COMMAND_CHILD_EVIDENCE, GET=102,
        POST=1, two DataStreams, three ControlStreams, waypoint_feasibility command POST HTTP 200 COMPLETED, zero parseable
        Observation child items, nested Commands HTTP 200 with non-JSON/empty body, and no dereferenceable status/result evidence.

low_risk_concerns:
  - id: RAZE-ETS38-CONCERN-001
    title: Populated smoke method-count wording is imprecise.
    details: >
      The populated TeamEngine container log shows IUT-bound GET=248, OPTIONS=12, POST=3, PUT=1, DELETE=3. This is not a
      public/shared-IUT safety issue because the run is documented as a dedicated mutable local IUT, and docs do not claim
      populated no-mutation. However the contract phrase "no-mutation method counts" is confusing for a mutation-enabled
      populated fixture and should be reconciled to "request method counts" or accompanied by a no-mutation artifact only
      for read-only runs.
  - id: RAZE-ETS38-CONCERN-002
    title: Container logs retain masked Authorization header fragments.
    details: >
      No full credential value was found, but the TeamEngine request logs contain masked Authorization strings. If the policy
      is interpreted as no auth header material of any kind, scrub or suppress these masked headers before archiving.

