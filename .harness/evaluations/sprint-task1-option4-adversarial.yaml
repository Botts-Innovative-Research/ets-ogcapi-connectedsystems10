recommendations:
  - priority: 1
    action: >
      Strengthen SCENARIO-SESS-PROG-001 coverage. Either (a) add a
      progress-page component unit test that mounts the page with mocked
      SSE events and asserts the progress bar width, '12/58' counter, and
      class/test name updates; or (b) extend TC-E2E-001 to assert two
      distinct progress states (e.g., progressbar aria-valuenow==0 before
      first test, then >0 after). One Playwright assertion on a transient
      heading is not sufficient evidence for the scenario's Given/When/Then.
  - priority: 2
    action: >
      Remove the false claim from _bmad/traceability.md RPT-TEST-001 row:
      'per-filter behavior covered by unit tests in tests/unit/components'
      — that directory does not exist and no unit test clicks filter
      buttons. Replace with either (a) a new component test, or (b) honest
      'PARTIAL: results page render verified E2E; filter-click behavior
      NOT tested'. The current wording is exactly the kind of copy-paste
      overstatement the Gate-4 rubric warns about.
  - priority: 3
    action: >
      Add SCENARIO-SESS-DESTRUCTIVE-001 (or similar) to
      openspec/capabilities/progress-session/spec.md describing the Given/When/Then
      for the destructive-confirm UX gate. Update TC-E2E-006's header
      comment to cite it. Retroactive spec-first is allowed per CLAUDE.md
      Step 6 reconciliation, but silently tested-but-not-spec'd is not.
  - priority: 4
    action: >
      Implement the backend destructive-confirm enforcement described in
      conformance-testing/design.md:123. POST /api/assessments/:id/start
      should require an opt-in flag (e.g., destructiveConfirmed: true) when
      session.selectedClasses contains any CRUD/update URI, and return
      HTTP 400 otherwise. Add a unit test against the route. Without this,
      the destructive-confirm story is single-layer defense (frontend only).
      The known-issues.md move to RESOLVED should be downgraded to
      PARTIAL-RESOLVED until the backend gate lands.
  - priority: 5
    action: >
      Extend TC-E2E-001 (or add a separate TC-E2E-007) to actually CLICK
      the Export JSON button and assert the download event fires with the
      correct filename + content-type. Current assertion ('button visible')
      is weaker than the scenario text.

