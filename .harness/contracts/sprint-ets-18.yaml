    sensorml_items: "System, deployment, and procedure SensorML bodies expose no top-level links member in current GeoRobotix observations."

relation_type_policy:
  resource_specific_links_member_association_rels:
    geojson:
      system: ["parentSystem", "subsystems", "samplingFeatures", "deployments", "procedures", "datastreams", "controlstreams"]
      deployment: ["parentDeployment", "subdeployments", "featuresOfInterest", "samplingFeatures", "datastreams", "controlstreams"]
      procedure: ["implementingSystems"]
      samplingFeature: ["parentSystem", "sampleOf", "datastreams", "controlstreams"]
    sensorml:
      system: ["subsystems", "samplingFeatures", "deployments", "procedures", "datastreams", "controlstreams"]
      deployment: ["parentDeployment", "subdeployments", "featuresOfInterest", "samplingFeatures", "datastreams", "controlstreams"]
      procedure: ["implementingSystems"]
  excluded_generic_rels:
    - "self"
    - "canonical"
    - "alternate"
    - "next"
    - "prev"
    - "first"
    - "last"
    - "collection"
    - "service-desc"
    - "service-doc"
  verdict_policy:
    - "PASS only when every detected association link encoded in a links member uses a rel valid for the selected encoding and resource type."
    - "SKIP per resource when the selected representation has no links-member association links."
    - "FAIL when a links-member entry has missing or blank rel."
    - "FAIL when a non-generic links-member rel is not valid for the selected encoding and resource type."
    - "Do not count property-level @link members as relation-types evidence."

generator_must_do:
  - "Record exact HEAD before editing."
  - "Keep existing GeoJSON System relation-types positive evidence."
  - "Add per-resource GeoJSON relation-types checks for deployment, procedure, and sampling feature."
  - "Add per-resource SensorML relation-types checks for deployment and procedure."
  - "Gate each check on conformance declaration, selected item availability, and representation availability."
  - "Use resource-specific links-member association allowlists."
  - "SKIP honestly per resource when only generic links or no links member exist."
  - "Add or extend unit coverage for per-resource classification and aggregate false PASS prevention."
  - "Run Docker Maven and default GeoRobotix TeamEngine smoke."
  - "Verify zero IUT-bound POST/PUT/DELETE/PATCH in default smoke."
  - "Update OpenSpec/story/traceability/status/changelog/test-results."

generator_must_not_do:
  - "Do not implement /req/geojson/mediatype-write or /req/sensorml/mediatype-write."
  - "Do not issue POST, PUT, PATCH, or DELETE."
  - "Do not count canonical or alternate links as association evidence."
  - "Do not count property-level @link members as links-member relation-types evidence."
  - "Do not hide per-resource SKIPs behind one aggregate PASS."
  - "Do not claim full GeoJSON or SensorML relation-types closure."
  - "Do not implement Part 2 work."

evaluation_focus:
  raze:
    - "Attack aggregate false PASS where one System PASS hides deployment/procedure/samplingFeature/SensorML SKIPs."
    - "Attack property-level @link false PASS."
    - "Attack wrong-resource relation type acceptance."
    - "Check no mutation and no mediatype-write scope creep."
    - "Check both REQ-ETS-PART1-012 and REQ-ETS-PART1-013 remain PARTIAL."

