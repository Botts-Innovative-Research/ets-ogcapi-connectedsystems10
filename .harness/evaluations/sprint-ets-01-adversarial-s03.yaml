verdict_summary: |
  S-ETS-01-03 is the strongest of the three Sprint 1 stories. Substantive engineering
  is sound across every adversarial axis I checked. The headline question — Dana's
  spec drift on REQ-ETS-TEAMENGINE-003 — is HONEST and CORRECT: I independently
  verified both claims (Docker Hub query returns only `:latest` and `:1.0-SNAPSHOT`
  tags for `ogccite/teamengine-production`, no `:5.6.1`; `docker run --rm
  ogccite/teamengine-production:latest java -version` reports `openjdk version
  "1.8.0_332" ... JAVA_VERSION=8u212`). The chosen resolution (`tomcat:8.5-jre17` +
  download TE 5.6.1 web/console/common-libs from Maven Central + 3 secondary patches)
  is the right architectural call: our ETS bytecode is JDK 17 (`javap -v
  LandingPageTests.class` reports `compiled Java class data, version 61.0`) and our
  Java sources import `jakarta.ws.rs.client.Client` (Jersey 3.x, Jakarta EE 9
  namespace), neither of which can run on JDK 8. The 3 secondary patches
  (VirtualWebappLoader strip, JAXB jars in shared lib/, Jersey 3.x deps in
  WEB-INF/lib via mvn dependency:copy-dependencies) are documented in the Dockerfile
  with empirical justification per patch.

  Reproducibility re-verified at HEAD 8aeffbf via fresh clone:
    target/ets-ogcapi-connectedsystems10-0.1-SNAPSHOT.jar:
      sha256 343136324b77651c6c8750522223ed202b0ec81bc70c4fcc5f9bc14730513f23
    target/ets-ogcapi-connectedsystems10-0.1-SNAPSHOT-aio.jar:
      sha256 e0935dbb3eab1bd67b78a05852b21665645d1a029a3b8f25e2474b558364646e
  Both match the user worktree byte-identical. mvn test → 22/0/0/3 (no regression
  from S-ETS-01-02 close).

  Independent smoke run via fresh clone produced byte-equivalent semantics (12/12
  PASS, identical method names, identical XML structure) in 12s wall-clock end-to-end
  including Docker build + Tomcat startup (image was already cached). Idempotency
  verified via back-to-back invocations leaving no residual containers. ADVERSARIAL
  SABOTAGE TEST: I temporarily injected a guaranteed-FAIL into
  `landingPageReturnsHttp200` (changed `if (status != 200)` → `if (status >= 0)`)
  and re-ran smoke-test.sh; the script CORRECTLY DETECTED the failure
  (`[smoke-test FATAL] TestNG report has failed=1 (>0)`) and exited with code 1 (when
  invoked without piping to `tail`). The script's 3-line filter exclusion
  (`did not find a matching property|maxActive is not used in DBCP2|encoding ['utf-8']`)
  is BELT-AND-SUSPENDERS — the awk gate `/Server startup in/{print; exit}` already
  truncates the log to the startup block (lines 1-48), and the only utf-8 SEVERE
  entries occur AFTER startup at line 49+ (during Jersey response serialization).
  None of the filtered patterns mask any genuine startup error.

  Container log scan independently verified clean of startup ERROR/SEVERE. The
  runtime utf-8 SEVERE that Dana flagged as known-tolerated is genuine: it's an
  IllegalArgumentException thrown by Tomcat 8.5+ when Saxon's XMLEmitter sends a
  lowercase `utf-8` charset header; the response (the `/rest/suites` XML) still
  arrives at the client correctly because Tomcat's response stream completes before
  the encoding-set is checked. This pattern is benign and matches OGC's own
  production deployment.

  CTL Saxon namespace: only one CTL file exists
  (`src/main/scripts/ctl/ogcapi-connectedsystems10-suite.ctl`); its `xmlns:tng`
  declaration uses the canonical run-together package
  `org.opengis.cite.ogcapiconnectedsystems10.TestNGController` (architect-handoff
  CONCERNS pitfall #3 — silent CTL Saxon namespace failure — does not occur).
  META-INF/services/com.occamlab.te.spi.jaxrs.TestSuiteController unchanged: 58
  bytes, single line, no whitespace, no extension (architect-handoff CONCERNS
  pitfall #2 — META-INF/services filename literal-correctness — does not occur).

  No regression of S-ETS-01-01 + S-ETS-01-02 deliverables: schemas byte-identical
  to csapi_compliance@HEAD (`diff -r` empty); pom.xml `<connected-systems-yaml.sha>
  3fd86c73...</>` preserved at HEAD 8aeffbf; surefire 22/0/0/3 unchanged; bare-throw
  count still 21 across the 3 conformance core files (per-file distribution shifted
  6/8/7 → 6/7/8 between s02 ResourceShapeTests and s03; the difference is the
  REQ_OAS30_OAS_IMPL → REQ_OAS30_OAS_IMPL+1 added when fixing GAP-3 in commit
  1fdfe07; net no regression on the count). No stale Pat-coordinate strings in
  production paths; only legitimate match is the canonical OGC URI form
  `ogcapi-connectedsystems-1/1.0/conf/core` in ConformanceTests.java:46.

  Sprint 1 contract walk: 11/12 success_criteria PASS; one (uri_mapping_fidelity_
  preserved) is an INHERITED PARTIAL from S-ETS-01-02 GAP-2 (URI form drift across
  v1.0 TS slug vs Java's `/req/core/...` vs OGC canonical `/req/landing-page/...`)
  that is explicitly tracked as a Sprint 2 cleanup story per the spec.md
  Implementation Status Deviations section. NOT a regression introduced by S03.

  THREE concerns hold the verdict at APPROVE_WITH_CONCERNS rather than APPROVE:

  (1) **Spec.md REQ-ETS-TEAMENGINE-003 still says `extends ogccite/teamengine-
  production:5.6.1` after this sprint** — the Implementation Status section
  acknowledges the deviation and flags the proposed amended wording for Sam's
  next planning cycle, but the REQ text itself was NOT updated. CITE SC reviewers
  (or any future Quinn run) reading the spec normatively will see a contradiction
  between the REQ and the Dockerfile. The architect-handoff fix pattern from
  S-ETS-01-01 (Sam reconciled spec/PRD strings to ADRs same-turn at
  19003b1) wasn't repeated here. CONCERN-1, not GAP, because Dana documented
  the proposed amendment in ops/server.md and called Sam out explicitly.

  (2) **`scripts/smoke-test.sh` requires `~/.m2/repository/` to be populated**.
  The script calls `mvn -B -q clean package -DskipTests` and `mvn -B -q
  dependency:copy-dependencies` at lines 69 + 75. In a fresh CI runner with no
  prior `mvn install`, these calls will need to download the entire ets-common:17
  + Jersey 3.x + REST Assured dep tree from Maven Central + OSSRH on every CI
  run — 5-10 minutes per CI invocation, plus brittleness if either upstream is
  intermittently down. The Dockerfile assumes `target/lib-runtime/` is staged
  outside (COPY target/lib-runtime/ /usr/local/tomcat/webapps/teamengine/WEB-INF/
  lib/ at line 96). A more robust pattern would be a multi-stage Dockerfile that
  runs `mvn dependency:copy-dependencies` inside the build stage with
  `--mount=type=cache,target=/root/.m2`. Dana flagged this concern in her
  self-report; I confirm it's real but not Sprint 1 blocking.

  (3) **No Dockerfile multi-stage build + container runs as root**. The image
  is single-stage (FROM tomcat:8.5-jre17, no AS builder), so build artifacts
  (the staged `target/lib-runtime/` jars) ship directly into the runtime layer.
  Final image size ~600MB, of which ~300MB is the staged ETS runtime deps. A
  multi-stage build could bring this down to ~400MB. The container also runs
  as `root` (Tomcat 8.5 base default). Both are defensible for a test harness
  (not a production-facing service) but should be flagged for Sprint 2+ when
  the image becomes a CI artifact published to a registry.

  Plus one minor observation: **Sprint 1 contract success_criteria
  `teamengine_loads_ets_without_error: true`** is verified-by-smoke-12/12-PASS
  but a TIGHTER test would query `/rest/suites/ogcapi-connectedsystems10` and
  assert the suite metadata is present and well-formed (smoke-test.sh step 5
  does this implicitly via `grep -q "<etscode>${ETS_CODE}</etscode>"`, but a
  more rigorous adversarial check would parse the XML and verify version,
  title, code per ets.properties).

