retry_guidance: |
  Three critical bugs must be fixed before this sprint can pass:

  1. **URL Construction (BUG-001)** — In ALL 34 instances across 11 files in src/engine/registry/,
     remove the leading slash from the first argument to new URL(). Example fix:

     BEFORE: new URL(`/deployments/${encodeURIComponent(deploymentId)}`, ctx.baseUrl)
     AFTER:  new URL(`deployments/${encodeURIComponent(deploymentId)}`, ctx.baseUrl)

     Files to fix:
     - src/engine/registry/deployments.ts (lines 139, 211, 287)
     - src/engine/registry/subsystems.ts (lines 83, 141, 200, 276)
     - src/engine/registry/subdeployments.ts (lines 83, 141, 200, 275)
     - src/engine/registry/features-core.ts (lines 299, 342, 416, 491, 527, 570)
     - src/engine/registry/part2-swe-encodings.ts (lines 62, 130, 240, 307, 413, 480)
     - src/engine/registry/part2-crud.ts (lines 104, 214, 326)
     - src/engine/registry/part2-update.ts (lines 92, 209)
     - src/engine/registry/part2-history.ts (lines 63, 122)
     - src/engine/registry/part2-events.ts (line 128)
     - src/engine/registry/part2-feasibility.ts (lines 64, 122)
     - src/engine/registry/sampling.ts (line 283)

     After fixing, verify by running the conformance test suite against https://api.georobotix.io/ogc/t18/api
     and confirming the deployment, subsystem, and features tests no longer get 404s.

  2. **Export Path Mismatch (BUG-002)** — In src/services/api-client.ts line 124:

     BEFORE: const response = await fetch(`/api/assessments/${id}/export/json`);
     AFTER:  const response = await fetch(`/api/assessments/${id}/export?format=json`);

     Verify by clicking the "Export JSON" button on the results page — it should trigger a download.

  3. **Stale Unit Test (BUG-003)** — In tests/unit/server/assessments.test.ts line 173:

     BEFORE:
       expect(res.body).toEqual({
         id: mockSession.id,
         status: 'discovering',
       });

     AFTER:
       expect(res.body).toEqual({
         id: mockSession.id,
         discoveryResult: {
           landingPage: {},
           conformsTo: [],
           collectionIds: [],
           links: [],
         },
       });

     The mock discoveryService.discover returns { cache: { landingPage: {}, conformsTo: [], collectionIds: [], links: [] }, ... }
     so the route responds with { id, discoveryResult: { landingPage: {}, conformsTo: [], collectionIds: [], links: [] } }.

  Additionally, fix the TypeScript errors (WARN-001) and parameterize the Playwright port (WARN-002)
  so the full test suite passes cleanly.
