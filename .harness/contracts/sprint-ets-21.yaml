planning_probes:
  georobotix:
    iut_url: "https://api.georobotix.io/ogc/t18/api"
    conformance: "Declares /conf/datastream but not /conf/api-common."
    datastreams: "GET /datastreams?limit=2 returned HTTP 200 JSON with top-level items and links."
    observations: "GET /observations?limit=2 returned HTTP 200 JSON with top-level items and links."
    datastream_item: "GET /datastreams/0mirhn7lo1kg returned HTTP 200 JSON with id, system@id, outputName, observedProperties, resultType, formats, and observations link."
    datastream_schema: "GET /datastreams/0mirhn7lo1kg/schema returned HTTP 200 JSON with obsFormat and resultSchema."
    datastream_observations: "GET /datastreams/0mirhn7lo1kg/observations?limit=2 returned HTTP 200 JSON with empty items and no top-level links."
    system_datastreams: "GET /systems/0nar3cl0tk3g/datastreams?limit=1 returned HTTP 200 JSON with a Datastream item."

verdict_policy:
  declaration_gate:
    - "If /conf/datastream is not declared, Datastream conformance judgment SKIPs with a precise reason."
    - "Do not infer /conf/api-common or API Common PASS from /conf/datastream or Datastream endpoint success."
  prerequisite:
    - "Keep /req/api-common prerequisite handling visible and honest."
    - "When /conf/datastream is declared but /conf/api-common is absent, scoped endpoint checks may run but the ETS must not report full /conf/datastream class closure."
    - "Prerequisite-dependent assertions SKIP rather than failing noisily when the prerequisite cannot be established."
  read_only_probe:
    - "Only HTTP GET requests are allowed in Sprint 21 Generator."
    - "Empty Datastream-scoped Observation collections are acceptable endpoint availability evidence when HTTP 200 JSON with items is returned."
    - "Empty Datastream-scoped Observation collections must not PASS /req/datastream/obs-ref-from-datastream; require actual Observation/reference evidence or SKIP."

generator_must_do:
  - "Record exact HEAD before editing."
  - "Use official OGC 23-002 identifiers: /req/datastream and /conf/datastream."
  - "Add Part 2 Datastream TestNG group and dependency/prerequisite handling."
  - "Implement declaration-gated read-only Datastream, schema, Observation, and selected System-scoped endpoint checks."
  - "Update OpenSpec/story/traceability/status/changelog/test-results after implementation."

generator_must_not_do:
  - "Do not mutate GeoRobotix or local OSH."
  - "Do not implement Part 2 ControlStream, Command, JSON, SWE Common, CRD, or Update behavior."
  - "Do not require non-empty nested Observation collections."
  - "Do not require nested Observation collection links unless implementing the specific collections assertion."
  - "Do not claim API Common PASS from Datastream evidence."
  - "Do not report full /conf/datastream class closure when /req/api-common is absent."
  - "Do not PASS obs-ref-from-datastream on an empty nested Observation collection."

evaluation_focus:
  raze:
    - "Attack false PASS from generic JSON objects masquerading as Datastreams."
    - "Attack false API Common PASS when GeoRobotix lacks /conf/api-common."
    - "Attack overreach into ControlStream, Command, mutation, SWE Common, or schema-binding closure."
    - "Check empty nested Observation collection handling."

