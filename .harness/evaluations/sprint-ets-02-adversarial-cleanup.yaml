  **CONCERN-2 (low)**: Image size 815MB vs ADR-009 §156 "≤ 450 MB sub-task A
  acceptance threshold." Dana flags as Sprint 3 carryover citing ADR-009 §157 "defer
  to Sprint 3 if 450 MB is missed." The deferral language in §157 is phrased as a
  conditional Future-Sprint-3-fallback, not as an explicit acceptance of >450MB
