findings:
  - id: RAZE-ETS23-PLAN-GAP-001
    severity: high
    category: false-pass-risk
    status: open
    summary: Planning does not explicitly prevent `/req/feasibility/ref-from-controlstream` PASS from the plural `/controlstreams/{id}/feasibility` alias.
    details: >
      OpenSpec correctly cites the normative Clause 11 path
      `{api_root}/controlstream/{csId}/feasibility`, and the planning probes
      record both `/controlstreams/{id}/feasibility` and
      `/controlstream/{id}/feasibility` returning HTTP 400 on GeoRobotix. The
      contract and ops docs, however, do not state that the plural probe is
      diagnostic only and cannot satisfy `/req/feasibility/ref-from-controlstream`.
      This leaves a future Generator false-PASS path: an IUT could expose a
      plural convenience endpoint while the normative singular endpoint is absent.
    evidence:
      - "OGC 23-002 Clause 11 Requirement 36: `/req/feasibility/ref-from-controlstream` uses `{api_root}/controlstream/{csId}/feasibility`."
      - ".harness/contracts/sprint-ets-23.yaml records `feasibility_nested_plural` and `feasibility_nested_singular`, but does not classify the plural URL as non-normative/diagnostic-only evidence."
      - "ops/status.md and ops/test-results.md list both feasibility probes without an explicit no-PASS-from-plural-alias guard."
    required_fix: >
      Add an explicit verdict rule across contract/story/OpenSpec/ops/handoff:
      `/req/feasibility/ref-from-controlstream` PASS requires the normative
      singular `{api_root}/controlstream/{csId}/feasibility` endpoint, or a
      documented standards-backed rationale for accepting another path. The
      plural `/controlstreams/{id}/feasibility` probe may be retained as IUT
      diagnostics but must not be enough for PASS by itself.

  - id: RAZE-ETS23-PLAN-GAP-002
    severity: medium
    category: doc-consistency
    status: open
    summary: Ops and traceability metadata still contain stale current-state markers after Sprint 23 planning.
    details: >
      The detailed Sprint 23 planning sections are mostly reconciled, but top-level
      status metadata still says the latest implemented story is Sprint 19 even
      though Sprint 22 was implemented and pushed. `_bmad/traceability.md` also
      retains a header saying it was last updated for Sprint 19, despite the new
      Sprint 23 row and renumbering. These stale markers reduce handoff reliability.
    evidence:
      - "ops/status.md Current Code State: `Latest implemented story: S-ETS-19-01` while the same section records latest pushed implementation commit `38cb3c0 Implement Sprint 22 Part 2 ControlStream`."
      - "_bmad/traceability.md header still says `Last updated: 2026-05-07 (Sprint 19 encoding mediatype-write Generator complete)`."
    required_fix: >
      Update top-level current-state metadata so it does not contradict Sprint 22
      implementation and Sprint 23 planning. At minimum, set latest implemented
      story to Sprint 22 and refresh the traceability header to the Sprint 23
      planning update.

