description: |
  Sprint 4 has two intertwined goals: (a) close the 5 carryover items from Sprint 3's
  cumulative gate report — most importantly the 4-SPRINT DEFER `gh workflow` scope
  user-action escalation (Raze CONCERN-3 explicitly flagged escalation territory),
  the 80MB chown-layer image-size attack v2 (Sprint 4 path identified by Sprint 3
  PARTIAL — ADR-009 illustrative table EMPIRICALLY FALSIFIED at S-ETS-03-04),
  the deeper E2E credential-leak smoke (S-ETS-03-02 PARTIAL → PASS at IUT-auth
  layer), and 2 sabotage-script mechanical bug fixes; and (b) add the FIRST CS API
  collection-resource conformance class beyond Core + SystemFeatures + Common —
  Subsystems (REQ-ETS-PART1-003, `/conf/subsystem`) — chosen because the
  SystemFeatures→Core dependency wiring is now PROVEN via Sprint 3's live break-Core
  sabotage exec (cascading SKIP demonstrated end-to-end). Subsystems extends the
  pattern: it depends on SystemFeatures (per OGC ATS), so it exercises a
  TWO-LEVEL group dependency chain (Subsystems→SystemFeatures→Core) for the first
  time — proving the multi-class dependency-DAG strategy works before Sprint 5+
  scales to 4-7 more classes.

  Sprint 4 explicitly EXCLUDES Part 2 work (continuing the 2026-04-27 user gate),
  remaining 10 Part 1 classes (Procedures, Sampling, Properties, Deployments,
  Subdeployments, AdvancedFiltering, CRUD, Update, GeoJSON, SensorML — Sprint 5+
  sprint-by-sprint after Subsystems proves the second-level dependency works),
  spec-trap fixture port (epic-ets-06 still parallel), CITE submission (still
  beta-bound), and Common-class expansion from 4 → 8 @Tests (Quinn CONCERN-2 +
  Raze acknowledged minimal-then-expand is by design — Sprint 5+ if user prioritizes).

  Carryover items 1-4 + new feature S-ETS-04-05 are P0/P1 scope. P0: CI-workflow
  escalation (5th-sprint defer = structural risk if user can't refresh scope) +
  Subsystems new feature. P1: image-size v2 (chown-layer attack, ADR-009
  amendment), credential-leak E2E. P2: sabotage-script 2 bug fixes (mechanical,
  ~30 min total).

  **Conformance class pick rationale**: Pat picks **Subsystems only** (NOT
  Subsystems+Procedures pair, NOT including Common-expansion) for these reasons:
  (i) Sprint 4 has 5 carryover items (vs Sprint 3's 8) — adding a SECOND new
  conformance class would re-introduce gate-fatigue risk that Sprint 3 narrowly
  avoided via tight scope discipline (Quinn 0.95 / Raze 0.93 trend);
  (ii) Subsystems is the FIRST class to exercise a TWO-LEVEL group dependency
  (Subsystems→SystemFeatures→Core) — single-class focus lets Generator + gates
  validate the multi-level dependency strategy carefully without compounding
  risk surface; (iii) Common expansion (4 → 8 @Tests) is "by-design minimal-then-
  expand" per Quinn CONCERN-2 + architect-handoff item 17 — explicit deferral to
  Sprint 5+ when user prioritizes; including it now would add Common surface
  without strategic gain; (iv) Procedures/Sampling/Properties/Deployments are
  siblings of Subsystems (also depend on SystemFeatures) — once Subsystems
  proves the two-level pattern, ALL of those land mechanically in Sprint 5
  (likely 2-3 classes batched). Subsystems-only is the pivot that unlocks
  Sprint 5+ batching.

