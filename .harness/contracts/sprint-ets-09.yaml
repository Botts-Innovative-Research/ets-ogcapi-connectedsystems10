# Sprint 9 contract — geojson-encoding-read-only
# Created by Codex orchestrator 2026-05-05 after Sprint 8 close commit fb01e40.
#
# Strategic decision: GeoJSON only.
# Rationale:
#   (1) GeoJSON systems read-only subset is lower risk than create-replace-delete mutation coverage.
#   (2) GeoJSON has narrower schema inheritance than SensorML, which remains deferred.
#   (3) GeoRobotix has historically declared /conf/geojson; Generator must re-verify at sprint time.
#   (4) Sprint 9 should preserve Sprint 8's gate discipline without bundling another cleanup wedge unless Quinn/Raze surface one.

sprint: "ets-09"
sprint_name: "geojson-systems-read-only-subset"
type: "feature-expansion"
created: "2026-05-05T15:06:38Z"
description: |
  Sprint 9 implements one Part 1 class:

  S-ETS-09-01 — GeoJSON systems read-only subset (`/conf/geojson`) (P0/M).
  Scope is PARTIAL for REQ-ETS-PART1-012:
    - `/conformance` declares `/conf/geojson`, otherwise SKIP-with-reason.
    - `GET /systems` with `Accept: application/geo+json` or documented default JSON fallback.
    - Strict GeoJSON FeatureCollection validation for `/systems`: type="FeatureCollection" + `features` array.
    - First system feature shape and attribute mapping validation.
    - Runtime or structural dependency proof: `geojson` depends on `systemfeatures`.

  Explicitly excluded:
    - `/req/geojson/mediatype-write` (OPEN until create-replace-delete is implemented or explicitly selected)
    - Any POST/PUT/PATCH/DELETE assertion
    - SensorML
    - AdvancedFiltering, CRUD, Update
    - Part 2 work

