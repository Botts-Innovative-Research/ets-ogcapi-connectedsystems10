planning_probes:
  georobotix:
    iut_url: "https://api.georobotix.io/ogc/t18/api"
    conformance: "Declares /conf/create-replace-delete, /conf/geojson, and /conf/sensorml; does not declare /conf/update."
    systems_options: "OPTIONS /systems returns Allow: GET, HEAD, POST, PUT, DELETE, TRACE, OPTIONS."
    system_item_options: "OPTIONS /systems/0mqcvdnfoca0 returns Allow: GET, HEAD, POST, PUT, DELETE, TRACE, OPTIONS."
    planning_interpretation: "Public GeoRobotix appears write-capable but remains a shared public IUT; Sprint 19 default smoke must not issue POST/PUT/DELETE/PATCH."

verdict_policy:
  default_public_iut:
    - "PASS conformance declaration/readiness checks without mutation where applicable."
    - "SKIP lifecycle Content-Type parsing checks before POST/PUT when mutation opt-in is absent."
    - "Hard-deny known shared public GeoRobotix URLs even if mutation opt-in is supplied."
    - "Default smoke must prove zero IUT-bound POST/PUT/DELETE/PATCH."
  dedicated_mutable_iut:
    - "Only after mutation-tests-enabled=true and mutation-iut-policy=dedicated-mutable-iut may the ETS issue POST/PUT."
    - "A mediatype-write PASS requires the IUT to parse the request body with the tested Content-Type and return dereferenceable created/replaced resource evidence."
    - "Status-only POST/PUT without follow-up GET evidence is not enough."
    - "If the IUT declares the encoding and CRD but rejects the required Content-Type with 415 or equivalent, FAIL the relevant mediatype-write assertion."

generator_must_do:
  - "Record exact HEAD before editing."
  - "Reuse Sprint 12 mutation opt-in and public-IUT hard-denial gates."
  - "Add GeoJSON mediatype-write checks that require /conf/geojson and /conf/create-replace-delete."
  - "Add SensorML mediatype-write checks that require /conf/sensorml and /conf/create-replace-delete."
  - "Use POST/PUT only in explicitly enabled dedicated mutable-IUT mode."
  - "Verify parse evidence by dereferencing Location or canonical id after mutation."
  - "Preserve best-effort cleanup for any created resource."
  - "Add focused unit tests for safety gating, Content-Type selection, public-IUT denial, and status-only false PASS prevention."
  - "Run Docker Maven and default GeoRobotix TeamEngine smoke."
  - "Verify zero IUT-bound POST/PUT/DELETE/PATCH in default smoke."
  - "Update OpenSpec/story/traceability/status/changelog/test-results."

generator_must_not_do:
  - "Do not mutate GeoRobotix or any known shared public IUT."
  - "Do not bypass the existing mutation safety parameters."
  - "Do not count OPTIONS Allow as mediatype-write conformance."
  - "Do not claim full GeoJSON or SensorML closure."
  - "Do not implement Part 2 work."
  - "Do not implement full external schema validation in this sprint."

evaluation_focus:
  raze:
    - "Attack any path that can POST/PUT to GeoRobotix by default or by unsafe opt-in."
    - "Attack OPTIONS-readiness false PASS as mediatype-write conformance."
    - "Attack status-only mutation false PASS without parse/dereference evidence."
    - "Check that Content-Type values are exact: application/geo+json and application/sml+json."
    - "Check both REQ-ETS-PART1-012 and REQ-ETS-PART1-013 remain PARTIAL."

