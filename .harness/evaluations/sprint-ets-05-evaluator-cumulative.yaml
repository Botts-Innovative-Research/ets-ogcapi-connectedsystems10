gaps_found:
  - id: GAP-1
    severity: high
    description: |
      S-ETS-05-01 GAP-1 wedge fix lands the bash + Java wiring (smoke-test.sh
      reads SMOKE_AUTH_CREDENTIAL; SuiteFixtureListener configures REST-Assured
      RequestSpecBuilder.addHeader("Authorization", credential)) — credential
      now reaches the wire, breaking the Sprint 4 zero-hit pattern. However,
      the wire request carries the MASKED sentinel `Bear***WXYZ`, not the
      original credential `Bearer ABCDEFGH12345678WXYZ`. Live exec at gate
      shows stub-iut.log with 12 inbound requests, ALL with
      `Authorization=Bear***WXYZ`. Diagnosis: MaskingRequestLoggingFilter (or
      one of the wrap chain filters) is mutating the request header BEFORE
      HTTP transport, rather than masking only at log time. The original
      design.md §"wrap pattern" mandates a try/finally restoration: log the
      masked form, then restore the original header value before the request
      goes out. The restoration step is missing or broken. Production impact:
      this ETS would FAIL against any authenticated IUT — the IUT would
      receive `Authorization: Bear***WXYZ` and reject as malformed credential.
      Sprint 4 GAP-1 (zero credential on wire) → Sprint 5 GAP-1' (masked
      credential on wire instead of original).
    recommendation: |
      Sprint 6 wedge: audit MaskingRequestLoggingFilter + CredentialMaskingFilter
      (the wrap pair from Sprint 3) and verify the request-header mutation is
      applied to a COPY for log emission, with a try/finally that restores the
      original header on the actual request. The unit-layer
      VerifyMaskingRequestLoggingFilter (8/8 PASS) tests masking semantics in
      isolation; what's missing is an integration test that verifies the
      RestAssured request, AFTER passing through the filter chain, still
      carries the unmasked header. Add a unit test: build a request via
      RestAssured.given().given(new MaskingRequestLoggingFilter()).header("Authorization",
      cred).get(stubURL); assert stubURL log shows unmasked cred. ~30 LOC.
      Then re-run scripts/credential-leak-e2e-test.sh — expect prong (b) >=1
      hit (script-side) AND prong (c) >=1 hit. Estimate 1-2h Generator time.

  - id: GAP-2
    severity: medium
    description: |
      scripts/sabotage-test.sh --target=systemfeatures FAILS at docker build
      step. Root cause line 205: `rsync -a --exclude='.git/' ...` strips .git
      from the temp worktree; the project Dockerfile contains `COPY .git
      ./.git` (used to bake git SHA into the jar manifest at build time).
      Build error: "failed to calculate checksum of ref ... \"/.git\": not
      found". The script reaches sabotage marker injection successfully (step
      3/6 PASS) but the docker build at step 4/6 dies before smoke runs. No
      cascade XML produced. The two-level cascade for the three new sibling
      classes (Subsystems already verified Sprint 4; Procedures + Deployments
      NEW Sprint 5) cannot be live-verified at gate using this script path.
      Per ADR-010 v3 the structural cascade is VERIFIED LIVE for the
      Subsystems chain; mechanically Procedures + Deployments use the
      identical TestNG mechanism so functional cascade should hold, but
      explicit live evidence for the two NEW Sprint 5 classes is missing.
    recommendation: |
      Sprint 6 fix is ~1-2 LOC bash: drop `--exclude='.git/'` from the rsync
      line OR add `cd "$SABOTAGE_WORKTREE" && git init -q && git add -A &&
      git -c user.email=x@x -c user.name=x commit -q -m "sabotage seed"` after
      rsync (creates a minimal .git dir for Docker COPY to consume; commit
      creates an HEAD ref). Either fix is small. Re-run sabotage and archive
      the cascade XML to /tmp/<role>-fresh-sprint6/test-results/sprint-ets-06-
      cascade-procedures-deployments.xml as the canonical Sprint 5 carryover
      evidence.

concerns:
  - id: CONCERN-1
    severity: medium
    description: |
      credential-leak-e2e-test.sh prong (b) check (lines 156-165) greps only
      container.log + testng-results.xml + smoke.log for the masked form
      `Bear***WXYZ`. It does NOT grep stub-iut.log. Quinn observed 12 masked-
      form hits in stub-iut.log at gate — the masked form IS present in the
      artifact set, just not in the locations the script checks. The script's
      prong (b) reports FAIL even though the masked form is observably present.
      This is a script-level false-negative on prong (b). Note: prong (c) is
      still a real defect (no unmasked credential at IUT) — fixing the prong
      (b) script-grep would NOT mask GAP-1.
    recommendation: |
      Sprint 6 update credential-leak-e2e-test.sh prong (b) to also grep
      $STUB_LOGFILE for the masked form. ~3 LOC bash. Doesn't change the
      verdict (prong c still FAILs while GAP-1 is open) but produces honest
      reporting. Lower-severity because GAP-1 is the load-bearing prong-(c)
      defect.

  - id: CONCERN-2
    severity: low
    description: |
      No live GeoRobotix smoke run was archived at gate for the full 34-test
      target (12 Core + 6 SystemFeatures + 4 Common + 4 Subsystems + 4
      Procedures + 4 Deployments). The credential-leak-e2e ran smoke against
      stub-IUT (returned 401 to all → 2 PASS / 10 FAIL / 22 SKIP, expected).
      The sabotage --target=systemfeatures live exec failed at docker build
      (GAP-2). A standalone clean GeoRobotix smoke run was not exercised.
      Mvn test (78/0/0/3 PASS) covers structural lint at unit level; live
      smoke would close the loop on the new conformance classes against
      GeoRobotix. Per the contract, smoke_test_green_against_georobotix is
      a success criterion — it's currently UNVERIFIED-LIVE.
    recommendation: |
      Raze adversarial gate (after this evaluator gate) should attempt a
      standalone GeoRobotix smoke run from /tmp/raze-fresh-sprint5/ (new
      clone) with `unset SMOKE_AUTH_CREDENTIAL` (run unauthenticated, since
      the masking-destructive defect is GAP-1's territory not a smoke
      regression). Expect 34/34 PASS or document the per-class result.

  - id: CONCERN-3
    severity: low
    description: |
      DeploymentsTests.deploymentDeployedSystemEncodingDeclared (line 404)
      uses substring matching against ['/conf/geojson', '/conf/sensorml',
      '/conf/json', '/conf/html']. A strict OGC reviewer might prefer exact-
      URI matching against canonical OGC URIs (e.g.
      `http://www.opengis.net/spec/ogcapi-connectedsystems-1/1.0/conf/geojson`).
      Substring is more permissive; could match vendor URIs that contain
      `/conf/geojson` as a path segment but aren't the OGC URI. Trade-off
      documented in javadoc; acceptable for Sprint-1-style minimal scope.
      Self-flagged in Generator handoff confidence_rationale.
    recommendation: |
      Sprint 7+ tighten the match to a regex that requires the OGC base URI
      `http://www\.opengis\.net/spec/ogcapi-connectedsystems-1/1.0/conf/`
      followed by one of the encoding tokens. ~5 LOC. Defer until at least
      one IUT shows up with a vendor-conf-geojson URI that's not OGC-canonical.

  - id: CONCERN-4
    severity: informational
    description: |
      Sprint 5 contract's `evaluation_artifacts_required` lists 5 archived
      artifacts at /tmp/<role>-fresh-sprint5/. Quinn produced 4 (credential-
      leak full report; credential-leak testng-results; credential-leak
      stub-iut.log; smoke-as-stub.log + smoke artifacts under
      test-results-quinn). The dedicated Sprint 5 cascade XML is missing
      because the sabotage script failed at docker build. Sprint 4 archived
      Subsystems cascade XML covers part of the chain; Sprint 5 NEW classes
      cascade evidence is missing.
    recommendation: |
      Bundle GAP-2 fix with a Sprint 6 wedge sprint. After fixing the
      sabotage rsync, re-archive cascade XML.

  - id: CONCERN-5
    severity: informational
    description: |
      Sprint 5 contract mentioned `byte-identical jar across two consecutive
