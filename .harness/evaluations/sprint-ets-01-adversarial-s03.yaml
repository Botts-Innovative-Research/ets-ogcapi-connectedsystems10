        No "5.6.1" tag exists. Dana's claim verified.
      Independent JDK version verification (Raze):
        docker run --rm ogccite/teamengine-production:latest java -version
        → openjdk version "1.8.0_332"
           OpenJDK Runtime Environment (build 1.8.0_332-8u332-ga-1~deb9u1-b09)
           OpenJDK 64-Bit Server VM (build 25.332-b09, mixed mode)
        ENV JAVA_VERSION=8u212. Dana's claim verified.
      Independent JDK 17-only feature usage in our source:
        javap -v target/classes/.../LandingPageTests.class
        → compiled Java class data, version 61.0  (= JDK 17 bytecode)
        grep 'jakarta\\.' src/main/java
