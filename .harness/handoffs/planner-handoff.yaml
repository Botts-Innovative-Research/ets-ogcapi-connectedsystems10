strategic_decisions:
  q1_next_class:
    question: "Which remaining Part 1 class should Sprint 12 implement?"
    decision: "create_replace_delete"
    rationale: |
      After Sprint 11, the only remaining Part 1 classes are mutation-side classes:
      Create/Replace/Delete and Update. Create/Replace/Delete should precede Update
      because it establishes the mutation-safety contract, opt-in parameters, and cleanup
      discipline needed before PATCH/update work.
    alternatives_rejected:
      - update: "PATCH/update should follow the write-safety gate established by Create/Replace/Delete."
      - part2_dynamic_data: "Explicitly out of current Part 1 incremental lane."

  q2_scope:
    question: "Full Create/Replace/Delete class or safety-gated subset?"
    decision: "safety-gated systems subset"
    rationale: |
      GeoRobotix declares /conf/create-replace-delete and advertises POST/PUT/DELETE
      via OPTIONS, but it is a public shared smoke target. Sprint 12 must avoid unguarded
      writes. The sprint targets declaration, non-mutating OPTIONS readiness, explicit
      mutation opt-in plumbing, default lifecycle SKIP-before-POST, dependency wiring,
      and no-mutation smoke evidence. OPTIONS checks are readiness preconditions only,
      not OGC lifecycle conformance PASS.

