# --- Process improvements ---
process_improvements:
  bash_x_trace_verification_tightened:
    description: |
      Sprint 8 contract TIGHTENS the Sprint 7 bash_x_trace criterion:
      BOTH gates MUST independently run bash -x from their respective /tmp/<role>-fresh-sprint8/
      clone and produce SEPARATE trace archives. Static inspection + runtime-stdout observation alone
      is INSUFFICIENT.
      Sprint 7 caveat: Quinn relied on static inspection + Generator's archived trace + runtime stdout
      for cred-leak script; Raze did a fresh independent re-exec of sabotage. Sprint 8 requires both
      gates to produce their own trace for any bash script they are evaluating.
    enforced_in: "success_criteria.bash_x_trace_evidence_for_bash_changes (tightened interpretation)"
    gate_check: "evaluation_questions_for_quinn (sabotage stdout section) + evaluation_questions_for_raze (sabotage bash -x trace)"

  generator_design_md_adr_self_audit_tightened:
    description: |
      Sprint 8 contract TIGHTENS the Sprint 7 generator_design_md_adr_self_audit criterion:
      Generator MUST run the full project-wide grep at INITIAL CLOSE COMMIT TIME and archive the
      grep output as an evidence artifact. Quinn + Raze READ the archive rather than re-doing the
      grep from scratch. This inverts Sprint 7's pattern (Generator did narrow section grep;
      Raze had to perform the broader audit at gate time — shifting the burden to Raze).
      Residual found in Sprint 7 commit afc7b04 (Self-Raze after initial close) must not recur.
    enforced_in: "success_criteria.generator_design_md_adr_self_audit_projectwide"
    gate_check: "evaluation_questions_for_quinn (grep artifact read) + evaluation_questions_for_raze (grep artifact adversarial verification)"

  gate_independence_no_peek:
    description: |
      Sprint 8 adds explicit gate independence forbid-list item per meta-Raze Sprint 7
      independence_assessment STRONG_PARTIAL finding (Quinn YAML mtime 17:28:38Z; Raze YAML
      17:32:33Z — file-system ordering allowed read). Both gates MUST include peek=false attestation
      in their YAML headers. Orchestrator enforces by parallel spawn design.
      The 0.03 score gap in Sprint 7 is most plausibly real-substantive-clean-close
      (not collusion per meta-Raze analysis), but strict zero-information-flow guarantee
      cannot be established from artifacts alone without this explicit criterion.
    enforced_in: "success_criteria.gate_independence_no_peek"
    applies_to: "Both Quinn YAML and Raze YAML must include peek_attempted: false in header"

  framing_threshold_honesty:
    description: |
      Sprint 8 adds framing_threshold_honesty criterion per META-GAP-S7-4 + Sprint 6 meta-review M-3
      (recurring pattern: orchestrator absorbed Sprint 5 META-RAZE "0.80 line" as contractual milestone).
      The 0.80 threshold was a meta-Raze diagnostic threshold, not a contractual gate threshold.
      Sprint 7 orchestrator framing "BACK ABOVE 0.80 line for first time since Sprint 4" is the
      documented instance. Sprint 8 close framing should describe substantive outcomes, not milestone lines.
    enforced_in: "success_criteria.framing_threshold_honesty"
    gate_check: "Meta-Raze checks framing language at meta-review; not applicable to primary gates"

risks:
  medium:
    - id: "SUBDEPLOYMENTS-IUT-STATE-UNKNOWN"
      description: |
        GeoRobotix has 1 deployment (16sp744ch58g). Whether this deployment has sub-deployments
        is unknown at planning time. If GeoRobotix returns HTTP 404 for /deployments/16sp744ch58g/subdeployments,
        all 4 @Tests SKIP-with-reason — which is the CORRECT behavior per IUT-state-honest SKIP policy.
        This means the story may IMPLEMENT the class structure correctly but all @Tests remain SKIP.
        Gate verdict: PASS as long as SKIP-with-reason is correct (not ERROR or FAIL).
      severity: medium
      mitigation: "Generator curl-verifies GeoRobotix endpoint FIRST. If 404 → IUT-state-honest SKIP for all @Tests. spec.md status set to PARTIAL-IMPLEMENTED (not IMPLEMENTED) with note about IUT state."
    - id: "OGC-SUBDEPLOYMENT-REQ-DIR-NAMING"
      description: |
        OGC requirement directory may use 'subdeployment/' (singular) or 'subdeployments/' (plural) or
        another form. Generator must verify the exact directory path via HTTP-200 at implementation time.
        The canonical class identifier /conf/subdeployments (plural) is established in OGC 23-001 Annex A.
        The requirement folder naming may differ (see Deployments: `/conf/deployment-features` in conformance
        vs `/conf/deployment` in requirement folder naming — Generator must verify at sprint time).
      severity: medium
      mitigation: "Generator browses the OGC raw.githubusercontent.com/opengeospatial/ogcapi-connected-systems/master/api/part1/standard/requirements/ directory listing before writing any @Test description URIs."
  low:
    - id: "TESTNG-SUBDEPLOYMENTS-GROUP-NAMING"
      description: |
        Pat uses 'subdeployments' as the group name (all lowercase, no hyphens, matching
        'subsystems', 'procedures', 'deployments', 'samplingfeatures', 'propertydefinitions').
        Generator should not diverge from this naming convention.
      severity: low
      mitigation: "Generator follows existing naming convention exactly."

