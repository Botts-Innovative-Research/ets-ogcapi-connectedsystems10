    - "ControlStream/Command/CommandStatus/CommandResult JSON assertions require /conf/controlstream."
    - "SystemEvent JSON assertions require /conf/system-event."
  schema_honesty:
    - "Schema PASS requires a retrieved candidate resource or collection and the corresponding bundled schema."
    - "Observation, Command, and CommandResult constraints require parent schema evidence and candidate child resource evidence, then SKIP instead of shape-only PASS until semantic validation is implemented."
  endpoint_honesty:
    - "HTTP 400, HTTP 500, streaming-only, empty candidate collections, and text/html error bodies cannot produce JSON conformance PASS."
  mutation_safety:
    - "Default public GeoRobotix smoke must issue zero IUT-bound POST, PUT, PATCH, or DELETE."
