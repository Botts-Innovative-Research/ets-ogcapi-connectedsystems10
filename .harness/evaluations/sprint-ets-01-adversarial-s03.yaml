      Adversarial consequence: a CITE SC reviewer (or any future Quinn run)
      reading spec.md normatively will see REQ-ETS-TEAMENGINE-003 specifying
      `ogccite/teamengine-production:5.6.1` and the Dockerfile using
      `tomcat:8.5-jre17`. Without reading ops/server.md, they have no way to
      know the deviation was deliberate, well-justified, and architect-aware.
      The Implementation Status section IS visible but is procedural-summary
      text, not the authoritative REQ.
    evidence: |
      spec.md line 137-139:
        "A `Dockerfile` SHALL extend `ogccite/teamengine-production:5.6.1`..."
      Dockerfile line 32:
        "FROM tomcat:8.5-jre17"
      ops/server.md line 115-116:
        "`Dockerfile SHALL produce a TeamEngine 5.6.1 webapp on a JDK 17 base
         image`. Until then, this `ops/server.md` block is the authoritative
         record of why the implementation deviates."
      Independent Docker Hub verification (Raze):
        curl -sL "https://hub.docker.com/v2/repositories/ogccite/teamengine-production/tags/?page_size=100"
        Returns count=2: "latest" (digest e4ee158ed..., size 877MB, last_pushed 2024-04-12)
