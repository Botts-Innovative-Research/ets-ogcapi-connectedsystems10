gap_corroboration_assessment:
  GAP-1-PRIME-MASKING-FILTER-WIRE-CORRUPTION:
    cross_corroboration_status: GENUINE_TWO_REPORTS_SAME_DEFECT
    evidence_independence: HIGH
    rationale: |
      Both gates observed the SAME wire behavior (12 stub-IUT hits with
      Bear***WXYZ) but arrived at the diagnosis through INDEPENDENT
      reasoning paths:
      - Quinn: noted Sprint 4 saw 0 inbound auth → Sprint 5 sees 12 masked;
        diagnosed wedge fix landed wiring but masking is destructive.
      - Raze: traced filter order: snapshot → mask → super.filter() →
        ctx.next() (HTTP send) → finally restore (TOO LATE); diagnosed unit
        test StubFilterContext doesn't exercise wire-side semantics so the
        Sprint 3+4+5 unit-level masking tests are decorative for ordering.
      The diagnoses are at different abstraction levels (Quinn: behavioral;
      Raze: code-trace) but converge on the same defect. This IS a
      legitimate cross-corroboration even though both gates ran the same
      script.
    meta_review_independent_inspection: |
      Inspected MaskingRequestLoggingFilter.java directly at /tmp/raze-meta-
      fresh-ets05/src/main/java/.../listener/MaskingRequestLoggingFilter.java
      lines 105-139. Confirmed: try-block snapshots originals (line 121),
      mutates requestSpec to masked form (lines 122-123), calls
      super.filter() (line 127). super.filter()'s default REST-Assured
      RequestLoggingFilter implementation logs the spec then calls
      ctx.next(...) which performs the HTTP send. The HTTP send happens
      INSIDE super.filter() with the masked spec. The finally block (lines
      129-138) restores AFTER super.filter() returns — i.e. AFTER the wire
      send completes. Both gates' diagnoses are CORRECT.

  GAP-2-SABOTAGE-TARGET-DOCKER-BUILD-BROKEN:
    cross_corroboration_status: MECHANICAL_THIRD_CORROBORATED
    evidence_independence: LOW (deterministic script defect)
    rationale: |
      The sabotage script's docker build is deterministic. Anyone who runs
      `bash scripts/sabotage-test.sh --target=systemfeatures` from a fresh
      clone will hit the same error at builder step 6/8 (COPY .git ./.git:
      "/.git": not found). Quinn + Raze + meta-Raze all hit this defect.
      Cross-corroboration is real but mechanical — independence is only at
      the diagnosis layer (rsync .git exclude vs Dockerfile COPY .git).
    meta_review_independent_inspection: |
      Reproduced GAP-2 from /tmp/raze-meta-fresh-ets05/. Ran:
        cd /tmp/raze-meta-fresh-ets05
        SMOKE_OUTPUT_DIR=/tmp/raze-meta-fresh-ets05/sabotage-results \
        SABOTAGE_TMPDIR=/tmp/raze-meta-sabotage-ets05 \
        bash scripts/sabotage-test.sh --target=systemfeatures
      Result: docker build FAILED at #14 [builder 6/8] COPY .git ./.git
      with error: "failed to compute cache key: failed to calculate
      checksum of ref ...: '/.git': not found". Reproduces deterministically.
      Confirmed scripts/sabotage-test.sh:204-206 has rsync line with
      `--exclude='.git/'`. Confirmed Dockerfile:59 has `COPY .git ./.git`.
      Root cause matches both prior gates.

  third_meta_gap_in_union:
    found: YES
    description: |
      Both gates noted the StubFilterContext-based unit test pattern is
      decorative for filter ordering, but NEITHER explicitly cataloged it as
      a SEPARATE gap distinct from GAP-1'. It's mentioned as part of GAP-1's
      diagnosis but doesn't get its own ID. I propose META-GAP-1 (see
      meta_gaps section): the 8 VerifyAuthCredentialPropagation unit tests +
      8 VerifyMaskingRequestLoggingFilter unit tests (16 total) are
      "wiring-only" not "credential-masking-correctness" coverage; this
      reclassification is a Sprint 6 follow-up that neither gate articulated
      cleanly.

