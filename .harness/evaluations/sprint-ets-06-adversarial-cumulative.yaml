per_story_adversarial_probes:
  S-ETS-06-01:
    title: "MaskingRequestLoggingFilter approach (i) wire-fix"
    verdict: APPROVE
    structural_inspection_pass: true
    findings: |
      Read MaskingRequestLoggingFilter.java filter() lines 178-207 directly:
      - Filter does NOT call super.filter() (verified by absence of `super.filter(`
        in the body; only `super(stream)` in the constructor — which propagates the
        stream field upwards but doesn't invoke parent's filter chain).
      - Filter does NOT mutate requestSpec before ctx.next (no .removeHeader, no
        .header( assignment, no .replaceHeaders — only `.getHeaders()` reads).
      - Masked log line is built from a header snapshot via
        `requestSpec.getHeaders().forEach(...)` and emitted to `this.stream` directly.
      - Final `return ctx.next(requestSpec, responseSpec)` passes the UNMUTATED spec.
      - Defensive try/catch wraps log build with fallback emission — does NOT mask
        wire-side correctness (the ctx.next call is OUTSIDE the try block).

      Read VerifyWireRestoresOriginalCredential.java lines 209-242:
      - CapturingFilterContext records header values BY VALUE into
        `Map<String,String> capturedHeadersAtNextCall` at ctx.next call time
        (line 236: `req.getHeaders().forEach(h -> this.capturedHeadersAtNextCall.put(h.getName(), h.getValue()))`).
      - Returns `mock(Response.class)` (not null) — Mockito present in pom.xml.
      - Test class field javadoc explicitly notes the by-VALUE-vs-by-REFERENCE
        pitfall and documents the redesign rationale (matches Generator's deviation
        narrative re: TDD red-phase false-positive caught).

      Test count audit: VerifyWireRestoresOriginalCredential has 4 @Test methods
      (matches Dana's claim: wireCarriesOriginalAuthorizationCredential,
      wireCarriesOriginalApiKeyAndCookie, filterDoesNotMutateRequestSpec,
      streamOutputContainsMaskedFormNotLiteralCredential).
    mvn_test_evidence: "80 tests / 0 failures / 0 errors / 3 skipped — BUILD SUCCESS in /tmp/raze-fresh-sprint6/ (and identical 80/0/0/3 in /tmp/raze-fresh-sprint6-bis/)."

  S-ETS-06-02:
    title: "sabotage-test.sh rsync .git fix + honest log message"
