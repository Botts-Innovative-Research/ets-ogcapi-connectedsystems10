    evidence:
      - "The plan lists six OGC subrequirements: /req/geojson/deployment-schema, /deployment-mappings, /procedure-schema, /procedure-mappings, /sf-schema, and /sf-mappings."
      - "Each new OpenSpec scenario says PASS requires FeatureCollection/features plus first feature type/id/geometry/properties."
      - "The story's planned test surface repeats only generic Feature shape checks: type='Feature', id, geometry present-or-null, and properties."
      - "Those checks are necessary but not sufficient to distinguish a generic GeoJSON FeatureCollection from a Deployment, Procedure, or Sampling Feature schema/mapping conformance check."
    impact: "A future Generator could truthfully implement the current scenarios while still giving false confidence that the named deployment/procedure/sf schema and mapping subrequirements were covered."
    required_fix: "Either tighten planning artifacts with explicit resource-specific schema/mapping predicates for deployments, procedures, and sampling features, tied to the relevant /req/geojson/*-schema and *-mappings identifiers, or rename/downgrade Sprint 15 scope to generic non-system GeoJSON FeatureCollection smoke and keep those six subrequirements explicitly open."

