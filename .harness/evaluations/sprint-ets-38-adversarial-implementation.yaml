findings:
  - id: RAZE-ETS38-GAP-001
    severity: high
    status: open
    title: Clean empty-IUT root Observation endpoint/body failures can now be skipped before probing /observations.
    files:
      - path: src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/part2/datastream/Part2DatastreamTests.java
        lines: "213-245, 398-406"
      - path: src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/part2/json/Part2JsonTests.java
        lines: "279-285"
      - path: ops/test-results/sprint-ets-38-final-clean-local-osh-smoke-2026-06-03.xml
        lines: "1269-1277, 2148-2165"
    evidence:
      - Part2DatastreamTests.observationEndpointsReadable resolves selectedDatastream before it probes the root /observations collection.
      - Part2DatastreamTests.observationsCanonicalEndpointReadable also calls selectedDatastream before probing /observations.
      - selectedDatastream throws SkipException when /datastreams is empty, so a clean IUT can skip root Observation endpoint parsing entirely.
      - Part2JsonTests.observationJsonSchemasValidateAgainstAnnexA9 now calls preferredDatastreamResource before firstRequiredCollectionResource("observations", ...).
      - The final clean smoke XML shows observationJsonSchemasValidateAgainstAnnexA9 and root Observation endpoint tests SKIP because /datastreams is empty, not because /observations was inspected.
    impact: >
      This weakens the Sprint 37 empty-collection-body guard for the clean primary IUT. A regression where /observations returns HTTP 200 application/json
      with an empty or unparsable body could become invisible whenever /datastreams is empty, despite the Sprint 38 claim that empty bodies remain
      failures/blockers.
    required_fix: >
      Keep root /observations endpoint/body assertions independent of selected parent Datastream availability. Parent-selected evidence should gate only
      nested /datastreams/{id}/observations and positive binding/candidate checks. Add or restore regression/E2E evidence that an empty clean IUT still
      inspects /observations and fails on an empty/unparseable body.

  - id: RAZE-ETS38-GAP-002
    severity: medium
    status: open
    title: Sprint 38 Maven pass claim is not archived in repository artifacts.
    files:
      - path: .harness/contracts/sprint-ets-38.yaml
        lines: "30, 44-48"
      - path: ops/test-results.md
        lines: "23-26"
    evidence:
      - The contract success criteria require Maven verification for touched ETS modules to be archived.
      - ops/test-results.md reports the wrapper limitation and cached Docker Maven equivalent result as 294 tests / 0 failures / 0 errors / 3 skipped.
      - A repository-wide filename search found no Sprint 38 Maven log artifact matching sprint-ets-38, ets-38, or s38 Maven naming.
    impact: >
      The wrapper limitation is reported honestly in docs, but the 294/0/0/3 cached Docker Maven result is not independently reproducible from the
      committed artifact set. This is a traceability gap, not proof the Maven claim is false.
    required_fix: >
      Archive the Sprint 38 Maven output under ops/test-results/ or downgrade the claim to session-output-only evidence and reconcile the contract/story
      wording accordingly. Prefer archiving a bounded cached Docker Maven log if rerunning is acceptable.

