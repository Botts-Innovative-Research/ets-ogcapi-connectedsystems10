verdict_rationale: |
  Sprint 4 ships 4-of-5 stories cleanly with strong evidence (S-ETS-04-01 Path-B
  formal-drop honest + correctly diagnosed; S-ETS-04-02 chown-layer attack delivered
  663→540MB / -18.6% empirically verified via `docker images`; S-ETS-04-04 sabotage
  bug fixes mechanical and committed; S-ETS-04-05 Subsystems FIRST two-level
  dependency chain wired in testng.xml + 4 @Tests structurally clean + defense-in-
  depth @BeforeClass SkipException present per ADR-010 v2 amendment). However, the
  S-ETS-04-03 LIVE EXEC (which Dana explicitly deferred to gate per file
  sprint-ets-04-03-credential-leak-2026-04-29.txt line 49) RAN AND FAILED at this
  gate: prong (a) PASSED (0 unmasked hits in test artifacts) but prongs (b) AND (c)
  BOTH FAILED — 0 masked-form hits in any artifact, AND 0 unmasked-credential hits
  in stub-IUT log. Stub-IUT log shows 11 inbound requests ALL with
  `Authorization=<absent>`. Root cause: smoke-test.sh has ZERO references to
  `SMOKE_AUTH_CREDENTIAL`, `auth-credential`, OR `Authorization` (verified via
  grep). The script Dana authored CLAIMS smoke-test.sh "propagates this to the
  CTL/TestNG suite parameter `auth-credential` per S-ETS-04-03 acceptance
  criterion" (credential-leak-e2e-test.sh line 112) but the propagation does NOT
  exist in code. The synthetic credential never enters the pipeline; the test
  cannot exercise the masking filter (which is why prong (b) is zero) and cannot
  exercise the wire request (which is why prong (c) is zero). This is a real
  defect — Dana's self-test in the artifact (lines 36-47) verified only the
  stub-IUT primitive itself works, NOT the end-to-end auth threading. The unit-
  layer credential-leak coverage from Sprint 3 (8/8 VerifyMaskingRequestLoggingFilter
  + grep-evidence integration test) IS still green and remains the load-bearing
  evidence for S-ETS-03-02; Sprint 4's deeper-E2E ambition is materially
  unfulfilled. Separately, the live exec ALSO produced a worktree-pollution
  incident (smoke-test.sh wrote to ops/test-results/s-ets-01-03-teamengine-smoke-
  2026-04-29.xml in the user's worktree, violating the contract's
  worktree_pollution_constraint — Quinn restored via `git checkout HEAD --` after
  capturing evidence). The remaining 4 stories' independent verifications are
  strong: mvn test 64/0/0/3 (exact byte match to Dana's claim — 9 Verify* classes
  summing 5+2+9+7+1+15+8+2+15 = 64); 26/26 smoke PASS in archived Subsystems XML
  (4 Subsystems @Tests including unique subsystemHasParentSystemLink each cite
  canonical OGC URIs verified HTTP 200 against ogcapi-connected-systems@master
  for /req/subsystem/); zero production bare-AssertionError hits across all 4
  conformance classes (the 3 grep hits are Javadoc continuation lines documenting
  ADR-008 in CommonTests:29 + SystemFeaturesTests:31 + SubsystemsTests:32);
  testng.xml correctly declares the two-level chain `<group name="subsystems"
  depends-on="systemfeatures"/>` AND the @BeforeClass SkipException defense-in-
  depth fallback is implemented at SubsystemsTests.fetchSubsystemsCollection
  lines 196-299 with explicit two-level cascade documentation; image-size 540MB
  empirically <600MB Sprint 4 PASS target; gh token scopes still lack 'workflow'
  (Path-B formal-drop empirically justified); ci/README.md documents BOTH
  activation paths cleanly. Confidence 0.84 (vs Sprint 3's 0.95) reflects: (i)
  S-ETS-04-03 is a real GAP not a deferral — prongs (b)+(c) tested negative when
  Quinn exec'd what Dana deferred; (ii) worktree pollution recurrence (Sprint 2
  systemfeatures incident pattern repeated). The 4 other stories alone would
  warrant 0.93+; the credential-leak gap and pollution incident together pull to
  0.84 — acceptable PASS-WITH-CONCERNS but Raze should examine S-ETS-04-03
  closely. The MaskingRequestLoggingFilter wrap pattern from Sprint 3 IS still
  load-bearing for the masking unit tests; what's missing is the smoke-pipeline
  glue that injects auth-credential into the actual REST-Assured request chain.

