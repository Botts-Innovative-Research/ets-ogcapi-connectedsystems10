  (LandingPageTests:209) and v1.0 SCENARIO-API-DEF-FALLBACK-001 preserved with
  landingPageHasApiDefinitionLink (LandingPageTests:179) asserting service-desc OR service-doc.

  Gaps and concerns are non-blocking but real:
    - GAP-1 (medium): architect-handoff `must` constraint #9 ("Use EtsAssert with structured
      FAIL messages... do not throw bare TestNG AssertionError") is VIOLATED. The 3 new test
      classes contain 21 bare `throw new AssertionError(...)` invocations and zero EtsAssert
      calls. The intent (URI in FAIL message) IS met — every AssertionError ctor includes the
      `/req/*` URI string — but the literal directive (use EtsAssert helper, not bare ctor)
      was not followed. The repo HAS an existing `ETSAssert` class at the root package, but
      it's XML-Schematron oriented (Document/Node/XPath assertions) with no JSON/REST-Assured
      friendly methods, so Dana would have had to extend it. She did not. Quinn concludes:
      design intent met (structured msg + URI), constraint letter violated (no helper).
      Recommendation: track for Sprint 2+ refactor; not a Sprint 1 blocker.
    - GAP-2 (medium): URI fidelity per evaluation Q1 is divergent — TS registry uses
      `/req/ogcapi-common/landing-page` form (6 URIs in common.ts); Java uses
      `/req/core/root-success` form (4 URIs in conformance.core.*). NEITHER form is the
      verified-canonical form per OGC 19-072 adoc (which is `/req/landing-page/root-success`).
      csapi_compliance's own ops/known-issues.md and a prior Raze adversarial review flagged
      this latent imprecision; the deferred fix never landed. The Java port now uses a
      different (also-imprecise) form than the TS registry. Both forms cite the same
      normative TEXT correctly (service-desc OR service-doc, conformance, etc.); only the
      URI path is debatable. Not a correctness bug — a citation-style consistency issue.
    - GAP-3 (low): Spec deviation acknowledged in Implementation Status (line 350-352) for
      Kaizen openapi-parser deferred and layout PARTIAL, but spec.md does NOT yet flip
      REQ-ETS-CORE-001..004 status from SPECIFIED to IMPLEMENTED for what's now built. Spec
      reconciliation per CLAUDE.md step 6 is partial — the "What's Built" sub-section under
      Sub-deliverable 2 should list LandingPageTests/ConformanceTests/ResourceShapeTests. To
      close after Quinn+Raze gates per orchestrator convention.

  Critical SCENARIOs PASS (smoke-archive evidence + class-by-class code reading +
