# ---------------------------------------------------------------
# Retry guidance
# ---------------------------------------------------------------
retry_guidance: |
  Verdict is CONCERNS (not RETRY), so this is "nice-to-have before closing retro-eval" rather than "must-fix
  to retry." To upgrade CONCERNS → PASS:

  1. Run `PORT=4000 CSAPI_PORT=4000 npm run dev` + `npx playwright test` and attach results to
     ops/test-results.md. The 6 UNVERIFIED critical scenarios (SESS-LAND-001/002, SESS-PROG-001,
     RPT-DASH-001, RPT-TEST-001, EXP-JSON-001 UI click) should then become PASS.

  2. Run the full conformance class set against https://api.georobotix.io/ogc/t18/api (the v1 IUT). The 3
     URL-driven false positives from v1 (Deployment Canonical URL, Deployment Canonical Endpoint, Deployments
     Referenced from System) should now show PASS or a genuine FAIL against a real response, not a
     resolves-to-wrong-host 404. The 4th (Deployments in Collections) requires separate adjudication.

  3. Fix ESLint config (pin to ^8.x or write eslint.config.js flat config). One-line.

  4. Commit .github/workflows/ OR decide to drop CI and update ops/status.md accordingly.

