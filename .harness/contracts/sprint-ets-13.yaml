# Sprint 13 contract - update/PATCH safety-gated systems subset
# Created 2026-05-06 after Sprint 12 local OSH follow-up commit.

sprint: "ets-13"
sprint_name: "update-patch-safety-gated-systems-subset"
type: "feature-expansion"
created: "2026-05-06T14:34:34Z"
description: |
  Sprint 13 implements one Part 1 class subset:

  S-ETS-13-01 - Update/PATCH safety-gated systems subset
  (`/conf/update`) (P0/M).

  Scope is PARTIAL for REQ-ETS-PART1-011:
    - `/conformance` declares `/conf/update`, otherwise SKIP-with-reason.
    - Default smoke MUST NOT issue IUT-bound PATCH.
    - Reuse Sprint 12 mutation opt-in parameters: `mutation-tests-enabled=true`
      and `mutation-iut-policy=dedicated-mutable-iut`.
    - `OPTIONS /systems/{id}` readiness precondition records PATCH advertisement
      without issuing PATCH.
    - OPTIONS readiness evidence MUST NOT be reported as satisfying OGC update
      lifecycle conformance.
    - Systems PATCH lifecycle assertion SKIPs by default before PATCH; only an
      explicitly enabled dedicated mutable IUT that declares `/conf/update` and
      advertises PATCH may execute it.
    - Runtime or structural dependency proof: `update` depends on `createreplacedelete`.
    - Default-smoke no-mutation evidence must include zero IUT-bound PATCH entries.

  Explicitly excluded:
    - unguarded PATCH against GeoRobotix or any shared public IUT
    - deployment, procedure, sampling-feature, and property PATCH
    - Feature Collection update paths under `/collections/{collectionId}/items/{id}`
    - Part 2 `/conf/update`
    - optimistic locking
    - PATCH media-type matrix, including JSON Patch, merge patch, and content negotiation

