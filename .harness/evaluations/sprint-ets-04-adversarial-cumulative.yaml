verdict_summary: |
  Sprint 4 cumulative subsystems-plus-sprint-3-carryover lands the HARDEST
  architectural-novelty item — the FIRST two-level dependency cascade
  (Subsystems→SystemFeatures→Core) — with adversarial integrity. Live-exec
  sabotage of SystemFeaturesTests.systemsCollectionReturns200 (unconditional
  AssertionError) on a /tmp/raze-fresh-s04 clone, full smoke against
  GeoRobotix at 2026-04-29T16:39Z, produced canonical TestNG XML evidence
  total=26 / passed=16 / failed=1 / skipped=9 with the precise per-method
  status pattern Architect's ADR-010 v2 amendment promised:

    - SystemFeatures.systemsCollectionReturns200       FAIL  (sabotage worked)
    - 5 other SystemFeatures @Tests                    SKIP  (one-level chain)
    - all 4 Subsystems @Tests                          SKIP  (TWO-LEVEL chain)
    - 12 Core @Tests + 4 Common @Tests                 PASS  (independent)

  This is the architectural goal of Sprint 4: prove that TestNG 7.9.0's
  group-dependency mechanism CASCADES TRANSITIVELY across a multi-level
  chain. It does. The defense-in-depth @BeforeClass SkipException fallback
  in SubsystemsTests was therefore inert in this run (load-bearing only if
  TestNG cascade had underperformed). Architect's ADR-010 v2 amendment
  decision (option c — BOTH testng.xml + @BeforeClass) was correctly
  conservative; observed reality validates the testng.xml-only path WOULD
  have sufficed — but the @BeforeClass insurance is cheap and forward-
  compatible for Sprint 5+ multi-class growth.

  Independent OGC source verification: 6 .adoc files at
  api/part1/standard/requirements/subsystem/ (req_recursive_param,
  req_recursive_search_subsystems, req_recursive_search_systems,
  req_subcollection, req_subcollection_time, requirements_class_system_
  components). Dana's URI REQ_SUBSYSTEM_COLLECTION =
  /req/subsystem/collection matches req_subcollection.adoc identifier. Her
  REQ_SUBSYSTEM_CLASS = /req/subsystem (used for the unique-to-Subsystems
  subsystemHasParentSystemLink assertion) matches
  requirements_class_system_components.adoc identifier `inherit:: /req/system`
  (no standalone parent-system-link sub-requirement; Dana's class-URI
  assertion is the architecturally correct adaptation, not a fabricated URI).

  GeoRobotix shape verification: /systems returns 36 systems (matches
  Sprint 2 evidence); /systems/0n3rtpmuihc0/subsystems returns 12 GeoJSON
  Features (Dana's claim VERIFIED — first 3 ids 0nar3cl0tk3g, 0n0d34emu4bg,
  0n99je6vp0e0). Subsystems are not exposed at properties.subsystems on
  /systems items; the canonical path is /systems/{id}/subsystems collection
  (which is what Dana wired). No GeoRobotix shape mismatch.

  Image-size v2 (S-ETS-04-02): independent docker images ets-ogcapi-
  connectedsystems10:smoke = 540MB matches Dana's claim. docker history
  shows the 80MB chown layer is GONE; largest layers are now 39.4MB
  (lib-runtime COPY) + 34.6MB (TE WAR/console download+chown-in-RUN).
  Sprint 4 PASS target <600MB EXCEEDED by ~60MB; ADR-009 v2 amendment
  empirical falsification of the illustrative 200-300MB jar-dedupe
  projection is now matched by an actual 123MB chown-attack saving.

  Sprint 1+2+3 invariants preserved: schemas diff -r EMPTY (byte-identical);
  pom.xml <connected-systems-yaml.sha>3fd86c73...; META-INF/services
  TestSuiteController single-FQCN line; final smoke XML 26/26 PASS at
  ops/test-results/sprint-ets-04-05-subsystems-georobotix-2026-04-29.xml
  (was 22/22 + 4 Subsystems = 26).

  Surefire independent count: 64 tests / 0 failures / 0 errors / 3 skipped
  matches Dana's claim — 9 unit-test classes (VerifyETSAssert 15 +
  VerifyTestNGController 1 + VerifyTestNGSuiteDependency 7 +
  VerifyCredentialMaskingFilter 15 + VerifyMaskingRequestLoggingFilter 8 +
  VerifySuiteFixtureListener 2 + VerifyURIUtils 5 + VerifyValidationUtils 2
  + VerifyXMLUtils 9 = 64).

  Zero bare AssertionError audit clean: precise grep returns 3 hits, all
  inside javadoc class comments (`* {@code throw new AssertionError}`) — no
  actual throw sites in conformance.{core,systemfeatures,common,subsystems}.

  PATH B formal-drop sanity (S-ETS-04-01): gh auth status confirms scopes
  'gist','read:org','repo' — workflow STILL absent (5 sprints in a row).
  ci/README.md is honest: documents the OAuth-scope blocker, names the two
  future activation paths (gh auth refresh -s workflow OR GitHub web UI
  upload), explains why ci/github-workflows-build.yml is preserved (cheap
  one-line activation for any future session). No deception. Path B IS
  the binary close — Sprint 4 will not re-litigate.

  ONE SIGNIFICANT GAP (downgrades 0.93 ceiling to 0.84):
    S-ETS-04-03 deeper E2E credential-leak smoke is a SHIP-LEVEL FALSE
    PASS at the gate-time live-exec layer. Live exec via `bash scripts/
    credential-leak-e2e-test.sh` (this Raze run, 2026-04-29T16:40Z)
    produced verdict FAIL with three-fold cross-check evidence:
      (a) PASS — ZERO unmasked-credential hits in TestNG XML / container
          log / smoke log
      (b) FAIL — ZERO masked-form `Bear***WXYZ` hits ANYWHERE
      (c) FAIL — ZERO unmasked-credential hits in stub-IUT log
    Root cause: SMOKE_AUTH_CREDENTIAL env var (set by credential-leak-
    e2e-test.sh:118) is NEVER read by smoke-test.sh — `grep -nE
    "SMOKE_AUTH_CREDENTIAL|auth-credential|auth_credential|authCredential"
    scripts/smoke-test.sh` returns zero hits. The synthetic credential is
    set in the verifier-script's environment, propagated to a child bash
    smoke-test.sh process, and silently dropped — smoke-test.sh's curl
    POST to /suite/.../run carries only `iut=...` URL-encoded. Stub-IUT
    log confirms EVERY incoming request shows `Authorization=<absent>`.
    The masking filter is therefore not exercised AT ALL; the test
    cannot prove (b) or (c) because the wire never carries the credential.
    This is functionally equivalent to "test that the engine produces
    smoke when started while never actually starting the engine" — the
    test is decorative, not load-bearing.

    Architect's ADR-010 + design.md §"Sprint 4 hardening: credential-leak
    E2E via stub IUT" specified the full E2E flow but did NOT enumerate
    the SMOKE_AUTH_CREDENTIAL → smoke-test.sh wiring (the design names
    `auth-credential CTL/TestNG suite parameter` but Generator did not
    implement the wiring chain). Dana's ops/test-results/sprint-ets-04-
    03-credential-leak-2026-04-29.txt artifact is honest about live-exec
    DEFERRAL — "LIVE EXECUTION OF credential-leak-e2e-test.sh — DEFERRED
    to Quinn/Raze gate" — but the deferral hides a structural defect:
    when this Raze gate ran the deferred live-exec, it surfaced the
    missing wiring. The artifact + script were committed and presented
    as Sprint 4 close evidence; live exec proves the E2E test
    INFRASTRUCTURE is incomplete.

    Sprint 4 success_criterion `credential_leak_e2e_test_green: true`
    cannot be honestly evaluated TRUE. Honest evaluation: PARTIAL —
    stub-IUT primitive WORKS (echoes Authorization=<absent> correctly,
    proving the stub itself is not the problem); three-fold cross-check
    LOGIC works (script correctly identifies the leak/no-leak/no-wire
    state); only the wiring step is missing. Sprint 5 carryover:
    augment smoke-test.sh to read SMOKE_AUTH_CREDENTIAL env, propagate
    as `auth-credential` TestNG suite parameter via the curl POST
    `--data-urlencode`, and add Java-side handling (CommonFixture or
    new AuthFixture) to read the parameter and inject into REST-Assured
    RequestSpec. ~30-50 LOC + one new VerifyAuthCredentialPropagation
    unit test + re-run this Raze live-exec to verify (b)>=1 and (c)>=1.

  TWO MINOR CONCERNS (non-blocking; verbosity at adversarial layer):
    (1) SubsystemsTests javadoc lists `subcollection-time` as the 5th
        verified .adoc but the actual class file lists `recursive-assoc`
        (5 reqs total: collection, recursive-param, recursive-search-
        systems, recursive-search-subsystems, recursive-assoc; plus a
        SEPARATE req_subcollection_time.adoc file that exists but is NOT
        listed in requirements_class_system_components.adoc). Dana's curl
        evidence claim is ~80% accurate; the class doc enumeration is
        slightly off but the asserted URIs (REQ_SUBSYSTEM_COLLECTION +
        REQ_SUBSYSTEM_CLASS + inherited REQ_CANONICAL_*) are all
        independently HTTP-200 verified. Doc-only discrepancy.
    (2) The defense-in-depth @BeforeClass SkipException fallback in
        SubsystemsTests was inert in this Raze sabotage run (TestNG
        cascade fired at the testng.xml level; @BeforeClass never ran
        because TestNG SKIPped the entire class before instantiating it).
        Forward-compat insurance is fine; just confirms the testng.xml
        path is the actual load-bearing one in TestNG 7.9.0.

gaps:
  - id: "GAP-1-CREDENTIAL-LEAK-E2E-WIRING-MISSING"
    severity: high
    description: |
      Sprint 4 S-ETS-04-03 ships scripts/credential-leak-e2e-test.sh +
      scripts/stub-iut.sh as artifacts and an honest-deferral text file
      (sprint-ets-04-03-credential-leak-2026-04-29.txt) explaining
      live-exec deferred to Quinn/Raze gate. Live-exec at this Raze
      gate produced verdict FAIL because SMOKE_AUTH_CREDENTIAL env var
      is set by the verifier script but NEVER read by scripts/smoke-test.sh
      (verified `grep -nE "SMOKE_AUTH_CREDENTIAL|auth-credential|
      auth_credential|authCredential" scripts/smoke-test.sh` returns
      zero hits; verified curl POST at smoke-test.sh:147 sends only
      `iut=${IUT_URL}` URL-encoded; verified stub-IUT log shows
      `Authorization=<absent>` for ALL 11 incoming requests). The
      masking filter cannot be exercised because the wire never carries
      the credential. Three-fold cross-check (a) PASS by accident —
      zero leak hits BECAUSE zero credential ever transmitted; (b) FAIL
      because zero masked-form hits — filter never ran; (c) FAIL because
      zero unmasked-credential hits at the stub IUT — wire request
      empty.
    impact: |
      Sprint 4 success_criterion `credential_leak_e2e_test_green: true`
      cannot honestly evaluate TRUE. The S-ETS-04-03 artifact set is
      decorative — primitives work (stub IUT echoes correctly, three-
      fold logic correct), but the IUT-side wiring chain is broken at
      the smoke-test.sh layer. Sprint 4's deeper-E2E ambition is
      unfulfilled; the unit-layer Sprint 3 closure remains the
      load-bearing credential-masking guarantee.
    recommendation: |
      Sprint 5 carryover (REQ-ETS-CLEANUP-013 candidate): wire
      SMOKE_AUTH_CREDENTIAL through smoke-test.sh as `auth-credential`
      TestNG suite parameter (~5 LOC bash); add Java-side AuthFixture
      that reads the parameter and injects into REST-Assured RequestSpec
      via MaskingRequestLoggingFilter ordering (~30-50 LOC); add
      VerifyAuthCredentialPropagation unit test (~10-15 LOC); re-run
      Raze live-exec to verify three-fold (b)>=1 + (c)>=1.

concerns:
  - id: "CONCERN-1-SUBSYSTEMS-CLASS-DOC-ADOC-LIST-OFF-BY-ONE"
    severity: low
    description: |
      SubsystemsTests.java javadoc enumerates 5 verified .adoc files:
      requirements_class_system_components.adoc, req_subcollection.adoc,
      req_recursive_param.adoc, req_recursive_search_systems.adoc,
      req_recursive_search_subsystems.adoc. Independent listing via
      GitHub API api/part1/standard/requirements/subsystem/ shows 6
      .adoc files actually exist. The 5 actually requirements_class
      lists requirement:: /req/subsystem/recursive-assoc as the 5th
      (NOT subcollection-time); req_subcollection_time.adoc exists as
      a separate file (968 bytes) but is NOT in the class enumeration.
      Dana's class doc is ~80% accurate but slightly off in the
      enumerated list. Asserted URIs are still all OGC-canonical and
      all class-level inherited from /req/system per
      requirements_class_system_components.adoc `inherit:: /req/system`.
    impact: |
      Doc-only discrepancy. No code-level URI is wrong. Future
      contributor referencing the javadoc enumeration to plan
      Sprint 5+ recursive-* expansion may be briefly confused; not
      load-bearing.
    recommendation: |
      Sprint 5 trivial fix: update SubsystemsTests.java class javadoc
      to list 6 .adoc files (req_subcollection_time + recursive-assoc)
      and clarify that requirements_class_system_components.adoc
      enumerates 5 sub-requirements (not 4), with req_subcollection_time
      as a separate optional sibling. ~3-LOC doc edit; bundle with the
      Sprint 5+ recursive-* expansion story.

  - id: "CONCERN-2-BEFORECLASS-FALLBACK-INERT-IN-RAZE-RUN"
    severity: low
    description: |
      ADR-010 v2 amendment defense-in-depth (option c) ratified BOTH
      testng.xml <group depends-on> AND @BeforeClass SkipException
      fallback in SubsystemsTests. This Raze sabotage run shows the
      testng.xml path fired correctly (all 4 Subsystems @Tests SKIP);
      the @BeforeClass fallback never ran because TestNG SKIPped the
      class before instantiating it (canonical TestNG 7.9.0 group-
      dependency cascade behavior). Dana's defense-in-depth code is
      load-bearing-only-if-cascade-fails; in this run it was inert.
    impact: |
      Architecturally correct conservative choice; observed reality
      validates the testng.xml-only path would have sufficed. The
      @BeforeClass guard remains forward-compatible for Sprint 5+
      multi-class growth where class-fixture-time IUT-shape probes
      may need to fail-fast independently of group dependency.
    recommendation: |
      No action. Document this empirical finding in ADR-010 v3
      amendment (Sprint 5+) when Architect ratifies the next
      conformance-class addition: "TestNG 7.9.0 transitive cascade
      VERIFIED Sprint 4 — testng.xml <group depends-on> chain is the
      canonical path; @BeforeClass fallback is forward-compat
      insurance, not load-bearing."

