        FROM tomcat:8.5-jre17

      The mismatch is documented in:
        - ops/server.md "Docker smoke test" section (lines 59-118), which calls
          out the proposed amended REQ wording and Sam's reconciliation TODO
        - spec.md Implementation Status section (line 350), which flags the
          deviation as "proposed REQ wording amendment for next planning cycle"
        - Dockerfile comment block (lines 5-30) with empirical justification

      The pattern Sam used at S-ETS-01-01 close (commit 19003b1) was to
      reconcile spec/PRD strings to ADRs same-turn. That same-turn reconciliation
      did NOT happen for S-ETS-01-03; the REQ-ETS-TEAMENGINE-003 text in
