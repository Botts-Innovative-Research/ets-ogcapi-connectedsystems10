    severity: low
    description: |
      Credential-leak integration test (sprint-ets-03-02-credential-leak-
      integration-2026-04-29.txt line 21) explicitly defers "deeper E2E IUT-auth
      wiring" to Sprint 4. The current test verifies the masking pipeline at the
      VerifyMaskingRequestLoggingFilter unit-test layer (asserting the formatter
      output is masked + the filter does not leak the literal credential), which
      is a strong defense-in-depth signal but NOT the full architect-handoff
      §S-ETS-03-02 vision of "synthetic Bearer ABCDEFGH12345678WXYZ as CTL/
      TestNG suite parameter, run smoke-test.sh, grep ops/test-results/ AND
      container log for literal — both must return ZERO." The deeper end-to-end
      smoke against an authenticated GeoRobotix endpoint is missing.
    recommendation: |
      Sprint 4 wedge: add a smoke variant that injects auth-credential=Bearer
      ABCDEFGH12345678WXYZ as TestNG suite parameter, runs the full smoke against
      a GeoRobotix endpoint that requires Bearer (or against a local stub server
      configured to require Bearer), then greps the archived ops/test-results/
      XML AND the container's catalina.out for literal EFGH12345678WXYZ —
      asserts zero hits, asserts >=1 hit for masked Bear***WXYZ form. ~30
      minutes Dana time. Documented as Sprint 4 follow-up; out of scope for
      Sprint 3 close.
  - id: CONCERN-2
    severity: low
    description: |
      Common conformance class is intentionally minimal-then-expand (4 @Tests
      vs the architect's Sprint 4+ target of 8-12 covering remaining /conf/common
      ATS items: oas30 sub-requirements, Common Part 2 collections-description
      shape, content-negotiation parameter validation depth, json-html
      negotiation, paging discipline). This is by design per architect-handoff
      constraints_for_generator.must item 17 ("Sprint-1-style minimal — same
      risk-control rationale as Sprint 2 SystemFeatures") and is NOT a gap, but
      it does mean the v1.0 product's /conf/common coverage is approximately
      30-40% of full ATS scope at Sprint 3 close.
    recommendation: |
      Sprint 4 contract should explicitly target Common expansion to 8-12
      @Tests (same expansion ratio Sprint 3 used for SystemFeatures: 4 → 6
      means +2; for parity Common would target +4 in Sprint 4 → 8 @Tests).
      Sprint 5+ closes the remainder. Pat tracks.
  - id: CONCERN-3
    severity: informational
    description: |
      The empirical dedupe falsification of ADR-009's illustrative jar table
      is a high-value negative result. ADR-009 Sprint 3 amendment should be
      re-amended (or a new ADR-011 superseding) to (a) record the empirical
      finding (TE 5.6.1 + ETS 0.1-SNAPSHOT exact-basename overlap is 4 jars /
      1.8MB, NOT 200-300MB); (b) document the 80MB chown -R layer as the
      Sprint 4 dominant target; (c) preserve the iterative version-overlap
      dedupe as a tier-2 path with smoke-verification budget warning. Current
      sprint-ets-03-04-empirical-dedupe-list-2026-04-29.txt captures this in a
      sprint artifact, but the architectural decision record should reflect
      the empirical reality.
    recommendation: |
      Architect (Alex) cycles next sprint: amend ADR-009 in-place with a
      Sprint 3 close addendum recording the empirical falsification, OR
      author ADR-011 superseding the illustrative table approach with the
      chown-layer + version-dedupe roadmap. Either is acceptable; Alex picks.
      Out of scope for Quinn evaluation.

