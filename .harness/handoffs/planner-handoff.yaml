strategic_decisions:
  q1_next_work:
    question: "After Sprint 21, what is the next item?"
    decision: "Plan S-ETS-22-01 Part 2 Control Streams & Commands."
    rationale: |
      Sprint 20 established Part 2 API Common and Sprint 21 implemented the
      first Datastreams & Observations subset. The next OGC 23-002 class in
      sequence is Control Streams & Commands, which GeoRobotix currently declares.

  q2_identifier_source:
    question: "Which identifiers anchor Sprint 22?"
    decision: "Use official OGC 23-002 `/req/controlstream` and `/conf/controlstream`."
    rationale: |
      The official OGC 23-002 published HTML defines Clause 10 as Requirements
      Class "Control Streams & Commands" with identifier /req/controlstream
      and conformance /conf/controlstream.

  q3_georobotix_verdict:
    question: "How should GeoRobotix be treated when it declares /conf/controlstream but not /conf/api-common?"
    decision: "Evaluate ControlStream-specific declared behavior, but never infer API Common PASS."
    rationale: |
      Clause 10 lists /req/api-common as a prerequisite. Current GeoRobotix can
      still provide scoped ControlStream endpoint evidence because it declares
      /conf/controlstream, but the ETS must keep the missing API Common
      declaration visible as a separate prerequisite-incomplete issue and must
      not report full /conf/controlstream closure.

  q4_alias_and_commands:
    question: "How should /controls/{id} and /commands behave in Sprint 22 planning?"
    decision: "Treat them as explicit false-PASS risks, not positive evidence."
    rationale: |
      GeoRobotix serves /controlstreams/{id} but returns HTTP 400 for
      /controls/{id}; it also returns HTTP 400 for /commands while nested
      /controlstreams/{id}/commands returns HTTP 200 empty items. Generator must
      not pass canonical-url or global Command endpoint assertions from alias or
      nested endpoint evidence.

