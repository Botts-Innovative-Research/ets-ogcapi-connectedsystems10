    rationale: |
      Fourth additional Part 1 conformance class beyond Core + SystemFeatures + Common
      + Subsystems. Mirrors the S-ETS-04-05 Subsystems pattern exactly: new
      `conformance.procedures.ProceduresTests` subpackage, REQ-ETS-PART1-006 expanded
      from PLACEHOLDER → SPECIFIED, SCENARIO-ETS-PART1-006-* added, testng.xml wired
      with `<group name="procedures" depends-on="systemfeatures"/>`.

      OGC 23-001 Annex A /conf/procedure-features/ has 5 sub-reqs (verified 2026-04-29):
      /req/procedure/resources-endpoint, /req/procedure/canonical-url,
      /req/procedure/canonical-endpoint, /req/procedure/location (Procedure feature
      SHALL NOT include location/geometry), /req/procedure/collections.

      GeoRobotix shape-verification (Pat-time, for Generator guidance):
        /procedures: 200, 19 items (first id=164p7ed8l47g, type=Feature,
                     links=[canonical,alternate,alternate])
        /procedures/164p7ed8l47g: 200, id=164p7ed8l47g, type=Feature,
                     links=[canonical,alternate,alternate]
        NOTE: /req/procedure/location says Procedure SHALL NOT include geometry —
        Generator MUST check that geometry=null or geometry key absent in each item
        and assert this invariant (FAIL if geometry is non-null).

      Generator MUST: (a) curl GeoRobotix /procedures before writing assertions; (b) verify
      canonical OGC .adoc URI HTTP-200 for all 5 sub-reqs; (c) use ETSAssert helpers +
      canonical URI form; (d) zero new bare-throw sites; (e) Sprint-1-style minimal
