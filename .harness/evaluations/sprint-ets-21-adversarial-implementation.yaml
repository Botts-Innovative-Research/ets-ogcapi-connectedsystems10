findings:
  - id: "RAZE-ETS21-IMPL-GAP-001"
    severity: "HIGH"
    status: "OPEN"
    title: "Implementation evidence is not reconciled across required ops/traceability docs"
    details: >
      The Java implementation and smoke behavior match the Sprint 21 false-PASS
      guardrails, but the repository documentation is not yet reconciled enough
      for amend/commit. OpenSpec and the story contain implementation evidence,
      and the epic row is partial-implemented, but _bmad/traceability.md still
      marks REQ-ETS-PART2-002 as PLANNED, ops/status.md still says the next action
      is to start Generator for S-ETS-21-01, and ops/test-results.md still labels
      Sprint 21 as planning-only with no Java code changed. This conflicts with
      the current uncommitted code and the supplied Maven/smoke evidence.
    evidence:
      - "_bmad/traceability.md row FR-ETS-31 / REQ-ETS-PART2-002 still begins **PLANNED** and describes Generator obligations."
      - "ops/status.md says Sprint ets-21 planning is complete and the next action is to start Generator for S-ETS-21-01."
      - "ops/test-results.md current Sprint section still says 'Planning-only change set; no Java code changed and no Maven/TeamEngine gates are required before Generator.'"
      - "OpenSpec and story already claim Sprint 21 Generator evidence, so the docs disagree with each other."
    required_fix: >
      Reconcile _bmad/traceability.md, ops/status.md, ops/test-results.md,
      ops/changelog.md, and any handoff artifact used for Generator close so they
      consistently record Sprint 21 as PARTIAL_IMPLEMENTED with exact formatter,
      Maven, smoke, no-mutation, runtime PASS/SKIP outcomes, and remaining scope
      limitations.

  - id: "RAZE-ETS21-IMPL-GAP-002"
    severity: "MEDIUM"
    status: "OPEN"
    title: "Maven verification evidence is not durably archived in ops/test-results"
    details: >
      The user supplied Maven evidence of 160 tests, 0 failures, 0 errors, and
      3 skipped, and the current target/surefire-reports directory is consistent
      with the new Part2Datastream helper and structural lint tests. However, no
      Sprint 21 Maven log exists under ops/test-results or another durable repo
