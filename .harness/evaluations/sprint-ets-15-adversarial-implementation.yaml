findings:
  - id: RAZE-ETS15-IMPL-001
    severity: info
    status: closed
    category: false_pass_risk
    title: CS API items wrappers do not produce GeoJSON PASS verdicts
    evidence:
      - "GeoJsonTests.firstGeoJsonFeature skips when a response contains items without features."
      - "Smoke evidence shows /deployments, /procedures, and /samplingFeatures skipped for items-wrapper fallback, not passed."
      - "VerifyGeoJsonResourceMappingAssertions.skipsItemsWrapperWithoutFeatures covers the regression path."
    assessment: >
      The core Sprint 15 false PASS risk is addressed. A server declaring
      /conf/geojson but returning a CS API default items wrapper for non-system
      resources is recorded as fallback evidence and skipped rather than passed.

  - id: RAZE-ETS15-IMPL-002
    severity: info
    status: closed
    category: resource_specific_predicates
    title: Resource-specific schema and mapping predicates are implemented
    evidence:
      - "Deployment requires properties.uid and non-empty properties.deployedSystems@link before PASS."
      - "Procedure requires Feature shape, geometry == null, properties.uid, and properties.featureType."
      - "Sampling feature requires properties.uid, properties.featureType, and either hostedProcedure@link or radius."
      - "Generic GeoJSON Feature shape alone cannot satisfy the new non-system mapping assertions."
    assessment: >
      The gap identified during Sprint 15 planning is closed in implementation.
      The tests require resource-specific mapping evidence and use SKIP where
      first-feature fixture data is insufficient to prove the mapping.

  - id: RAZE-ETS15-IMPL-003
    severity: info
    status: closed
    category: conformance_scope_gating
    title: Non-system GeoJSON tests are gated by matching resource conformance classes
    evidence:
      - "deploymentFeatureHasGeoJsonSchemaAndMapping calls skipIfConformanceMissing(CONF_DEPLOYMENT, ...)."
      - "procedureFeatureHasGeoJsonSchemaAndMapping calls skipIfConformanceMissing(CONF_PROCEDURE, ...)."
      - "samplingFeatureHasGeoJsonSchemaAndMapping calls skipIfConformanceMissing(CONF_SF, ...)."
      - "skipIfConformanceMissing emits SKIP when /conf/geojson is declared but the relevant resource class is not declared."
    assessment: >
      The final patch closes the overreach risk where a server could declare
      GeoJSON without declaring deployment/procedure/sampling-feature support
      and still be judged on those resource-specific mapping requirements.

