findings:
  - id: "RAZE-ETS17-IMPL-001"
    severity: pass
    title: "Generic links are not counted as association evidence"
    evidence:
      - "EncodingRelationTypes.GENERIC_RELATIONS excludes self, canonical, alternate, pagination, collection, service-desc, and service-doc rels."
      - "assertLinksMemberAssociationRels continues past generic rels and throws SkipException when only generic links remain."
      - "VerifyEncodingRelationTypes.genericLinksOnlySkipWithoutVacuousPass covers generic-only fallback honesty."
    conclusion: "Canonical/alternate/pagination/service links cannot produce relation-types PASS."
  - id: "RAZE-ETS17-IMPL-002"
    severity: pass
    title: "Wrong-resource relation types are rejected by resource-specific allowlists"
    evidence:
      - "EncodingRelationTypes.ALLOWED_ASSOCIATION_RELS is keyed by encoding and resource type, not one global allowlist."
      - "GeoJSON procedure allows only implementingSystems, while GeoJSON system/deployment/samplingFeature use their own OGC-derived rel sets."
      - "SensorML system intentionally excludes parentSystem because SensorML maps that association to attachedTo rather than links."
      - "VerifyEncodingRelationTypes.wrongResourceAssociationRelFails and sensorMlSystemRejectsGeoJsonOnlyParentSystemRel exercise wrong-resource rejection."
    conclusion: "RAZE-ETS17-PLAN-GAP-001 remains closed in implementation."
  - id: "RAZE-ETS17-IMPL-003"
    severity: pass
    title: "Property-level @link objects are not links-member evidence"
    evidence:
      - "assertLinksMemberAssociationRels reads only representation.get(\"links\"); it does not traverse properties or @link members."
      - "GeoJsonTests and SensorMlTests call the helper on selected representation bodies, and the helper's scope is top-level links-member only."
      - "Story/spec/status continue to classify deployedSystems@link and hostedProcedure@link as mapping evidence, not relation-types evidence."
    conclusion: "Property-level @link objects cannot produce relation-types PASS."
  - id: "RAZE-ETS17-IMPL-004"
    severity: pass
    title: "Missing rel handling fails rather than skipping or passing"
    evidence:
      - "assertLinksMemberAssociationRels calls ETSAssert.failWithUri when a links[] object has a missing or blank rel."
      - "VerifyEncodingRelationTypes.missingRelFailsRatherThanSkipping covers the behavior."
    conclusion: "Missing rel values do not create false PASS or silent SKIP."
  - id: "RAZE-ETS17-IMPL-005"
    severity: pass
    title: "SensorML no-association state is represented honestly as SKIP"
