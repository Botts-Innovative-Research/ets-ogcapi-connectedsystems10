gaps_found:
  - id: GAP-1
    severity: medium
    description: |
      DOCKER-IMAGE-SIZE-MISSED. ADR-009's image size soft target is ≤450MB. Quinn
      independently measured the smoke-built image at 663MB; Dana's claim of 815MB
      was for the build-test variant. Either way, both miss the target by 47-81%.
      ADR-009 §"Negative" explicitly notes this is acceptable with Sprint 3
      deferral (distroless runtime stage rejected for Sprint 2 in §Alternatives;
      TE common-libs ↔ deps-closure dedupe identified as the high-value Sprint 3
      optimization). Story documents the miss in Acceptance Criteria sub-task A
      bullet 5 and Implementation Notes.

      Quinn's verdict: meets the success criterion's spirit (multi-stage Dockerfile
      works, non-root USER works, no host-mvn dep works) but misses the explicit
      size target. Honest documentation; not a blocker. Carries to Sprint 3.
    recommended_fix: |
      Sprint 3 image-size optimization story:
        Option A: distroless runtime stage (gcr.io/distroless/java17-debian12 or
                  equivalent). ~60-100MB image. Risk: Tomcat 8.5 + TE 5.6.1's
                  bash-script-based startup may not work in a no-shell distroless
                  image. Investigate first.
        Option B: TE common-libs ↔ deps-closure dedupe. The 60-80 jars in
                  /usr/local/tomcat/lib (from teamengine-web-common-libs.zip)
                  overlap with the 96 jars in /usr/local/tomcat/webapps/teamengine/
                  WEB-INF/lib (from our deps closure). De-dupe by listing the TE
                  common-libs and excluding from the COPY --from=builder lib-runtime.
                  Estimate: 200-300MB savings, brings runtime image to ~360-460MB.
        Recommend Option B for Sprint 3 — minimal layout change, no runtime risk.

  - id: GAP-2
    severity: low
    description: |
      CI-WORKFLOW-NOT-LIVE-DEFERRED. `.github/workflows/build.yml` does NOT exist;
      `ci/github-workflows-build.yml` is the staged location. `gh auth status`
      confirms missing `workflow` scope (Dana's diagnosis verified by Quinn).
      Sprint 2 success_criterion `ci_workflow_live` is therefore DEFERRED-WITH-
      RATIONALE per Sprint 2 contract `risks_for_generator.medium.GH-WORKFLOW-
      SCOPE-STILL-MISSING.mitigation`. Tracked across S-ETS-01-01..03 and
      S-ETS-02-05 (4 sprints) — pure user-action blocker, not Dana's gap.
    recommended_fix: |
      User action: orchestrator runs `gh auth refresh -s workflow` from a
      session with that scope. Then either:
        (a) Quick: `cd ets-ogcapi-connectedsystems10 && mkdir -p .github/workflows
            && git mv ci/github-workflows-build.yml .github/workflows/build.yml
            && git commit -m "chore: move CI workflow to .github/workflows/" && git push`
        (b) Make S-ETS-03-XX a one-line story with the same git mv + push.

concerns:
  - id: CONCERN-1
    description: |
      CREDENTIAL-LEAK-INTEGRATION-TEST-DEFERRED. The 15-test unit-test layer is
      substantive (verifies the literal-middle-leak guard with the EXACT Bearer
      string from the Sprint 2 contract: "Bearer ABCDEFGH12345678WXYZ" → "Bear***WXYZ"
      with explicit `assertFalse(masked.contains("EFGH12345678WXYZ"))`). But the
      end-to-end claim from SCENARIO-ETS-CLEANUP-LOGBACK-MASKING-001 ("literal
      substring MUST NOT appear anywhere in masked output") is verified ONLY at
      the unit-test level, not at the full-stack smoke-test level. Dana's
      rationale (suite doesn't yet wire `auth-credential` CTL parameter) is sound;
      smoke against an auth-protected IUT requires the suite to know the IUT's
      auth scheme. GeoRobotix (the Sprint 1 + 2 IUT) is an open IUT.

      Why this is a concern not a gap: the load-bearing semantic IS verified
      (the unit test directly asserts the masked form does not contain the
      credential middle). The gap is in the surface of where it's verified (unit
      vs integration), not in whether the masking works. Sprint 3+ story should
      add the auth-credential CTL parameter wiring + integration smoke.
    recommended_fix: |
      Sprint 3 story (foldable into S-ETS-03-XX SystemFeatures or its own
      cleanup story): wire `auth-credential` as a CTL parameter; add integration
      smoke that sets it to "Bearer ABCDEFGH12345678WXYZ" and greps the TestNG
      report attachments + container log for the literal substring "EFGH12345678WXYZ"
      — must be ZERO hits.

  - id: CONCERN-2
    description: |
      REST-ASSURED-LOGGINGFILTER-NOT-WRAPPED. CredentialMaskingFilter masks via
      logging at FINE level; it does NOT mutate the outgoing request. REST-Assured's
      built-in `RequestLoggingFilter` (when explicitly added by user code in a
      future sprint) would still log the unmasked header because it reads the
      specification directly. Filter source documents this at line 145-151:
      "Sprint 2 the suite does not chain RequestLoggingFilter, so the masked-form
      FINE log is the sole observable." Acceptable for Sprint 2; Sprint 3 if any
      class adds RequestLoggingFilter, the masking gap surfaces.
    recommended_fix: |
      Sprint 3 architect-handoff `must` constraint to add: "Any new
      RequestLoggingFilter usage must be wrapped to consult CredentialMaskingFilter
      first." Or: extend CredentialMaskingFilter to mutate outgoing request with
      a side-channel original-value preserved for the actual auth handshake.

  - id: CONCERN-3
    description: |
      EMPIRICAL-DEVIATIONS-NOT-IN-ADR-009. Dana's generator-handoff lists 3
      empirical deviations from ADR-009's specified Dockerfile (lines 133-141):
      (a) MAVEN_BASE switched to archive.apache.org (rationale: dlcdn rotates,
          3.9.9 was 404; archive is permanent — ADR-009 §Risks anticipates this)
      (b) git installed in builder + .git COPY'd (rationale: buildnumber-maven-plugin
          requires it)
      (c) COPY pattern tightened to slim ets jar only, not wildcard *.jar
          (rationale: aio.jar shades transitive deps that conflict with loose
          lib-runtime closure)
      All three deviations have empirical justification in the story Implementation
      Notes and Dana's handoff. None contradict ADR-009's intent. But ADR-009's
      §"Stage 1 — Build (builder)" snippet reads `dlcdn.apache.org` literally
      — a future maintainer will be surprised.
    recommended_fix: |
      Sprint 3 ADR-009 amendment (lightweight footnote, similar to ADR-001
      amendment pattern): "Empirical adjustments at S-ETS-02-05 close: MAVEN_BASE
      → archive.apache.org (dlcdn rotates); .git COPY'd into builder context
      (buildnumber-maven-plugin requires); COPY pattern tightened to slim ets
      jar only (avoids aio jar shade conflict)." Optional: write as ADR-010
      "Multi-stage Dockerfile empirical adjustments" if the cumulative content
      is non-trivial.

  - id: CONCERN-4
    description: |
      SCENARIO-LINKS-NORMATIVE-001 row in traceability.md has a duplicate-row
      shape — the cleanup batch added a row for it referring to the URI sweep,
      but the original Sprint 1 row may also still exist. Quinn grep matched
      one entry; recommend full traceability.md audit at Sprint 2 close. Low
      severity — at most a duplicate row, not a missing one.
    recommended_fix: |
      Quick `grep -n SCENARIO-LINKS-NORMATIVE-001 _bmad/traceability.md`; if
      multiple matches, dedupe.

  - id: CONCERN-5
    description: |
      The Sprint 2 evaluation_questions_for_quinn item asks for an "Archived
      TestNG report from S-ETS-02-06 SystemFeatures smoke against GeoRobotix"
      and "Archived TestNG report from full Sprint 2 close smoke (Core +
      SystemFeatures combined)". Neither exists because S-ETS-02-06 is OUT OF
      SCOPE for this Generator run per user instruction. The Core-only smoke
