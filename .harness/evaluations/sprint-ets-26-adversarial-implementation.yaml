findings:
  - id: "RAZE-ETS26-IMPL-GAP-001"
    severity: "HIGH"
    category: "false-pass-risk"
    title: "OPTIONS readiness probes use non-normative global endpoints for several Clause 14 resources."
    files:
      - path: "src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/part2/createreplacedelete/Part2CreateReplaceDeleteTests.java"
        lines:
          - 185
          - 189
          - 205
    evidence:
      implementation:
        - "`datastreamAndObservationOptionsReadinessIsReadOnly` checks `OPTIONS /datastreams` for POST readiness, then `OPTIONS /observations` for POST readiness."
        - "`controlStreamAndNestedCommandOptionsReadinessIsReadOnly` checks `OPTIONS /controlstreams` for POST readiness."
      official_ogc_23_002_clause_14:
        - "Requirement 63 says DataStream CREATE is at `{api_root}/systems/{sysId}/datastreams`; REPLACE/DELETE are at `{api_root}/systems/{sysId}/datastreams/{id}` and `{api_root}/datastreams/{id}`."
        - "Requirement 66 says Observation CREATE is at `{api_root}/datastreams/{dsId}/observations`; REPLACE/DELETE are at `{api_root}/datastreams/{dsId}/observations/{id}` and `{api_root}/observations/{id}`."
        - "Requirement 68 says ControlStream CREATE is at `{api_root}/systems/{sysId}/controlstreams`; REPLACE/DELETE are at `{api_root}/systems/{sysId}/controlstreams/{id}` and `{api_root}/controlstreams/{id}`."
      why_it_matters: "A server can advertise broad methods on `/datastreams`, `/observations`, or `/controlstreams` while failing the normative system-scoped or datastream-scoped lifecycle endpoints. The current readiness tests can therefore produce a PASS-style diagnostic tied to OGC requirement URIs from the wrong endpoint."
    required_fix:
      - "Change readiness probes to use the OGC 23-002 Clause 14 endpoint templates, or SKIP with a precise seed-ID/unavailable-endpoint reason when the normative template cannot be constructed."
      - "For DataStream/ControlStream CREATE, select a System id and probe `systems/{sysId}/datastreams` and `systems/{sysId}/controlstreams`."
      - "For Observation CREATE, select a DataStream id and probe `datastreams/{dsId}/observations` rather than `/observations`."
      - "Keep global resource endpoints only where Clause 14 lists them as REPLACE/DELETE alternatives, and label them as alternatives."
      - "Add helper regressions or structural assertions proving the readiness paths use the canonical templates."
      - "Update planning/ops text that currently records only the global OPTIONS probes so the docs do not preserve the bad endpoint model."
      - "Rerun formatter and Maven after the patch; rerun TeamEngine smoke when the IUT blocker clears."

  - id: "RAZE-ETS26-IMPL-BLOCKER-002"
    severity: "HIGH"
    category: "e2e-blocker"
    title: "Mandatory E2E completion remains unresolved; the docs are honest, but Sprint 26 cannot be closed as complete."
