# HIGH GAP-1 reproduction (third-corroboration)
# ---------------------------------------------------------------------------
live_exec_reproduction:
  status: REPRODUCED
  command: |
    git clone /home/nh/docker/gir/ets-ogcapi-connectedsystems10 /tmp/raze-meta-fresh-sprint6
    cd /tmp/raze-meta-fresh-sprint6
    SABOTAGE_TMPDIR=/tmp/raze-meta-sabotage-sprint6/ \
    SMOKE_OUTPUT_DIR=/tmp/raze-meta-fresh-sprint6/test-results/ \
    bash scripts/sabotage-test.sh --target=systemfeatures
  result: |
    Docker build failed at builder 8/8 (mvn clean package) with exact error:
    `[ERROR] /build/src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/systemfeatures/SystemFeaturesTests.java:[210,17] unreachable statement`
    `[ERROR] Failed to execute goal org.apache.maven.plugins:maven-compiler-plugin:3.13.0:compile (default-compile) on project ets-ogcapi-connectedsystems10: Compilation failure`
    Exit code 0 (sabotage-test.sh's trap cleanup ran; the underlying mvn package call inside Docker failed with exit 1 which propagates through the script's docker buildx invocation).
  archive: /tmp/raze-meta-sab.log
  determinism: FULLY_DETERMINISTIC
  triangulation: |
    THIRD-CORROBORATION CONFIRMED. Raze's HIGH GAP-1 diagnosis is
    independently reproduced from a clean third clone:
    - Sprint 5 latent sabotage-marker injection technique
    - Now visible because Sprint 6 .git fix lets Docker build proceed past
      `COPY .git ./.git` step
    - javac rejects with `unreachable statement` per JLS reachability
      analysis because `throw new AssertionError(...)` injected as the
      first statement makes the existing
      `ETSAssert.assertStatus(this.systemsResponse, 200, ...)` at line 209
      unreachable
  source_inspection_systemfeatures_tests_line_210:
    file: /tmp/raze-meta-fresh-sprint6/src/main/java/org/opengis/cite/ogcapiconnectedsystems10/conformance/systemfeatures/SystemFeaturesTests.java
    method: systemsCollectionReturns200()
    body_line_209: "ETSAssert.assertStatus(this.systemsResponse, 200, REQ_RESOURCES_ENDPOINT);"
    sabotage_injection_pattern: |
      sabotage-test.sh line 232 python script regex matches `public\s+void\s+systemsCollectionReturns200\s*\(\s*\)\s*\{` and inserts the throw statement immediately after the opening brace. Result: `throw new AssertionError("SABOTAGED ...");` becomes line 209's first executable statement; line 210's existing assertStatus call becomes unreachable per JLS §14.21.
    raze_diagnosis_correct: true
  bash_unreachability_verification:
    test_command: 'bash -c "set -eo pipefail; trap \"echo TRAPPED EXIT=\\$?\" EXIT; LATEST_REPORT=\"\$(ls -t /tmp/this-glob-will-not-match-*.xml 2>/dev/null | head -1)\"; echo \"got past assignment\""'
    result: |
      TRAPPED EXIT=2
      (no "got past assignment" echoed — script terminates inside the assignment line under set -eo pipefail when ls returns non-zero exit code)
    raze_diagnosis_correct: true
  could_fix_be_simpler:
    raze_proposed_fixes: |
      (1) `if (true) throw new AssertionError(...)` (defeats reachability)
      (2) Replace original method body entirely (drop assertStatus line)
      (3) Wrap in try { } catch (Throwable t) { throw t; }
    meta_review_recommendation: |
      Option (1) `if (true) throw new AssertionError(...)` is the standard
      Java idiom and the simplest fix (~1 LOC python edit in
      sabotage-test.sh line 231). javac's reachability analysis treats
      `if (constant-expression)` as reachable in both branches per JLS
      §14.21. The assertStatus line at the original line 210 becomes
      reachable-but-unreachable-at-runtime; javac's static analysis is
      satisfied. This is a smaller fix than option (2) or (3).
    alternative_robust_fix: |
      Option (2) — replace the method body — is more invasive but more
      robust. The python sed script could match the entire method body
      `public void systemsCollectionReturns200() {\n\t\tETSAssert.assertStatus(...);\n\t}` and replace with `public void systemsCollectionReturns200() {\n\t\tthrow new AssertionError(...);\n\t}`. ~5-10 LOC python.
    recommended_for_sprint_7: option_1 (if-true-throw idiom)

