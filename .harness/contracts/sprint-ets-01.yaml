success_criteria:
  all_critical_scenarios_pass: true
  normal_scenario_pass_rate: 0.90
  spec_updated: true
  no_regression: true
  build_green_jdk17: true
  reproducible_build: true
  teamengine_loads_ets_without_error: true
  smoke_test_green_against_georobotix: true
  no_part2_work_in_sprint: true
  uri_mapping_fidelity_preserved: true
  spec_trap_fixtures_preserved: true
  openapi_yaml_pinned_by_sha: true

evaluation_focus:
  # What Quinn (and Raze, if Gate 4 fires) should weight
  - "Did the Java port preserve the URI-mapping fidelity from the TS registry? Spot-check: every @Test description in the Core suite has a matching `/req/core/...` URI in the TS source under csapi_compliance/src/engine/registry/."
  - "Are the v1.0 GH#3 fixes preserved? Specifically: rel=self on landing page is NOT asserted as mandatory (REQ-ETS-CORE-002 + SCENARIO-ETS-CORE-LINKS-NORMATIVE-001), and the API-definition fallback (service-desc OR service-doc) is honored (SCENARIO-ETS-CORE-API-DEF-FALLBACK-001)."
  - "Is the OGC OpenAPI YAML pinned by commit SHA in pom.xml, not by branch name? Verify via `mvn dependency:list` or by grep on pom.xml."
  - "Are the spec-trap fixtures from csapi_compliance/tests/fixtures/spec-traps/ ACKNOWLEDGED as a downstream port target (REQ-ETS-FIXTURES-001..003 referenced in epic-ets-06)? They are NOT in Sprint 1 scope but the contract must NOT erase the requirement that they exist."
  - "Does the smoke test against GeoRobotix produce a non-empty TestNG report with zero suite-registration errors? Concrete artifact required: archived TestNG XML in CI."
  - "Were any Part 2 REQs implemented? Sprint 1 contract is violated if so."
  - "Did Generator skip writing ADRs for archetype-modernization decisions? Each delta from the 2019 archetype must be ADR-tracked per REQ-ETS-SCAFFOLD-006."

evaluation_questions_for_quinn:
  - "Compare Java @Test descriptions in CoreTests.java against the URI list extracted from csapi_compliance/src/engine/registry/common.ts and csapi_compliance/src/engine/registry/csapi-core.ts. Are all relevant URIs present? Are there extras? Are any missing without justification?"
  - "Run scripts/smoke-test.sh in a fresh container; archive the TestNG report; verify zero ERROR entries and non-empty test list."
  - "Verify reproducible build: clean checkout twice, mvn clean install twice, diff target/*.jar excluding META-INF timestamps."
  - "Verify the v1.0 known-issue catalog at csapi_compliance/ops/known-issues.md does not regress: rel=self, service-doc fallback, half-conformant featureType — all should be preserved-by-design in the Java port."

gate_4_required: true
gate_4_triggers:
  reason: "First sprint of a major architectural pivot. Adversarial review (Raze) is mandatory regardless of LOC because the language change introduces translation risk; specifically, spec knowledge encoded in TypeScript must transfer to Java without losing the GH#3 fix and the spec-trap fixture corpus."
  force_run: true

# Convention (clarified retroactively per S-ETS-03-06 doc-cleanup #2):
# Smoke artifacts archive to ets-ogcapi-connectedsystems10/ops/test-results/
# (the artifact-producing repo's ops/), NOT csapi_compliance/ops/test-results/
# (which does not exist).
evaluation_artifacts_required:
  - "Archived TestNG report from smoke test against GeoRobotix"
  - "Diff output from reproducible-build CI job (must be empty modulo META-INF timestamps)"
  - "ADR files under _bmad/adrs/ for archetype modernization deltas"
  - "Updated openspec/capabilities/ets-ogcapi-connectedsystems/spec.md Implementation Status section"
  - "Updated _bmad/traceability.md with Sprint 1 REQ-ETS-* impl status"
  - "Updated ops/status.md and ops/changelog.md"

risks:
  highest:
    - id: "TEAMENGINE-SPI-DOCS-INCOMPLETE"
      description: "TeamEngine 5.6.x (currently 5.6.1) testng-essentials docs defer SPI registration details to a `Part 2` that is not yet linked. Mitigation: copy SPI registration pattern verbatim from ets-ogcapi-features10."
      severity: high
    - id: "ARCHETYPE-DATED"
      description: "ets-archetype-testng:2.7 was last published 2019. Generated scaffolds may need manual JDK-17 fixes. Mitigation: ADR each delta; budget 30-50% of S-ETS-01-01 for archetype modernization."
      severity: medium
    - id: "JVM-TOOLCHAIN-LEARNING-CURVE"
      description: "Team's demonstrated proficiency is TypeScript/Vitest. Maven + TestNG + REST Assured is new. Mitigation: heavy reuse of ets-ogcapi-features10 patterns."
      severity: medium
  out_of_scope:
    - "OGC governance velocity (CITE SC review pace) — not Sprint 1 risk."
    - "Three-implementation rule outreach — milestone-bound, post-Part-1."

handoff_to_generator:
  next_agent: "architect"
  rationale: |
    Architect (Alex) MUST land before Generator (Dana). The TeamEngine SPI registration mechanics,
    Java package naming, schema-bundling mechanism (symlink vs submodule vs copy), and the
    archetype modernization plan all need to be ratified at architectural level before code is
    written. Architect produces _bmad/architecture.md v2.0 and the ADRs that S-ETS-01-01 references.
