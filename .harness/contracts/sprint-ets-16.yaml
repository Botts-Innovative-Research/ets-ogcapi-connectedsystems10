  deployment_sensorml_shape_or_skip_honestly: true
  procedure_sensorml_shape_or_skip_honestly: true
  property_sensorml_shape_or_skip_honestly: true
  deployment_resource_specific_mapping_checked: true
  procedure_resource_specific_mapping_checked: true
  property_resource_specific_mapping_checked: true
