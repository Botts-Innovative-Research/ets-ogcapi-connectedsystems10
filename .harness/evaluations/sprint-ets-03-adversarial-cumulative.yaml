verdict_summary: |
  Sprint 3 cleanup-tail-plus-common-plus-systemfeatures-expansion lands with strong
  adversarial integrity across the cumulative 7-story scope. The HARDEST item — the
  bash-sabotage live exec that prior Raze runs timed out attempting — is not just
  archived but archived HONESTLY: TestNG XML at sprint-ets-03-dependency-skip-
  sabotage-2026-04-29.xml shows total=16 / passed=0 / failed=6 / skipped=10, and
  per-method status inspection confirms ALL FOUR SystemFeatures @Tests show
  status="SKIP" (zero PASS, zero FAIL — i.e. the dependsOnGroups="core" wiring did
  fire mechanically; if any SF method had been status="PASS", the wiring would have
  been broken and Dana would have misreported, but it didn't and they didn't). The
  Core-side FAIL evidence is grounded in concrete error messages ("expected HTTP 200,
  got 404", "Content-Type was: text/html") proving the bogus-IUT sabotage was
  genuinely sabotaging rather than the script lying.

  Three independently-curl-verified OGC `.adoc` sources (req/json/definition,
  req/system/collections, req/system/location-time) all return HTTP 200 with matching
  identifiers — Dana did NOT fabricate URIs in S-ETS-03-05 or S-ETS-03-07.

  PARTIAL/DEFERRED stories carry honest rationale (no paper-over):
    - S-ETS-03-03 DEFERRED: `gh auth status` independently confirms scopes are
      'gist','read:org','repo' with NO 'workflow' — 4th-sprint user-action blocker
      is real; Dana's deferral artifact correctly identifies escalation territory.
    - S-ETS-03-04 PARTIAL (3MB savings vs 113-160MB target): empirical analysis at
      sprint-ets-03-04-empirical-dedupe-list-2026-04-29.txt is GENUINE — lists 4
      exact-basename overlaps with sizes (1.8MB total), enumerates 14 intra-WEB-INF
      duplicate-version artifacts with the runtime-binding caveat per ADR-009
      §"DO NOT dedupe" rule, and clearly explains why ADR-009's 200-300MB
      illustrative target was empirically wrong (TE common-libs are TINY because
      the ADR-006 Jersey 3.x migration already moved the heavy jars to WEB-INF/lib;
      so the dedupe surface is correspondingly tiny). This is exactly the right
      kind of empirical-vs-illustrative reconciliation.
    - S-ETS-03-02 PARTIAL→PASS-at-unit-layer: credential-leak integration test
      executes 8/8 unit tests + grep mvn output for literal credential body (zero
      hits) + grep surefire XML (zero hits); deeper E2E IUT-auth wiring honestly
      deferred to Sprint 4 with explicit rationale.

  Common conformance class (S-ETS-03-07): 4 @Tests, all use ETSAssert.failWithUri,
  zero `throw new AssertionError` or `Assert.fail`, INDEPENDENT (groups="common"
  with no dependsOnGroups), URIs cite the underlying ogcapi-common-1 + ogcapi-
  common-2 sub-requirements per OGC `.adoc` actual identifiers (json/definition,
  landing-page/conformance-success, json/content, collections/collections-list-
  success). Note: the contract anticipated `/req/common/<X>` form, but Dana
  correctly used the actual `.adoc` identifiers — this is correct adaptation, not
  divergence (the OGC standards don't actually use `/req/common/<X>` form).

  SystemFeatures expansion (S-ETS-03-05): 6 @Tests total (4 original + 2 new for
  /req/system/collections + /req/system/location-time). The nested-properties fix
  is implemented correctly with defense-in-depth: `nestedHasNonNull(systemItemBody,
  "properties", "validTime")` is tried in addition to top-level `validTime`, so
  the GeoJSON Feature shape from GeoRobotix would be detected at either path.
  Without this dual-path check, the GeoRobotix shape (validTime nested under
  properties) would have FAIL'd; Dana caught and patched this in commit c56df10.

  Sprint 1+2 invariants preserved: schemas byte-identical (diff -r empty), SPI
  single-FQCN line preserved, ADR-002 sha pin preserved, zero stale strings
  (ogcapi.cs10 / ets-common:14 / teamengine-production:5.5). Surefire 61/0/0/3
  (independently re-run in 14s; matches Dana's claim). Final smoke XML shows
  total=22 / passed=22 / failed=0 / skipped=0 across Core (12) + SystemFeatures
  (6) + Common (4) = 22 PASS — matches Dana's claim.

  Contract modifications during Sprint 3 (Run 1 commit dcea3ba): footnote-only
  Convention edits to Sprint 1 and Sprint 2 contracts (ops/test-results/ location
  clarification) — semantically harmless audit-trail clarification, not contract-
  surface mutation. Frozen-audit-artifact integrity preserved.

  Three CONCERNS (non-blocking; downgrade vs the 0.96 ceiling):
    (1) The S-ETS-03-04 result formally MISSED Sprint 3's stretch criterion
        `image_size_under_550mb=true` (660MB delivered vs <550MB target). Dana's
        empirical analysis correctly explains WHY the target was unrealistic
        (ADR-009 illustrative numbers were off-by-an-order-of-magnitude given
        post-ADR-006 layout), and PARTIAL with explicit Sprint 4 path is the
        contract-permitted outcome — but the verdict cannot ignore that the
        success_criterion line literally evaluates to false.
    (2) S-ETS-03-02 `credential_leak_integration_test_green` PASSES at the unit-
        test integration layer (8/8 PASS, zero leaks in mvn + surefire output),
        but the design.md §529 / contract original intent was full E2E with a
        synthetic auth-credential flowing through REST-Assured against the IUT.
        Honest defer to Sprint 4 with rationale, but it's a partial-meets-spirit
        rather than a literal-meets-letter close.
    (3) S-ETS-03-03 is the FOURTH consecutive sprint deferral on the same
        user-action blocker (S-ETS-01-01 → S-ETS-01-03 → S-ETS-02-05 → S-ETS-03-
        03). Honest deferral, but the structural risk Pat flagged in the contract
        (gh-workflow-scope-still-missing-4th-sprint, severity=medium) has now
        manifested. Sprint 4 planning needs an explicit user-escalation hard-stop.

