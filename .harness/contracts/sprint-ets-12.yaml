stories:
  - id: "S-ETS-12-01"
    title: "Create/Replace/Delete safety-gated systems subset - depends on SystemFeatures"
    file: "epics/stories/s-ets-12-01-create-replace-delete-safety-gated.md"
    epic: "epic-ets-02-part1-classes"
    priority: "P0"
    complexity: "M"
    depends_on:
      - "systemfeatures"
    parallelizable: false
    rationale: |
      Create/Replace/Delete is the next remaining Part 1 class. GeoRobotix declares the class
      and advertises mutating methods, but it is a shared public demo target. Sprint 12 must
      therefore establish mutation-safety plumbing and non-mutating readiness checks before
      any future positive lifecycle execution against a dedicated mutable IUT.

