stories:
  - id: "S-ETS-06-01"
    title: "MaskingRequestLoggingFilter wire-fix: log masked directly; ctx.next(originalSpec); new wire-side unit test; container-log capture fix bundled"
    file: "epics/stories/s-ets-06-01-masking-filter-wire-fix.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P0"
    complexity: "M"
    depends_on: []
    parallelizable: false
    rationale: |
      GAP-1' from Sprint 5 Raze adversarial live-exec (confirmed by Quinn + meta-Raze):
      MaskingRequestLoggingFilter.filter() mutates requestSpec to masked form before
      super.filter() → ctx.next() performs the HTTP send; finally-block restores AFTER
      the wire. Wire carries Bear***WXYZ instead of the original credential. The Sprint 3
      design.md javadoc claim "IUT receives the real credential header" is FALSE in the
      current implementation.

      Fix approach (i) per primary Raze + meta-Raze consensus: do NOT call super.filter()
      (which delegates log output and then calls ctx.next internally); instead: (1) build
      masked log string directly from requestSpec headers snapshot; (2) emit to PrintStream;
      (3) call ctx.next(originalSpec) directly. This separates "log with masking" from
      "HTTP transmission" — masking happens at log time, wire carries original.

      Bundled items (both ~10 LOC bash each):
      - Container-log capture timing fix: capture catalina.out BEFORE smoke-test.sh
        teardown trap (CONCERN-1 from Raze — prong (a) currently passes vacuously;
        prong (b) currently grep-misses because container log is empty after teardown)
      - Prong (b) grep expansion: add stub-IUT log grep to prong (b) in
        credential-leak-e2e-test.sh (CONCERN-2 from Raze — masked form IS in stub log
        but current script doesn't grep there for prong b)

      Wire-side unit test (part of this story's DoD — also referenced by S-ETS-06-03
      for spec-side reclassification):
      - New VerifyWireRestoresOriginalCredential test class with CapturingFilterContext
        (not StubFilterContext) records requestSpec passed to ctx.next() and asserts
        Authorization header = ORIGINAL value.

  - id: "S-ETS-06-02"
    title: "sabotage-test.sh rsync .git include fix + honest log message (1-2 LOC bash)"
    file: "epics/stories/s-ets-06-02-sabotage-rsync-git-fix.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"
    complexity: "S"
    depends_on: []
    parallelizable: true
    rationale: |
      GAP-2 from Sprint 5 Raze adversarial live-exec (confirmed by Quinn + meta-Raze;
      reproduced from 3 independent clones; reclassified from HIGH → MEDIUM by meta-Raze):
      sabotage-test.sh --target=systemfeatures rsync call at line 205 uses
      --exclude='.git/', which strips .git from the temp worktree. The project Dockerfile
      line 59 has `COPY .git ./.git` (for git-commit-sha manifest pinning per ADR-002).
      Temp worktree missing .git → Docker build fails at COPY .git step.

      Fix: remove --exclude='.git/' from the rsync call. ~1 LOC bash.
      Additional improvement: distinguish Docker build failure from smoke @Test failure
      in the log message at line ~266. ~5-10 LOC bash conditional.

      This fix enables the gate-time live cascade verification that proves Procedures +
      Deployments SKIP when SystemFeatures FAILs — closing the ADR-010 v3 "forward-
      extends to Procedures + Deployments" claim at the live-exec layer.

  - id: "S-ETS-06-03"
    title: "Wire-side unit test spec reclassification: 16 tests marked wiring-only; spec.md + story notes amended"
    file: "epics/stories/s-ets-06-03-wire-side-unit-test-reclassify.md"
    epic: "epic-ets-04-teamengine-integration"
    priority: "P1"
    complexity: "S"
    depends_on: ["S-ETS-06-01"]
    parallelizable: false
    rationale: |
      META-GAP-1 from meta-Raze review: both VerifyAuthCredentialPropagation (8 tests)
      + VerifyMaskingRequestLoggingFilter (8 tests) — 16 total — use StubFilterContext
      returning null from ctx.next(). They exercise wiring, header mutation behavior,
      and snapshot/restore roundtrip in isolation but CANNOT detect the filter-ordering
      defect that GAP-1' exposed. Neither Quinn nor Raze explicitly cataloged this as a
      separate gap; both reported "8/8 PASS" as a strength while separately noting the
      StubFilterContext limitation. The 16-PASS metric is misleading without the caveat.

      This story's primary deliverable is spec.md + story-notes documentation updates.
      The new VerifyWireRestoresOriginalCredential test (the wire-side proof) is
      implemented in S-ETS-06-01 (DoD shared). This story sequences AFTER S-ETS-06-01
      to reference the test in the reclassification text.

