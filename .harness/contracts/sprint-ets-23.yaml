verdict_policy:
  declaration_gate:
    - "If /conf/feasibility is not declared, all Feasibility conformance assertions SKIP with a precise reason."
    - "Do not infer /conf/feasibility PASS from /conf/controlstream or from ControlStream endpoint success."
    - "Do not treat GeoRobotix HTTP 400 Invalid resource name responses as Feasibility endpoint evidence."
  prerequisite:
    - "Keep /req/controlstream prerequisite handling visible and honest."
    - "Do not report full /conf/feasibility closure when /req/controlstream cannot be established."
  public_iut_safety:
    - "Default GeoRobotix smoke must not issue IUT-bound feasibility POST requests."
    - "Positive feasibility creation checks require explicit safe/mutable-IUT opt-in."
    - "Feasibility POSTs, if later enabled, must remain separate from regular Command creation checks."
  resource_evidence:
    - "Canonical URL, status endpoint, and result endpoint PASS outcomes require actual Feasibility resource evidence."
    - "Empty or absent Feasibility resources produce SKIP, not PASS."
    - "Feasibility collections are optional unless itemType Feasibility is advertised."
  endpoint_alias_honesty:
    - "/req/feasibility/ref-from-controlstream PASS requires the normative singular {api_root}/controlstream/{csId}/feasibility endpoint, or a documented standards-backed rationale."
    - "The plural /controlstreams/{id}/feasibility probe is diagnostic only and cannot satisfy /req/feasibility/ref-from-controlstream by itself."

