  - id: CONCERN-2
    severity: low
    title: "scripts/smoke-test.sh staging step requires populated ~/.m2/repository (not durable in fresh CI)"
    description: |
      smoke-test.sh lines 64-81 stage build artifacts via:
        - mvn -B -q clean package -DskipTests   (line 69)
        - mvn -B -q dependency:copy-dependencies -DoutputDirectory=target/lib-runtime
                                                  -DincludeScope=runtime  (line 75)
        - rm -f target/lib-runtime/teamengine-*.jar  (line 80)

      In a fresh CI runner (e.g. GitHub Actions ubuntu-latest with no prior
      mvn cache), both mvn calls will resolve the entire ets-common:17 + Jersey
      3.x + REST Assured + everit-json-schema + jts + groovy + ... transitive
      tree from Maven Central + OSSRH. That's ~70 dependencies (verified: `ls
      target/lib-runtime/ | wc -l` = 72), download size on the order of 100MB+.

      Two failure modes:
      1. **CI build time**: 5-10 minutes added per smoke-test invocation in the
         worst case (cold cache).
      2. **Brittleness**: If OSSRH or any single transitive's host is
         intermittently unreachable (which has happened in the OGC ecosystem
         before, e.g. ets-common's earlier OSSRH outages), the smoke-test
         fails for transient reasons unrelated to the ETS itself.

      The Dockerfile does NOT bake the deps closure into the image (line 96:
      `COPY target/lib-runtime/`); the staged dir lives outside. A more
      robust pattern is a multi-stage Dockerfile:
        FROM maven:3.9-eclipse-temurin-17 AS build
        COPY pom.xml ./
        RUN --mount=type=cache,target=/root/.m2 mvn -B -q dependency:resolve
        COPY src ./src
        RUN --mount=type=cache,target=/root/.m2 mvn -B -q package -DskipTests \
            && mvn -B -q dependency:copy-dependencies \
                -DoutputDirectory=target/lib-runtime -DincludeScope=runtime

      Dana's self-report flagged this concern (architect-handoff did not
      surface it). I confirm it's real but not Sprint 1 blocking — local dev
      and the OGC dev's WSL2 CI work fine because mvn cache is populated by
      the prior `mvn test` step.
    evidence: |
      grep -nE 'mvn|copy-depend' /home/nh/docker/gir/ets-ogcapi-connectedsystems10/scripts/smoke-test.sh
      → 6 mvn references at lines 67-78
      ls /tmp/raze-fresh-checkout-s03/target/lib-runtime/ | wc -l
      → 72 jars staged (after teamengine-*.jar removal)
      Total deps zip size in target: ~30MB (varies)
      Dockerfile line 96: COPY target/lib-runtime/ /usr/local/tomcat/webapps/teamengine/WEB-INF/lib/
        — confirms deps are NOT baked into image; required to be staged outside
    recommended_fix: |
      Sprint 2 cleanup: convert Dockerfile to multi-stage build with mvn cache
      mount; eliminate the `mvn dependency:copy-dependencies` step in
      smoke-test.sh. Estimated 30-LOC Dockerfile change + 20-LOC smoke-test.sh
      simplification. Tag for next CI-hardening sprint.
    address_in_turn: no (defer to Sprint 2 or whenever CI infra lands)

  - id: CONCERN-3
    severity: low
    title: "Single-stage Dockerfile + container runs as root; image ~600MB"
    description: |
      The Dockerfile is single-stage (no `AS builder` separation). Build-time
      artifacts ship directly into the runtime image. The base
      `tomcat:8.5-jre17` is ~330MB; final image is ~600MB after layering.
      The container runs as `root` (Tomcat 8.5 base default; no `USER` line in
      Dockerfile).

      Both are defensible for a test harness (not a production-facing
      service), but Sprint 2+ should flag both:
        - Multi-stage build to drop intermediate Maven artifacts
        - Add `USER tomcat` (UID 1000) before CMD
        - Consider distroless base for the runtime stage (would require Tomcat
          embedded jar; significant refactor)

      Sprint 1 acceptable; Sprint 2 housekeeping.
    evidence: |
      cat /home/nh/docker/gir/ets-ogcapi-connectedsystems10/Dockerfile | grep -E '^(FROM|USER|AS)'
      → only line 32: FROM tomcat:8.5-jre17
      No multi-stage (no AS), no USER directive
      docker images | grep ets-ogcapi-connectedsystems10:smoke
      → ~600MB total image size
    recommended_fix: |
      Sprint 2 housekeeping: add multi-stage + USER directive. ~10 LOC
      Dockerfile change.
    address_in_turn: no (defer to Sprint 2)

  - id: CONCERN-4
    severity: low
    title: "Sprint 1 success criteria `teamengine_loads_ets_without_error` verified-by-smoke; a tighter check would parse `/rest/suites/<code>` metadata"
    description: |
      Sprint contract success_criterion `teamengine_loads_ets_without_error`
      is satisfied by smoke-test.sh's success (12/12 PASS, suite is queryable
      via `<etscode>` grep). A tighter adversarial check would:
        - GET /teamengine/rest/suites/ogcapi-connectedsystems10
        - Parse the response XML
        - Assert version == project.version, title == project.name,
          getCode() == ets-code per ets.properties
      This would catch a class of failure where the suite is loaded but
      reports wrong metadata (e.g. cached classes from a stale jar). Sprint 1
      doesn't require this tightness.
    evidence: |
      smoke-test.sh line 116:
        "if ! echo \"$suites_xml\" | grep -q \"<etscode>${ETS_CODE}</etscode>\"; then"
        — checks for presence of etscode element only, not full metadata.
    recommended_fix: |
      Sprint 2: extend smoke-test.sh step 5 to:
        suite_meta=$(curl -fsS -u ... /rest/suites/${ETS_CODE})
        version=$(echo "$suite_meta" | xmllint --xpath '//version/text()' -)
        [[ "$version" == "0.1-SNAPSHOT" ]] || die "version mismatch"
      ~10 LOC.
    address_in_turn: no (Sprint 2 nice-to-have)

