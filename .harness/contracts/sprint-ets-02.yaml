evaluation_focus:
  # What Quinn (and Raze, since gate_4_required: true) should weight
  - "Does the EtsAssert helper API surface match what the architect ratified (per next architect-handoff)? Spot-check that the helper signatures in `ETSAssert.java` cover the 4 use-cases (assertStatus, assertJsonObjectHas, assertJsonArrayContains, failWithUri) and that the 21 bare-throw sites in conformance.core.* are all migrated."
  - "Does the URI canonicalization sweep land the OGC `.adoc` form on EVERY site? Use Raze's prior canonical-fetch evidence at `.harness/evaluations/sprint-api-def-fallback-adversarial.yaml` (verified 2026-04-17 against `raw.githubusercontent.com/opengeospatial/ogcapi-common/master/19-072/requirements/landing-page/REQ_root-success.adoc`). After this sweep, dereferencing any @Test description URI against the OGC normative document SHOULD return 200 (not 404)."
  - "Does smoke-test.sh STILL exit 0 with 12/12 PASS for Core AFTER the EtsAssert refactor + URI canonicalization sweep + Dockerfile multi-stage rebuild + logback masking filter wired? (No regression of S-ETS-01-03's smoke is the integration gate.)"
  - "Does SystemFeaturesTests follow the S-ETS-01-02 pattern with no new bare-throw sites and the OGC canonical URI form from day 1? Verify the dependency-skip wiring: temporarily make Core FAIL (e.g. point IUT at a server with no /conformance) and confirm SystemFeatures @Tests emit SKIP (not FAIL or ERROR)."
  - "Does the multi-stage Dockerfile build cleanly on a fresh runner with NO ~/.m2 cache? (Raze s03 CONCERN-2 specifically called this out as the failure mode the current single-stage Dockerfile is exposed to.) Verify by running `docker build` in a tempdir with no ~/.m2 mount available."
  - "Does the CredentialMaskingFilter actually work? Spot-check by setting `auth-credential=Bearer abcd1234efgh5678ijklmnop` as a CTL parameter and grep-checking the TestNG report attachments + container log for the literal substring `1234efgh5678ijklm` (which would be the unmasked middle); if it appears anywhere, the filter is leaking. Verify masked-form `Beare...mnop` does appear (proves filter ran)."
  - "Were any Part 2 REQs implemented? Sprint 2 contract is violated if so."
  - "Is the CI workflow LIVE at `.github/workflows/build.yml` (not staged at `ci/github-workflows-build.yml`)? GitHub Actions UI should show at least one workflow_run on the Sprint 2 close commit. If gh token scope is still the blocker, the close commit must explicitly defer with rationale + a tracked-blocker artifact."

evaluation_questions_for_quinn:
  - "Run `mvn clean install` on a fresh checkout of the new repo at the Sprint 2 close HEAD. Verify surefire still shows 22+N tests / 0 failures / 0 errors / 3 skipped (where N is the new SystemFeatures @Tests + any new ETSAssert tests). Check that reproducibility is preserved (sha256 of main jar matches across two consecutive fresh-clone builds)."
  - "Run `bash scripts/smoke-test.sh` end-to-end. Verify exit 0 + (12 + N)/N PASS where N is the full SystemFeatures count. Archive the TestNG XML to `ops/test-results/sprint-ets-02-georobotix-smoke-<date>.xml` for the audit trail."
  - "grep -rE 'throw new AssertionError|Assert\\.fail' src/main/java/.../conformance/ — count MUST be 0 across ALL conformance.* subpackages (core + systemfeatures). If any non-zero, GAP."
  - "grep -hoE 'http://www\\.opengis\\.net/spec/[^ \"]+' src/main/java/.../conformance/*/*.java | sort -u — every URI MUST match the OGC canonical `.adoc` form (`/req/<class>/<X>-success` for Common Part 1; `/req/<class>/<X>` for CS API). Cross-reference against the `csapi_compliance/openspec/capabilities/ets-ogcapi-connectedsystems/spec.md` REQ blocks updated by S-ETS-02-03."
  - "Verify ADR-006 + ADR-007 exist under `_bmad/adrs/` with the standard ADR template (Context, Decision, Status, Consequences, Alternatives Considered). Cross-reference back to the Sprint 1 commits they retroactively cover."
  - "Run a credential-leak test: set CTL parameter `auth-credential=Bearer ABCDEFGH12345678WXYZ` and run smoke-test.sh. grep both the TestNG report XML attachments AND the container log for the literal substring `EFGH12345678WXYZ` (the would-be-unmasked middle). Zero hits = pass."
  - "Verify `.github/workflows/build.yml` exists (not at `ci/github-workflows-build.yml`). If `gh auth refresh -s workflow` was run during the sprint, the GitHub UI should show at least one successful workflow_run on a Sprint 2 commit."

