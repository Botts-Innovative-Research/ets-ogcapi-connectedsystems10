strategic_decisions:
  q1_next_work:
    question: "After Sprint 15, what is the next Sprint item?"
    decision: "S-ETS-16-01 SensorML non-system read-only expansion"
    rationale: |
      SensorML has a clear open Part 1 gap from Sprint 10:
      deployment/procedure/property schema and mapping checks. The work is
      read-only, low mutation risk, and directly advances REQ-ETS-PART1-013.

  q2_scope_boundary:
    question: "Should Sprint 16 close full SensorML?"
    decision: "No. Keep REQ-ETS-PART1-013 PARTIAL."
    rationale: |
      Sprint 16 covers deployment/procedure/property read-only schema and
      mapping checks only. `/req/sensorml/mediatype-write`,
      `/req/sensorml/relation-types`, full SensorML 3.0 JSON Schema validation,
      mutation-side behavior, GeoJSON, and Part 2 remain out of scope.

  q3_fallback_honesty:
    question: "How should default CS API JSON responses be treated?"
    decision: "CS API `items` wrappers and default Feature JSON are fallback evidence, not PASS."
    rationale: |
      GeoRobotix currently declares `/conf/sensorml`, but deployment, procedure,
      and property collection requests with `Accept: application/sml+json`
      returned `Content-Type: application/json` CS API wrappers. Counting that
      as SensorML PASS would repeat the encoding false-positive risk addressed
      in Sprint 9 and Sprint 10.

