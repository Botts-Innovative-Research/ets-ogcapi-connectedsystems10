  - concern: "deselectCrudClasses helper matches label text by URI substring. Works for the current supported-set, but is brittle to future label copy changes. Not a blocker — just a maintenance note."
    location: "tests/e2e/assessment-flow.spec.ts:25-27"
  - concern: "The fast-run (1.3s backend, 3.2s E2E) on GeoRobotix is not a bug per se, but it means SCENARIO-SESS-PROG-001 is effectively a chrome-render test, not a progress-behavior test."
    location: "tests/e2e/assessment-flow.spec.ts:175-178"

