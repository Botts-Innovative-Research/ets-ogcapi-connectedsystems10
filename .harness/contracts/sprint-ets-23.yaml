generator_must_not_do:
  - "Do not use stale /req/commandfeasibility, /req/systemevents, or dynamic-* identifiers."
  - "Do not PASS /conf/feasibility from /conf/controlstream alone."
  - "Do not POST to GeoRobotix or any public IUT during default smoke."
  - "Do not create regular Commands as a Feasibility substitute."
  - "Do not treat /commands or /controlstreams/{id}/commands as Feasibility endpoint evidence."
  - "Do not PASS /req/feasibility/ref-from-controlstream from plural /controlstreams/{id}/feasibility alias evidence alone."
  - "Do not fail an IUT solely because Feasibility collections are absent."

