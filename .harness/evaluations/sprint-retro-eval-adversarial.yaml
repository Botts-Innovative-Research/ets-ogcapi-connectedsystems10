schema_friction_notes: |
  Feedback on the Gate 4 schema (first live run):

  1. `step_1_spec_first`/`step_3_implement` not meaningful for a retro-eval where code predates the harness. I used "N/A" with a comment; schema should explicitly allow N/A (prompt said it does, good).
  2. `overrides_evaluator: true` is ambiguous when Quinn's verdict (RETRY) was for a different HEAD than what Raze is reviewing. My verdict (GAPS_FOUND) is technically less severe than RETRY, but it applies to post-fix code and cites different gaps. Recommend adding a field like `evaluator_snapshot_commit: "<sha>"` and `adversarial_snapshot_commit: "<sha>"` so the delta is explicit.
  3. `request_fulfillment.fully_delivered` as a flat list gets unwieldy when the sprint has 39 stories; would benefit from grouping by story or by original-eval-finding-ID. Not a blocker, a nice-to-have.
  4. No explicit slot for "missing follow-up artifacts" (e.g., missing Gate 2 re-run, missing ops/test-results.md regeneration). I folded these under `gaps` and `recommendations`, but the pattern is distinct enough to deserve its own field: `missing_artifacts: [{path, reason_needed}]`.
  5. The binary `overrides_evaluator` doesn't capture the "Quinn was right about the pre-fix state, I'm judging the post-fix state" nuance. Consider three values: "agrees", "overrides-upward" (Raze stricter), "overrides-downward" (Raze less strict given new evidence).
  6. `confidence` is fine as a 0-1 float but would benefit from a note field explaining what drives it down from 1.0 (here: inability to independently re-run E2E + no post-fix Gate 2 artifact).
  7. Overall: schema is workable for a first run. Friction points above are refinements, not redesigns.
